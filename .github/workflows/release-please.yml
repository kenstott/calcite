name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Ensure engine-v<version> tag exists even if release-please created only v<version>
      - name: Create engine-v alias tag
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.release.outputs.tag_name }}"
          BARE="${VERSION#v}"
          ENGINE_TAG="engine-v${BARE}"
          SHA="${{ steps.release.outputs.sha }}"
          if ! gh api "repos/${{ github.repository }}/git/refs/tags/${ENGINE_TAG}" &>/dev/null; then
            gh api repos/${{ github.repository }}/git/refs \
              --method POST \
              --field ref="refs/tags/${ENGINE_TAG}" \
              --field sha="${SHA}"
            echo "Created ${ENGINE_TAG} → ${SHA}"
          else
            echo "${ENGINE_TAG} already exists"
          fi

      # release-please creates a redundant v<version> release + tag. The canonical, consistent
      # release is engine-v<version> (alias above, assets attached by AskAmerica Engine). Remove the
      # v<version> duplicate so only the engine-v<version> tag/release remains.
      - name: Remove redundant v<version> release/tag
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.release.outputs.tag_name }}"
          gh release delete "${VERSION}" --repo "${{ github.repository }}" --cleanup-tag --yes \
            || echo "No ${VERSION} release/tag to remove"

      # Tags created via the API by GITHUB_TOKEN do not trigger push events in other
      # workflows. Dispatch the release CI explicitly so the jar is always built.
      - name: Dispatch release workflows
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.release.outputs.tag_name }}"
          BARE="${VERSION#v}"
          ENGINE_TAG="engine-v${BARE}"
          gh workflow run "AskAmerica Engine" \
            --repo "${{ github.repository }}" \
            --ref "refs/tags/${ENGINE_TAG}" \
            --field version="${BARE}"
          gh workflow run "Publish GovData Driver" \
            --repo "${{ github.repository }}" \
            --ref "refs/tags/${ENGINE_TAG}"
          gh workflow run "publish-trino" \
            --repo "${{ github.repository }}" \
            --ref "refs/tags/${ENGINE_TAG}" \
            --field version="${BARE}"
          echo "Dispatched release workflows on ${ENGINE_TAG}"
