# pgwire-calcite CI — runs the test suite (JVM + Calcite classpath + UDFs).
# Part of the BSL-1.1 pgwire-calcite subtree (see pgwire-calcite/LICENSE, NOTICE).
name: pgwire-calcite CI

on:
  push:
    paths:
      - "pgwire-calcite/**"
      - ".github/workflows/pgwire-calcite-ci.yml"
  pull_request:
    paths:
      - "pgwire-calcite/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build Calcite file-adapter runtime classpath
        run: |
          ./gradlew :file:pgwPrintCp \
            --init-script pgwire-calcite/scripts/print-calcite-classpath.gradle \
            --no-daemon --console=plain -q
          cp /tmp/pgw-file-cp.txt pgwire-calcite/calcite-classpath.txt
          echo "classpath entries: $(tr ':' '\n' < pgwire-calcite/calcite-classpath.txt | wc -l)"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build vector/compat UDF jar
        working-directory: pgwire-calcite
        run: bash packaging/build-udf.sh

      - name: Create venv and install (with OIDC extra)
        working-directory: pgwire-calcite
        run: |
          uv venv --python 3.12 .venv
          uv pip install --python .venv -e ./vendor/buenavista -e ".[oidc]" pytest

      - name: Run tests
        working-directory: pgwire-calcite
        run: .venv/bin/python -m pytest tests/unit -q --junit-xml=pytest.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pgwire-calcite/pytest.xml
