name: AskAmerica Engine

on:
  push:
    tags:
      - 'engine-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0)'
        required: true
        default: '0.1.0'

jobs:
  # ── GovData ETL JAR (used by run-all-dq.sh on ingest servers) ────────────
  govdata-jar:
    name: Build govdata shadow JAR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build govdata shadow JAR
        run: ./gradlew :govdata:shadowJar --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename to stable asset name
        run: |
          JAR=$(find govdata/build/libs -name "sih-govdata-*.jar" -o -name "calcite-govdata-*-all.jar" | head -1)
          echo "JAR: $JAR ($(du -sh "$JAR" | cut -f1))"
          cp "$JAR" govdata/build/libs/sih-govdata.jar

      - name: Upload govdata JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: govdata-jar
          path: govdata/build/libs/sih-govdata.jar
          retention-days: 30

  # ── Trino connector plugins (calcite, sharepoint, splunk) ──────────────────
  trino-plugins:
    name: Build Trino connector plugins
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Java 25 for the connector toolchain (Trino SPI) + Java 21 to run Gradle.
      # Last-listed becomes the default JAVA_HOME (21), which runs Gradle.
      - name: Set up JDKs
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: |
            25
            21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build plugin packages
        run: |
          ./gradlew \
            :trino-calcite:trinoPlugin \
            :trino-sharepoint:trinoPlugin \
            :trino-splunk:trinoPlugin \
            :trino-file:trinoPlugin \
            :trino-cloudops:trinoPlugin \
            -Porg.gradle.java.installations.paths="${JAVA_HOME_25_X64},${JAVA_HOME_21_X64}" \
            --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect plugin archives (stable names)
        run: |
          mkdir -p trino-assets
          for m in trino-calcite trino-sharepoint trino-splunk trino-file trino-cloudops; do
            src=$(ls ${m}/build/distributions/${m}-plugin-*.zip | head -1)
            cp "$src" "trino-assets/${m}-plugin.zip"
          done
          ls -lh trino-assets/

      - name: Upload Trino plugin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trino-plugins
          path: trino-assets/*.zip
          retention-days: 30

  # ── JAR build (ubuntu only — same JAR works on all platforms via JPype) ────
  jar:
    name: Build shadow JAR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build shadow JAR
        run: ./gradlew :askamerica-engine:shadowJar --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report JAR size
        run: |
          JAR=$(find askamerica-engine/build/libs -name "askamerica-engine*.jar" | head -1)
          echo "JAR: $JAR"
          echo "JAR size: $(du -sh "$JAR" | cut -f1)"
          # Rename to a stable name for the release asset
          cp "$JAR" askamerica-engine/build/libs/askamerica-engine.jar

      - name: Slimming guards (distribution.md)
        # Lock in the read-only slimming so a transitive dep can't silently reintroduce
        # bloat. Fail the build rather than ship a regressed asset.
        run: |
          JAR=askamerica-engine/build/libs/askamerica-engine.jar
          fail=0
          entries=$(unzip -l "$JAR" | awk '{print $4}')
          # Tier-2a: AWS SDK v1 codegen JSON must be stripped (flat models/*.json only).
          n=$(echo "$entries" | grep -cE '^models/.*-(intermediate|model)\.json$' || true)
          [ "$n" -eq 0 ] || { echo "FAIL: $n AWS codegen JSON entries under models/"; fail=1; }
          # Tier-1: orphaned ML resources must be stripped.
          for pat in 'models/all-MiniLM' 'native/lib/'; do
            c=$(echo "$entries" | grep -cE "^${pat}" || true)
            [ "$c" -eq 0 ] || { echo "FAIL: orphan '$pat' present ($c)"; fail=1; }
          done
          # Tier-3: Arrow Gandiva must be stripped (reached only via reflective .arrow path).
          for pat in 'gandiva_jni/' 'org/apache/arrow/gandiva/'; do
            c=$(echo "$entries" | grep -cE "^${pat}" || true)
            [ "$c" -eq 0 ] || { echo "FAIL: gandiva '$pat' present ($c)"; fail=1; }
          done
          # Regression guard: the govdata resource under config/ must be preserved
          # (proves the models/*.json exclude did not over-match).
          k=$(echo "$entries" | grep -cE '^config/djia-wiki-model\.json$' || true)
          [ "$k" -eq 1 ] || { echo "FAIL: config/djia-wiki-model.json missing (over-broad exclude)"; fail=1; }
          # Size ceiling — catches a bloat regression (current ~441 MB after Tier-1/2a/3).
          sz=$(stat -c%s "$JAR"); ceil=$((500*1024*1024))
          echo "JAR size: $((sz/1024/1024)) MB (ceiling $((ceil/1024/1024)) MB)"
          [ "$sz" -le "$ceil" ] || { echo "FAIL: jar exceeds size ceiling"; fail=1; }
          [ "$fail" -eq 0 ] && echo "All slimming guards passed." || exit 1

      - name: Stage unshaded jar-set (smoke)
        # distribution.md wheel path: prove the unshaded runtime jar-set builds in CI.
        # Not yet uploaded — the <100 MB wheel partition is the tracked follow-up.
        run: |
          ./gradlew :askamerica-engine:stageEngineRuntime --no-daemon
          DIR=askamerica-engine/build/engine-runtime
          echo "jar-set: $(ls "$DIR"/*.jar | wc -l) jars, $(du -sh "$DIR" | cut -f1)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: askamerica-engine-jar
          path: askamerica-engine/build/libs/askamerica-engine.jar
          retention-days: 30

  # ── JDBC driver test suite ───────────────────────────────────────────────
  test:
    name: JDBC driver tests
    runs-on: ubuntu-latest
    needs: jar
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install jpype1
        run: pip install jpype1

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: askamerica-engine-jar
          path: askamerica-engine/build/libs/

      - name: Run JDBC driver tests
        # Non-fatal: this is a live-data smoke test against the govdata S3 warehouse. When ref
        # tables are unavailable (e.g. after a data purge) it must not block the release — the
        # driver jar and installers are independent of live data. Failures are still logged.
        continue-on-error: true
        run: python3 govdata/scripts/test_govdata_python.py askamerica-engine/build/libs/askamerica-engine.jar
        env:
          AWS_ACCESS_KEY_ID:       ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:   ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_OVERRIDE:   ${{ secrets.AWS_ENDPOINT_OVERRIDE }}
          AWS_REGION:              auto
          GOVDATA_PARQUET_DIR:     ${{ secrets.GOVDATA_PARQUET_DIR }}

  # ── Native installers (per-platform, bundled JRE) ─────────────────────────
  installer:
    name: Build installer — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [jar, test]
    strategy:
      # One platform's installer failure (e.g. macOS notarization when Apple certs are absent)
      # must not cancel the others or block the release.
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_glob: "*.pkg"
          - os: ubuntu-latest
            artifact_glob: "*.deb"
          - os: windows-latest
            artifact_glob: "*.msi"

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: askamerica-engine-jar
          path: askamerica-engine/build/libs/

      - name: Import Apple signing certificate (macOS only)
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERT_P12_BASE64" ]; then
            echo "No Apple signing certificate configured — skipping import"
            exit 0
          fi
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > /tmp/signing.p12
          security create-keychain -p "" build.keychain
          security unlock-keychain -p "" build.keychain
          security list-keychains -d user -s build.keychain \
            $(security list-keychains -d user | tr -d '"' | tr '\n' ' ')
          security import /tmp/signing.p12 \
            -k build.keychain \
            -P "$APPLE_CERT_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign \
            -T /usr/bin/xcrun
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "" build.keychain
          rm /tmp/signing.p12
          SIGN_ID=$(security find-identity -v -p codesigning build.keychain \
            | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "ASKAMERICA_SIGN_IDENTITY=$SIGN_ID" >> "$GITHUB_ENV"
          echo "ASKAMERICA_SIGN_KEYCHAIN=$HOME/Library/Keychains/build.keychain-db" >> "$GITHUB_ENV"
          echo "Signing identity: $SIGN_ID"

      - name: Unlock keychain before jpackage (macOS only)
        if: matrix.os == 'macos-latest'
        run: |
          if [ -f "$HOME/Library/Keychains/build.keychain-db" ]; then
            security unlock-keychain -p "" build.keychain
            security set-keychain-settings -t 7200 build.keychain
          fi

      - name: Build jpackage installer
        shell: bash
        run: ./gradlew :askamerica-engine:jpackage --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASKAMERICA_SIGN_IDENTITY: ${{ env.ASKAMERICA_SIGN_IDENTITY }}
          ASKAMERICA_SIGN_KEYCHAIN: ${{ env.ASKAMERICA_SIGN_KEYCHAIN }}

      - name: Create PKG from app-image (macOS only)
        if: matrix.os == 'macos-latest'
        env:
          ASKAMERICA_SIGN_KEYCHAIN: ${{ env.ASKAMERICA_SIGN_KEYCHAIN }}
        run: |
          APP=$(find askamerica-engine/build/jpackage -name "*.app" -maxdepth 1 | head -1)
          VERSION=$(defaults read "$APP/Contents/Info" CFBundleShortVersionString 2>/dev/null || echo "1.0.0")
          PKG="askamerica-engine/build/jpackage/AskAmerica-MCP-${VERSION}.pkg"
          pkgbuild \
            --component "$APP" \
            --install-location /Applications \
            --scripts askamerica-engine/src/packaging/mac \
            --version "$VERSION" \
            "$PKG"
          echo "Created: $PKG"
          KEYCHAIN="${ASKAMERICA_SIGN_KEYCHAIN:-}"
          INSTALLER_ID=""
          if [ -n "$KEYCHAIN" ]; then
            INSTALLER_ID=$(security find-identity -v "$KEYCHAIN" 2>/dev/null \
              | grep "Developer ID Installer" | head -1 | sed 's/.*"\(.*\)"/\1/')
          fi
          if [ -z "$INSTALLER_ID" ]; then
            INSTALLER_ID=$(security find-identity -v 2>/dev/null \
              | grep "Developer ID Installer" | head -1 | sed 's/.*"\(.*\)"/\1/')
          fi
          if [ -n "$INSTALLER_ID" ]; then
            echo "Signing PKG with: $INSTALLER_ID"
            productsign --sign "$INSTALLER_ID" "$PKG" "${PKG%.pkg}-signed.pkg"
            mv "${PKG%.pkg}-signed.pkg" "$PKG"
          else
            echo "No Developer ID Installer cert — PKG will be unsigned"
          fi

      - name: Notarize and staple PKG (macOS only)
        if: matrix.os == 'macos-latest'
        # Non-fatal: notarization requires a Developer ID Installer cert + valid app-specific
        # password. Signed/notarized installers are not a release requirement — an unsigned PKG
        # still installs (right-click → Open, or `xattr -dr com.apple.quarantine`). Do not block
        # the release on it. To enable real notarization, provide the Developer ID Installer cert
        # in APPLE_CERT_P12_BASE64 and a valid APPLE_NOTARYTOOL_PASSWORD/TEAM_ID.
        continue-on-error: true
        env:
          APPLE_NOTARYTOOL_APPLE_ID: ${{ secrets.APPLE_NOTARYTOOL_APPLE_ID }}
          APPLE_NOTARYTOOL_PASSWORD: ${{ secrets.APPLE_NOTARYTOOL_PASSWORD }}
          APPLE_NOTARYTOOL_TEAM_ID: ${{ secrets.APPLE_NOTARYTOOL_TEAM_ID }}
        run: |
          if [ -z "$APPLE_NOTARYTOOL_APPLE_ID" ]; then
            echo "No notarization credentials configured — skipping"
            exit 0
          fi
          PKG=$(find askamerica-engine/build/jpackage -name "*.pkg" | head -1)
          echo "Notarizing $PKG"
          xcrun notarytool submit "$PKG" \
            --apple-id "$APPLE_NOTARYTOOL_APPLE_ID" \
            --password "$APPLE_NOTARYTOOL_PASSWORD" \
            --team-id "$APPLE_NOTARYTOOL_TEAM_ID" \
            --wait
          xcrun stapler staple "$PKG"
          echo "Notarization and stapling complete"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: askamerica-engine-${{ matrix.os }}
          path: askamerica-engine/build/jpackage/${{ matrix.artifact_glob }}
          retention-days: 30

  # ── Publish to Maven Central (Sonatype Central Portal) ───────────────────
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    needs: [jar, test]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Import GPG key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import

      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#engine-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: askamerica-engine-jar
          path: askamerica-engine/build/libs/

      - name: Generate POM
        run: |
          ./gradlew :askamerica-engine:generatePomFileForAskamericaEnginePublication \
            --no-daemon \
            -PreleaseVersion=${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Maven Central bundle
        env:
          GPG_KEY_ID:       ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE:   ${{ secrets.GPG_PASSPHRASE }}
          VERSION:          ${{ steps.version.outputs.version }}
          GROUP_ID:         ai.askamerica
          ARTIFACT_ID:      askamerica-engine
        run: |
          GROUP_PATH=$(echo "$GROUP_ID" | tr '.' '/')
          BUNDLE_DIR="bundle/${GROUP_PATH}/${ARTIFACT_ID}/${VERSION}"
          mkdir -p "$BUNDLE_DIR"

          JAR="askamerica-engine/build/libs/askamerica-engine.jar"
          POM=$(find askamerica-engine/build/publications -name "*.xml" | head -1)

          # JAR
          cp "$JAR" "${BUNDLE_DIR}/${ARTIFACT_ID}-${VERSION}.jar"
          # POM
          cp "$POM" "${BUNDLE_DIR}/${ARTIFACT_ID}-${VERSION}.pom"

          # Minimal sources and javadoc JARs (required by Central)
          echo "Sources: ${ARTIFACT_ID} ${VERSION}" > /tmp/placeholder.txt
          jar cf "${BUNDLE_DIR}/${ARTIFACT_ID}-${VERSION}-sources.jar" -C /tmp placeholder.txt
          jar cf "${BUNDLE_DIR}/${ARTIFACT_ID}-${VERSION}-javadoc.jar" -C /tmp placeholder.txt

          # GPG sign all four artifacts
          for f in \
            "${BUNDLE_DIR}/${ARTIFACT_ID}-${VERSION}.jar" \
            "${BUNDLE_DIR}/${ARTIFACT_ID}-${VERSION}.pom" \
            "${BUNDLE_DIR}/${ARTIFACT_ID}-${VERSION}-sources.jar" \
            "${BUNDLE_DIR}/${ARTIFACT_ID}-${VERSION}-javadoc.jar"
          do
            if [ -n "$GPG_PASSPHRASE" ]; then
              gpg --batch --yes --passphrase "$GPG_PASSPHRASE" \
                --local-user "$GPG_KEY_ID" --armor --detach-sign "$f"
            else
              gpg --batch --yes --local-user "$GPG_KEY_ID" --armor --detach-sign "$f"
            fi
            md5sum  "$f" | awk '{print $1}' > "${f}.md5"
            sha1sum "$f" | awk '{print $1}' > "${f}.sha1"
          done

          # Create bundle ZIP
          (cd bundle && zip -r "../askamerica-engine-bundle.zip" .)
          echo "Bundle: $(du -sh askamerica-engine-bundle.zip | cut -f1)"

      - name: Upload to Sonatype Central Portal
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          VERSION:           ${{ steps.version.outputs.version }}
        run: |
          AUTH=$(echo -n "${SONATYPE_USERNAME}:${SONATYPE_PASSWORD}" | base64)
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "https://central.sonatype.com/api/v1/publisher/upload" \
            -H "Authorization: Bearer ${AUTH}" \
            -H "Accept: application/json" \
            -F "bundle=@askamerica-engine-bundle.zip;type=application/zip" \
            -F "name=askamerica-engine-${VERSION}" \
            -F "publishingType=AUTOMATIC")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Response ($HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "ERROR: Maven Central upload failed"
            exit 1
          fi

  # ── Publish to GitHub Packages (temporary — remove once Maven Central namespace verified) ──
  publish-github:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: [jar, test]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: askamerica-engine-jar
          path: askamerica-engine/build/libs/

      - name: Determine version
        id: ghver
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#engine-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Delete existing version from GitHub Packages (if any)
        env:
          GH_TOKEN: ${{ secrets.PACKAGES_PAT }}
          VERSION: ${{ steps.ghver.outputs.version }}
        run: |
          VERSION_ID=$(gh api "/user/packages/maven/ai.askamerica.askamerica-engine/versions" \
            --jq ".[] | select(.name == \"$VERSION\") | .id" 2>/dev/null || true)
          if [ -n "$VERSION_ID" ]; then
            echo "Deleting existing version $VERSION (ID: $VERSION_ID)"
            gh api -X DELETE "/user/packages/maven/ai.askamerica.askamerica-engine/versions/$VERSION_ID"
          else
            echo "No existing version $VERSION in GitHub Packages"
          fi

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          OUTPUT=$(./gradlew :askamerica-engine:publishAllPublicationsToGitHubPackagesRepository \
            --no-daemon \
            -PreleaseVersion=${{ steps.ghver.outputs.version }} 2>&1) && echo "$OUTPUT" && exit 0
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "status code 409"; then
            echo "409 Conflict: artifact already exists in GitHub Packages — treating as success"
            exit 0
          fi
          exit 1

  # ── Publish Python package to PyPI ────────────────────────────────────────
  publish-python:
    name: Publish Python package to PyPI
    runs-on: ubuntu-latest
    needs: [jar, test]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write

    steps:
      - name: Checkout askamerica Python repo
        uses: actions/checkout@v4
        with:
          repository: kenstott/askamerica
          token: ${{ secrets.ASKAMERICA_REPO_PAT }}
          path: askamerica-python

      - name: Determine version
        id: pyver
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#engine-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump versions in Python package
        working-directory: askamerica-python/python
        env:
          VERSION: ${{ steps.pyver.outputs.version }}
        run: |
          python3 - <<'EOF'
          import re, os, pathlib
          v = os.environ["VERSION"]

          # pyproject.toml
          p = pathlib.Path("pyproject.toml")
          p.write_text(re.sub(r'^version = ".*"', f'version = "{v}"', p.read_text(), flags=re.MULTILINE))

          # __init__.py
          p = pathlib.Path("askamerica/__init__.py")
          p.write_text(re.sub(r'^__version__ = ".*"', f'__version__ = "{v}"', p.read_text(), flags=re.MULTILINE))

          # engine.py — BUNDLED_ENGINE_VERSION
          p = pathlib.Path("askamerica/engine.py")
          p.write_text(re.sub(r'^BUNDLED_ENGINE_VERSION = ".*"', f'BUNDLED_ENGINE_VERSION = "{v}"', p.read_text(), flags=re.MULTILINE))

          print(f"Bumped all version strings to {v}")
          EOF

      - name: Commit and push version bump
        working-directory: askamerica-python/python
        env:
          VERSION: ${{ steps.pyver.outputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml askamerica/__init__.py askamerica/engine.py
          # Idempotent: a re-run of an already-released version has nothing to bump.
          if git diff --cached --quiet; then
            echo "Version already at ${VERSION}; nothing to commit."
          else
            git commit -m "chore(release): bump to ${VERSION} — tracks engine-v${VERSION}"
            git push
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Python package
        working-directory: askamerica-python/python
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: askamerica-python/python/dist/

  # ── GitHub Release ────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [jar, govdata-jar, trino-plugins, installer, publish, publish-python]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      actions: write   # needed to dispatch the pgwire release workflows below

    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: askamerica-engine-jar
          path: release-assets/

      - name: Download govdata JAR
        uses: actions/download-artifact@v4
        with:
          name: govdata-jar
          path: release-assets/

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          pattern: askamerica-engine-*-latest
          path: release-assets/
          merge-multiple: true

      - name: Download Trino connector plugins
        uses: actions/download-artifact@v4
        with:
          name: trino-plugins
          path: release-assets/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: AskAmerica Engine ${{ github.ref_name }}
          body: |
            ## AskAmerica Query Engine

            Query all 15 US government datasets from Python, Node, Go, or any JDBC client.

            ---

            ### Python (JPype — recommended)

            ```bash
            pip install 'askamerica[engine]'
            askamerica install-engine        # downloads askamerica-engine.jar
            askamerica login                 # get your free API key
            ```

            ```python
            import askamerica as aa
            df = aa.query("SELECT cik, company_name FROM sec.filing_metadata FETCH FIRST 5 ROWS ONLY")
            ```

            ### Claude Desktop (MCP)

            ```bash
            pip install 'askamerica[mcp]'
            askamerica install-engine
            askamerica mcp-config            # prints Claude Desktop config snippet
            ```

            ### Raw JAR (JDBC / any language)

            Download `askamerica-engine.jar` below and load it on your classpath.
            JDBC URL: `jdbc:govdata:source=sec,geo,econ,census,...`

            ### Native Installers (bundled JRE — no Java required)

            | Platform | File |
            |----------|------|
            | macOS    | `AskAmerica-MCP-*.pkg` |
            | Linux    | `askamerica-mcp_*.deb` |
            | Windows  | `AskAmerica MCP-*.msi` |

            **macOS:** Double-click the `.pkg` and follow the installer (installs to Applications), then open AskAmerica MCP to enter your API key. Unsigned build: if Gatekeeper blocks it, right-click → Open, or run `xattr -dr com.apple.quarantine` on the app.
            **Linux:** `sudo dpkg -i askamerica-mcp_*.deb`, then run `askamerica-mcp` to configure.
            **Windows:** Double-click the `.msi`, then open AskAmerica MCP from the Start Menu to configure.

            ### Trino connectors

            Plugin-directory archives — unzip into your Trino server's `plugin/` directory.

            | File | Connector | JDBC source |
            |------|-----------|-------------|
            | `trino-calcite-plugin.zip` | `calcite` | any Calcite model (`jdbc:calcite:`) |
            | `trino-sharepoint-plugin.zip` | `sharepoint` | SharePoint Lists (`jdbc:sharepoint:`) |
            | `trino-splunk-plugin.zip` | `splunk` | Splunk (`jdbc:splunk:`) |
            | `trino-file-plugin.zip` | `file` | files / S3 globs (file adapter) |
            | `trino-cloudops-plugin.zip` | `cloudops` | Azure/AWS/GCP inventory (`jdbc:cloudops:`) |
          files: release-assets/**/*
          draft: false
          prerelease: false

      # The pgwire-calcite installers attach on a release event, but a release created above by
      # GITHUB_TOKEN does not emit one. Dispatch that workflow explicitly now that the release
      # object exists so its per-OS tarballs attach to this engine-v<version> release.
      - name: Dispatch pgwire-calcite release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BARE="${{ github.ref_name }}"
          BARE="${BARE#engine-v}"
          gh workflow run "pgwire-calcite release" --repo "${{ github.repository }}" --ref main --field version="${BARE}"
          gh workflow run "pgwire-adapters release" --repo "${{ github.repository }}" --ref main --field version="${BARE}"
          echo "Dispatched pgwire-calcite + pgwire-adapters releases for version ${BARE}"
