name: AskAmerica Engine

on:
  push:
    tags:
      - 'engine-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0)'
        required: true
        default: '0.1.0'

jobs:
  # ── JAR build (ubuntu only — same JAR works on all platforms via JPype) ────
  jar:
    name: Build shadow JAR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build shadow JAR
        run: ./gradlew :askamerica-engine:shadowJar --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report JAR size
        run: |
          JAR=$(find askamerica-engine/build/libs -name "askamerica-engine*.jar" | head -1)
          echo "JAR: $JAR"
          echo "JAR size: $(du -sh "$JAR" | cut -f1)"
          # Rename to a stable name for the release asset
          cp "$JAR" askamerica-engine/build/libs/askamerica-engine.jar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: askamerica-engine-jar
          path: askamerica-engine/build/libs/askamerica-engine.jar
          retention-days: 30

  # ── JDBC driver test suite ───────────────────────────────────────────────
  test:
    name: JDBC driver tests
    runs-on: ubuntu-latest
    needs: jar

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install jpype1
        run: pip install jpype1

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: askamerica-engine-jar
          path: askamerica-engine/build/libs/

      - name: Run JDBC driver tests
        run: python3 govdata/scripts/test_govdata_python.py askamerica-engine/build/libs/askamerica-engine.jar
        env:
          AWS_ACCESS_KEY_ID:       ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:   ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_OVERRIDE:   ${{ secrets.AWS_ENDPOINT_OVERRIDE }}
          AWS_REGION:              auto
          GOVDATA_PARQUET_DIR:     ${{ secrets.GOVDATA_PARQUET_DIR }}

  # ── Native installers (per-platform, bundled JRE) ─────────────────────────
  installer:
    name: Build installer — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [jar, test]
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_glob: "*.dmg"
          - os: ubuntu-latest
            artifact_glob: "*.deb"
          - os: windows-latest
            artifact_glob: "*.msi"

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: askamerica-engine-jar
          path: askamerica-engine/build/libs/

      - name: Build jpackage installer
        run: ./gradlew :askamerica-engine:jpackage --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: askamerica-engine-${{ matrix.os }}
          path: askamerica-engine/build/jpackage/${{ matrix.artifact_glob }}
          retention-days: 30

  # ── Publish to Maven Central (Sonatype Central Portal) ───────────────────
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    needs: [jar, test]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Import GPG key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import

      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#engine-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: askamerica-engine-jar
          path: askamerica-engine/build/libs/

      - name: Generate POM
        run: |
          ./gradlew :askamerica-engine:generatePomFileForAskamericaEnginePublication \
            --no-daemon \
            -PreleaseVersion=${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Maven Central bundle
        env:
          GPG_KEY_ID:       ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE:   ${{ secrets.GPG_PASSPHRASE }}
          VERSION:          ${{ steps.version.outputs.version }}
          GROUP_ID:         ai.askamerica
          ARTIFACT_ID:      askamerica-engine
        run: |
          GROUP_PATH=$(echo "$GROUP_ID" | tr '.' '/')
          BUNDLE_DIR="bundle/${GROUP_PATH}/${ARTIFACT_ID}/${VERSION}"
          mkdir -p "$BUNDLE_DIR"

          JAR="askamerica-engine/build/libs/askamerica-engine.jar"
          POM=$(find askamerica-engine/build/publications -name "*.xml" | head -1)

          # JAR
          cp "$JAR" "${BUNDLE_DIR}/${ARTIFACT_ID}-${VERSION}.jar"
          # POM
          cp "$POM" "${BUNDLE_DIR}/${ARTIFACT_ID}-${VERSION}.pom"

          # Minimal sources and javadoc JARs (required by Central)
          echo "Sources: ${ARTIFACT_ID} ${VERSION}" > /tmp/placeholder.txt
          jar cf "${BUNDLE_DIR}/${ARTIFACT_ID}-${VERSION}-sources.jar" -C /tmp placeholder.txt
          jar cf "${BUNDLE_DIR}/${ARTIFACT_ID}-${VERSION}-javadoc.jar" -C /tmp placeholder.txt

          # GPG sign all four artifacts
          for f in \
            "${BUNDLE_DIR}/${ARTIFACT_ID}-${VERSION}.jar" \
            "${BUNDLE_DIR}/${ARTIFACT_ID}-${VERSION}.pom" \
            "${BUNDLE_DIR}/${ARTIFACT_ID}-${VERSION}-sources.jar" \
            "${BUNDLE_DIR}/${ARTIFACT_ID}-${VERSION}-javadoc.jar"
          do
            if [ -n "$GPG_PASSPHRASE" ]; then
              gpg --batch --yes --passphrase "$GPG_PASSPHRASE" \
                --local-user "$GPG_KEY_ID" --armor --detach-sign "$f"
            else
              gpg --batch --yes --local-user "$GPG_KEY_ID" --armor --detach-sign "$f"
            fi
            md5sum  "$f" | awk '{print $1}' > "${f}.md5"
            sha1sum "$f" | awk '{print $1}' > "${f}.sha1"
          done

          # Create bundle ZIP
          (cd bundle && zip -r "../askamerica-engine-bundle.zip" .)
          echo "Bundle: $(du -sh askamerica-engine-bundle.zip | cut -f1)"

      - name: Upload to Sonatype Central Portal
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          VERSION:           ${{ steps.version.outputs.version }}
        run: |
          AUTH=$(echo -n "${SONATYPE_USERNAME}:${SONATYPE_PASSWORD}" | base64)
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "https://central.sonatype.com/api/v1/publisher/upload" \
            -H "Authorization: Bearer ${AUTH}" \
            -H "Accept: application/json" \
            -F "bundle=@askamerica-engine-bundle.zip;type=application/zip" \
            -F "name=askamerica-engine-${VERSION}" \
            -F "publishingType=AUTOMATIC")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Response ($HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "ERROR: Maven Central upload failed"
            exit 1
          fi

  # ── Publish to GitHub Packages (temporary — remove once Maven Central namespace verified) ──
  publish-github:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: [jar, test]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: askamerica-engine-jar
          path: askamerica-engine/build/libs/

      - name: Determine version
        id: ghver
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#engine-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish to GitHub Packages
        run: |
          ./gradlew :askamerica-engine:publishAllPublicationsToGitHubPackagesRepository \
            --no-daemon \
            -PreleaseVersion=${{ steps.ghver.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

  # ── GitHub Release ────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [jar, installer, publish]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: askamerica-engine-jar
          path: release-assets/

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          pattern: askamerica-engine-*-latest
          path: release-assets/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: AskAmerica Engine ${{ github.ref_name }}
          body: |
            ## AskAmerica Query Engine

            Query all 15 US government datasets from Python, Node, Go, or any JDBC client.

            ---

            ### Python (JPype — recommended)

            ```bash
            pip install 'askamerica[engine]'
            askamerica install-engine        # downloads askamerica-engine.jar
            askamerica login                 # get your free API key
            ```

            ```python
            import askamerica as aa
            df = aa.query("SELECT cik, company_name FROM sec.filing_metadata FETCH FIRST 5 ROWS ONLY")
            ```

            ### Claude Desktop (MCP)

            ```bash
            pip install 'askamerica[mcp]'
            askamerica install-engine
            askamerica mcp-config            # prints Claude Desktop config snippet
            ```

            ### Raw JAR (JDBC / any language)

            Download `askamerica-engine.jar` below and load it on your classpath.
            JDBC URL: `jdbc:govdata:source=sec,geo,econ,census,...`

            ### Native Installers (bundled JRE — no Java required)

            | Platform | File |
            |----------|------|
            | macOS    | `AskAmerica MCP-*.dmg` |
            | Linux    | `askamerica-mcp_*.deb` |
            | Windows  | `AskAmerica MCP-*.msi` |

            **macOS:** Open the `.dmg`, drag to Applications, open the app — enter your API key and click Configure.
            **Linux:** `sudo dpkg -i askamerica-mcp_*.deb`, then run `askamerica-mcp` to configure.
            **Windows:** Double-click the `.msi`, then open AskAmerica MCP from the Start Menu to configure.
          files: release-assets/**/*
          draft: false
          prerelease: false
