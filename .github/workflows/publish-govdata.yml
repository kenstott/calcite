name: Publish GovData Driver

on:
  push:
    paths:
      - 'govdata/build.gradle.kts'
    branches:
      - main
      - 'feature/production-materialization'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Delete existing package version (if any)
        run: |
          VERSION=$(./gradlew :govdata:properties -q --console=plain | grep "^version:" | awk '{print $2}')
          echo "Looking for existing version: $VERSION"
          VERSION_ID=$(gh api "users/kenstott/packages/maven/org.apache.calcite.calcite-govdata/versions" \
            --jq ".[] | select(.name == \"$VERSION\") | .id" 2>/dev/null || true)
          if [ -n "$VERSION_ID" ]; then
            gh api --method DELETE "users/kenstott/packages/maven/org.apache.calcite.calcite-govdata/versions/$VERSION_ID"
            echo "Deleted version $VERSION (id: $VERSION_ID)"
          else
            echo "No existing version found, proceeding"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish shadow JAR
        run: ./gradlew :govdata:shadowJar :govdata:publishShadowPublicationToGitHubPackagesRepository
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
