name: Publish GovData Driver

on:
  push:
    tags:
      - 'engine-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#engine-v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing govdata version: ${VERSION}"

      - name: Build and publish shadow JAR
        run: |
          ./gradlew :govdata:shadowJar \
            :govdata:publishShadowPublicationToGitHubPackagesRepository \
            --no-daemon \
            -PreleaseVersion=${{ steps.version.outputs.version }}
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
