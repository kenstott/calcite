name: Publish GovData Driver

on:
  push:
    paths:
      - 'govdata/build.gradle.kts'
    branches:
      - main
      - 'feature/production-materialization'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build and publish shadow JAR
        run: ./gradlew :govdata:shadowJar :govdata:publishShadowPublicationToGitHubPackagesRepository
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
