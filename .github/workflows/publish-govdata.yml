name: Publish GovData Driver

on:
  push:
    paths:
      - 'govdata/build.gradle.kts'
    branches:
      - main
      - 'feature/production-materialization'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Delete existing package (if any)
        run: |
          COUNT=$(gh api "users/kenstott/packages/maven/org.apache.calcite.calcite-govdata/versions" \
            --jq "length" 2>/dev/null || echo "0")
          if [ "$COUNT" -gt "0" ]; then
            echo "Deleting existing package ($COUNT version(s))"
            gh api --method DELETE "users/kenstott/packages/maven/org.apache.calcite.calcite-govdata"
            echo "Package deleted"
          else
            echo "No existing package found, proceeding"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish shadow JAR
        run: ./gradlew :govdata:shadowJar :govdata:publishShadowPublicationToGitHubPackagesRepository
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
