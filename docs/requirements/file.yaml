# ============================== csv (simple basis, 1:1, seam: table) =============================

- id: FILE-001
  module: file
  status: complete
  group: csv
  category: Type inference
  priority: MUST
  type: behavioral
  mode: read
  cardinality: "1:1"
  topology: single
  seam: table
  description: >
    CSV type inference maps each column to an exact SQL type (INTEGER, VARCHAR, DOUBLE, DATE, TIME,
    BOOLEAN) via a deterministic inferrer.
  scenario: >
    Given mixed-types.csv with integer, text, decimal, date, time and boolean columns
    When the columns are inferred
    Then each resolves to exactly one SQL type with no ambiguity.
  applies: { engines: [linq4j], storagetypes: [local] }
  tests: [ file/CsvGoldenIngestTest#mixedTypes_inferredTypesAreExact ]
  supersedes: [ CsvTypeInferenceTest#testTypeInferrerDirectly, CsvTypeInferenceTest#testMixedTypesInference ]
  since: 2026-06

- id: FILE-002
  module: file
  status: complete
  group: csv
  category: Value fidelity
  priority: MUST
  type: behavioral
  mode: read
  cardinality: "1:1"
  topology: single
  seam: table
  description: >
    A CSV table round-trips to its exact cell values, SQL NULL distinct from the empty string in
