- id: FILE-186
  module: file
  status: complete
  group: aperio-uri
  category: materialize verb
  priority: MUST
  type: behavioral
  mode: write
  seam: connection
  description: >
    GAP. Add a `materialize=iceberg` param that turns the URI from "query files in place" into
    "build/refresh an Iceberg lake": with rw=on, source files under `directories` are materialized to
    Iceberg tables under `storage` (engaging the tracker + Phase 1.5 self-heal, FILE-084/178), and the
    query path then reads the lake. With rw=off, materialize=iceberg means "read the existing lake at
    storage" (the consumer) — not a contradiction. Materialization is lazy per-table (on first access) so
    first use stays responsive. Today icebergEnabled is read-config only; there is no build verb.
    SCHEMA IS INFERRED FROM THE SOURCE, NOT DECLARED. Iceberg is only metadata over Parquet, and the
    staged Parquet already carries authoritative column names + types (DuckDB writes it before the Iceberg
    commit), so the materialize path must derive the Iceberg schema from that data — a bare
    materialize=iceberg with zero column defs must work. `columns` becomes an OPTIONAL override layer
    merged over the inferred base (comments/REMARKS, PK/FK constraints, computed `expression:` columns,
    forced types, order/nullability) — never the sole source of truth. This also removes the
    "schema drift -> drop and recreate" churn, since table schema and data both derive from the same
    Parquet and cannot disagree.
  source: >
    file/src/main/java/org/apache/calcite/adapter/file/iceberg/IcebergCatalogManager.java
    (createTableFromParquet + describeParquet + duckdbTypeToCanonical — inference primitive, DONE);
    file/src/main/java/org/apache/calcite/adapter/file/etl/IcebergMaterializationWriter.java
    (deferSchemaInference + ensureTableCreated + inferTableFromRows — deferred create wiring, DONE);
    file/src/main/java/org/apache/calcite/adapter/file/AperioDriver.java (materialize verb parsing);
    file/src/main/java/org/apache/calcite/adapter/file/FileSchemaFactory.java (parse + setMaterializeConfig);
    file/src/main/java/org/apache/calcite/adapter/file/FileSchema.java (getTableMap post-pass +
    materializeTablesToIceberg + conversionMetadata ICEBERG_PARQUET recording for the DuckDB engine);
    file/src/main/java/org/apache/calcite/adapter/file/format/parquet/ParquetConversionUtil.java
    (public scanTableRows) — CONSUMER DONE
  tests:
    - file/IcebergCatalogManagerTest#testCreateTableFromParquetInfersSchema
    - file/IcebergMaterializationWriterTest#testDeferredSchemaInferenceFromFirstBatch
    - file/AperioDriverOperandTest#materializeIcebergEmitsSchemaLevelDefault
    - file/AperioMaterializeIcebergTest#materializeIcebergBuildsLakeAndServesIt
  notes: "Three layers. (1) INFERENCE PRIMITIVE (DONE, tested): IcebergCatalogManager.
    createTableFromParquet(config,tableId,parquetPath,partitionColumns) — DuckDB DESCRIBE the Parquet ->
    ColumnDef list (duckdbTypeToCanonical, fail-loud on unknown types) -> createTableFromColumns ->
    Iceberg table via HadoopCatalog (kept for later REST/multi-writer). Reads stay catalog-service-free
    via HadoopTables.load(path). (2) WIRING (DONE, tested): with no declared columns,
    IcebergMaterializationWriter.initialize() sets deferSchemaInference and leaves table/tableWriter
    null (ensureTableExists is otherwise eager, and writeRecords needs the schema to stage the Parquet —
    chicken-and-egg). The first flushPartition calls ensureTableCreated, which infers the schema from
    that batch (rows merged with their partition values -> JSON -> DuckDB read_json_auto -> temp Parquet
    -> createTableFromParquet) or LOADS the table on a re-run; commit/compaction/maintenance/selfHeal are
    null-guarded for the zero-row case. Inert for every declared-column schema. (3) URI VERB (DONE):
    materialize=iceberg emits a SCHEMA-LEVEL materialize default {format:iceberg,warehousePath:
    <storage>/<schema>/iceberg} (AperioDriver.buildOperand). CONSUMER, verified end-to-end by
    AperioMaterializeIcebergTest on the DEFAULT duckdb engine (CSV dir -> lake -> query served from
    Iceberg; reconnect idempotent): (a) FileSchemaFactory parses the `materialize` operand and calls the
    post-construction FileSchema.setMaterializeConfig(config, writable) — a setter (not a constructor
    param; FileSchema has ~6 delegating overloads and getTableMap runs lazily after the factory), wired
    into all engine branches. (b) getTableMap post-pass (FileSchema.java ~L2279) transforms the finished
    map: each discovered file-table is scanned (ParquetConversionUtil.scanTableRows) ->
    IcebergMaterializationWriter (columns-less -> deferred inference) -> commit -> served as an
    IcebergTable, AND recorded in conversionMetadata as ICEBERG_PARQUET so the DuckDB engine routes to
    iceberg_scan (Calcite/parquet engines scan the IcebergTable directly). REFRESH (user decision):
    writable rebuilds a table only when its own Iceberg table is missing or THAT table's source file
    changed — PER-TABLE freshness (each discovered table is mapped to its source file by basename, and
    the file's size+mtime signature is stored as the 'aperio.source.signature' Iceberg table property;
    changing one CSV rebuilds only that table, proven by AperioMaterializeIcebergTest#
    perTableFreshnessRebuildsOnlyChangedTable comparing per-table Iceberg file listings). read-only
    never builds, serves the existing lake, and metadata freshness is handled by cache_httpfs (FILE-189)
    excluding mutable Iceberg metadata so iceberg_scan re-reads the current snapshot. CAVEAT: mutating a
    source within a single live JVM can serve stale rows on the immediate rebuild because the underlying
    CSV->parquet cache + cache_httpfs treat derived data files as immutable; a fresh process/connection
    is always correct (the freshness SCOPING — which table rebuilds — is unaffected). Unblocks FILE-188's
    emit. WHY ICEBERG not
    plain Parquet: atomic compaction (RewriteFiles.commit) + an authoritative metadata record — neither
    is safe on files-in-place."
  since: 2026-07

