  seam: execution
  description: >
    PGPipelineTracker write paths (upsertState, markTableComplete/WithConfig/WithSourceWatermark,
    markCleared, invalidateAll, invalidateTableCompletion, clearAllCompletions) throw on SQLException
    rather than logging-and-swallowing, so a tracker that cannot persist fails the run loudly instead
