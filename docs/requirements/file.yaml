- id: FILE-176
  module: file
  status: complete
  group: document-etl
  category: read-only tracker
  priority: MUST
  type: behavioral
  mode: write
  seam: execution
  description: >
    ReadOnlyPipelineTracker reports every read as "untracked" (like NOOP, so pure-query paths work
    with zero config) but throws IllegalStateException on every mutator. It is deliberately distinct
    from NOOP_PIPELINE, which silently swallows writes: for an ETL run a silent no-op write means data
    is written with no completion state recorded (silent idempotence loss), so the read-only default
    must fail loud on write instead.
  source: file/src/main/java/org/apache/calcite/adapter/file/partition/ReadOnlyPipelineTracker.java
  tests:
    - file/partition/PipelineTrackerFactoryTest#testCreateDefaultTrackerIsReadOnly
  since: 2026-06

