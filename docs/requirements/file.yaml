- id: FILE-189
  module: file
  status: complete
  group: aperio-uri
  category: persistent remote-read cache
  priority: SHOULD
  type: behavioral
  mode: read
  seam: execution
  description: >
    The DuckDB query engine loads the cache_httpfs community extension by default (non-Windows; WSL
    included) and points it at a PERSISTENT cache directory (~/.aperio/.duckdb_httpfs_cache) that survives
    process restarts. So reading a remote (http/s3) lake pulls each parquet from source on first read and
    serves it from the local cache thereafter — local-speed repeat queries and blazing warm restarts, with
    no operand to enable. Freshness is by IMMUTABILITY, not a refresh policy: Iceberg data files never
    change (so caching them is always correct), and cache_httpfs exclusion regexes keep mutable Iceberg
    metadata OUT of the cache so every query re-reads the latest snapshot pointer. Static data caches once
    and never re-fetches.
  source: >
    file/src/main/java/org/apache/calcite/adapter/file/duckdb/DuckDBJdbcSchemaFactory.java
    (loadQueryExtensions cache_httpfs; configureCacheHttpfs; cache_httpfs_add_exclusion_regex)
  notes: "Corrects an earlier wrong finding: the data cache is ALWAYS on (cache_httpfs), not gated by the
    operand `cacheEnabled` — that operand is HTTP-auth/ETL response caching (HttpConfig), a different
    cache. Caveats: cache_httpfs is http/s3 only (a local/SMB mount is already 'local' to DuckDB so this
    cache does not apply there) and is unavailable on native Windows (WSL is fine)."
  since: 2026-07
