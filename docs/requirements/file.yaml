# ===================== aperio driver — URI semantics & their model expression ==================
# The AperioDriver is a thin URI->model compiler: it parses a jdbc:aperio: URL into a Calcite inline
# model targeting FileSchemaFactory. These pin the URI grammar, its mapping to the model operand, and
# the defaults. FILE-180..183 are the current driver contract; FILE-184..189 are the target semantics
# (the write/distribution half) — designed in the tracker/aperio thread but not yet built.

- id: FILE-180
  module: file
  status: complete
  group: aperio-uri
  category: uri -> model compilation
  priority: MUST
  type: behavioral
  mode: read
  seam: connection
  description: >
    AperioDriver accepts jdbc:aperio:<path>[?k=v&...], splits path from query params, and compiles an
    inline Calcite model with one custom schema whose factory is FileSchemaFactory and whose operand is
    built from the params, then delegates to jdbc:calcite:model=inline:. The form jdbc:aperio:model=<file>
    passes through to a full Calcite model file — the escape hatch for the long tail, so the URI never has
    to grow to express everything the model can.
  source: file/src/main/java/org/apache/calcite/adapter/file/AperioDriver.java
  tests:
    - file/AperioDriverOperandTest
  since: 2026-07

- id: FILE-181
  module: file
  status: complete
  group: aperio-uri
  category: files-in-place default
  priority: MUST
  type: behavioral
  mode: read
  seam: connection
  description: >
    With no materialize/iceberg opt-in, the URI compiles to a plain directory read (files-in-place): the
    query path reads the source files directly and engages no tracker, no ETL, no lake. Iceberg /
    materialization is opt-in only. This is the low-friction default — point at a directory, query it.
  source: file/src/main/java/org/apache/calcite/adapter/file/AperioDriver.java
  tests:
    - file/AperioDriverOperandTest
  since: 2026-07

