# ============================== csv (simple basis, 1:1, seam: table) =============================

- id: FILE-001
  module: file
  status: complete
  group: csv
  category: Type inference
  priority: MUST
  type: behavioral
  mode: read
  cardinality: "1:1"
  topology: single
  seam: table
  description: >
    CSV type inference maps each column to an exact SQL type (INTEGER, VARCHAR, DOUBLE, DATE, TIME,
    BOOLEAN) via a deterministic inferrer.
  scenario: >
    Given mixed-types.csv with integer, text, decimal, date, time and boolean columns
    When the columns are inferred
    Then each resolves to exactly one SQL type with no ambiguity.
  applies: { engines: [linq4j], storagetypes: [local] }
  tests: [ file/CsvGoldenIngestTest#mixedTypes_inferredTypesAreExact ]
  supersedes: [ CsvTypeInferenceTest#testTypeInferrerDirectly, CsvTypeInferenceTest#testMixedTypesInference ]
  since: 2026-06

- id: FILE-002
  module: file
  status: complete
  group: csv
  category: Value fidelity
  priority: MUST
  type: behavioral
  mode: read
  cardinality: "1:1"
  topology: single
  seam: table
  description: >
    A CSV table round-trips to its exact cell values, SQL NULL distinct from the empty string in
    every column.
  scenario: >
    Given mixed-types.csv
    When SELECT * is ordered by id
    Then every cell equals the committed golden value, NULL distinct from "".
  applies: { engines: [linq4j], storagetypes: [local] }
  tests: [ file/CsvGoldenIngestTest#mixedTypes_fullTableMatchesGolden ]
  since: 2026-06

- id: FILE-003
  module: file
  status: complete
  group: csv
  category: Null handling
  priority: MUST
  type: behavioral
  mode: read
  cardinality: "1:1"
  topology: single
  seam: table
  description: >
    Textual null sentinels (NULL, NA, N/A, NONE, nil + case variants) in non-VARCHAR columns
    collapse to SQL NULL; a blank cell in a VARCHAR column is preserved as "".
  scenario: >
    Given nulls-and-empty.csv with sentinel and blank cells
    When the table is read
    Then sentinels in typed columns are SQL NULL and blank VARCHAR cells are "".
  applies: { engines: [linq4j], storagetypes: [local] }
  tests:
    - file/CsvGoldenIngestTest#nullsAndEmpty_sentinelsCollapseToNull
    - file/CsvGoldenIngestTest#mixedTypes_fullTableMatchesGolden
  supersedes: [ CsvTypeInferenceTest#testNullHandling ]
  since: 2026-06

