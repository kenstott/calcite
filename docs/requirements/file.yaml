- id: FILE-178
  module: file
  status: complete
  group: document-etl
  category: tracker self-heal from data
  priority: MUST
  type: behavioral
  mode: write
  seam: execution
  description: >
    Phase 1.5 self-heal (rebuildCacheFromIceberg) reconstructs tracker completion state from data
    already committed to Iceberg, so an empty/cutover tracker rebuilds from existing parquet instead
    of reprocessing. It relies on getExistingPartitions reading partition values from the Iceberg
    partition spec, so the table MUST be partitioned by materialize.partition.columns. Verified for
    standard tables (econ_reference against empty PG rebuilt 7 tables, 0 reprocessed). ROOT CAUSE of
    the fedregister gap: fr_documents had no materialize.partition block, so its Iceberg table was
    unpartitioned (spec fields []) with flat data files and no year/month columns — getExistingPartitions
    returned empty and self-heal reconstructed 0. (batchPartitionColumns is write-batching, not the
    partition spec — a fallback using it was wrong and was reverted.) FIX: declare
    materialize.partition.columns:[year,month] on fr_documents so the materializer adds year/month as
    partition columns (same mechanism econ_reference uses for `type`) and the table becomes partitioned
    → standard self-heal applies. Requires a purge + repartitioned rebuild of the existing flat table.
  source: govdata/src/main/resources/fedregister/fedregister-schema.yaml (fr_documents materialize.partition)
  tests:
    - file/EtlTrackerRequirementsTest
  notes: "VERIFIED live: after adding materialize.partition:[year,month], purged fr_documents and
    rebuilt → table is now partitioned (spec fields [year,month], data under year=2026/month=N/).
    Empty-tracker rerun then self-healed: 'Found 6 existing partition combinations' → 'Self-healing:
    Rebuilding cache from 6 existing Iceberg partitions' → Phase 2 reused 6-of-12, Phase 5 processed
    only the 6 empty future months. PG: 6 complete (self-healed) + 6 empty. Before the fix the same
    run reprocessed all 12. EtlPipeline batchPartitionColumns fallback was reverted (wrong mechanism)."
  since: 2026-06

