- id: FILE-184
  module: file
  status: complete
  group: aperio-uri
  category: rw mode
  priority: MUST
  type: behavioral
  mode: write
  seam: connection
  description: >
    An `rw` URI param (rw=on|off) governs whether the connection may write/materialize, expressed in the
    model as: rw=off -> read-only model (trackerBackend=readonly per FILE-176 + autoDownload=false), the
    consumer/distribution mode; rw=on (default) -> writable model (local DuckDB tracker per FILE-175 —
    required, else the fail-closed default would block writes; materialize permitted). An explicit
    trackerBackend param overrides. rw is only meaningful once materialize/lake features are engaged — a
    pure files-in-place read is inherently read-only.
  source: file/src/main/java/org/apache/calcite/adapter/file/AperioDriver.java (buildOperand rw block)
  tests:
    - file/AperioDriverOperandTest#rwOffCompilesReadOnlyModel
    - file/AperioDriverOperandTest#rwOnDefaultSelectsWritableDuckdbTracker
    - file/AperioDriverOperandTest#explicitTrackerBackendWinsOverRw
  since: 2026-07

