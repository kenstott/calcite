    (quarterly history + a <=120-day rolling daily tip) bounded by GOVDATA_START_YEAR (NVD floor 1999).
  source: "cyber-vuln-schema.yaml (vulnerabilities freshness ~130, dimensions startYear/tipDays ~252-261)"
