# ============================================================================
# U.S. Weather, Climate, and Air Quality Data Schema (WEATHER)
# ============================================================================
# Data Sources:
#   - NWS (weather.gov) - Weather stations and severe weather alerts (no auth)
#   - NOAA CDO v2 - Historical monthly/annual climate summaries (token auth)
#   - EPA AQS - Historical air quality data by pollutant (email+key auth)
#
# Features:
#   - Cross-references with geo.states via state_abbr and state_fips
#   - Cross-references with geo.counties via county_fips (EPA)
#   - Token-gated table enablement (CDO requires NOAA_CDO_TOKEN,
#     EPA requires EPA_AQS_EMAIL + EPA_AQS_KEY)
#   - Hive-style partitioning for efficient querying
# ============================================================================

schemaName: "${SCHEMA_NAME:weather}"
dataLagYears: 1
materializeDirectory: "${GOVDATA_PARQUET_DIR}/source=weather"

comment: >
  U.S. weather, climate, and air quality data from NWS (weather.gov), NOAA Climate
  Data Online (CDO v2), and EPA Air Quality System (AQS). NWS tables provide weather
  station metadata and active severe weather alerts by state (no auth required). CDO
  tables provide historical monthly and annual climate summaries (GSOM/GSOY) with
  temperature, precipitation, and snowfall metrics (requires NOAA_CDO_TOKEN). EPA table
  provides annual air quality index data for PM2.5, Ozone, SO2, NO2, and CO by county
  (requires EPA_AQS_EMAIL + EPA_AQS_KEY). All state-level tables join with geo.states
  via state_abbr or state_fips; EPA data joins with geo.counties via county_fips.

# ============================================================================
# COLUMN TEMPLATES
# ============================================================================

column_templates:

  state_abbr_column: &state_abbr_column
    name: state_abbr
    type: string
    nullable: false
    comment: "2-letter state abbreviation (e.g., 'CA')"

  state_fips_column: &state_fips_column
    name: state_fips
    type: string
    nullable: false
    comment: "2-digit state FIPS code (e.g., '06' for California)"

  year_column: &year_column
    name: year
    type: integer
    nullable: false
    comment: Calendar year

  partition_type: &partition_type
    name: type
    type: VARCHAR

  partition_year: &partition_year
    name: year
    type: INTEGER

  partition_state_abbr: &partition_state_abbr
    name: state_abbr
    type: VARCHAR

  partition_state_fips: &partition_state_fips
    name: state_fips
    type: VARCHAR

  nws_partitions: &nws_partitions
    style: hive
    columnDefinitions:
      - *partition_type
      - *partition_state_abbr

  cdo_station_partitions: &cdo_station_partitions
    style: hive
    columnDefinitions:
      - *partition_type
      - *partition_state_fips

  standard_partitions: &standard_partitions
    style: hive
    columnDefinitions:
      - *partition_type
      - *partition_year

# ============================================================================
# DIMENSION VALUES
# ============================================================================

dimension_values:

  # All 50 states + DC (2-letter postal abbreviations for NWS)
  all_state_abbrs: &all_state_abbrs
    - 'AL'
    - 'AK'
    - 'AZ'
    - 'AR'
    - 'CA'
    - 'CO'
    - 'CT'
    - 'DE'
    - 'DC'
    - 'FL'
    - 'GA'
    - 'HI'
    - 'ID'
    - 'IL'
    - 'IN'
    - 'IA'
    - 'KS'
    - 'KY'
    - 'LA'
    - 'ME'
    - 'MD'
    - 'MA'
    - 'MI'
    - 'MN'
    - 'MS'
    - 'MO'
    - 'MT'
    - 'NE'
    - 'NV'
    - 'NH'
    - 'NJ'
    - 'NM'
    - 'NY'
    - 'NC'
    - 'ND'
    - 'OH'
    - 'OK'
    - 'OR'
    - 'PA'
    - 'RI'
    - 'SC'
    - 'SD'
    - 'TN'
    - 'TX'
    - 'UT'
    - 'VT'
    - 'VA'
    - 'WA'
    - 'WV'
    - 'WI'
    - 'WY'

  # All 50 states + DC (2-digit FIPS codes for CDO/EPA)
  all_state_fips: &all_state_fips
    - '01'  # AL
    - '02'  # AK
    - '04'  # AZ
    - '05'  # AR
    - '06'  # CA
    - '08'  # CO
    - '09'  # CT
    - '10'  # DE
    - '11'  # DC
    - '12'  # FL
    - '13'  # GA
    - '15'  # HI
    - '16'  # ID
    - '17'  # IL
    - '18'  # IN
    - '19'  # IA
    - '20'  # KS
    - '21'  # KY
    - '22'  # LA
    - '23'  # ME
    - '24'  # MD
    - '25'  # MA
    - '26'  # MI
    - '27'  # MN
    - '28'  # MS
    - '29'  # MO
    - '30'  # MT
    - '31'  # NE
    - '32'  # NV
    - '33'  # NH
    - '34'  # NJ
    - '35'  # NM
    - '36'  # NY
    - '37'  # NC
    - '38'  # ND
    - '39'  # OH
    - '40'  # OK
    - '41'  # OR
    - '42'  # PA
    - '44'  # RI
    - '45'  # SC
    - '46'  # SD
    - '47'  # TN
    - '48'  # TX
    - '49'  # UT
    - '50'  # VT
    - '51'  # VA
    - '53'  # WA
    - '54'  # WV
    - '55'  # WI
    - '56'  # WY

  # Year range for weather/climate data
  weather_year_range: &weather_year_range
    type: yearRange
    start: "${WEATHER_START_YEAR:${GOVDATA_START_YEAR:2015}}"
    end: current
    dataLag: 1

  # EPA AQS pollutant parameter codes
  aqi_pollutants: &aqi_pollutants
    - '88101'  # PM2.5 - Local Conditions
    - '44201'  # Ozone
    - '42401'  # SO2
    - '42602'  # NO2
    - '42101'  # CO

# ============================================================================
# PARTITIONED TABLES
# ============================================================================

partitionedTables:

  # ---------------------------------------------------------------------------
  # NWS STATIONS - Weather station metadata (no auth)
  # ---------------------------------------------------------------------------
  - name: nws_stations
    pattern: "type=nws_station/state_abbr=*/*.parquet"
    partitions: *nws_partitions
    comment: >
      NWS weather station metadata from weather.gov. Includes station ID, name,
      coordinates, elevation, timezone, and zone IDs. One row per station.
      Cross-references geo.states via state_abbr. No authentication required.

    dimensions:
      type:
        - nws_station
      state_abbr: *all_state_abbrs

    columns:
      - name: station_id
        type: string
        nullable: false
        comment: "NWS station ID (e.g., 'KORD')"
      - name: station_name
        type: string
        nullable: true
        comment: Station name
      - <<: *state_abbr_column
      - name: latitude
        type: double
        nullable: true
        comment: Station latitude
      - name: longitude
        type: double
        nullable: true
        comment: Station longitude
      - name: elevation_m
        type: double
        nullable: true
        comment: Elevation in meters
      - name: timezone
        type: string
        nullable: true
        comment: IANA timezone (e.g., 'America/Chicago')
      - name: forecast_zone
        type: string
        nullable: true
        comment: NWS forecast zone ID
      - name: county_zone
        type: string
        nullable: true
        comment: NWS county zone ID

    source:
      type: http
      url: "https://api.weather.gov/stations?state={state_abbr}&limit=500"
      method: GET
      response:
        format: json
      headers:
        User-Agent: "(calcite-govdata, contact@example.com)"
        Accept: "application/geo+json"
      rateLimit:
        requestsPerSecond: 2.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.weather.NwsStationTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=nws_station/state_abbr=*/"
      partition:
        columns: [type, state_abbr]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/source=weather/WEATHER"
        tableName: nws_stations
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

  # ---------------------------------------------------------------------------
  # NWS ALERTS - Active severe weather alerts (no auth)
  # ---------------------------------------------------------------------------
  - name: nws_alerts
    pattern: "type=nws_alert/state_abbr=*/*.parquet"
    partitions: *nws_partitions
    comment: >
      NWS active weather alerts from weather.gov. Includes alert type, severity,
      certainty, urgency, and temporal bounds. Snapshot of current alerts per state.
      Cross-references geo.states via state_abbr. No authentication required.

    dimensions:
      type:
        - nws_alert
      state_abbr: *all_state_abbrs

    columns:
      - name: alert_id
        type: string
        nullable: false
        comment: NWS alert identifier
      - <<: *state_abbr_column
      - name: event
        type: string
        nullable: true
        comment: "Event type (e.g., 'Tornado Warning')"
      - name: severity
        type: string
        nullable: true
        comment: "Extreme, Severe, Moderate, Minor, Unknown"
      - name: certainty
        type: string
        nullable: true
        comment: "Observed, Likely, Possible, Unlikely"
      - name: urgency
        type: string
        nullable: true
        comment: "Immediate, Expected, Future, Past"
      - name: headline
        type: string
        nullable: true
        comment: Alert headline
      - name: description
        type: string
        nullable: true
        comment: Full description
      - name: onset
        type: string
        nullable: true
        comment: ISO datetime of onset
      - name: expires
        type: string
        nullable: true
        comment: ISO datetime of expiration
      - name: sender_name
        type: string
        nullable: true
        comment: Issuing office
      - name: affected_zones
        type: string
        nullable: true
        comment: Comma-separated zone IDs

    source:
      type: http
      url: "https://api.weather.gov/alerts?area={state_abbr}&status=actual&limit=500"
      method: GET
      response:
        format: json
      headers:
        User-Agent: "(calcite-govdata, contact@example.com)"
        Accept: "application/geo+json"
      rateLimit:
        requestsPerSecond: 2.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.weather.NwsAlertTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=nws_alert/state_abbr=*/"
      partition:
        columns: [type, state_abbr]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/source=weather/WEATHER"
        tableName: nws_alerts
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

  # ---------------------------------------------------------------------------
  # CDO STATIONS - Climate observation station metadata (requires NOAA_CDO_TOKEN)
  # ---------------------------------------------------------------------------
  - name: cdo_stations
    pattern: "type=cdo_station/state_fips=*/*.parquet"
    partitions: *cdo_station_partitions
    comment: >
      NOAA CDO weather station metadata. Includes GHCND station ID, name,
      coordinates, elevation, data coverage dates, and coverage fraction.
      One row per station. Cross-references geo.states via state_fips.
      Requires NOAA_CDO_TOKEN environment variable.

    dimensions:
      type:
        - cdo_station
      state_fips: *all_state_fips

    columns:
      - name: station_id
        type: string
        nullable: false
        comment: "CDO station ID (e.g., 'GHCND:USW00094846', 'COOP:110050')"
      - name: station_name
        type: string
        nullable: true
        comment: Station name
      - <<: *state_fips_column
      - name: latitude
        type: double
        nullable: true
        comment: Station latitude
      - name: longitude
        type: double
        nullable: true
        comment: Station longitude
      - name: elevation
        type: double
        nullable: true
        comment: Elevation (nullable)
      - name: min_date
        type: string
        nullable: true
        comment: Earliest data available (ISO date)
      - name: max_date
        type: string
        nullable: true
        comment: Most recent data available (ISO date)
      - name: datacoverage
        type: double
        nullable: true
        comment: Coverage fraction 0-1

    source:
      type: http
      url: "https://www.ncdc.noaa.gov/cdo-web/api/v2/stations?locationid=FIPS:{state_fips}&limit=1000&offset=1"
      method: GET
      response:
        format: json
      headers:
        token: "{env:NOAA_CDO_TOKEN}"
      rateLimit:
        requestsPerSecond: 5.0
        retryOn: [429, 503]
        maxRetries: 3
      pagination:
        enabled: true
        offsetParam: offset
        limitParam: limit
        maxPerRequest: 1000
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.weather.CdoStationTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=cdo_station/state_fips=*/"
      partition:
        columns: [type, state_fips]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/source=weather/WEATHER"
        tableName: cdo_stations
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

  # ---------------------------------------------------------------------------
  # CDO MONTHLY SUMMARIES (GSOM) - Monthly climate data (requires NOAA_CDO_TOKEN)
  # ---------------------------------------------------------------------------
  - name: cdo_monthly_summaries
    pattern: "type=cdo_monthly/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      NOAA CDO Global Summary of the Month (GSOM) data. Includes temperature
      (TAVG, TMAX, TMIN), precipitation (PRCP), snowfall (SNOW), and other
      monthly climate metrics per station. One row per station+month+datatype.
      Cross-references geo.states via state_fips and cdo_stations via station_id.
      Requires NOAA_CDO_TOKEN environment variable.

    dimensions:
      type:
        - cdo_monthly
      year: *weather_year_range
      state_fips: *all_state_fips

    columns:
      - <<: *state_fips_column
      - name: station_id
        type: string
        nullable: true
        comment: CDO station ID
      - <<: *year_column
      - name: month
        type: integer
        nullable: true
        comment: Month (1-12)
      - name: datatype
        type: string
        nullable: true
        comment: "Measurement type (TAVG, TMAX, TMIN, PRCP, SNOW, etc.)"
      - name: value
        type: double
        nullable: true
        comment: Value in standard units
      - name: attributes
        type: string
        nullable: true
        comment: Quality flags
      - name: date
        type: string
        nullable: true
        comment: ISO date of measurement period

    source:
      type: http
      url: "https://www.ncdc.noaa.gov/cdo-web/api/v2/data?datasetid=GSOM&locationid=FIPS:{state_fips}&startdate={year}-01-01&enddate={year}-12-31&limit=1000&offset=1"
      method: GET
      response:
        format: json
      headers:
        token: "{env:NOAA_CDO_TOKEN}"
      rateLimit:
        requestsPerSecond: 5.0
        retryOn: [429, 503]
        maxRetries: 3
      pagination:
        enabled: true
        offsetParam: offset
        limitParam: limit
        maxPerRequest: 1000
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.weather.CdoDataTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=cdo_monthly/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/source=weather/WEATHER"
        tableName: cdo_monthly_summaries
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # CDO ANNUAL SUMMARIES (GSOY) - Annual climate data (requires NOAA_CDO_TOKEN)
  # ---------------------------------------------------------------------------
  - name: cdo_annual_summaries
    pattern: "type=cdo_annual/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      NOAA CDO Global Summary of the Year (GSOY) data. Includes annual temperature,
      precipitation, and other climate metrics per station. One row per
      station+datatype+year. Cross-references geo.states via state_fips and
      cdo_stations via station_id. Requires NOAA_CDO_TOKEN environment variable.

    dimensions:
      type:
        - cdo_annual
      year: *weather_year_range
      state_fips: *all_state_fips

    columns:
      - <<: *state_fips_column
      - name: station_id
        type: string
        nullable: true
        comment: CDO station ID
      - <<: *year_column
      - name: datatype
        type: string
        nullable: true
        comment: Measurement type
      - name: value
        type: double
        nullable: true
        comment: Value in standard units
      - name: attributes
        type: string
        nullable: true
        comment: Quality flags
      - name: date
        type: string
        nullable: true
        comment: ISO date

    source:
      type: http
      url: "https://www.ncdc.noaa.gov/cdo-web/api/v2/data?datasetid=GSOY&locationid=FIPS:{state_fips}&startdate={year}-01-01&enddate={year}-12-31&limit=1000&offset=1"
      method: GET
      response:
        format: json
      headers:
        token: "{env:NOAA_CDO_TOKEN}"
      rateLimit:
        requestsPerSecond: 5.0
        retryOn: [429, 503]
        maxRetries: 3
      pagination:
        enabled: true
        offsetParam: offset
        limitParam: limit
        maxPerRequest: 1000
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.weather.CdoDataTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=cdo_annual/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/source=weather/WEATHER"
        tableName: cdo_annual_summaries
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # EPA ANNUAL AQI - Air quality index by county (requires EPA_AQS_EMAIL + EPA_AQS_KEY)
  # ---------------------------------------------------------------------------
  - name: epa_annual_aqi
    pattern: "type=epa_aqi/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      EPA AQS annual air quality data by state and pollutant. Includes annual mean,
      peak values, observation counts, and AQI for PM2.5, Ozone, SO2, NO2, and CO.
      One row per county+parameter+year. Cross-references geo.states via state_fips
      and geo.counties via county_fips. Requires EPA_AQS_EMAIL and EPA_AQS_KEY
      environment variables.

    dimensions:
      type:
        - epa_aqi
      year: *weather_year_range
      state_fips: *all_state_fips
      param: *aqi_pollutants

    columns:
      - <<: *state_fips_column
      - name: county_fips
        type: string
        nullable: true
        comment: "5-digit county FIPS code"
      - name: parameter_code
        type: string
        nullable: true
        comment: "Pollutant code (88101, 44201, etc.)"
      - name: parameter_name
        type: string
        nullable: true
        comment: "Pollutant name (e.g., 'PM2.5 - Local Conditions')"
      - <<: *year_column
      - name: arithmetic_mean
        type: double
        nullable: true
        comment: Annual mean concentration
      - name: first_max_value
        type: double
        nullable: true
        comment: Highest recorded value
      - name: observation_count
        type: integer
        nullable: true
        comment: Number of observations
      - name: valid_day_count
        type: integer
        nullable: true
        comment: Days with valid data
      - name: aqi
        type: integer
        nullable: true
        comment: Air Quality Index

    source:
      type: http
      url: "https://aqs.epa.gov/data/api/annualData/byState?email={env:EPA_AQS_EMAIL}&key={env:EPA_AQS_KEY}&param={param}&bdate={year}0101&edate={year}1231&state={state_fips}"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 0.167  # 10 req/min
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.weather.EpaAqsTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=epa_aqi/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/source=weather/WEATHER"
        tableName: epa_annual_aqi
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5
        batchPartitionColumns: [year]
        incrementalKeys: [year]

# ============================================================================
# CONSTRAINTS
# ============================================================================

constraints:
  nws_stations:
    primaryKey: [station_id]
    foreignKeys:
      - columns: [state_abbr]
        targetSchema: geo
        targetTable: states
        targetColumns: [state_abbr]

  nws_alerts:
    primaryKey: [alert_id, state_abbr]
    foreignKeys:
      - columns: [state_abbr]
        targetSchema: geo
        targetTable: states
        targetColumns: [state_abbr]

  cdo_stations:
    primaryKey: [station_id]
    foreignKeys:
      - columns: [state_fips]
        targetSchema: geo
        targetTable: states
        targetColumns: [state_fips]

  cdo_monthly_summaries:
    primaryKey: [station_id, datatype, year, month]
    foreignKeys:
      - columns: [state_fips]
        targetSchema: geo
        targetTable: states
        targetColumns: [state_fips]
      - columns: [station_id]
        targetTable: cdo_stations
        targetColumns: [station_id]

  cdo_annual_summaries:
    primaryKey: [station_id, datatype, year]
    foreignKeys:
      - columns: [state_fips]
        targetSchema: geo
        targetTable: states
        targetColumns: [state_fips]
      - columns: [station_id]
        targetTable: cdo_stations
        targetColumns: [station_id]

  epa_annual_aqi:
    primaryKey: [county_fips, parameter_code, year]
    foreignKeys:
      - columns: [state_fips]
        targetSchema: geo
        targetTable: states
        targetColumns: [state_fips]
      - columns: [county_fips]
        targetSchema: geo
        targetTable: counties
        targetColumns: [county_fips]
