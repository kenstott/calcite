# ============================================================================
# U.S. Crime and Public Safety Data Schema (CRIME)
# ============================================================================
# Data Sources:
#   - FBI Crime Data Explorer (CDE) - Agency data, offense rates, arrests, SHR,
#     police employment, hate crimes, use of force, LEOKA, cargo theft,
#     human trafficking, participation, crime estimates
#   - Bureau of Justice Statistics (BJS) - NIBRS estimates, NCVS victimization
#     (personal + household), NCVS population data
#
# Features:
#   - Cross-references with geo.states via state_abbr
#   - Hive-style partitioning for efficient querying
#   - Rate-limited API integration (10 req/sec)
# ============================================================================

schemaName: "${SCHEMA_NAME:crime}"
# 0: CDE/BJS are queried by the literal data year and CDE publishes current-year monthly data,
# so the end year is the current year (no publish lag). Year ranges file under the data year.
dataLagYears: 0
materializeDirectory: "${GOVDATA_PARQUET_DIR}"

comment: >
  Comprehensive U.S. crime and public safety data from FBI Crime Data Explorer (CDE) and
  Bureau of Justice Statistics (BJS). CDE tables cover law enforcement agencies, summarized
  offense rates, agency-level offenses, arrests, supplementary homicide reports (SHR), police
  employment, hate crimes, use of force, LEOKA (officers killed/assaulted), cargo theft,
  human trafficking, agency participation rates, and estimated crime counts. BJS tables cover
  NIBRS national crime estimates, NCVS personal and household victimization, and NCVS
  population data. All state-level tables join with geo.states via state_abbr.

# ============================================================================
# COLUMN TEMPLATES
# ============================================================================

column_templates:

  state_abbr_column: &state_abbr_column
    name: state_abbr
    type: string
    nullable: false
    comment: 2-letter state abbreviation (e.g., 'CA') or 'national'

  year_column: &year_column
    name: year
    type: integer
    nullable: false
    comment: Calendar year

  section_column: &section_column
    name: section
    type: string
    nullable: true
    comment: Data section grouping

  category_column: &category_column
    name: category
    type: string
    nullable: true
    comment: Category within section

  label_column: &label_column
    name: label
    type: string
    nullable: true
    comment: Metric or value label

  partition_type: &partition_type
    name: type
    type: VARCHAR

  partition_year: &partition_year
    name: year
    type: INTEGER

  partition_state: &partition_state
    name: state_abbr
    type: VARCHAR

  partition_endpoint: &partition_endpoint
    name: endpoint_id
    type: VARCHAR

  standard_partitions: &standard_partitions
    style: hive
    columnDefinitions:
      - *partition_type
      - *partition_year

  agency_partitions: &agency_partitions
    style: hive
    columnDefinitions:
      - *partition_type
      - *partition_state

  endpoint_partitions: &endpoint_partitions
    style: hive
    columnDefinitions:
      - *partition_type
      - *partition_endpoint

# ============================================================================
# DIMENSION VALUES
# ============================================================================

dimension_values:

  # All 50 states + DC
  all_state_abbrs: &all_state_abbrs
    - 'AL'
    - 'AK'
    - 'AZ'
    - 'AR'
    - 'CA'
    - 'CO'
    - 'CT'
    - 'DE'
    - 'DC'
    - 'FL'
    - 'GA'
    - 'HI'
    - 'ID'
    - 'IL'
    - 'IN'
    - 'IA'
    - 'KS'
    - 'KY'
    - 'LA'
    - 'ME'
    - 'MD'
    - 'MA'
    - 'MI'
    - 'MN'
    - 'MS'
    - 'MO'
    - 'MT'
    - 'NE'
    - 'NV'
    - 'NH'
    - 'NJ'
    - 'NM'
    - 'NY'
    - 'NC'
    - 'ND'
    - 'OH'
    - 'OK'
    - 'OR'
    - 'PA'
    - 'RI'
    - 'SC'
    - 'SD'
    - 'TN'
    - 'TX'
    - 'UT'
    - 'VT'
    - 'VA'
    - 'WA'
    - 'WV'
    - 'WI'
    - 'WY'

  # UCR offense codes for summarized crime data
  # Aggregate categories
  ucr_core_offenses: &ucr_core_offenses
    - 'violent-crime'
    - 'property-crime'
    - 'homicide'
    - 'aggravated-assault'
    - 'rape'
    - 'robbery'
    - 'burglary'
    - 'larceny'
    - 'motor-vehicle-theft'
    - 'arson'

  # Full NIBRS offense types for detailed queries
  ucr_all_offenses: &ucr_all_offenses
    - 'violent-crime'
    - 'property-crime'
    - 'homicide'
    - 'aggravated-assault'
    - 'rape'
    - 'robbery'
    - 'burglary'
    - 'larceny'
    - 'motor-vehicle-theft'
    - 'arson'

  # Arrest offense categories - numeric codes from /LATEST/lookup/offenses?type=arrest
  # Use 'all' for all offenses combined
  arrest_offenses: &arrest_offenses
    - 'all'

  # Year range for FBI CDE data. Start floor 2010; the factory-set GOVDATA_START_YEAR
  # system property overrides it for all schemas.
  # dataLag MUST be 0: every crime URL templates the literal {year} (publish year), so the
  # stored partition year must equal the fetched year. dataLag>0 stores effective_year=year-lag,
  # which only makes sense when the URL uses {effective_year}. CDE/BJS data is fetchable by
  # literal year (2026 monthly data exists), so no lag is warranted.
  crime_year_range: &crime_year_range
    type: yearRange
    start: "${GOVDATA_START_YEAR:2010}"
    end: current
    dataLag: 0

  # Month range is encoded differently for CDE API (MM-YYYY format)
  # We use year dimension only; the API returns all months for the year range

  # BJS NIBRS SODA endpoint IDs
  bjs_nibrs_endpoints: &bjs_nibrs_endpoints
    - 'r32q-bdaw'   # Violent incidents
    - 'iv7i-eah6'   # Property incidents
    - 'x3sz-eb6y'   # Violent offenses
    - 'kj7p-vx4s'   # Property offenses
    - 'ms42-n765'   # Victimization counts
    - 'uy37-xgmh'   # Victimization rates

  # BJS NCVS SODA endpoint IDs
  bjs_ncvs_endpoints: &bjs_ncvs_endpoints
    - endpoint_id: 'gcuy-rt5g'
      name: ncvs_personal
    - endpoint_id: 'r4j4-fdwx'
      name: ncvs_personal_pop
    - endpoint_id: 'gkck-euys'
      name: ncvs_household
    - endpoint_id: 'ya4e-n9zp'
      name: ncvs_household_pop

# ============================================================================
# PARTITIONED TABLES
# ============================================================================

partitionedTables:

  # ---------------------------------------------------------------------------
  # CDE AGENCIES - Law enforcement agency registry
  # ---------------------------------------------------------------------------
  - name: cde_agencies
    pattern: "type=agency/state_abbr=*/*.parquet"
    partitions: *agency_partitions
    comment: >
      FBI CDE law enforcement agency registry. ~19,600 agencies across 51 jurisdictions
      with ORI identifiers, agency type, county, NIBRS reporting status, and coordinates.
      One row per agency. Cross-references geo.states via state_abbr.

    dimensions:
      type:
        - agency
      state_abbr: *all_state_abbrs
      year: *crime_year_range

    columns:
      - name: ori
        type: string
        nullable: false
        comment: ORI identifier (e.g., 'CA0150000')
      - name: agency_name
        type: string
        nullable: true
        comment: Agency name
      - name: agency_type_name
        type: string
        nullable: true
        comment: Agency type (City, County, State, Other)
      - <<: *state_abbr_column
      - name: county_name
        type: string
        nullable: true
        comment: County name (title case, e.g., 'Kern')
      - name: is_nibrs
        type: boolean
        nullable: true
        comment: Whether agency reports via NIBRS
      - name: nibrs_start_date
        type: string
        nullable: true
        comment: NIBRS start date (ISO format)
      - name: latitude
        type: double
        nullable: true
        comment: Agency latitude
      - name: longitude
        type: double
        nullable: true
        comment: Agency longitude

    source:
      type: http
      url: "https://api.usa.gov/crime/fbi/cde/agency/byStateAbbr/{state_abbr}?API_KEY=${API_DATA_GOV}"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 10.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.crime.CdeAgencyTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=agency/state_abbr=*/"
      partition:
        columns: [type, state_abbr]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/crime"
        tableName: cde_agencies
        catalogType: hadoop
        runCompaction: true
        overwritePartitions: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

  # ---------------------------------------------------------------------------
  # CDE OFFENSES - Summarized crime rates by state, offense, and month
  # ---------------------------------------------------------------------------
  - name: cde_offenses
    pattern: "type=offense/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      FBI CDE summarized crime rates by state and offense type. Includes offense rate,
      clearance rate, national comparison rates, population, and coverage percentage.
      One row per state + offense + month. Cross-references geo.states via state_abbr.

    dimensions:
      type:
        - offense
      year:
        <<: *crime_year_range
        monthlyYTD: true
      state_abbr: *all_state_abbrs
      offense: *ucr_core_offenses

    columns:
      - <<: *state_abbr_column
      - name: offense_code
        type: string
        nullable: false
        comment: FBI offense code (e.g., violent-crime, homicide, burglary)
      - name: month
        type: string
        nullable: true
        comment: MM-YYYY format
      - name: offense_rate
        type: double
        nullable: true
        comment: Offenses per 100k population (state)
      - name: clearance_rate
        type: double
        nullable: true
        comment: Clearances per 100k population (state)
      - name: national_offense_rate
        type: double
        nullable: true
        comment: National offense rate for comparison
      - name: national_clearance_rate
        type: double
        nullable: true
        comment: National clearance rate for comparison
      - name: population
        type: long
        nullable: true
        comment: State population for the period
      - name: population_coverage_pct
        type: double
        nullable: true
        comment: Percentage of population covered by reporting agencies

    source:
      type: http
      url: "https://cde.ucr.cjis.gov/LATEST/summarized/state/{state_abbr}/{offense}?from=01-{year}&to={month}-{year}"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 10.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.crime.CdeCrimeRatesTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=offense/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/crime"
        tableName: cde_offenses
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # CDE POLICE EMPLOYMENT - Sworn officers and civilian employees
  # ---------------------------------------------------------------------------
  - name: cde_police_employment
    pattern: "type=pe/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      FBI CDE police employment data by state and year. Includes officers per 1,000
      population, male/female officer and civilian counts, and population coverage.

    dimensions:
      type:
        - pe
      year: *crime_year_range
      state_abbr: *all_state_abbrs

    columns:
      - <<: *state_abbr_column
      - <<: *year_column
      - name: officers_per_1000
        type: double
        nullable: true
        comment: Officers per 1,000 people
      - name: male_officers
        type: long
        nullable: true
        comment: Male sworn officer count
      - name: female_officers
        type: long
        nullable: true
        comment: Female sworn officer count
      - name: male_civilians
        type: long
        nullable: true
        comment: Male civilian employee count
      - name: female_civilians
        type: long
        nullable: true
        comment: Female civilian employee count
      - name: participated_population
        type: long
        nullable: true
        comment: Population covered by reporting agencies

    source:
      type: http
      url: "https://cde.ucr.cjis.gov/LATEST/pe/{state_abbr}?from={year}&to={year}"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 10.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.crime.CdePoliceEmploymentTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=pe/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/crime"
        tableName: cde_police_employment
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # CDE HATE CRIMES - Hate crime statistics by state
  # ---------------------------------------------------------------------------
  - name: cde_hate_crimes
    pattern: "type=hate_crime/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      FBI CDE hate crime statistics by state and year. Flattened from nested sections
      (bias_section, incident_section) with categories (victim_type, offense_type,
      offender_race, bias, etc.) and labels with counts.

    dimensions:
      type:
        - hate_crime
      year: *crime_year_range
      month: ["12"]
      state_abbr: *all_state_abbrs

    columns:
      - <<: *state_abbr_column
      - <<: *year_column
      - <<: *section_column
      - <<: *category_column
      - <<: *label_column
      - name: count
        type: long
        nullable: true
        comment: Count for this combination

    source:
      type: http
      url: "https://cde.ucr.cjis.gov/LATEST/hate-crime/state/{state_abbr}?from=01-{year}&to={month}-{year}"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 10.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.crime.CdeHateCrimeTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=hate_crime/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/crime"
        tableName: cde_hate_crimes
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # CDE USE OF FORCE - Police use of force metrics
  # ---------------------------------------------------------------------------
  - name: cde_use_of_force
    pattern: "type=uof/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      FBI CDE use of force data by state and year. Includes participation rates,
      incident reports, and demographic breakdowns.

    dimensions:
      type:
        - uof
      year: *crime_year_range
      state_abbr: *all_state_abbrs

    columns:
      - <<: *state_abbr_column
      - <<: *year_column
      - <<: *section_column
      - <<: *category_column
      - <<: *label_column
      - name: value
        type: double
        nullable: true
        comment: Metric value (count or percentage)

    source:
      type: http
      url: "https://cde.ucr.cjis.gov/LATEST/uof?location={state_abbr}&year={year}"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 10.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.crime.CdeUseOfForceTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=uof/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/crime"
        tableName: cde_use_of_force
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # CDE RETA - Return A agency monthly offense + clearance counts (bulk master file)
  # ---------------------------------------------------------------------------
  - name: cde_reta
    pattern: "type=reta/year=*/*.parquet"
    # DQ sample cap (GOVDATA_DQ mode): the national Return A file unpivots to ~313k rows/year
    # (≈26k agencies × 12 months). Cap each year's sample; applied after the month-unpivot
    # transformer so it bounds output rows. Cache-safe — the fixed-width raw cache is written in
    # full during fetch before this iterator runs, so the cap never truncates it.
    dqRowLimit: 25000
    partitions: *standard_partitions
    comment: >
      FBI Return A master file: agency-level monthly counts of Part I offenses
      (reported/unfounded/actual/cleared/juvenile-cleared) plus officers killed and
      assaulted, from the CDE bulk download (one national fixed-width file per year)
      instead of per-ORI API calls. One row per agency (ORI7) per month, unpivoted from
      the wide 12-month record. Cross-references cde_agencies via ori (ORI7 prefix).

    dimensions:
      type:
        - reta
      year: *crime_year_range

    columns:
      - name: identifier_code
        type: string
        nullable: true
        comment: Return A header field identifier code
      - name: state
        type: string
        nullable: true
        comment: Return A header field state
      - name: ori
        type: string
        nullable: false
        comment: 7-character originating agency identifier (ORI7)
      - name: population_group
        type: string
        nullable: true
        comment: Return A header field population group
      - name: country_division
        type: string
        nullable: true
        comment: Return A header field country division
      - name: year
        type: integer
        nullable: false
        comment: Reporting year (4-digit, from the file batch)
      - name: month
        type: integer
        nullable: false
        comment: Calendar month 1-12 (unpivoted from the monthly record groups)
      - name: sequence_number
        type: string
        nullable: true
        comment: Return A header field sequence number
      - name: juvenile_age
        type: string
        nullable: true
        comment: Return A header field juvenile age
      - name: core_city_indication
        type: string
        nullable: true
        comment: Return A header field core city indication
      - name: covered_by_ori
        type: string
        nullable: true
        comment: Return A header field covered by ori
      - name: covered_by_population_group
        type: string
        nullable: true
        comment: Return A header field covered by population group
      - name: last_update
        type: string
        nullable: true
        comment: Return A header field last update
      - name: fbi_field_office
        type: string
        nullable: true
        comment: Return A header field fbi field office
      - name: number_of_months_reported
        type: integer
        nullable: true
        comment: Return A header field number of months reported
      - name: agency_count
        type: integer
        nullable: true
        comment: Return A header field agency count
      - name: population_1
        type: long
        nullable: true
        comment: Return A header field population 1
      - name: population_1_county
        type: long
        nullable: true
        comment: Return A header field population 1 county
      - name: population_1_msa
        type: long
        nullable: true
        comment: Return A header field population 1 msa
      - name: population_2
        type: long
        nullable: true
        comment: Return A header field population 2
      - name: population_2_county
        type: long
        nullable: true
        comment: Return A header field population 2 county
      - name: population_2_msa
        type: long
        nullable: true
        comment: Return A header field population 2 msa
      - name: population_3
        type: long
        nullable: true
        comment: Return A header field population 3
      - name: population_3_county
        type: long
        nullable: true
        comment: Return A header field population 3 county
      - name: population_3_msa
        type: long
        nullable: true
        comment: Return A header field population 3 msa
      - name: last_population_1
        type: long
        nullable: true
