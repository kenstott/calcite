# ============================================================================
# U.S. Crime and Public Safety Data Schema (CRIME)
# ============================================================================
# Data Sources:
#   - FBI Crime Data Explorer (CDE) - Agency data, offense rates, arrests, SHR,
#     police employment, hate crimes, use of force, LEOKA, cargo theft,
#     human trafficking, participation, crime estimates
#   - Bureau of Justice Statistics (BJS) - NIBRS estimates, NCVS victimization
#     (personal + household), NCVS population data
#
# Features:
#   - Cross-references with geo.states via state_abbr
#   - Hive-style partitioning for efficient querying
#   - Rate-limited API integration (10 req/sec)
# ============================================================================

schemaName: "${SCHEMA_NAME:crime}"
dataLagYears: 1
materializeDirectory: "${GOVDATA_PARQUET_DIR}/crime"

comment: >
  Comprehensive U.S. crime and public safety data from FBI Crime Data Explorer (CDE) and
  Bureau of Justice Statistics (BJS). CDE tables cover law enforcement agencies, summarized
  offense rates, agency-level offenses, arrests, supplementary homicide reports (SHR), police
  employment, hate crimes, use of force, LEOKA (officers killed/assaulted), cargo theft,
  human trafficking, agency participation rates, and estimated crime counts. BJS tables cover
  NIBRS national crime estimates, NCVS personal and household victimization, and NCVS
  population data. All state-level tables join with geo.states via state_abbr.

# ============================================================================
# COLUMN TEMPLATES
# ============================================================================

column_templates:

  state_abbr_column: &state_abbr_column
    name: state_abbr
    type: string
    nullable: false
    comment: 2-letter state abbreviation (e.g., 'CA') or 'national'

  year_column: &year_column
    name: year
    type: integer
    nullable: false
    comment: Calendar year

  section_column: &section_column
    name: section
    type: string
    nullable: true
    comment: Data section grouping

  category_column: &category_column
    name: category
    type: string
    nullable: true
    comment: Category within section

  label_column: &label_column
    name: label
    type: string
    nullable: true
    comment: Metric or value label

  partition_type: &partition_type
    name: type
    type: VARCHAR

  partition_year: &partition_year
    name: year
    type: INTEGER

  partition_state: &partition_state
    name: state_abbr
    type: VARCHAR

  partition_endpoint: &partition_endpoint
    name: endpoint_id
    type: VARCHAR

  standard_partitions: &standard_partitions
    style: hive
    columnDefinitions:
      - *partition_type
      - *partition_year

  agency_partitions: &agency_partitions
    style: hive
    columnDefinitions:
      - *partition_type
      - *partition_state

  endpoint_partitions: &endpoint_partitions
    style: hive
    columnDefinitions:
      - *partition_type
      - *partition_endpoint

# ============================================================================
# DIMENSION VALUES
# ============================================================================

dimension_values:

  # All 50 states + DC
  all_state_abbrs: &all_state_abbrs
    - 'AL'
    - 'AK'
    - 'AZ'
    - 'AR'
    - 'CA'
    - 'CO'
    - 'CT'
    - 'DE'
    - 'DC'
    - 'FL'
    - 'GA'
    - 'HI'
    - 'ID'
    - 'IL'
    - 'IN'
    - 'IA'
    - 'KS'
    - 'KY'
    - 'LA'
    - 'ME'
    - 'MD'
    - 'MA'
    - 'MI'
    - 'MN'
    - 'MS'
    - 'MO'
    - 'MT'
    - 'NE'
    - 'NV'
    - 'NH'
    - 'NJ'
    - 'NM'
    - 'NY'
    - 'NC'
    - 'ND'
    - 'OH'
    - 'OK'
    - 'OR'
    - 'PA'
    - 'RI'
    - 'SC'
    - 'SD'
    - 'TN'
    - 'TX'
    - 'UT'
    - 'VT'
    - 'VA'
    - 'WA'
    - 'WV'
    - 'WI'
    - 'WY'

  # UCR offense codes for summarized crime data
  # Aggregate categories
  ucr_core_offenses: &ucr_core_offenses
    - 'violent-crime'
    - 'property-crime'
    - 'homicide'
    - 'aggravated-assault'
    - 'rape'
    - 'robbery'
    - 'burglary'
    - 'larceny'
    - 'motor-vehicle-theft'
    - 'arson'

  # Full NIBRS offense types for detailed queries
  ucr_all_offenses: &ucr_all_offenses
    - 'violent-crime'
    - 'property-crime'
    - 'homicide'
    - 'aggravated-assault'
    - 'rape'
    - 'robbery'
    - 'burglary'
    - 'larceny'
    - 'motor-vehicle-theft'
    - 'arson'

  # Arrest offense categories - numeric codes from /LATEST/lookup/offenses?type=arrest
  # Use 'all' for all offenses combined
  arrest_offenses: &arrest_offenses
    - 'all'

  # Year range for FBI CDE data
  # Override: CRIME_START_YEAR for crime-only, GOVDATA_START_YEAR for all schemas
  crime_year_range: &crime_year_range
    type: yearRange
    start: "${CRIME_START_YEAR:${GOVDATA_START_YEAR:2015}}"
    end: current
    dataLag: 1

  # Month range is encoded differently for CDE API (MM-YYYY format)
  # We use year dimension only; the API returns all months for the year range

  # BJS NIBRS SODA endpoint IDs
  bjs_nibrs_endpoints: &bjs_nibrs_endpoints
    - 'r32q-bdaw'   # Violent incidents
    - 'iv7i-eah6'   # Property incidents
    - 'x3sz-eb6y'   # Violent offenses
    - 'kj7p-vx4s'   # Property offenses
    - 'ms42-n765'   # Victimization counts
    - 'uy37-xgmh'   # Victimization rates

  # BJS NCVS SODA endpoint IDs
  bjs_ncvs_endpoints: &bjs_ncvs_endpoints
    - endpoint_id: 'gcuy-rt5g'
      name: ncvs_personal
    - endpoint_id: 'r4j4-fdwx'
      name: ncvs_personal_pop
    - endpoint_id: 'gkck-euys'
      name: ncvs_household
    - endpoint_id: 'ya4e-n9zp'
      name: ncvs_household_pop

# ============================================================================
# PARTITIONED TABLES
# ============================================================================

partitionedTables:

  # ---------------------------------------------------------------------------
  # CDE AGENCIES - Law enforcement agency registry
  # ---------------------------------------------------------------------------
  - name: cde_agencies
    pattern: "type=agency/state_abbr=*/*.parquet"
    partitions: *agency_partitions
    comment: >
      FBI CDE law enforcement agency registry. ~19,600 agencies across 51 jurisdictions
      with ORI identifiers, agency type, county, NIBRS reporting status, and coordinates.
      One row per agency. Cross-references geo.states via state_abbr.

    dimensions:
      type:
        - agency
      state_abbr: *all_state_abbrs

    columns:
      - name: ori
        type: string
        nullable: false
        comment: ORI identifier (e.g., 'CA0150000')
      - name: agency_name
        type: string
        nullable: true
        comment: Agency name
      - name: agency_type_name
        type: string
        nullable: true
        comment: Agency type (City, County, State, Other)
      - <<: *state_abbr_column
      - name: county_name
        type: string
        nullable: true
        comment: County name (title case, e.g., 'Kern')
      - name: is_nibrs
        type: boolean
        nullable: true
        comment: Whether agency reports via NIBRS
      - name: nibrs_start_date
        type: string
        nullable: true
        comment: NIBRS start date (ISO format)
      - name: latitude
        type: double
        nullable: true
        comment: Agency latitude
      - name: longitude
        type: double
        nullable: true
        comment: Agency longitude

    source:
      type: http
      url: "https://api.usa.gov/crime/fbi/cde/agency/byStateAbbr/{state_abbr}?API_KEY=${API_DATA_GOV}"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 10.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.crime.CdeAgencyTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=agency/state_abbr=*/"
      partition:
        columns: [type, state_abbr]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/crime"
        tableName: cde_agencies
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

  # ---------------------------------------------------------------------------
  # CDE OFFENSES - Summarized crime rates by state, offense, and month
  # ---------------------------------------------------------------------------
  - name: cde_offenses
    pattern: "type=offense/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      FBI CDE summarized crime rates by state and offense type. Includes offense rate,
      clearance rate, national comparison rates, population, and coverage percentage.
      One row per state + offense + month. Cross-references geo.states via state_abbr.

    dimensions:
      type:
        - offense
      year: *crime_year_range
      state_abbr: *all_state_abbrs
      offense: *ucr_core_offenses

    columns:
      - <<: *state_abbr_column
      - name: offense_code
        type: string
        nullable: false
        comment: FBI offense code (e.g., violent-crime, homicide, burglary)
      - name: month
        type: string
        nullable: true
        comment: MM-YYYY format
      - name: offense_rate
        type: double
        nullable: true
        comment: Offenses per 100k population (state)
      - name: clearance_rate
        type: double
        nullable: true
        comment: Clearances per 100k population (state)
      - name: national_offense_rate
        type: double
        nullable: true
        comment: National offense rate for comparison
      - name: national_clearance_rate
        type: double
        nullable: true
        comment: National clearance rate for comparison
      - name: population
        type: long
        nullable: true
        comment: State population for the period
      - name: population_coverage_pct
        type: double
        nullable: true
        comment: Percentage of population covered by reporting agencies

    source:
      type: http
      url: "https://cde.ucr.cjis.gov/LATEST/summarized/state/{state_abbr}/{offense}?from=01-{year}&to=12-{year}"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 10.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.crime.CdeCrimeRatesTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=offense/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/crime"
        tableName: cde_offenses
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # CDE POLICE EMPLOYMENT - Sworn officers and civilian employees
  # ---------------------------------------------------------------------------
  - name: cde_police_employment
    pattern: "type=pe/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      FBI CDE police employment data by state and year. Includes officers per 1,000
      population, male/female officer and civilian counts, and population coverage.

    dimensions:
      type:
        - pe
      year: *crime_year_range
      state_abbr: *all_state_abbrs

    columns:
      - <<: *state_abbr_column
      - <<: *year_column
      - name: officers_per_1000
        type: double
        nullable: true
        comment: Officers per 1,000 people
      - name: male_officers
        type: long
        nullable: true
        comment: Male sworn officer count
      - name: female_officers
        type: long
        nullable: true
        comment: Female sworn officer count
      - name: male_civilians
        type: long
        nullable: true
        comment: Male civilian employee count
      - name: female_civilians
        type: long
        nullable: true
        comment: Female civilian employee count
      - name: participated_population
        type: long
        nullable: true
        comment: Population covered by reporting agencies

    source:
      type: http
      url: "https://cde.ucr.cjis.gov/LATEST/pe?stateAbbr={state_abbr}&from={year}&to={year}"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 10.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.crime.CdePoliceEmploymentTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=pe/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/crime"
        tableName: cde_police_employment
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # CDE HATE CRIMES - Hate crime statistics by state
  # ---------------------------------------------------------------------------
  - name: cde_hate_crimes
    pattern: "type=hate_crime/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      FBI CDE hate crime statistics by state and year. Flattened from nested sections
      (bias_section, incident_section) with categories (victim_type, offense_type,
      offender_race, bias, etc.) and labels with counts.

    dimensions:
      type:
        - hate_crime
      year: *crime_year_range
      state_abbr: *all_state_abbrs

    columns:
      - <<: *state_abbr_column
      - <<: *year_column
      - <<: *section_column
      - <<: *category_column
      - <<: *label_column
      - name: count
        type: long
        nullable: true
        comment: Count for this combination

    source:
      type: http
      url: "https://cde.ucr.cjis.gov/LATEST/hate-crime/state/{state_abbr}?from=01-{year}&to=12-{year}"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 10.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.crime.CdeHateCrimeTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=hate_crime/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/crime"
        tableName: cde_hate_crimes
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # CDE USE OF FORCE - Police use of force metrics
  # ---------------------------------------------------------------------------
  - name: cde_use_of_force
    pattern: "type=uof/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      FBI CDE use of force data by state and year. Includes participation rates,
      incident reports, and demographic breakdowns.

    dimensions:
      type:
        - uof
      year: *crime_year_range
      state_abbr: *all_state_abbrs

    columns:
      - <<: *state_abbr_column
      - <<: *year_column
      - <<: *section_column
      - <<: *category_column
      - <<: *label_column
      - name: value
        type: double
        nullable: true
        comment: Metric value (count or percentage)

    source:
      type: http
      url: "https://cde.ucr.cjis.gov/LATEST/uof?location={state_abbr}&year={year}"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 10.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.crime.CdeHateCrimeTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=uof/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/crime"
        tableName: cde_use_of_force
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # CDE CRIME AGENCY - Agency-level offense data
  # ---------------------------------------------------------------------------
  - name: cde_crime_agency
    pattern: "type=agency_offense/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      FBI CDE agency-level offense data. One row per agency (ORI) + offense + month.
      Uses OriDimensionResolver to iterate ORIs per state from cde_agencies table.
      ~19,581 agencies x 10 core offenses. Cross-references cde_agencies via ori.

    dimensions:
      type:
        - agency_offense
      year: *crime_year_range
      state_abbr: *all_state_abbrs
      offense: *ucr_core_offenses
      ori:
        type: custom
        properties:
          contextKey: state_abbr
          agenciesTablePath: "${GOVDATA_PARQUET_DIR}/crime/cde_agencies"

    columns:
      - name: ori
        type: string
        nullable: false
        comment: ORI identifier (e.g., 'CA0150000')
      - name: state_abbr
        type: string
        nullable: false
        comment: 2-letter state abbreviation
      - name: offense_code
        type: string
        nullable: false
        comment: FBI offense code
      - name: month
        type: string
        nullable: true
        comment: MM-YYYY format
      - name: actual
        type: long
        nullable: true
        comment: Actual offense count
      - name: cleared
        type: long
        nullable: true
        comment: Cleared offense count
      - name: actual_since_last_year
        type: long
        nullable: true
        comment: Year-to-date actual count
      - name: cleared_since_last_year
        type: long
        nullable: true
        comment: Year-to-date cleared count

    source:
      type: http
      url: "https://cde.ucr.cjis.gov/LATEST/summarized/agency/{ori}/{offense}?from=01-{year}&to=12-{year}"
      method: GET
      parallel: 5
      response:
        format: json
      rateLimit:
        requestsPerSecond: 10.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.crime.CdeAgencyOffenseTransformer"
      dimensionResolver: "org.apache.calcite.adapter.govdata.crime.OriDimensionResolver"

    materialize:
      format: iceberg
      output:
        pattern: "type=agency_offense/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/crime"
        tableName: cde_crime_agency
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # CDE ARRESTS - Arrest data by state, offense, age, sex, race
  # ---------------------------------------------------------------------------
  - name: cde_arrests
    pattern: "type=arrest/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      FBI CDE arrest data by state and offense category. Includes monthly arrest
      counts broken down by age group, sex, and race. Covers drug abuse, DUI,
      violent crime, property crime, and 20+ other categories.

    dimensions:
      type:
        - arrest
      year: *crime_year_range
      state_abbr: *all_state_abbrs
      offense: *arrest_offenses

    columns:
      - <<: *state_abbr_column
      - <<: *year_column
      - name: offense_code
        type: string
        nullable: false
        comment: Arrest offense category (e.g., drug-abuse, dui, violent-crime)
      - <<: *section_column
        comment: Data section (age, sex, race, ethnicity)
      - <<: *category_column
        comment: Category within section (e.g., Under 10, Male, White)
      - <<: *label_column
        comment: Metric label
      - name: count
        type: long
        nullable: true
        comment: Arrest count

    source:
      type: http
      url: "https://cde.ucr.cjis.gov/LATEST/arrest/state/{state_abbr}/{offense}?from=01-{year}&to=12-{year}&type=totals"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 10.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.crime.CdeHateCrimeTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=arrest/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/crime"
        tableName: cde_arrests
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # CDE SHR - Supplementary Homicide Reports
  # ---------------------------------------------------------------------------
  - name: cde_shr
    pattern: "type=shr/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      FBI CDE Supplementary Homicide Reports. Victim and offender demographics
      for homicide incidents including age, sex, race, relationship, weapon,
      and circumstance details.

    dimensions:
      type:
        - shr
      year: *crime_year_range
      state_abbr: *all_state_abbrs

    columns:
      - <<: *state_abbr_column
      - <<: *year_column
      - <<: *section_column
        comment: Data section (victim demographics, offender demographics, circumstances)
      - <<: *category_column
        comment: Category (age, sex, race, relationship, weapon, circumstance)
      - <<: *label_column
        comment: Value label
      - name: count
        type: long
        nullable: true
        comment: Count for this combination

    source:
      type: http
      url: "https://cde.ucr.cjis.gov/LATEST/shr/state/{state_abbr}?from=01-{year}&to=12-{year}&type=totals"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 10.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.crime.CdeHateCrimeTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=shr/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/crime"
        tableName: cde_shr
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # CDE LEOKA - Law Enforcement Officers Killed and Assaulted
  # ---------------------------------------------------------------------------
  - name: cde_leoka
    pattern: "type=leoka/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      FBI CDE Law Enforcement Officers Killed and Assaulted (LEOKA) data.
      Totals for officers killed (feloniously and accidentally) and assaulted
      in the line of duty, by state and year.

    dimensions:
      type:
        - leoka
      year: *crime_year_range
      state_abbr: *all_state_abbrs

    columns:
      - <<: *state_abbr_column
      - <<: *year_column
      - <<: *section_column
        comment: Data section (killed, assaulted, activity, weapon, assignment)
      - <<: *category_column
        comment: Category within section
      - <<: *label_column
        comment: Metric label
      - name: count
        type: long
        nullable: true
        comment: Count for this combination

    source:
      type: http
      url: "https://cde.ucr.cjis.gov/LATEST/leoka/ytd?stateAbbr={state_abbr}&year={year}"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 10.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.crime.CdeHateCrimeTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=leoka/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/crime"
        tableName: cde_leoka
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # CDE TRENDS - National crime trend percentages (rolling 12-month)
  # ---------------------------------------------------------------------------
  - name: cde_trends
    pattern: "type=trends/*.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - *partition_type
    comment: >
      FBI CDE national crime trend percentages. Year-over-year change for major
      offense categories from a rolling 12-month comparison window. Single
      snapshot refreshed periodically (~monthly). No state dimension.

    dimensions:
      type:
        - trends

    columns:
      - name: offense_name
        type: string
        nullable: false
        comment: Offense category (e.g., Murder, Robbery, Violent Crime)
      - name: trend_pct
        type: double
        nullable: true
        comment: Year-over-year percentage change (negative = decrease)
      - name: current_range
        type: string
        nullable: true
        comment: Comparison time window (e.g., 'November 2024 - October 2025')
      - name: last_refresh_date
        type: string
        nullable: true
        comment: Date this data was last refreshed

    source:
      type: http
      url: "https://cde.ucr.cjis.gov/LATEST/trends/national"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 10.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.crime.CdeTrendsTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=trends/"
      partition:
        columns: [type]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/crime"
        tableName: cde_trends
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

