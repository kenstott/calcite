  # ---------------------------------------------------------------------------
  # CDE TRENDS - National crime trend percentages (rolling 12-month)
  # ---------------------------------------------------------------------------
  - name: cde_trends
    # Latest-snapshot table (no real year axis): the open snapshot always re-runs; the
    # post-download hash gate skips the Iceberg write when the fetched content is identical
    # to the last run. No period dimension — a yearRange here produces phantom unprocessed
    # combos that trip self-heal re-registration on every resume.
    dataset_type: snapshot
    freshness:
      type: hash
    pattern: "type=trends/*.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - *partition_type
    comment: >
      FBI CDE national crime trend percentages. Year-over-year change for major
      offense categories from a rolling 12-month comparison window. Single
      snapshot refreshed periodically (~monthly). No state dimension.

    dimensions:
      type:
        - trends

    columns:
      - name: offense_name
        type: string
        nullable: false
        comment: Offense category (e.g., Murder, Robbery, Violent Crime)
      - name: trend_pct
        type: double
        nullable: true
        comment: Year-over-year percentage change (negative = decrease)
      - name: current_range
        type: string
        nullable: true
        comment: Comparison time window (e.g., 'November 2024 - October 2025')
      - name: last_refresh_date
        type: string
        nullable: true
        comment: Date this data was last refreshed

    source:
      type: http
      url: "https://cde.ucr.cjis.gov/LATEST/trends/national"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 10.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.crime.CdeTrendsTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=trends/"
      partition:
        columns: [type]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/crime"
        tableName: cde_trends
        catalogType: hadoop
        runCompaction: true
        overwritePartitions: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

  # ---------------------------------------------------------------------------
  # CDE SUPPLEMENTAL - Stolen and recovered property values
  # ---------------------------------------------------------------------------
  - name: cde_supplemental
    pattern: "type=supplemental/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      FBI CDE supplemental property crime data. Stolen and recovered property
      values by category (Firearms, Motor Vehicles, Currency, Jewelry, etc.)
      aggregated at the state level. Cross-references geo.states via state_abbr.

    dimensions:
      type:
        - supplemental
      year: *crime_year_range
      month: ["12"]
      state_abbr: *all_state_abbrs

    columns:
      - <<: *state_abbr_column
      - <<: *year_column
      - name: property_type
        type: string
        nullable: false
        comment: Property category (Firearms, Locally Stolen Motor Vehicles, Currency, etc.)
      - name: stolen_value
        type: long
        nullable: true
        comment: Total dollar value of stolen property
      - name: recovered_value
        type: long
        nullable: true
        comment: Total dollar value of recovered property

    source:
      type: http
      url: "https://cde.ucr.cjis.gov/LATEST/supplemental/state/{state_abbr}/property-crime?from=01-{year}&to={month}-{year}&type=totals"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 10.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.crime.CdeSupplementalTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=supplemental/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/crime"
        tableName: cde_supplemental
        catalogType: hadoop
        runCompaction: true
