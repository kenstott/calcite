      output:
        pattern: "type=reta/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/crime"
        tableName: cde_reta
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # CDE ARRESTS - Arrest data by state, offense, age, sex, race
  # ---------------------------------------------------------------------------
  - name: cde_arrests
    pattern: "type=arrest/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      FBI CDE arrest data by state and offense category. Includes monthly arrest
      counts broken down by age group, sex, and race. Covers drug abuse, DUI,
      violent crime, property crime, and 20+ other categories.

    dimensions:
      type:
        - arrest
      year: *crime_year_range
      month: ["12"]
      state_abbr: *all_state_abbrs
      offense: *arrest_offenses

    columns:
      - <<: *state_abbr_column
      - <<: *year_column
      - <<: *section_column
        comment: Data section (age, sex, race, ethnicity)
      - <<: *category_column
        comment: Category within section (e.g., Under 10, Male, White)
      - <<: *label_column
        comment: Metric label
      - name: count
        type: long
        nullable: true
        comment: Arrest count

    source:
      type: http
      url: "https://cde.ucr.cjis.gov/LATEST/arrest/state/{state_abbr}/{offense}?from=01-{year}&to={month}-{year}&type=totals"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 10.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.crime.CdeHateCrimeTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=arrest/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/crime"
        tableName: cde_arrests
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5
        batchPartitionColumns: [year]
        incrementalKeys: [year]

