      - <<: *year_column
      - name: property_type
        type: string
        nullable: false
        comment: Property category (Firearms, Locally Stolen Motor Vehicles, Currency, etc.)
      - name: stolen_value
        type: long
        nullable: true
        comment: Total dollar value of stolen property
      - name: recovered_value
        type: long
        nullable: true
        comment: Total dollar value of recovered property

    source:
      type: http
      url: "https://cde.ucr.cjis.gov/LATEST/supplemental/state/{state_abbr}/property-crime?from=01-{year}&to=12-{year}&type=totals"
      method: GET
