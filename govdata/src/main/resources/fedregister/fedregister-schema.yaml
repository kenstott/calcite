# ============================================================================
# U.S. Federal Register Schema (FEDREGISTER)
# ============================================================================
# Data Source:
#   - Federal Register API (api.federalregister.gov) — no API key required
#   - Coverage: 1994-present, ~85,000 documents/year
#   - Document types: Final Rules, Proposed Rules, Notices, Presidential Documents
#
# Features:
#   - Hive-style partitioning by doc_type + year
#   - Cross-reference ready: CFR citations, RINs, docket IDs link to SEC, econ
#   - agencies table: static registry of all issuing agencies
#   - Rate-limited API integration (polite 2 req/sec)
# ============================================================================

schemaName: "${SCHEMA_NAME:fedregister}"
dataLagYears: 0
materializeDirectory: "${GOVDATA_PARQUET_DIR}/fedregister"

comment: >
  U.S. Federal Register documents from the Office of the Federal Register API.
  Covers final rules, proposed rules, notices, and presidential documents (executive
  orders, proclamations, memoranda) from 1994 to present. Key cross-reference fields:
  cfr_references (links to affected CFR titles/parts by industry), rin (Regulatory
  Identifier Number — tracks rulemaking lifecycle from NPRM to final rule),
  docket_ids (links to regulations.gov comment dockets), and significant flag
  (OIRA-designated economically significant rules affecting ≥$100M/year).
  Agency names link to fr_agencies table via slug.

# ============================================================================
# COLUMN TEMPLATES
# ============================================================================

column_templates:

  partition_doc_type: &partition_doc_type
    name: doc_type
    type: VARCHAR

  partition_year: &partition_year
    name: year
    type: INTEGER

  doc_type_partitions: &doc_type_partitions
    style: hive
    columnDefinitions:
      - *partition_doc_type
      - *partition_year

# ============================================================================
# DIMENSION VALUES
# ============================================================================

dimension_values:

  # Federal Register document types (API values)
  fr_doc_types: &fr_doc_types
    - RULE
    - PRORULE
    - NOTICE
    - PRESDOC

  # Year range for Federal Register data
  # Override: FR_START_YEAR for FR-only, GOVDATA_START_YEAR for all schemas
  fr_year_range: &fr_year_range
    type: yearRange
    start: "${FR_START_YEAR:${GOVDATA_START_YEAR:2010}}"
    end: current
    dataLag: 0

# ============================================================================
# PARTITIONED TABLES
# ============================================================================

partitionedTables:

  # ---------------------------------------------------------------------------
  # FR_DOCUMENTS — all Federal Register documents, partitioned by type + year
  # ---------------------------------------------------------------------------
  - name: fr_documents
    pattern: "type=*/year=*/*.parquet"
    partitions: *doc_type_partitions
    comment: >
      All Federal Register documents partitioned by document type and publication year.
      RULE=final rules (binding, amend CFR), PRORULE=proposed rules (open for comment),
      NOTICE=agency announcements/meetings/grants, PRESDOC=executive orders/proclamations.
      Key analytical fields: rin (tracks NPRM→final rule lifecycle via RIN cross-reference),
      cfr_references (JSON: affected CFR titles and parts → maps to regulated industry),
      significant=true marks OIRA-designated rules with ≥$100M/year economic impact,
      docket_ids (JSON: links to regulations.gov for comment letter intelligence).

    dimensions:
      doc_type: *fr_doc_types
      year: *fr_year_range

    columns:
      - name: document_number
        type: string
        nullable: false
        comment: Federal Register document number (e.g., 2026-07234)
      - name: title
        type: string
        nullable: true
        comment: Document title
      - name: doc_type
        type: string
        nullable: false
        comment: Document type (RULE, PRORULE, NOTICE, PRESDOC)
      - name: abstract
        type: string
        nullable: true
        comment: Document abstract/summary
      - name: publication_date
        type: string
        nullable: false
        comment: Publication date (YYYY-MM-DD)
      - name: effective_on
        type: string
        nullable: true
        comment: Effective date of the rule (YYYY-MM-DD)
      - name: action
        type: string
        nullable: true
        comment: Rule action description (e.g., 'Final rule', 'Proposed rule')
      - name: agency_names
        type: string
        nullable: true
        comment: Comma-separated issuing agency names (denormalized for easy SQL filtering)
      - name: agency_slugs
        type: string
        nullable: true
        comment: Comma-separated agency slugs (join key to fr_agencies.slug)
      - name: cfr_references
        type: string
        nullable: true
        comment: JSON array of CFR references [{title:N, part:N}] — maps to regulated industry
      - name: rin
        type: string
        nullable: true
        comment: Primary Regulatory Identifier Number (links NPRM to final rule lifecycle)
      - name: significant
        type: boolean
        nullable: true
        comment: OIRA economically significant flag — true means estimated economic impact >=100M/year
      - name: docket_ids
        type: string
        nullable: true
        comment: JSON array of docket identifiers (links to regulations.gov comment dockets)
      - name: president
        type: string
        nullable: true
        comment: Signing president (presidential documents only)
      - name: signing_date
        type: string
        nullable: true
        comment: Presidential document signing date (YYYY-MM-DD)
      - name: full_text_xml_url
        type: string
        nullable: true
        comment: URL to full text XML on federalregister.gov
      - name: body_html_url
        type: string
        nullable: true
        comment: URL to rendered HTML body on federalregister.gov

    source:
      type: http
      url: "https://api.federalregister.gov/v1/documents.json?conditions[type][]={doc_type}&conditions[publication_date][gte]={year}-01-01&conditions[publication_date][lte]={year}-12-31&per_page=1000&page=1&fields[]=document_number&fields[]=title&fields[]=type&fields[]=abstract&fields[]=publication_date&fields[]=effective_on&fields[]=action&fields[]=agencies&fields[]=cfr_references&fields[]=regulation_id_numbers&fields[]=significant&fields[]=docket_ids&fields[]=president&fields[]=signing_date&fields[]=full_text_xml_url&fields[]=body_html_url"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 2.0
        retryOn: [429, 503, 504]
        maxRetries: 5
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.fedregister.FedRegisterDocumentsTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type={doc_type}/year={year}/"

  # ---------------------------------------------------------------------------
  # FR_AGENCIES — Federal Register agency registry (static reference)
  # ---------------------------------------------------------------------------
  - name: fr_agencies
    pattern: "type=agencies/*.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR
    comment: >
      Complete registry of all Federal Register issuing agencies. The slug field
      is the stable join key — use it to join fr_documents.agency_slugs against
      fr_agencies.slug. parent_id links sub-agencies to their parent agency.
      Updated infrequently (agencies change rarely); refreshed on each full reload.

    dimensions:
      type:
        - agencies

    columns:
      - name: id
        type: integer
        nullable: false
        comment: Agency numeric ID
      - name: name
        type: string
        nullable: false
        comment: Full agency name
      - name: short_name
        type: string
        nullable: true
        comment: Agency short name or abbreviation
      - name: slug
        type: string
        nullable: false
        comment: URL-safe agency identifier (stable join key)
      - name: url
        type: string
        nullable: true
        comment: Agency URL on federalregister.gov
      - name: parent_id
        type: integer
        nullable: true
        comment: Parent agency ID (null for top-level agencies)

    source:
      type: http
      url: "https://api.federalregister.gov/v1/agencies.json"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 2.0
        maxRetries: 3

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.fedregister.FedRegisterAgenciesTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=agencies/"
