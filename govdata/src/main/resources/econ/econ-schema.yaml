  # --- REGIONAL INCOME (API-BASED - DEPRECATED) ---
  # NOTE: This table uses per-API-call approach which is slow and memory-intensive.
  # Consider using state_personal_income (SAINC bulk), state_gdp (SAGDP bulk), etc. instead.
  - name: regional_income
    pattern: "type=*/year=*/*.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR
        - name: year
          type: INTEGER
    comment: >
      State and regional personal income statistics from BEA Regional Economic Accounts. Includes total income, per capita income, and population by state.

    # Dimension definitions for iteration
    # IMPORTANT: Dimension order matters for context-aware resolution!
    # geo_fips_set and tablename must come before line_code so the resolver can filter
    # valid combinations. BeaDimensionResolver uses both to return only valid line codes.
    dimensions:
      type:
        - regional_income  # Static table type
      year: *year_range_from_2000  # Use anchor for year range from 2000
      geo_fips_set: *bea_geo_fips_sets  # Use anchor: STATE, COUNTY, MSA, MIC, PORT, DIV, CSA
      tablename: *bea_regional_tables  # Use anchor: All 63 BEA Regional tables
      line_code:
        type: custom  # Resolved by BeaDimensionResolver using tablename context
        properties:
          # Reference directory containing regional_linecodes Iceberg table
          # Must point to the econ_reference schema output directory
          referenceDirectory: "${ECON_REFERENCE_CACHE_DIR:-${GOVDATA_PARQUET_DIR}/econ_reference}"

    columns:
      - name: geo_fips
        type: string
        source: GeoFips
        nullable: true
        comment: FIPS code for the geographic area (e.g., '01000' for Alabama)
      - name: geo_name
        type: string
        source: GeoName
        nullable: true
        comment: Name of the geographic area
      - name: time_period
        type: string
        source: TimePeriod
        nullable: true
        comment: Year or Quarter - e.g. 2020 or 2023Q1
      - name: cl_unit
        type: string
        source: CL_UNIT
        nullable: true
        comment: Income metric type (e.g., 'Personal Income', 'Per Capita Income')
      - name: unit_mult
        type: string
        source: UNIT_MULT
        nullable: true
        comment: Unit multiplier (e.g., thousands, millions)
      - name: data_value
        type: double
        source: DataValue
        nullable: true
        comment: Income value in thousands of dollars or dollars (depending on metric)
      # Partition columns - types must match what DuckDB infers when writing
      - name: year
        type: string
        nullable: true
        comment: Year partition from dimension iteration
      - name: geo_fips_set
        type: string
        nullable: true
        comment: Geographic level - STATE, COUNTY, MSA, etc.
      - name: tablename
        type: string
        nullable: true
        comment: BEA table identifier (e.g., SAGDP1, SAINC1)
      - name: line_code
        type: string
        nullable: true
        comment: BEA line code for specific metric

    # API Configuration
    download:
      enabled: true
      method: GET
      baseUrl: "https://apps.bea.gov/api/data"
      authentication:
        type: query_param
        paramName: UserID
        envVar: BEA_API_KEY  # Set API key in environment
      queryParams:
        UserID:
          type: auth
        method:
          type: constant
          value: GetData
        datasetname:
          type: constant
          value: Regional
        TableName:
          type: expression
          value: "{tablename}"
        LineCode:
          type: expression
          value: "{line_code}"
        GeoFips:
          type: expression
          value: "{geo_fips_set}"
        Year:
          type: expression
          value: "{year}"
        ResultFormat:
          type: constant
          value: JSON
      rateLimit:  # API rate limiting
        minIntervalMs: 500  # Milliseconds between requests
        maxRetries: 5
        retryDelayMs: 5000
      geoFipsSet:
        STATE: "All states (50 states + District of Columbia)"
        COUNTY: "All counties nationwide"
        MSA: "All Metropolitan Statistical Areas"
        MIC: "All Micropolitan Areas"
        PORT: "All state metropolitan/nonmetropolitan portions"
        DIV: "All Metropolitan Divisions"
        CSA: "All Combined Statistical Areas"
      tableNamesSet:
        # State Annual Personal Income (SAINC*) - 12 active tables
        SAINC1: "State annual personal income summary: personal income, population, per capita personal income"
        SAINC30: "State annual economic profile"
        SAINC35: "State annual personal current transfer receipts"
        SAINC4: "State annual personal income and employment by major component"
        SAINC40: "State annual property income"
        SAINC50: "State annual personal current taxes"
        SAINC51: "State annual disposable personal income"
        SAINC5N: "State annual personal income by major component and earnings by NAICS industry"
        SAINC6N: "State annual compensation of employees by NAICS industry"
        SAINC70: "State annual wage and salary disbursements"
        SAINC7N: "State annual wages and salaries by NAICS industry"
        SAINC91: "State annual gross flow of earnings"
        # State Quarterly Personal Income (SQINC*) - 6 active tables
        SQINC1: "State quarterly personal income summary: personal income, population, per capita personal income"
        SQINC35: "State quarterly personal current transfer receipts"
        SQINC4: "State quarterly personal income and employment by major component"
        SQINC5N: "State quarterly personal income by major component and earnings by NAICS industry"
        SQINC6N: "State quarterly compensation of employees by NAICS industry"
        SQINC7N: "State quarterly wages and salaries by NAICS industry"
        # County/MSA Annual Personal Income (CAINC*) - 6 active tables
        CAINC1: "County and MSA annual personal income summary: personal income, population, per capita personal income"
        CAINC30: "County and MSA annual economic profile"
        CAINC4: "County and MSA annual personal income and employment by major component"
        CAINC5N: "County and MSA annual personal income by major component and earnings by NAICS industry"
        CAINC6N: "County and MSA annual compensation of employees by NAICS industry"
        CAINC91: "County annual gross flow of earnings (inter-county commuting, county-level only)"
        # State Annual GDP (SAGDP*) - 10 active tables
        SAGDP1: "State annual GDP summary"
        SAGDP2: "State annual GDP by industry"
        SAGDP3: "State annual GDP contributions by industry"
        SAGDP4: "State annual components of GDP by industry"
        SAGDP5: "State annual GDP by industry (chain-type quantity indexes)"
        SAGDP6: "State annual GDP by industry (chain-type price indexes)"
        SAGDP7: "State annual chain-type quantity indexes for real GDP by industry"
        SAGDP8: "State annual chain-type price indexes for GDP by industry"
        SAGDP9: "State annual real GDP by industry"
        SAGDP11: "State annual real GDP contributions by industry"
        # State Quarterly GDP (SQGDP*) - 5 active tables
        SQGDP1: "State quarterly GDP by state"
        SQGDP2: "State quarterly GDP by industry"
        SQGDP8: "State quarterly chain-type price indexes for GDP"
        SQGDP9: "State quarterly real GDP by state"
        SQGDP11: "State quarterly industry contributions to percent change in real GDP"
        # County/MSA Annual GDP (CAGDP*) - 5 active tables
        CAGDP1: "County and MSA annual GDP summary"
        CAGDP2: "County and MSA annual GDP by industry"
        CAGDP8: "County and MSA annual chain-type price indexes for GDP"
        CAGDP9: "County and MSA annual real GDP"
        CAGDP11: "County and MSA annual real GDP contributions by industry"
        # State Arts & Culture (SAAC*) - 7 active tables
        SAACArtsComp: "State arts and culture compensation"
        SAACArtsEmp: "State arts and culture employment"
        SAACArtsVA: "State arts and culture value added"
        SAACCompLQ: "State arts and culture compensation location quotient"
        SAACCompRatio: "State arts and culture compensation ratio"
        SAACLVALQ: "State arts and culture value added location quotient"
        SAACVARatio: "State arts and culture value added ratio"
        # State Outdoor Recreation (SAO*) - 4 active tables
        SAOACTVA: "State outdoor activities value added"
        SAOCOMP: "State outdoor recreation compensation"
        SAOEMP: "State outdoor recreation employment"
        SAOVA: "State outdoor recreation value added"
        # Personal Consumption Expenditures (SAPCE*) - 4 active tables
        SAPCE1: "State annual personal consumption expenditures (PCE) by state - level 1"
        SAPCE2: "State annual personal consumption expenditures (PCE) by state - level 2"
        SAPCE3: "State annual personal consumption expenditures (PCE) by state - level 3"
        SAPCE4: "State annual personal consumption expenditures (PCE) by state - level 4"
        # Real Personal Income (*RPP) - 3 active tables
        SARPP: "State annual real personal income"
        MARPP: "Metropolitan area annual real personal income"
        PARPP: "Port area annual real personal income"
        # Summary Statistics - 3 active tables
        SASUMMARY: "State summary statistics"
        TASUMMARY1: "Territory summary statistics - table 1"
        TASUMMARY2: "Territory summary statistics - table 2"
      response:
        format: json
        dataPath: "BEAAPI.Results.Data"
        errorPath: "BEAAPI.Results.Error"

    # HTTP Source configuration for EtlPipeline
    source:
      type: http
      url: "https://apps.bea.gov/api/data"
      method: GET
      parameters:
        UserID: "{env:BEA_API_KEY}"
        method: "GetData"
        DataSetName: "Regional"
        TableName: "{tablename}"
        LineCode: "{line_code}"
        GeoFips: "{geo_fips_set}"
        Year: "{effective_year}"
        ResultFormat: "JSON"
      response:
        format: json
        # Note: dataPath removed because responseTransformer already extracts the data
        errorPath: "BEAAPI.Results.Error"
      rateLimit:
        requestsPerSecond: 1.5
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    # Custom hooks for BEA response handling and dimension resolution
    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.econ.BeaResponseTransformer"
      dimensionResolver: "org.apache.calcite.adapter.govdata.econ.BeaDimensionResolver"

    # Materialization configuration
    # Consolidates ~26K small parquet files into ~25-175 larger Iceberg files
    # partitioned by (type, year) for optimal query performance.
    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: "type=regional_income/year=*/"
      partition:
        columns: [type, year]
        valueSource:
          year: effective_year
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        targetFileSizeBytes: 134217728  # 128MB target for optimal read performance
        # Process in batches by year AND geo_fips_set to avoid OOM on the
        # high cardinality dimension cross-product (7 geo_fips × 63 tables × many linecodes)
        batchPartitionColumns: [year, geo_fips_set]
        incrementalKeys: [year]
        runMaintenance: true
        snapshotRetentionDays: 7
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728  # 128MB
        compactionMinFiles: 10
        compactionSmallFileSizeBytes: 10485760  # 10MB

    # Alternate partition layouts for optimized query patterns
    # Consolidated files use different partition keys within type=regional_income.
    # All alternates include year as partition key for incremental processing.
    alternate_partitions:
      # Consolidated by geo_fips (state/county/MSA/etc) and year
      - name: regional_income_by_fips
        enabled: false  # Disabled due to OOM issues during reorganization
        pattern: "type=regional_income/geo_fips=*/year=*/*.parquet"
        partition:
          style: hive
          columnDefinitions:
            - name: geo_fips
              type: VARCHAR
              sourceColumn: GeoFips
            - name: year
              type: INTEGER
        # Incremental keys - only process new values of these columns
        incremental_keys:
          - year
        # Batch reorganization by year and geo_fips_set to avoid OOM on 700K+ files
        batch_partition_columns:
          - year
          - geo_fips_set
        threads: 4

      # Consolidated by year (all geo_fips in one partition per year)
      - name: regional_income_by_year
        enabled: false  # Disabled due to OOM issues during reorganization
        pattern: "type=regional_income/year=*/*.parquet"
        partition:
          style: hive
          columnDefinitions:
            - name: year
              type: INTEGER
        incremental_keys:
          - year
        # Batch by geo_fips_set to reduce memory usage
        batch_partition_columns:
          - year
          - geo_fips_set
        threads: 4

      # Consolidated by indicator table and year
      - name: regional_income_by_indicator
        enabled: false  # Disabled due to OOM issues during reorganization
        pattern: "type=regional_income/tablename=*/year=*/*.parquet"
        partition:
          style: hive
          columnDefinitions:
            - name: tablename
              type: VARCHAR
            - name: year
              type: INTEGER
        incremental_keys:
          - year
        # Batch by year and geo_fips_set for large datasets
        threads: 4
        batch_partition_columns:
          - year
          - geo_fips_set

  # --- ITA DATA ---
  - name: ita_data
    pattern: "type=ita_data/frequency=*/year=*/indicator=*/ita_data.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR
        - name: frequency
          type: VARCHAR
        - name: year
          type: INTEGER
        - name: indicator
          type: VARCHAR
    comment: >
      International Transactions Accounts (ITA) from BEA providing balance of payments statistics. Includes trade balance, current account, capital account, and income balances.
    columns:
      # Source columns from ItaDataTransformer output (snake_case)
      - name: data_value
        type: double
        source: data_value
        nullable: true
        comment: Transaction value
      - name: area_or_country
        type: string
        source: area_or_country
        nullable: true
        comment: Geographic area or country name for the transaction
      - name: time_series_description
        type: string
        source: time_series_description
        nullable: true
        comment: Description of the time series
      - name: series_code
        type: string
        source: series_code
        nullable: true
        comment: Unique identifier for the time series
      - name: time_period
        type: string
        source: time_period
        nullable: true
        comment: Time period for the data point (e.g., '2022', '2022Q1')
      - name: cl_unit
        type: string
        source: cl_unit
        nullable: true
        comment: Classification unit (e.g., 'USD')
      - name: unit_mult
        type: string
        source: unit_mult
        nullable: true
        comment: Unit multiplier (e.g., '6' for millions)
      - name: metric_name
        type: string
        source: metric_name
        nullable: true
        comment: Type of metric (e.g., 'Current Dollars')
      - name: frequency
        type: string
        source: frequency
        nullable: true
        comment: Data frequency ('A' for Annual, 'Q' for Quarterly)
      - name: note_ref
        type: string
        source: note_ref
        nullable: true
        comment: Reference to explanatory notes

    # API Configuration
    download:
      enabled: true
      method: GET
      baseUrl: "https://apps.bea.gov/api/data"
      authentication:
        type: query_param
        paramName: UserID
        envVar: BEA_API_KEY  # Set API key in environment
      queryParams:
        UserID:
          type: auth
        method:
          type: constant
          value: GetData
        datasetname:
          type: constant
          value: ITA
        Indicator:
          type: expression
          value: "{indicator}"
        Frequency:
          type: expression
          value: "{frequency}"
        Year:
          type: expression
          value: "{year}"
        ResultFormat:
          type: constant
          value: JSON
      itaIndicatorsList:
        - "BalGds"
        - "BalServ"
        - "BalGdsServ"
        - "BalCurrAcct"
        - "BalCapAcct"
        - "BalPrimInc"
        - "BalSecInc"
        - "ExpGds"
        - "ImpGds"
        - "ExpServ"
        - "ImpServ"
      frequencyList:
        - "A"
        - "Q"
      response:
        format: json
        dataPath: "BEAAPI.Results.Data"
        errorPath: "BEAAPI.Results.Error"
      rateLimit:  # API rate limiting
        minIntervalMs: 500  # Milliseconds between requests
        maxRetries: 5
        retryDelayMs: 5000

    # HTTP Source configuration for EtlPipeline
    source:
      type: http
      url: "https://apps.bea.gov/api/data"
      method: GET
      parameters:
        UserID: "{env:BEA_API_KEY}"
        method: "GetData"
        DataSetName: "ITA"
        Indicator: "{indicator}"
        Frequency: "{frequency}"
        Year: "{effective_year}"
        ResultFormat: "JSON"
      response:
        format: json
        # Note: dataPath removed because responseTransformer already extracts the data
        errorPath: "BEAAPI.Results.Error"
      rateLimit:
        requestsPerSecond: 1.5
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    # Custom hooks for BEA response handling
    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.econ.ItaDataTransformer"

    # Dimension definitions for ETL iteration
    dimensions:
      type:
        - ita_data
      frequency:
        - A   # Annual only - BEA ITA dataset does not provide quarterly data
      year: *year_range_from_2020  # Use anchor for year range
      indicator:
        - "BalGds"        # Balance on Goods
        - "BalServ"       # Balance on Services
        - "BalGdsServ"    # Balance on Goods and Services
        - "BalCurrAcct"   # Current Account Balance
        - "BalCapAcct"    # Capital Account Balance
        - "BalPrimInc"    # Primary Income Balance
        - "BalSecInc"     # Secondary Income Balance
        - "ExpGds"        # Exports of Goods
        - "ImpGds"        # Imports of Goods
        - "ExpServ"       # Exports of Services
        - "ImpServ"       # Imports of Services

    # Materialization configuration
    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: "type=ita_data/frequency=*/year=*/indicator=*/"
      partition:
        columns: [type, frequency, year, indicator]
        valueSource:
          year: effective_year
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        targetFileSizeBytes: 134217728  # 128MB target for optimal read performance
        batchPartitionColumns: [year]
        incrementalKeys: [year]
        runMaintenance: true
        snapshotRetentionDays: 7
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

  # --- FOREIGN DIRECT INVESTMENT (BEA MNE dataset) ---
  # Two request profiles over the same BEA "MNE" dataset, sharing one output
  # schema (FdiDataTransformer) and one tall shape:
  #   * fdi_direct_investment (DI)   - SeriesID=all, default ownership
  #   * fdi_activities        (AMNE) - SeriesID=all, OwnershipLevel=0,
  #                                     NonbankAffiliatesOnly=0
  # Each is iterated over direction (inward/outward) x classification
  # (Country/Industry) x year. See views fdi_data (tall union) and
  # fdi_by_country (wide pivot).
  - name: fdi_direct_investment
    pattern: "type=fdi_direct_investment/direction=*/classification=*/year=*/fdi_direct_investment.parquet"
    partitions:
      style: hive
      columnDefinitions: &fdi_partition_columns
        - name: type
          type: VARCHAR
        - name: direction
          type: VARCHAR
        - name: classification
          type: VARCHAR
        - name: year
          type: INTEGER
    comment: >
      BEA Direct Investment (DI) statistics from the Multinational Enterprises
      (MNE) dataset. Balance-of-payments direct investment: position (stock),
      income, financial transactions, equity, debt instruments, and reinvested
      earnings. Inward (foreign investment in the U.S.) and outward (U.S.
      investment abroad), by partner country or by industry. Tall layout: one
      row per statistic (series_id) x area/industry (row_code) x year.
    columns: &fdi_columns
      - name: series_id
        type: string
        source: series_id
        nullable: true
        comment: BEA MNE series identifier (e.g. 30=U.S. position abroad, 22=foreign position in U.S., 27=direct investment income)
      - name: series_name
        type: string
        source: series_name
        nullable: true
        comment: Human-readable statistic name
      - name: row_code
        type: string
        source: row_code
        nullable: true
        comment: Country or industry code (matches the classification partition)
      - name: row_label
        type: string
        source: row_label
        nullable: true
        comment: Country or industry name
      - name: column_code
        type: string
        source: column_code
        nullable: true
        comment: Statistic sub-breakdown code
      - name: column_label
        type: string
        source: column_label
        nullable: true
        comment: Statistic sub-breakdown name
      - name: data_value
        type: double
        source: data_value
        nullable: true
        comment: Statistic value in the units given by table_scale (null when BEA suppressed the value)
      - name: table_scale
        type: string
        source: table_scale
        nullable: true
        comment: Units for data_value (e.g. 'Millions of Dollars', 'Thousands of Employees')
      - name: time_period
        type: string
        source: time_period
        nullable: true
        comment: Data year (YYYY)

    source:
      type: http
      url: "https://apps.bea.gov/api/data"
      method: GET
      parameters:
        UserID: "{env:BEA_API_KEY}"
        method: "GetData"
        DataSetName: "MNE"
        DirectionOfInvestment: "{direction}"
        Classification: "{classification}"
        Year: "{effective_year}"
        SeriesID: "all"
        ResultFormat: "JSON"
      response:
        format: json
        # dataPath omitted: FdiDataTransformer extracts BEAAPI.Results.Data
        errorPath: "BEAAPI.Results.Error"
      rateLimit:
        requestsPerSecond: 1.5
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.econ.FdiDataTransformer"

    dimensions:
      type:
        - fdi_direct_investment
      direction: &fdi_directions
        - inward   # foreign direct investment in the United States
        - outward  # U.S. direct investment abroad
      classification: &fdi_classifications
        - Country
        - Industry
      year: *year_range_from_2000

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: "type=fdi_direct_investment/direction=*/classification=*/year=*/"
      partition:
        columns: [type, direction, classification, year]
        valueSource:
          year: effective_year
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg: &fdi_iceberg
        catalogType: hadoop
        targetFileSizeBytes: 134217728
        batchPartitionColumns: [year]
        incrementalKeys: [year]
        runMaintenance: true
        snapshotRetentionDays: 7
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

  - name: fdi_activities
    pattern: "type=fdi_activities/direction=*/classification=*/year=*/fdi_activities.parquet"
    partitions:
      style: hive
      columnDefinitions: *fdi_partition_columns
    comment: >
      BEA Activities of Multinational Enterprises (AMNE) statistics from the
      MNE dataset, majority-owned affiliates (bank and nonbank). Operations of
      U.S. affiliates of foreign firms (inward) and foreign affiliates of U.S.
      firms (outward): employment, total sales, total assets, value added, net
      income, capital expenditures, R&D expenditures, and affiliate trade in
      goods. By partner country or by industry. Same tall layout as
      fdi_direct_investment; note table_scale mixes dollars and headcounts.
    columns: *fdi_columns

    source:
      type: http
      url: "https://apps.bea.gov/api/data"
      method: GET
      parameters:
        UserID: "{env:BEA_API_KEY}"
        method: "GetData"
        DataSetName: "MNE"
        DirectionOfInvestment: "{direction}"
        Classification: "{classification}"
        OwnershipLevel: "0"          # majority-owned affiliates
        NonbankAffiliatesOnly: "0"   # both bank and nonbank affiliates
        Year: "{effective_year}"
        SeriesID: "all"
        ResultFormat: "JSON"
      response:
        format: json
        errorPath: "BEAAPI.Results.Error"
      rateLimit:
        requestsPerSecond: 1.5
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.econ.FdiDataTransformer"

    dimensions:
      type:
        - fdi_activities
      direction: *fdi_directions
      classification: *fdi_classifications
      year: *year_range_from_2000

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: "type=fdi_activities/direction=*/classification=*/year=*/"
      partition:
        columns: [type, direction, classification, year]
        valueSource:
          year: effective_year
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg: *fdi_iceberg

  # --- INTERNATIONAL INVESTMENT POSITION (BEA IIP dataset) ---
  # U.S. external balance sheet: the stock (position) of U.S.-owned assets
  # abroad and foreign-owned assets in the United States, plus the annual change
  # in those positions decomposed by driver (financial-account transactions,
  # price changes, exchange-rate changes, other volume/valuation effects).
  # Complements the flow-based ita_data (balance of payments) and the
  # direct-investment detail in fdi_direct_investment / fdi_activities. One BEA
  # call per (frequency, year) with TypeOfInvestment=All & Component=All returns
  # every series for that year; the table is tall (one row per
  # type_of_investment x component x period). Verified live 2026-07-08:
  # TypeOfInvestment=All&Component=All&Frequency=A&Year=2022 -> 200 with the
  # field set mapped below.
  - name: iip_positions
    pattern: "type=iip_positions/frequency=*/year=*/iip_positions.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR
        - name: frequency
          type: VARCHAR
        - name: year
          type: INTEGER
    comment: >
      BEA International Investment Position (IIP): U.S. external assets and
      liabilities by type of investment, reporting position (stock) and the
      change in position decomposed by driver (transactions, price changes,
      exchange-rate changes, other). Tall layout: one row per
      type_of_investment x component x period.
    columns:
      # Source columns from IipDataTransformer output (snake_case)
      - name: type_of_investment
        type: string
        source: type_of_investment
        nullable: true
        comment: Asset/liability category code (e.g. CurrAndDepAssets, DirectInvAssets)
      - name: component
        type: string
        source: component
        nullable: true
        comment: Measure code (Pos=position; ChgPos*=change in position by driver)
      - name: time_series_id
        type: string
        source: time_series_id
        nullable: true
        comment: BEA series identifier (e.g. TSI_IipCurrAndDepAssetsChgPos_A)
      - name: time_series_description
        type: string
        source: time_series_description
        nullable: true
        comment: Human-readable series description
      - name: time_period
        type: string
        source: time_period
        nullable: true
        comment: Data period ('2022' annual, '2022Q1' quarterly)
      - name: data_value
        type: double
        source: data_value
        nullable: true
        comment: Position or change value in the units given by cl_unit/unit_mult (null when BEA suppressed)
      - name: cl_unit
        type: string
        source: cl_unit
        nullable: true
        comment: Classification unit (e.g. 'USD')
      - name: unit_mult
        type: string
        source: unit_mult
        nullable: true
        comment: Unit multiplier (e.g. '6' for millions)
      - name: frequency
        type: string
        source: frequency
        nullable: true
        comment: Data frequency ('A' for Annual)
      - name: note_ref
        type: string
        source: note_ref
        nullable: true
        comment: Reference to explanatory notes

    source:
      type: http
      url: "https://apps.bea.gov/api/data"
      method: GET
      parameters:
        UserID: "{env:BEA_API_KEY}"
        method: "GetData"
        DataSetName: "IIP"
        TypeOfInvestment: "All"
        Component: "All"
        Frequency: "{frequency}"
        Year: "{effective_year}"
        ResultFormat: "JSON"
      response:
        format: json
        # dataPath omitted: IipDataTransformer extracts BEAAPI.Results.Data
        errorPath: "BEAAPI.Results.Error"
      rateLimit:
        requestsPerSecond: 1.5
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.econ.IipDataTransformer"

    dimensions:
      type:
        - iip_positions
      frequency:
        - A   # Annual (BEA also publishes QNSA/QSA; annual chosen for parity with ita_data)
      year: *year_range_from_2000

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: "type=iip_positions/frequency=*/year=*/"
      partition:
        columns: [type, frequency, year]
        valueSource:
          year: effective_year
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        targetFileSizeBytes: 134217728
        batchPartitionColumns: [year]
        incrementalKeys: [year]
        runMaintenance: true
        snapshotRetentionDays: 7
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

  # --- GDP STATISTICS ---
  - name: gdp_statistics
    pattern: "type=gdp_statistics/frequency=*/year=*/gdp_statistics.parquet"
    partitions: *standard_partitions
    comment: >
      Quarterly and annual GDP growth rates, nominal and real GDP values.
    columns:
      # Map BEA API field names to our column names
      - name: year
        type: int
        nullable: true
        expression: "CAST(SUBSTRING(TimePeriod, 1, 4) AS INTEGER)"
        comment: Year of the GDP observation (extracted from TimePeriod)
      - name: quarter
        type: int
        nullable: true
        expression: "CASE WHEN TimePeriod LIKE '%Q%' THEN CAST(SUBSTRING(TimePeriod, 6, 1) AS INTEGER) ELSE NULL END"
        comment: Quarter number (1-4) for quarterly data, null for annual data
      - name: metric
        type: string
        source: LineDescription
        nullable: true
        comment: GDP metric name (e.g., 'Nominal GDP', 'Real GDP', 'Personal Consumption')
      - name: value
        type: double
        nullable: true
        expression: "CAST(REPLACE(src.DataValue, ',', '') AS DOUBLE)"
        comment: GDP value in millions of dollars (BEA returns comma-formatted numbers)
      - name: percent_change
        type: double
        nullable: true
        expression: "NULL"
        comment: Percent change from previous period (not available in raw NIPA data)
      - name: seasonally_adjusted
        type: boolean
        nullable: true
        expression: "CASE WHEN NoteRef IS NOT NULL AND NoteRef LIKE '%SA%' THEN TRUE ELSE FALSE END"
        comment: Whether the data is seasonally adjusted

    # HTTP Source configuration for EtlPipeline
    source:
      type: http
      url: "https://apps.bea.gov/api/data"
      method: GET
      parameters:
        UserID: "{env:BEA_API_KEY}"
        method: "GetData"
        DataSetName: "NIPA"
        TableName: "T10101"
        Frequency: "{frequency}"
        Year: "{effective_year}"
        ResultFormat: "JSON"
      response:
        format: json
        # Note: dataPath removed because responseTransformer already extracts the data
        errorPath: "BEAAPI.Results.Error"
      rateLimit:
        requestsPerSecond: 1.5
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    # Custom hooks for BEA response handling
    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.econ.BeaResponseTransformer"

    # Dimension definitions for ETL iteration
    dimensions:
      type:
        - gdp_statistics
      frequency: *bea_frequencies     # Use anchor: A, Q
      year: *year_range_from_2020     # Use anchor for year range

    # Materialization configuration
    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: "type=gdp_statistics/frequency=*/year=*/"
      partition:
        columns: [type, frequency, year]
        valueSource:
          year: effective_year
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        targetFileSizeBytes: 134217728  # 128MB target for optimal read performance
        batchPartitionColumns: [year]
        incrementalKeys: [year]
        runMaintenance: true
        snapshotRetentionDays: 7
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

  # --- STATE GDP (View over regional_income) ---
  # Note: State GDP data is downloaded as part of regional_income (SAGDP* tables).
  # This view filters regional_income to just the SAGDP tables for convenience.

  # --- INDUSTRY GDP ---
  - name: industry_gdp
    pattern: "type=industry_gdp/frequency=*/year=*/industry=*/industry_gdp.parquet"
    dimensions:
      type:
        - industry_gdp
      frequency:
        - "A"  # Annual
        - "Q"  # Quarterly
      industry:
        - "31G"
        - "52"
        - "53"
        - "54"
        - "GSLG"
      year:
        type: yearRange
        start: "{env:GOVDATA_START_YEAR:2000}"
        end: current
        # BEA GDP-by-industry publishes the current year in arrears (tracker frontier = 2025;
        # 2026 not yet released). Request param Year already uses {effective_year}, so a 1-year
        # lag caps the request at the latest published vintage instead of fetching an empty 2026.
        dataLag: 1
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR
        - name: frequency
          type: VARCHAR
        - name: year
          type: INTEGER
        - name: industry
          type: VARCHAR
    comment: >
      GDP by Industry data from BEA showing value added by NAICS industry sectors. Provides comprehensive breakdown of economic output by industry including agriculture, mining, manufacturing, services, and government sectors. Available at both annual and quarterly frequencies for detailed sectoral analysis.
    columns:
      # Source columns from IndustryGdpTransformer output (snake_case)
      - name: table_id
        type: string
        source: table_id
        nullable: true
        comment: BEA table identifier for industry GDP data
      - name: quarter
        type: string
        source: quarter
        nullable: true
        comment: Quarter identifier (e.g., 'Q1', 'Q2') or empty for annual data
      - name: industry_code
        type: string
        source: industry_code
        nullable: true
        comment: NAICS industry code
      - name: industry_description
        type: string
        source: industry_description
        nullable: true
        comment: Full description of the industry
      - name: value
        type: double
        source: value
        nullable: true
        comment: GDP value for the industry in millions of dollars
      - name: units
        type: string
        source: units
        nullable: true
        comment: Units of measurement (e.g., 'Millions of Dollars')
      - name: note_ref
        type: string
        source: note_ref
        nullable: true
        comment: Reference to footnotes or data quality notes

    # API Configuration
    download:
      enabled: true
      method: GET
      baseUrl: "https://apps.bea.gov/api/data"
      authentication:
        type: query_param
        paramName: UserID
        envVar: BEA_API_KEY  # Set API key in environment
      queryParams:
        UserID:
          type: auth
        method:
          type: constant
          value: GetData
        datasetname:
          type: constant
          value: GDPbyIndustry
        Industry:
          type: expression
          value: "{industry}"
        Frequency:
          type: expression
          value: "{frequency}"
        Year:
          type: expression
          value: "{year}"
        ResultFormat:
          type: constant
          value: JSON
        TableID:
          type: constant
          value: ALL
      response:
        format: json
        dataPath: "BEAAPI.Results.Data"
        errorPath: "BEAAPI.Results.Error"
      rateLimit:  # API rate limiting
        minIntervalMs: 500  # Milliseconds between requests
        maxRetries: 5
        retryDelayMs: 5000

    # HTTP Source configuration for EtlPipeline
    source:
      type: http
      url: "https://apps.bea.gov/api/data"
      method: GET
      parameters:
        UserID: "{env:BEA_API_KEY}"
        method: "GetData"
        DataSetName: "GDPbyIndustry"
        Industry: "{industry}"
        Frequency: "{frequency}"
        Year: "{effective_year}"
        TableID: "ALL"
        ResultFormat: "JSON"
      response:
        format: json
        # Note: dataPath removed because responseTransformer already extracts the data
        errorPath: "BEAAPI.Results.Error"
      rateLimit:
        requestsPerSecond: 1.5
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    # Custom hooks for BEA response handling
    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.econ.IndustryGdpTransformer"

    # Materialization configuration
    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: "type=industry_gdp/frequency=*/year=*/industry=*/"
      partition:
        columns: [type, frequency, year, industry]
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        targetFileSizeBytes: 134217728  # 128MB target for optimal read performance
        batchPartitionColumns: [year]
        incrementalKeys: [year]
        runMaintenance: true
        snapshotRetentionDays: 7
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

  # ---------------------------------------------------------------------------
  # INTERNATIONAL TRADE — Census intltrade HS-6 monthly (moved from census schema;
  # consolidated with the BEA trade/FDI tables so all trade data lives in econ).
  # ---------------------------------------------------------------------------
  - name: trade_exports
    freshness:
      type: hash
    pattern: "type=trade/direction=exports/year=*/month=*/*.parquet"
    partitions:
      style: hive
      columns:
        - name: type
          type: string
        - name: direction
          type: string
        - name: year
          type: integer
        - name: month
          type: string
    comment: >
      Monthly U.S. goods exports by HS-6 commodity and destination country
      (Census International Trade timeseries, exports/hs endpoint).

    dimensions:
      type:
        - trade
      direction:
        - exports
      # Period dimension: dynamic yearRange (never hardcoded). The publish year is
      # iterated start->current; effective_year = publish - dataLag is the data year
      # written to the partition. The intltrade HS timeseries begins in 2013, so the
      # data floor is 2013 (publish 2014 with dataLag 1); minYear hard-floors it even
      # if GOVDATA_START_YEAR is set lower for other schemas.
      year:
        type: yearRange
        start: "${GOVDATA_START_YEAR:2014}"
        end: "${GOVDATA_END_YEAR:current}"
        minYear: 2014
        dataLag: 1
        descending: true
      # Full monthly cadence: one fetch per (year, month) = one overwrite partition,
      # so the fetch unit equals the partition granularity (required for correct
      # replace-partition refresh).
      month:
        type: list
        values: ['01', '02', '03', '04', '05', '06', '07', '08', '09', '10', '11', '12']

    columns:
      - name: country_code
        type: string
        nullable: true
        expression: 'src."CTY_CODE"'
        comment: Destination country code
      - name: country_name
        type: string
        nullable: true
        expression: 'src."CTY_NAME"'
        comment: Destination country name
      - name: hs6
        type: string
        nullable: true
        expression: 'src."E_COMMODITY"'
        comment: HS 6-digit commodity code
      - name: hs2
        type: string
        nullable: true
        expression: 'LEFT(src."E_COMMODITY", 2)'
        comment: HS 2-digit chapter (derived from hs6)
      - name: value_usd
        type: long
        nullable: true
        expression: 'TRY_CAST(src."ALL_VAL_MO" AS BIGINT)'
        comment: Total export value for the month (USD)
      - name: quantity
        type: double
        nullable: true
        expression: 'TRY_CAST(src."QTY_1_MO" AS DOUBLE)'
        comment: Quantity shipped in the first unit of measure
      - name: quantity_unit
        type: string
        nullable: true
        expression: 'src."UNIT_QY1"'
        comment: Unit of measure for quantity

    source:
      type: http
      # The /hs timeseries returns 204 (empty) for a time=YYYY-MM predicate; it requires
      # discrete YEAR= and MONTH= predicates (verified live 2026-07-08: YEAR/MONTH -> 200
      # with ~321k HS-6 rows/month, time= -> 204).
      url: "https://api.census.gov/data/timeseries/intltrade/exports/hs?get=CTY_CODE,CTY_NAME,E_COMMODITY,ALL_VAL_MO,QTY_1_MO,UNIT_QY1&COMM_LVL=HS6&YEAR={effective_year}&MONTH={month}&key={env:CENSUS_API_KEY}"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 2.0
        retryOn: [429, 503]
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.geo.CensusResponseTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=trade/direction=exports/year=*/month=*/"
      partition:
        columns: [type, direction, year, month]
        valueSource:
          year: effective_year
      iceberg:
        catalogType: hadoop
        targetFileSizeBytes: 134217728
        runMaintenance: true
        snapshotRetentionDays: 7
        runCompaction: true
        overwritePartitions: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

  # ---------------------------------------------------------------------------
  # TRADE IMPORTS — Census intltrade HS-6 monthly, with CIF charges
  # ---------------------------------------------------------------------------
  - name: trade_imports
    freshness:
      type: hash
    pattern: "type=trade/direction=imports/year=*/month=*/*.parquet"
    partitions:
      style: hive
      columns:
        - name: type
          type: string
        - name: direction
          type: string
        - name: year
          type: integer
        - name: month
          type: string
    comment: >
      Monthly U.S. goods imports by HS-6 commodity and origin country, including
      CIF charges (Census International Trade timeseries, imports/hs endpoint).

    dimensions:
      type:
        - trade
      direction:
        - imports
      # Period dimension: dynamic yearRange (never hardcoded). effective_year =
      # publish - dataLag is the data year; intltrade HS timeseries begins 2013.
      year:
        type: yearRange
        start: "${GOVDATA_START_YEAR:2014}"
        end: "${GOVDATA_END_YEAR:current}"
        minYear: 2014
        dataLag: 1
        descending: true
      # Full monthly cadence: one fetch per (year, month) = one overwrite partition.
      month:
        type: list
        values: ['01', '02', '03', '04', '05', '06', '07', '08', '09', '10', '11', '12']

    columns:
      - name: country_code
        type: string
        nullable: true
        expression: 'src."CTY_CODE"'
        comment: Origin country code
      - name: country_name
        type: string
        nullable: true
        expression: 'src."CTY_NAME"'
        comment: Origin country name
      - name: hs6
        type: string
        nullable: true
        expression: 'src."I_COMMODITY"'
        comment: HS 6-digit commodity code
      - name: hs2
        type: string
        nullable: true
        expression: 'LEFT(src."I_COMMODITY", 2)'
        comment: HS 2-digit chapter (derived from hs6)
      - name: value_usd
        type: long
        nullable: true
        expression: 'TRY_CAST(src."GEN_VAL_MO" AS BIGINT)'
        comment: General customs import value for the month (USD)
      - name: cif_charges
        type: long
        nullable: true
        expression: 'TRY_CAST(src."GEN_CIF_MO" AS BIGINT)'
        comment: Cost, insurance, and freight charges for the month (USD)
      - name: quantity
        type: double
        nullable: true
        expression: 'TRY_CAST(src."GEN_QY1_MO" AS DOUBLE)'
        comment: Quantity imported in the first unit of measure
      - name: quantity_unit
        type: string
        nullable: true
        expression: 'src."UNIT_QY1"'
        comment: Unit of measure for quantity

    source:
      type: http
      # /hs requires discrete YEAR=/MONTH= predicates (time=YYYY-MM returns 204). Verified
      # live 2026-07-08: YEAR/MONTH -> 200 with ~213k HS-6 rows/month including GEN_CIF_MO.
      url: "https://api.census.gov/data/timeseries/intltrade/imports/hs?get=CTY_CODE,CTY_NAME,I_COMMODITY,GEN_VAL_MO,GEN_CIF_MO,GEN_QY1_MO,UNIT_QY1&COMM_LVL=HS6&YEAR={effective_year}&MONTH={month}&key={env:CENSUS_API_KEY}"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 2.0
        retryOn: [429, 503]
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.geo.CensusResponseTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=trade/direction=imports/year=*/month=*/"
      partition:
        columns: [type, direction, year, month]
        valueSource:
          year: effective_year
      iceberg:
        catalogType: hadoop
        targetFileSizeBytes: 134217728
        runMaintenance: true
        snapshotRetentionDays: 7
        runCompaction: true
        overwritePartitions: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

  # ---------------------------------------------------------------------------
  # TRADE BY STATE — Census intltrade statehs, HS-6 state exports by destination
  # ---------------------------------------------------------------------------
  # Sub-national export exposure: monthly U.S. goods exports by origin STATE x
  # HS-6 commodity x destination country. The /statehs timeseries only publishes
  # exports (there is no state-level import origin), so this is exports-only and
  # carries no `direction` partition. One fetch per (year, month) returns full
  # state x country x commodity detail (~2.1M rows / ~100 MB per month, verified
  # live 2026-07-08) plus roll-up rows: STATE='-' is the U.S. total and
  # CTY_CODE='-' is the all-countries total — filter both out for detail-grain
  # analysis. Like /hs, the statehs endpoint requires discrete YEAR=/MONTH=
  # predicates (a time=YYYY-MM predicate is rejected), so month is a full list
  # dimension and each (year, month) is one overwrite partition.
  - name: trade_by_state
    freshness:
      type: hash
    pattern: "type=trade_by_state/year=*/month=*/*.parquet"
    partitions:
      style: hive
      columns:
        - name: type
          type: string
        - name: year
          type: integer
        - name: month
          type: string
    comment: >
      Monthly U.S. goods exports by origin state, HS-6 commodity, and
      destination country (Census International Trade timeseries, statehs
      endpoint). state='-' rows are U.S. totals; country_code='-' rows are
      all-countries totals.

    dimensions:
      type:
        - trade_by_state
      # Period dimension: dynamic yearRange (never hardcoded). publish year is
      # iterated start->current; effective_year = publish - dataLag is the data
      # year written to the partition. The intltrade statehs timeseries begins in
      # 2013; minYear hard-floors the publish year at 2014 (=> data floor 2013).
      year:
        type: yearRange
        start: "${GOVDATA_START_YEAR:2014}"
        end: "${GOVDATA_END_YEAR:current}"
        minYear: 2014
        dataLag: 1
        descending: true
      # Full monthly cadence: one fetch per (year, month) = one overwrite
      # partition, so the fetch unit equals the partition granularity.
      month:
        type: list
        values: ['01', '02', '03', '04', '05', '06', '07', '08', '09', '10', '11', '12']

    columns:
      - name: state
        type: string
        nullable: true
        expression: 'src."STATE"'
        comment: Origin state (USPS 2-char abbreviation); '-' = U.S. total roll-up
      - name: country_code
        type: string
        nullable: true
        expression: 'src."CTY_CODE"'
        comment: Destination country code (4-char Census); '-' = all-countries roll-up
      - name: country_name
        type: string
        nullable: true
        expression: 'src."CTY_NAME"'
        comment: Destination country name
      - name: hs6
        type: string
        nullable: true
        expression: 'src."E_COMMODITY"'
        comment: HS 6-digit commodity code
      - name: hs2
        type: string
        nullable: true
        expression: 'LEFT(src."E_COMMODITY", 2)'
        comment: HS 2-digit chapter (derived from hs6)
      - name: commodity_desc
        type: string
        nullable: true
        expression: 'src."E_COMMODITY_SDESC"'
        comment: Short HS commodity description
      - name: value_usd
        type: long
        nullable: true
        expression: 'TRY_CAST(src."ALL_VAL_MO" AS BIGINT)'
        comment: Total export value for the month, all transport modes (USD)
      - name: vessel_value_usd
        type: long
        nullable: true
        expression: 'TRY_CAST(src."VES_VAL_MO" AS BIGINT)'
        comment: Export value shipped by vessel for the month (USD)
      - name: air_value_usd
        type: long
        nullable: true
        expression: 'TRY_CAST(src."AIR_VAL_MO" AS BIGINT)'
        comment: Export value shipped by air for the month (USD)
      - name: container_value_usd
        type: long
        nullable: true
        expression: 'TRY_CAST(src."CNT_VAL_MO" AS BIGINT)'
        comment: Export value shipped in containers for the month (USD)

    source:
      type: http
      # statehs requires discrete YEAR=/MONTH= predicates (time=YYYY-MM is
      # rejected). Verified live 2026-07-08: YEAR/MONTH -> 200 with ~2.1M HS-6
      # state-detail rows/month.
      url: "https://api.census.gov/data/timeseries/intltrade/exports/statehs?get=STATE,CTY_CODE,CTY_NAME,E_COMMODITY,E_COMMODITY_SDESC,ALL_VAL_MO,VES_VAL_MO,AIR_VAL_MO,CNT_VAL_MO&COMM_LVL=HS6&YEAR={effective_year}&MONTH={month}&key={env:CENSUS_API_KEY}"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 2.0
        retryOn: [429, 503]
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.geo.CensusResponseTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=trade_by_state/year=*/month=*/"
      partition:
        columns: [type, year, month]
        valueSource:
          year: effective_year
      iceberg:
        catalogType: hadoop
        targetFileSizeBytes: 134217728
        runMaintenance: true
        snapshotRetentionDays: 7
        runCompaction: true
        overwritePartitions: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

# ============================================================================
# CONSTRAINTS
# ============================================================================
# Table constraints (metadata only - not enforced).
# Primary keys document unique row identifiers based on partition columns.
# Foreign keys document relationships between tables across schemas (econ, geo)
# to guide analysts and query optimizers on potential joins and correlations.
# Used for query optimization hints and documentation, not data validation.
# ============================================================================

constraints:
  # International trade (Census intltrade HS-6 monthly)
  trade_exports:
    primaryKey: [year, month, hs6, country_code]
    foreignKeys:
      - columns:
          - country_code
        targetSchema: "${REF_SCHEMA_NAME:ref}"
        targetTable: countries
        targetColumns:
          - census_cty_code
        comment: >
          Destination country (Census code) links to ref.countries for ISO/FIPS/region.
          Metadata only; the country_code='-' all-countries roll-up rows do not resolve.
  trade_imports:
    primaryKey: [year, month, hs6, country_code]
    foreignKeys:
      - columns:
          - country_code
        targetSchema: "${REF_SCHEMA_NAME:ref}"
        targetTable: countries
        targetColumns:
          - census_cty_code
        comment: >
          Origin country (Census code) links to ref.countries for ISO/FIPS/region.
          Metadata only; the country_code='-' all-countries roll-up rows do not resolve.
  # State-level HS-6 exports (Census intltrade statehs)
  trade_by_state:
    primaryKey: [year, month, state, hs6, country_code]
    foreignKeys:
      - columns:
          - state
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: states
        targetColumns:
          - state_abbr
        comment: >
          Origin state (USPS abbreviation) links to geo.states for state name/FIPS/geometry.
          Metadata only; the state='-' U.S.-total roll-up rows do not resolve.
      - columns:
          - country_code
        targetSchema: "${REF_SCHEMA_NAME:ref}"
        targetTable: countries
        targetColumns:
          - census_cty_code
        comment: >
          Destination country (Census code) links to ref.countries for ISO/FIPS/region.
          Metadata only; the country_code='-' all-countries roll-up rows do not resolve.
  # BEA International Investment Position — no cross-schema FK: type_of_investment/component
  # are BEA-internal codes with no reference table (there is no country grain in IIP).
  iip_positions:
