  # --- STATE INDUSTRY ---
  - name: state_industry
    pattern: "type=state_industry/frequency=*/year=*/state_industry.parquet"
    partitions: *standard_partitions
    comment: >
      Employment by industry sector for all 53 U.S. jurisdictions (50 states + DC, plus Puerto Rico and the Virgin Islands) across 22 NAICS supersector codes. Includes total nonfarm employment, private sector employment, and breakdowns by major industry categories like manufacturing, construction, retail, healthcare, and government. Enables state-level industry analysis and cross-state economic comparisons.

    # Dimension definitions for iteration
    dimensions:
      type:
        - state_industry
      frequency: *monthly_frequency
      year:
        type: yearRange
        start: "{env:GOVDATA_START_YEAR:2020}"
        end: current

    # BLS SM-program flat-file columns (TSV): series_id, year, period, value, footnote_codes.
    # Series ID layout: SM + seasonal(1) + state(2) + area(5) + supersector(2) + industry(6) + datatype(2).
    columns:
      - name: series
        type: string
        nullable: true
        comment: BLS series ID (e.g., SMU01000000000000001 = Alabama, statewide, total nonfarm, all employees)
        source: series_id
      - name: year
        type: integer
        nullable: true
        comment: Data year
        source: year
      - name: period
        type: string
        nullable: true
        comment: BLS period identifier (M01-M12 monthly, M13 annual average)
        source: period
      - name: periodName
        type: string
        nullable: true
        comment: Human-readable period name derived from period
        expression: "CASE period WHEN 'M01' THEN 'January' WHEN 'M02' THEN 'February' WHEN 'M03' THEN 'March' WHEN 'M04' THEN 'April' WHEN 'M05' THEN 'May' WHEN 'M06' THEN 'June' WHEN 'M07' THEN 'July' WHEN 'M08' THEN 'August' WHEN 'M09' THEN 'September' WHEN 'M10' THEN 'October' WHEN 'M11' THEN 'November' WHEN 'M12' THEN 'December' WHEN 'M13' THEN 'Annual' ELSE period END"
      - name: value
        type: double
        nullable: true
        comment: Employment in thousands
        source: value
      - name: footnotes
        type: string
        nullable: true
        comment: BLS footnote codes for the data point
        source: footnote_codes

    # Bulk flat-file source — replaces api.bls.gov, which caps registered keys at ~500 requests/day.
    # A full multi-year backfill (1,122 series / 50-per-batch x N years, across every BLS table) blows
    # that cap; over-quota batches return REQUEST_NOT_PROCESSED, leaving older years truncated (they
    # lose whole states in series-list order). The SM program publishes the entire series set as TSV
    # with no key and no daily limit — the same mechanism the jolts_* tables use (jt program).
    source:
      type: http
      url: "https://download.bls.gov/pub/time.series/sm/sm.data.1.AllData"
      method: GET
      headers:
        # download.bls.gov 403s fake-browser User-Agents; requires a self-identifying UA
        User-Agent: "calcite-govdata (+mailto:kennethstott@gmail.com)"
      response:
        format: tsv
      rateLimit:
        requestsPerSecond: 1.0
        maxRetries: 3
      rawCache:
        enabled: true
      # Reproduce the prior selection exactly: SMU (seasonally unadjusted), area 00000 (statewide),
      # industry 000000 (supersector totals), datatype 01 (all employees) = 51 states x 22 supersectors
      # = 1,122 series. Drops metro-area rows (captured by metro_industry) and seasonally adjusted (SMS).
      rowFilter:
        column: series_id
        pattern: '^SMU\d{2}00000\d{2}00000001.*$'

    # Materialization configuration
    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: "type=state_industry/frequency=*/year=*/"
      partition:
        columns: [type, frequency, year]
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        targetFileSizeBytes: 134217728  # 128MB target for optimal read performance
        batchPartitionColumns: [year]
        incrementalKeys: [year]
        runMaintenance: true
        snapshotRetentionDays: 7
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

  # --- STATE WAGES ---
  - name: state_wages
    pattern: "type=state_wages/frequency=*/year=*/state_wages.parquet"
    partitions: *standard_partitions
    comment: >
      Average weekly wages for all 51 U.S. jurisdictions (50 states + DC) from BLS QCEW (Quarterly Census of Employment and Wages). Provides state-level compensation data for understanding regional wage differences, cost-of-living adjustments, and economic competitiveness analysis.

    # Dimension definitions for iteration
    dimensions:
      type:
        - state_wages  # Static table type
      frequency:
        - annual
      year:
        type: yearRange
        start: "{env:GOVDATA_START_YEAR:1990}"  # QCEW data only available from 1990
        end: current
        dataLag: 1       # QCEW annual data is released with ~1 year lag
        releaseMonth: 9  # Released in September (with Q1 data of following year)

    # Source columns from QCEW CSV (matching actual file structure)
    columns:
      - name: area_fips
        type: string
        nullable: true
        comment: State FIPS code with 000 suffix (e.g., 01000 for Alabama)
      - name: own_code
        type: string
        nullable: true
        comment: Ownership code (0=all, 5=private)
      - name: industry_code
        type: string
        nullable: true
        comment: NAICS industry code (10=total)
      - name: agglvl_code
        type: string
        nullable: true
        comment: Aggregation level code
      - name: annual_avg_estabs
        type: int
        nullable: true
        comment: Average annual establishment count
      - name: annual_avg_emplvl
        type: int
        nullable: true
        comment: Average annual employment level
      - name: total_annual_wages
        type: long
        nullable: true
        comment: Total annual wages in dollars
      - name: annual_avg_wkly_wage
        type: int
        nullable: true
        comment: Average weekly wage in dollars
      # Computed columns for user convenience
      - name: state_fips
        type: string
        nullable: true
        expression: "SUBSTR(CAST(area_fips AS VARCHAR), 1, 2)"
        comment: 2-digit state FIPS code derived from area_fips
      - name: state_name
        type: string
        nullable: true
        expression: "CASE SUBSTR(CAST(area_fips AS VARCHAR), 1, 2) WHEN '01' THEN 'Alabama' WHEN '02' THEN 'Alaska' WHEN '04' THEN 'Arizona' WHEN '05' THEN 'Arkansas' WHEN '06' THEN 'California' WHEN '08' THEN 'Colorado' WHEN '09' THEN 'Connecticut' WHEN '10' THEN 'Delaware' WHEN '11' THEN 'District of Columbia' WHEN '12' THEN 'Florida' WHEN '13' THEN 'Georgia' WHEN '15' THEN 'Hawaii' WHEN '16' THEN 'Idaho' WHEN '17' THEN 'Illinois' WHEN '18' THEN 'Indiana' WHEN '19' THEN 'Iowa' WHEN '20' THEN 'Kansas' WHEN '21' THEN 'Kentucky' WHEN '22' THEN 'Louisiana' WHEN '23' THEN 'Maine' WHEN '24' THEN 'Maryland' WHEN '25' THEN 'Massachusetts' WHEN '26' THEN 'Michigan' WHEN '27' THEN 'Minnesota' WHEN '28' THEN 'Mississippi' WHEN '29' THEN 'Missouri' WHEN '30' THEN 'Montana' WHEN '31' THEN 'Nebraska' WHEN '32' THEN 'Nevada' WHEN '33' THEN 'New Hampshire' WHEN '34' THEN 'New Jersey' WHEN '35' THEN 'New Mexico' WHEN '36' THEN 'New York' WHEN '37' THEN 'North Carolina' WHEN '38' THEN 'North Dakota' WHEN '39' THEN 'Ohio' WHEN '40' THEN 'Oklahoma' WHEN '41' THEN 'Oregon' WHEN '42' THEN 'Pennsylvania' WHEN '44' THEN 'Rhode Island' WHEN '45' THEN 'South Carolina' WHEN '46' THEN 'South Dakota' WHEN '47' THEN 'Tennessee' WHEN '48' THEN 'Texas' WHEN '49' THEN 'Utah' WHEN '50' THEN 'Vermont' WHEN '51' THEN 'Virginia' WHEN '53' THEN 'Washington' WHEN '54' THEN 'West Virginia' WHEN '55' THEN 'Wisconsin' WHEN '56' THEN 'Wyoming' WHEN '72' THEN 'Puerto Rico' WHEN '78' THEN 'Virgin Islands' ELSE 'Unknown' END"
        comment: State name derived from FIPS code


    # API Configuration
    download:
      bulkDownload: qcew_annual_bulk

    # HTTP Source configuration for EtlPipeline (bulk download)
    # Downloads ZIP file and extracts CSV content
    # Uses lazy streaming for large CSV files (parsed row-by-row, not loaded into memory)
    source:
      type: http
      url: "https://data.bls.gov/cew/data/files/{effective_year}/csv/{effective_year}_{frequency}_singlefile.zip"
      method: GET
      extractPattern: "*.csv"  # Extract CSV from ZIP archive
      # Row filter: state-level data has area_fips = XX000 (2-digit state + 000)
      rowFilter:
        column: area_fips
        pattern: "^\\d{2}000$"  # State FIPS codes: 01000, 02000, etc.
      response:
        format: csv
      rateLimit:
        requestsPerSecond: 1.0
        maxRetries: 3
      rawCache:
        enabled: true

    # Materialization configuration
    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: "type=state_wages/frequency=*/year=*/"
      partition:
        columns: [type, frequency, year]
        valueSource:
          year: effective_year
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        targetFileSizeBytes: 134217728  # 128MB target for optimal read performance
        batchPartitionColumns: [year]
        incrementalKeys: [year]
        runMaintenance: true
        snapshotRetentionDays: 7
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

