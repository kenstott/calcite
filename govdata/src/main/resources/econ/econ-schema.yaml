tables:
  - name: fred_indicators_enriched
    type: view
    sql: "SELECT i.series, i.date, i.value, c.title AS series_name, c.units, c.frequency, c.seasonal_adjustment, c.last_updated, c.observation_start, c.observation_end, c.popularity FROM ${ECON_SCHEMA_NAME:econ}.fred_indicators i JOIN ${ECON_REFERENCE_SCHEMA_NAME:econ_reference}.fred_series c ON i.series = c.series"
    comment: Enriched fred_indicator observations with metadata such as series names, units, frequency, or others.

  - name: national_accounts_enriched
    type: view
    sql: "SELECT na.table_id, na.line_number, na.line_description, na.series_code, na.year, na.value, na.units, na.frequency, r.description AS table_description, r.section FROM ${ECON_SCHEMA_NAME:econ}.national_accounts na LEFT JOIN ${ECON_REFERENCE_SCHEMA_NAME:econ_reference}.nipa_tables r ON na.table_id = r.table_name"
    comment: >
      National accounts (NIPA) data enriched with table metadata and section categorization. Columns: table_id (BEA table code), line_number (line within table), line_description (component description), series_code (BEA series code), year, value (millions of dollars), units, frequency (A=Annual/Q=Quarterly), table_description (full table description from BEA), section (1-8 NIPA section from the nipa_tables partition). Enables semantic queries by economic category without manual joins. (The nipa_tables reference catalog exposes only table_name/description/section from the BEA API, so section_name/family/metric/table_number are not available.)

  - name: regional_income_enriched
    type: view
    sql: "SELECT ri.*, rlc.\"desc\" AS line_code_description FROM ${ECON_SCHEMA_NAME:econ}.regional_income ri LEFT JOIN ${ECON_REFERENCE_SCHEMA_NAME:econ_reference}.regional_linecodes rlc ON ri.tablename = rlc.tablename AND ri.line_code = rlc.key"
    comment: >
      Regional income data enriched with LineCode descriptions from the reference catalog. Columns include all regional_income fields plus line_code_description (what the BEA line code represents). Enables semantic queries without needing to know specific LineCode values. (The regional_linecodes reference catalog exposes only key/desc from the BEA API, so table_prefix/data_category/geography_level/table_frequency are not available.)

  - name: interest_rate_spreads
    type: view
    sql: "SELECT date, MAX(CASE WHEN series = 'DGS3MO' THEN value END) AS three_month_yield, MAX(CASE WHEN series = 'DGS2' THEN value END) AS two_year_yield, MAX(CASE WHEN series = 'DGS5' THEN value END) AS five_year_yield, MAX(CASE WHEN series = 'DGS10' THEN value END) AS ten_year_yield, MAX(CASE WHEN series = 'DGS30' THEN value END) AS thirty_year_yield, MAX(CASE WHEN series = 'DGS10' THEN value END) - MAX(CASE WHEN series = 'DGS2' THEN value END) AS term_spread_10y_2y, MAX(CASE WHEN series = 'DGS10' THEN value END) - MAX(CASE WHEN series = 'DGS3MO' THEN value END) AS term_spread_10y_3m, MAX(CASE WHEN series = 'T10YIE' THEN value END) AS breakeven_inflation_10y, MAX(CASE WHEN series = 'DFF' THEN value END) AS fed_funds_rate, MAX(CASE WHEN series = 'BAMLC0A0CM' THEN value END) AS corporate_spread_bps FROM ${ECON_SCHEMA_NAME:econ}.fred_indicators WHERE series IN ('DGS3MO', 'DGS2', 'DGS5', 'DGS10', 'DGS30', 'T10YIE', 'DFF', 'BAMLC0A0CM') GROUP BY date"
    comment: >
      Full yield curve with spreads and breakeven inflation. Columns: date, three_month_yield, two_year_yield, five_year_yield, ten_year_yield, thirty_year_yield (all Treasury constant maturity rates %), term_spread_10y_2y (canonical recession signal, negative historically precedes downturns), term_spread_10y_3m, breakeven_inflation_10y (market-implied 10Y inflation expectations %), fed_funds_rate (FOMC policy rate %), corporate_spread_bps (investment-grade spread, widening signals credit stress). Critical for recession forecasting, monetary policy analysis, and credit market assessment.

  - name: housing_indicators
    type: view
    sql: "SELECT date, MAX(CASE WHEN series = 'HOUST' THEN value END) AS housing_starts, MAX(CASE WHEN series = 'HOUST1F' THEN value END) AS single_family_starts, MAX(CASE WHEN series = 'PERMIT' THEN value END) AS building_permits, MAX(CASE WHEN series = 'EXHOSLUSM495S' THEN value END) AS existing_sales, MAX(CASE WHEN series = 'CSUSHPISA' THEN value END) AS case_shiller_index, MAX(CASE WHEN series = 'MSPUS' THEN value END) AS median_sale_price, MAX(CASE WHEN series = 'MORTGAGE30US' THEN value END) AS mortgage_rate_30y, MAX(CASE WHEN series = 'RRVRUSQ156N' THEN value END) AS rental_vacancy_rate FROM ${ECON_SCHEMA_NAME:econ}.fred_indicators WHERE series IN ('HOUST', 'HOUST1F', 'PERMIT', 'EXHOSLUSM495S', 'CSUSHPISA', 'MSPUS', 'MORTGAGE30US', 'RRVRUSQ156N') GROUP BY date"
    comment: >
      Comprehensive housing market health dashboard. Columns: date, housing_starts (total new housing units started in thousands, annualized), single_family_starts (single-family housing starts subset in thousands), building_permits (authorized building permits in thousands, leading indicator), existing_sales (existing home sales in millions annualized), case_shiller_index (S&P CoreLogic Case-Shiller U.S. National Home Price Index), median_sale_price (median sales price of houses sold in USD), mortgage_rate_30y (30-year fixed rate mortgage average %), rental_vacancy_rate (percentage of rental units vacant). Essential for real estate analysis, construction sector tracking, and housing affordability assessment.

  - name: monetary_aggregates
    type: view
    sql: "SELECT date, MAX(CASE WHEN series = 'M1SL' THEN value END) AS m1_money_supply, MAX(CASE WHEN series = 'M2SL' THEN value END) AS m2_money_supply, MAX(CASE WHEN series = 'BOGMBASE' THEN value END) AS monetary_base, MAX(CASE WHEN series = 'GDP' THEN value END) AS nominal_gdp, MAX(CASE WHEN series = 'GDP' THEN value END) / NULLIF(MAX(CASE WHEN series = 'M2SL' THEN value END), 0) AS m2_velocity FROM ${ECON_SCHEMA_NAME:econ}.fred_indicators WHERE series IN ('M1SL', 'M2SL', 'BOGMBASE', 'GDP') GROUP BY date"
    comment: >
      Federal Reserve monetary aggregates and velocity analysis. Columns: date, m1_money_supply (narrow money supply including currency and demand deposits in billions), m2_money_supply (broad money supply including M1 plus savings deposits and money market funds in billions), monetary_base (currency in circulation plus bank reserves in billions), nominal_gdp (gross domestic product in billions), m2_velocity (calculated as GDP/M2, measures money turnover rate, declining velocity may indicate liquidity hoarding). Critical for Federal Reserve policy analysis, inflation expectations, and monetary transmission mechanism assessment.

  - name: business_indicators
    type: view
    sql: "SELECT date, MAX(CASE WHEN series = 'INDPRO' THEN value END) AS industrial_production_index, MAX(CASE WHEN series = 'TCU' THEN value END) AS capacity_utilization_pct, MAX(CASE WHEN series = 'RSXFS' THEN value END) AS retail_sales_millions, MAX(CASE WHEN series = 'TOTBKCR' THEN value END) AS bank_credit_billions, MAX(CASE WHEN series = 'DRTSCILM' THEN value END) AS lending_standards_net_pct FROM ${ECON_SCHEMA_NAME:econ}.fred_indicators WHERE series IN ('INDPRO', 'TCU', 'RSXFS', 'TOTBKCR', 'DRTSCILM') GROUP BY date"
    comment: >
      Business cycle and economic activity dashboard. Columns: date, industrial_production_index (index of manufacturing and industrial output, 2017=100), capacity_utilization_pct (percentage of total industrial capacity in use, high values indicate potential inflation pressure), retail_sales_millions (advance retail sales in millions USD, excludes services, leading consumer spending indicator), bank_credit_billions (total credit extended by banks in billions, measure of lending activity), lending_standards_net_pct (net percentage of banks tightening lending standards, positive values indicate credit tightening). Essential for business cycle analysis, recession/expansion identification, and credit conditions monitoring.

  - name: trade_balance_summary
    type: view
    sql: "SELECT year, quarter, line_description, SUM(CASE WHEN trade_type = 'exports' THEN TRY_CAST(value AS DOUBLE) ELSE 0 END) AS total_exports, SUM(CASE WHEN trade_type = 'imports' THEN TRY_CAST(value AS DOUBLE) ELSE 0 END) AS total_imports, SUM(CASE WHEN trade_type = 'trade_balance' THEN TRY_CAST(value AS DOUBLE) ELSE 0 END) AS net_trade_balance FROM ${ECON_SCHEMA_NAME:econ}.trade_statistics GROUP BY year, quarter, line_description"
    comment: >
      U.S. international trade balance aggregated by category from BEA. Columns: year (calendar year), quarter (Q1-Q4 for quarterly data, NULL for annual), line_description (trade category such as 'Goods', 'Services', 'Foods feeds and beverages', etc.), total_exports (sum of exports in millions USD), total_imports (sum of imports in millions USD), net_trade_balance (exports minus imports, negative indicates trade deficit). Derived from BEA NIPA Table 4.2.5B (Foreign Transactions section), enables analysis of trade composition, bilateral balances, and sectoral trade patterns. Critical for understanding U.S. competitiveness, currency impacts, and GDP contribution from net exports.

  - name: trade_statistics
    type: view
    sql: "SELECT tablename AS table_id, line_number, line_description, series_code, year, time_period, CASE WHEN time_period LIKE '%Q%' THEN CAST(SUBSTRING(time_period, LENGTH(time_period), 1) AS INTEGER) ELSE NULL END AS quarter, value, units, frequency, CASE WHEN LOWER(line_description) LIKE '%export%' THEN 'exports' WHEN LOWER(line_description) LIKE '%import%' THEN 'imports' ELSE 'trade_balance' END AS trade_type FROM ${ECON_SCHEMA_NAME:econ}.national_accounts WHERE tablename = 'T40205B'"
    comment: >
      U.S. international trade statistics from BEA NIPA Table 4.2.5B (Foreign Transactions section). Provides detailed breakdown of exports and imports of goods and services with computed columns: quarter (1-4 extracted from time_period for quarterly data, NULL for annual), trade_type (exports/imports/trade_balance derived from line_description). This is a convenience view filtering national_accounts for trade-specific data. For enriched version with section metadata, query national_accounts_enriched WHERE table_id = 'T40205B'.

  - name: real_gdp_growth
    type: view
    sql: "SELECT date, value AS real_gdp_billions, LAG(value) OVER (ORDER BY date) AS prior_quarter_gdp, (value - LAG(value) OVER (ORDER BY date)) / NULLIF(LAG(value) OVER (ORDER BY date), 0) * 100 AS qoq_growth_pct FROM ${ECON_SCHEMA_NAME:econ}.fred_indicators WHERE series = 'GDPC1'"
    comment: >
      Real GDP (chained 2017 dollars) with quarter-over-quarter growth rate. Columns: date, real_gdp_billions (real GDP in billions of chained 2017 dollars), prior_quarter_gdp, qoq_growth_pct (percentage change from prior quarter). Use GDPC1 instead of GDP for growth analysis to remove inflation distortion. Two consecutive negative qoq_growth_pct values is the informal recession definition.

  - name: pce_inflation
    type: view
    sql: "SELECT date, MAX(CASE WHEN series = 'PCEPI' THEN value END) AS pce_index, MAX(CASE WHEN series = 'PCEPILFE' THEN value END) AS core_pce_index FROM ${ECON_SCHEMA_NAME:econ}.fred_indicators WHERE series IN ('PCEPI', 'PCEPILFE') GROUP BY date"
    comment: >
      PCE inflation dashboard — the Federal Reserve's preferred inflation framework. Columns: date, pce_index (Personal Consumption Expenditures price index, headline), core_pce_index (PCE excluding food and energy — the FOMC's primary 2% inflation target). Complements CPI-based views; the Fed explicitly targets Core PCE, making this view critical for monetary policy analysis.

  - name: consumer_spending
    type: view
    sql: "SELECT date, MAX(CASE WHEN series = 'PCE' THEN value END) AS personal_consumption_billions, MAX(CASE WHEN series = 'PI' THEN value END) AS personal_income_billions, MAX(CASE WHEN series = 'PSAVERT' THEN value END) AS saving_rate_pct FROM ${ECON_SCHEMA_NAME:econ}.fred_indicators WHERE series IN ('PCE', 'PI', 'PSAVERT') GROUP BY date"
    comment: >
      Consumer spending, income, and saving dashboard. Columns: date, personal_consumption_billions (PCE in billions USD — largest single component of GDP at ~70%), personal_income_billions (total personal income in billions USD), saving_rate_pct (personal saving as % of disposable income, low values indicate consumer stress, high values can signal precautionary behavior). Essential for consumer health assessment, GDP forecasting, and tracking post-shock household balance sheet recovery.

  - name: labor_market_conditions
    type: view
    sql: "SELECT date, MAX(CASE WHEN series = 'UNRATE' THEN value END) AS unemployment_rate_u3, MAX(CASE WHEN series = 'U6RATE' THEN value END) AS unemployment_rate_u6, MAX(CASE WHEN series = 'U6RATE' THEN value END) - MAX(CASE WHEN series = 'UNRATE' THEN value END) AS labor_slack_gap, MAX(CASE WHEN series = 'ICSA' THEN value END) AS initial_claims, MAX(CASE WHEN series = 'CCSA' THEN value END) AS continuing_claims, MAX(CASE WHEN series = 'AWHMAN' THEN value END) AS avg_weekly_hours_mfg FROM ${ECON_SCHEMA_NAME:econ}.fred_indicators WHERE series IN ('UNRATE', 'U6RATE', 'ICSA', 'CCSA', 'AWHMAN') GROUP BY date"
    comment: >
      Comprehensive labor market conditions dashboard. Columns: date, unemployment_rate_u3 (official U-3 unemployment rate %), unemployment_rate_u6 (broad U-6 rate including underemployed and marginally attached %), labor_slack_gap (U6 minus U3, higher values indicate hidden slack), initial_claims (weekly initial jobless claims — most timely leading labor indicator), continuing_claims (workers still collecting unemployment benefits — measures labor market absorption), avg_weekly_hours_mfg (average weekly hours in manufacturing, a Conference Board leading indicator — employers cut hours before cutting workers). Essential for assessing true labor market health beyond the headline unemployment rate.

  - name: fed_policy_dashboard
    type: view
    sql: "SELECT date, MAX(CASE WHEN series = 'DFF' THEN value END) AS fed_funds_rate, MAX(CASE WHEN series = 'PCEPILFE' THEN value END) AS core_pce, MAX(CASE WHEN series = 'DFF' THEN value END) - MAX(CASE WHEN series = 'PCEPILFE' THEN value END) AS real_fed_funds_rate, MAX(CASE WHEN series = 'WALCL' THEN value END) AS fed_balance_sheet_billions, MAX(CASE WHEN series = 'USREC' THEN value END) AS in_recession FROM ${ECON_SCHEMA_NAME:econ}.fred_indicators WHERE series IN ('DFF', 'PCEPILFE', 'WALCL', 'USREC') GROUP BY date"
    comment: >
      Federal Reserve policy stance dashboard. Columns: date, fed_funds_rate (FOMC policy rate %), core_pce (Fed primary inflation target — PCE ex-food-and-energy %), real_fed_funds_rate (nominal rate minus Core PCE — negative values indicate accommodative policy, positive values restrictive), fed_balance_sheet_billions (Fed total assets in billions — tracks QE/QT cycles), in_recession (NBER recession indicator, 1=recession, 0=expansion). Directly maps to the Fed's dual mandate framework (price stability + maximum employment) and balance sheet normalization tracking.

  - name: global_conditions
    type: view
    sql: "SELECT date, MAX(CASE WHEN series = 'DCOILWTICO' THEN value END) AS wti_crude_price, MAX(CASE WHEN series = 'DTWEXBGS' THEN value END) AS usd_broad_index FROM ${ECON_SCHEMA_NAME:econ}.fred_indicators WHERE series IN ('DCOILWTICO', 'DTWEXBGS') GROUP BY date"
    comment: >
      Global commodity and currency conditions. Columns: date, wti_crude_price (West Texas Intermediate crude oil spot price in USD/barrel — leading input cost and inflation driver), usd_broad_index (trade-weighted US dollar index against broad basket of trading partners, 2006=100 — strong dollar suppresses exports and commodity prices, weak dollar does the opposite). Useful for cost-push inflation analysis, export competitiveness, and macro regime identification.

# ============================================================================
# END OF SCHEMA
# ============================================================================
# STATISTICS:
#   - 30 partitioned tables
#   - 225 total columns
#   - 11 reusable column templates (anchors)
#   - 42 anchor references (reducing duplication)
#   - 18 tables use standard partitioning scheme
#   - 1 bulk download configuration (QCEW data ~80-323MB)
#   - 28 table constraints (primary keys + foreign keys)
#   - 16 SQL views for enriched data and analytics
#
# ANCHOR USAGE:
#   - *date_column: 12 uses
#   - *percent_change_year: 7 uses
#   - *series_column: 6 uses
#   - *percent_change_month: 6 uses
#   - *state_name: 4 uses
#   - *industry_name: 3 uses
#   - *state_fips: 2 uses
#   - *standard_partitions: 18 uses
#
# FILE SIZE: 57KB (49.6% smaller than JSON 113KB)
#
# MAINTAINABILITY IMPROVEMENTS:
#   - Column definitions centralized in column_templates section
#   - Consistent formatting with 2-space indentation
#   - Comprehensive inline comments for API configs and data sources
#   - Clear section separators for navigation
#   - Rate limit documentation (BLS: 500 daily, 1.1s between requests)
#   - Bulk download file size annotations (80MB annual, 323MB quarterly)
# ============================================================================

# ============================================================================
# VIEWS
# ============================================================================

views:

  - name: state_economic_snapshot
    comment: >
      State-level economic snapshot joining BLS QCEW state wages and JOLTS state labor
      market data, enriched with geographic identifiers. QCEW carries no "series" — a
      state/year has multiple rows keyed by own_code (0=all, 5=private) and industry_code
      (10=total); filter those to select a specific wage aggregate. One row per
      state+year+own_code+industry_code+jolts_series. Use state_fips to join with
      geo.states, census, or health schemas.
    sql: >
      SELECT
        w.state_fips,
        gs.state_name,
        gs.state_abbr,
        w.year,
        w.own_code,
        w.industry_code,
        w.annual_avg_wkly_wage AS avg_weekly_wage,
        w.annual_avg_emplvl    AS avg_employment,
        w.total_annual_wages,
        j.series               AS jolts_series,
        j.metric_type          AS jolts_metric,
        TRY_CAST(j.value AS DOUBLE) AS jolts_value
      FROM state_wages w
      LEFT JOIN jolts_state j
        ON w.state_fips = j.state_fips AND w.year = j.year
      LEFT JOIN "geo"."states" gs ON w.state_fips = gs.state_fips

  - name: fdi_data
    comment: >
      Unified tall view over the two BEA MNE foreign-direct-investment tables:
      fdi_direct_investment (stat_type='DI' — position, income, financial
      transactions) and fdi_activities (stat_type='AMNE' — employment, sales,
      assets, value added). One row per stat_type x direction x classification
      x year x series_id x row_code. data_value is expressed in the units named
      by table_scale (dollars for financial series, thousands of employees for
      employment). Use fdi_by_country for a country-level wide pivot.
    sql: >
      SELECT 'DI' AS stat_type, direction, classification, year, series_id,
             series_name, row_code, row_label, column_code, column_label,
             data_value, table_scale, time_period
      FROM fdi_direct_investment
      UNION ALL
      SELECT 'AMNE' AS stat_type, direction, classification, year, series_id,
             series_name, row_code, row_label, column_code, column_label,
             data_value, table_scale, time_period
      FROM fdi_activities

  - name: fdi_by_country
    comment: >
      Country-level wide pivot of BEA foreign direct investment: one row per
      direction (inward/outward) x partner country x year, with the headline DI
      and AMNE statistics as columns. Position and income are historical-cost
      balance-of-payments direct investment; employment/sales/assets/value_added
      are majority-owned affiliate activities. Dollar figures are in millions;
      employment is in thousands of employees. Each source series is a single
      country row (verified), so the MAX pivot is a lossless reshape.
    sql: >
      SELECT
        direction,
        year,
        row_code  AS country_code,
        row_label AS country,
        MAX(CASE WHEN series_id IN ('30','22') THEN data_value END) AS position_usd_million,
        MAX(CASE WHEN series_id = '27' THEN data_value END)         AS income_usd_million,
        MAX(CASE WHEN series_id IN ('31','23') THEN data_value END) AS financial_flows_usd_million,
        MAX(CASE WHEN series_id = '25' THEN data_value END)         AS reinvested_earnings_usd_million,
        MAX(CASE WHEN series_id = '8'  THEN data_value END)         AS employment_thousands,
        MAX(CASE WHEN series_id = '4'  THEN data_value END)         AS sales_usd_million,
        MAX(CASE WHEN series_id = '1'  THEN data_value END)         AS assets_usd_million,
        MAX(CASE WHEN series_id = '6'  THEN data_value END)         AS value_added_usd_million,
        MAX(CASE WHEN series_id = '5'  THEN data_value END)         AS net_income_usd_million,
        MAX(CASE WHEN series_id = '14' THEN data_value END)         AS rd_expenditures_usd_million
      FROM (
        SELECT direction, year, series_id, row_code, row_label, data_value
        FROM fdi_direct_investment WHERE classification = 'Country'
        UNION ALL
        SELECT direction, year, series_id, row_code, row_label, data_value
        FROM fdi_activities WHERE classification = 'Country'
      ) t
      GROUP BY direction, year, row_code, row_label
