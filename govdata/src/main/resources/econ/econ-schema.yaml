        source: year
      - name: date
        type: string
        nullable: true
        comment: Observation date - period field (M01, M02, etc.)
        source: period
      - name: series
        type: string
        nullable: true
        comment: BLS series identifier
        source: series_id
      - name: metric_type
        type: string
        nullable: true
        comment: "JOLTS metric code (last 3 chars - element + rate/level, e.g. JOR, HIR, HIL)"
        expression: "RIGHT(src.series_id, 3)"
      - name: value
        type: double
        nullable: true
        comment: JOLTS metric value (levels in thousands, rates as percentage)
        source: value

    # Dimension definitions for iteration
    dimensions:
      type:
        - jolts_industry
      frequency:
        - monthly
      year:
        type: yearRange
        start: "{env:GOVDATA_START_YEAR:2020}"
        end: current
      metric:
        - "2.JobOpenings"
