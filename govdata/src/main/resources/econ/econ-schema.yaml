      - name: state_name
        type: string
        nullable: true
        comment: State name from the state FIPS at series_id positions 10-11; unmapped codes captured as-is
        expression: "CASE SUBSTRING(src.series_id, 10, 2) WHEN '00' THEN 'United States' WHEN '01' THEN 'Alabama' WHEN '02' THEN 'Alaska' WHEN '04' THEN 'Arizona' WHEN '05' THEN 'Arkansas' WHEN '06' THEN 'California' WHEN '08' THEN 'Colorado' WHEN '09' THEN 'Connecticut' WHEN '10' THEN 'Delaware' WHEN '11' THEN 'District of Columbia' WHEN '12' THEN 'Florida' WHEN '13' THEN 'Georgia' WHEN '15' THEN 'Hawaii' WHEN '16' THEN 'Idaho' WHEN '17' THEN 'Illinois' WHEN '18' THEN 'Indiana' WHEN '19' THEN 'Iowa' WHEN '20' THEN 'Kansas' WHEN '21' THEN 'Kentucky' WHEN '22' THEN 'Louisiana' WHEN '23' THEN 'Maine' WHEN '24' THEN 'Maryland' WHEN '25' THEN 'Massachusetts' WHEN '26' THEN 'Michigan' WHEN '27' THEN 'Minnesota' WHEN '28' THEN 'Mississippi' WHEN '29' THEN 'Missouri' WHEN '30' THEN 'Montana' WHEN '31' THEN 'Nebraska' WHEN '32' THEN 'Nevada' WHEN '33' THEN 'New Hampshire' WHEN '34' THEN 'New Jersey' WHEN '35' THEN 'New Mexico' WHEN '36' THEN 'New York' WHEN '37' THEN 'North Carolina' WHEN '38' THEN 'North Dakota' WHEN '39' THEN 'Ohio' WHEN '40' THEN 'Oklahoma' WHEN '41' THEN 'Oregon' WHEN '42' THEN 'Pennsylvania' WHEN '44' THEN 'Rhode Island' WHEN '45' THEN 'South Carolina' WHEN '46' THEN 'South Dakota' WHEN '47' THEN 'Tennessee' WHEN '48' THEN 'Texas' WHEN '49' THEN 'Utah' WHEN '50' THEN 'Vermont' WHEN '51' THEN 'Virginia' WHEN '53' THEN 'Washington' WHEN '54' THEN 'West Virginia' WHEN '55' THEN 'Wisconsin' WHEN '56' THEN 'Wyoming' WHEN '72' THEN 'Puerto Rico' ELSE SUBSTRING(src.series_id, 10, 2) END"
      - name: year
        type: int
        nullable: true
        comment: Year
        source: year
      - name: date
        type: string
        nullable: true
        comment: Observation date - period field (M01, M02, etc.)
        source: period
      - name: series
        type: string
        nullable: true
        comment: BLS series identifier
        source: series_id
      - name: metric_type
        type: string
        nullable: true
        comment: "JOLTS metric code (last 3 chars - JOR, HIR, TSR, QUR, LDR)"
        expression: "RIGHT(src.series_id, 3)"
      - name: value
        type: double
        nullable: true
        comment: JOLTS metric value (levels in thousands, rates as percentage)
        source: value

    # Dimension definitions for iteration
    dimensions:
      type:
        - jolts_state
      frequency:
        - monthly
      year:
        type: yearRange
        start: "{env:GOVDATA_START_YEAR:2020}"
        end: current
      metric:
        - "2.JobOpenings"
        - "3.Hires"
        - "4.TotalSeparations"
        - "5.Quits"
        - "6.LayoffsDischarges"

    # HTTP Source configuration for EtlPipeline (FTP files)
    source:
      type: http
      url: "https://download.bls.gov/pub/time.series/jt/jt.data.{metric}"
      method: GET
      headers:
        # download.bls.gov 403s fake-browser User-Agents; requires a self-identifying UA
        User-Agent: "calcite-govdata (+mailto:kennethstott@gmail.com)"
      response:
        format: tsv
      rateLimit:
        requestsPerSecond: 1.0
        maxRetries: 3
      rawCache:
        enabled: true
      # Filter to state-level data only: industry=000000 (positions 4-9) AND a state FIPS code at
      # positions 10-11 (01-99 — excludes national 00 and the alpha region codes NE/MW/SO/WE).
      rowFilter:
        column: series_id
        pattern: "^JTS000000(?:0[1-9]|[1-9][0-9]).*$"

    # No responseTransformer - using inline expressions instead
    # (responseTransformer only works for JSON responses, not CSV/TSV from FTP)

    # Materialization configuration
    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: "type=jolts_state/frequency=*/year=*/"
      partition:
        columns: [type, frequency, year, metric]
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        batchPartitionColumns: [year, metric]
