      (rates and levels) per JOLTS industry. Series ID encodes the industry at positions 4-9
      with national geography (state=00) at positions 10-11.
    columns:
      # Series ID: JTS{industry:4-9}{state:10-11}{area:12-16}{sizeclass:17-18}{element+rate:19-21}
      - name: industry_code
        type: string
        nullable: true
        comment: JOLTS industry code at series_id positions 4-9 (000000 = total nonfarm, excluded here)
