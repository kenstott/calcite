        - "4.TotalSeparations"
        - "5.Quits"
        - "6.LayoffsDischarges"

    # HTTP Source configuration for EtlPipeline (FTP files)
    source:
      type: http
      url: "https://download.bls.gov/pub/time.series/jt/jt.data.{metric}"
      method: GET
      headers:
        # download.bls.gov 403s fake-browser User-Agents; requires a self-identifying UA
        User-Agent: "calcite-govdata (+mailto:kennethstott@gmail.com)"
      response:
        format: tsv
      rateLimit:
        requestsPerSecond: 1.0
        maxRetries: 3
      rawCache:
        enabled: true
      # Filter to national industry detail: industry != 000000 (positions 4-9; non-total codes
      # start with a non-zero leading digit) AND national geography state=00 at positions 10-11.
      rowFilter:
        column: series_id
        pattern: "^JTS[1-9][0-9]{5}00.*$"

    # Materialization configuration
    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: "type=jolts_industry/frequency=*/year=*/"
