  # --- WORLD INDICATORS ---
  - name: world_indicators
    freshness:
      type: last_modified
    pattern: "type=indicators/frequency=*/year=*/world_indicators.parquet"
    partitions: *standard_partitions
    comment: >
      International economic indicators from World Bank for all countries. Includes GDP, inflation,
      unemployment, government debt, and population statistics. Uses bulk download with response
      partitioning: one API call per indicator returns all countries/years, then partitioned on write.

    # Dimensions for batch iteration - only indicator drives API calls
    # Country and year are derived from response data via responsePartitioning
    dimensions:
      indicator:
        type: json_catalog
        source: "/worldbank/worldbank-indicators.json"
        path: "indicators[*].items[*].code"

    # Columns match World Bank API response fields from [1] array (data array)
    # API response: [metadata, [{indicator:{id,value}, country:{id,value}, countryiso3code, date, value, unit, ...}]]
    columns:
      - name: countryiso3code
        type: string
        nullable: true
        comment: ISO 3-letter country code (e.g., 'USA', 'CHN')
      - name: date
        type: integer
        nullable: true
        comment: Year of observation (e.g., 2022)
      - name: value
        type: double
        nullable: true
        comment: Indicator value for the given country and year
      - name: unit
        type: string
        nullable: true
        comment: Unit of measurement (e.g., 'current US$', 'percent')
      - name: obs_status
        type: string
        nullable: true
        comment: Observation status flag
      - name: decimal
        type: int
        nullable: true
        comment: Decimal precision indicator

    # HTTP Source configuration for EtlPipeline
    # Uses bulk download: all countries, year range filter, high per_page limit
    source:
      type: http
      url: "https://api.worldbank.org/v2/country/all/indicator/{indicator}"
      method: GET
      parameters:
        format: "json"
        # Bulk table: fetch the full history on every run, decoupled from the run-mode year
        # window (GOVDATA_START_YEAR is the current year in daily mode). The responsePartitioning
        # yearFilter trims on write and overwritePartitions replaces, so re-fetching all years is
        # idempotent. Throttling is the job of the freshness gate, not a per-run year window.
        # End is an open-ended sentinel, NOT a real cutoff: World Bank only returns years that
        # exist (<= current), so a far-future end never over-fetches and never freezes the table at
        # a fixed year; the yearFilter (end: current) does the precise upper trim on write. The 2000
        # floor (not the start) is what bounds row count under per_page=20000 (~266 rows/yr → the
        # single-call limit is reached ~year 2075, the only real ceiling here).
        date: "2000:2100"
        per_page: "20000"  # Get all data in one request (API supports up to ~20k)
      response:
        format: json
        dataPath: "[1]"  # World Bank API returns [metadata, data_array]
      rateLimit:
        requestsPerSecond: 2.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true
      # Response partitioning: filter response rows by year range
      # Note: country_code is NOT a partition column - it's a regular column with stats
      responsePartitioning:
        fields:
          year: "date"  # Used for year filtering only
        # Fixed floor (not the run-mode start year): a bulk-replace table keeps the full
        # history every run; the upper bound tracks the current year.
        yearFilter:
          field: "date"
          start: 2000
          end: current

    # Materialization configuration
    # Partition by coarse dimensions only - country_code uses column statistics for pruning
    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: "type=indicators/frequency=*/year=*/"
      partition:
        columns: [type, frequency, year]  # NO country_code - avoids small file problem
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        targetFileSizeBytes: 134217728  # 128MB target for optimal read performance
        batchPartitionColumns: [year]
        # Bulk table: each run overwrites the year partitions wholesale (replace, not append).
        overwritePartitions: true
        runMaintenance: true
        snapshotRetentionDays: 7
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

  # --- FRED INDICATORS ---
  - name: fred_indicators
    pattern: "type=fred_indicators/series=*/year=*/fred_indicators.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR
        - name: series
          type: VARCHAR
        - name: year
          type: INTEGER
    comment: >
      Federal Reserve Economic Data (FRED) time series raw observations. For metadata (series name, units, frequency, etc.), JOIN with reference_fred_series or use fred_indicators_enriched view.
    columns:
      - name: series
        type: string
        nullable: true
        comment: FRED series identifier (foreign key to reference_fred_series)
      - *date_column
      - name: value
        type: double
        nullable: true
        comment: Observed value for this date

    # API Configuration
    download:
      enabled: true
      method: GET
      baseUrl: "https://api.stlouisfed.org/fred/series/observations"
      authentication:
        type: query_param
        paramName: api_key
        envVar: FRED_API_KEY  # Set API key in environment
      queryParams:
        api_key:
          type: auth
        file_type:
          type: constant
          value: json
        observation_start:
          type: expression
          value: "startOfYear({year})"
        observation_end:
          type: expression
          value: "endOfYear({year})"
        limit:
          type: constant
          value: 100000
        offset:
          type: pagination
        series_id:
          type: iteration
          source: seriesList
      seriesList:  # Curated FRED series — covers all SQL view dependencies
        # Rates & monetary policy
        - "DFF"          # Federal funds rate (effective)
        - "FEDFUNDS"     # Federal funds target rate
        - "DGS2"         # 2-year Treasury yield
        - "DGS5"         # 5-year Treasury yield
        - "DGS10"        # 10-year Treasury yield
        - "DGS30"        # 30-year Treasury yield
        - "DGS3MO"       # 3-month Treasury yield
        - "T10Y2Y"       # 10Y-2Y yield spread
        - "T10YIE"       # 10-year breakeven inflation rate
        - "BAMLC0A0CM"   # Investment-grade corporate bond spread
        # Monetary aggregates & Fed balance sheet
        - "M1SL"         # M1 money supply
        - "M2SL"         # M2 money supply
        - "BOGMBASE"     # Monetary base
        - "WALCL"        # Fed balance sheet total assets
        # GDP & national accounts
        - "GDP"          # Nominal GDP
        - "GDPC1"        # Real GDP (chained 2017 dollars)
        # Employment & labor
        - "UNRATE"       # Unemployment rate
        - "U6RATE"       # Broad unemployment (U-6: underemployed + marginally attached)
        - "PAYEMS"       # Nonfarm payrolls
        - "CIVPART"      # Labor force participation rate (FRED id; was BLS LNS11300000 — invalid in FRED)
        - "ICSA"         # Initial jobless claims (weekly)
        - "CCSA"         # Continuing jobless claims
        - "AWHMAN"       # Average weekly hours: manufacturing
        # Inflation
        - "CPIAUCSL"     # CPI all items (seasonally adjusted)
        - "CPIAUCNS"     # CPI all items, not seasonally adjusted (FRED id; was BLS CUUR0000SA0 — invalid in FRED)
        - "CPILFESL"     # Core CPI ex food & energy, SA (FRED id; was BLS CUUR0000SA0L1E — invalid in FRED)
        - "WPUFD49207"   # PPI finished goods
        - "PCEPI"        # PCE price index (headline)
        - "PCEPILFE"     # Core PCE price index (Fed primary target)
        # Consumer spending & income
        - "PCE"          # Personal consumption expenditures
        - "PI"           # Personal income
        - "PSAVERT"      # Personal saving rate
        # Production & activity
        - "INDPRO"       # Industrial production index
        - "TCU"          # Capacity utilization
        - "RSXFS"        # Advance retail sales
        - "TOTBKCR"      # Total bank credit
        - "DRTSCILM"     # Loan officer survey: lending standards
        # Housing
        - "HOUST"        # Housing starts (total)
        - "HOUST1F"      # Housing starts (single-family)
        - "PERMIT"       # Building permits
        - "EXHOSLUSM495S" # Existing home sales
        - "CSUSHPISA"    # S&P/Case-Shiller national home price index
        - "MSPUS"        # Median sales price of houses sold
        - "RRVRUSQ156N"  # Rental vacancy rate
        - "MORTGAGE30US" # 30-year fixed mortgage rate
        # Energy & commodities
        - "DCOILWTICO"   # WTI crude oil price
        # International & FX
        - "DTWEXBGS"     # Trade-weighted US dollar index (broad)
        # Business cycle
        - "USREC"        # NBER recession indicator (1=recession, 0=expansion)
      rateLimit:  # API rate limiting
        minIntervalMs: 500  # Milliseconds between requests
        maxRetries: 5
        retryDelayMs: 5000
      pagination:
        enabled: true
        offsetParam: offset
        limitParam: limit
        maxPerRequest: 100000
      caching:
        usePattern: true
      response:
        format: json
        dataPath: "observations"
        missingValueIndicator: "."  # FRED uses "." to indicate missing values

    # HTTP Source configuration for EtlPipeline
    source:
      type: http
      url: "https://api.stlouisfed.org/fred/series/observations"
      method: GET
      parameters:
        api_key: "{env:FRED_API_KEY}"
        file_type: "json"
        series_id: "{series}"
        observation_start: "{year}-01-01"
        observation_end: "{year}-12-31"
        limit: "100000"
      response:
        format: json
        # NOTE: dataPath removed - FredResponseTransformer already extracts observations array
      rateLimit:
        requestsPerSecond: 2.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    # Custom hooks for FRED response handling
    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.econ.FredResponseTransformer"

    # Dimension definitions for ETL iteration
    dimensions:
      type:
        - fred_indicators
      series:
        # Rates & monetary policy
        - "DFF"
        - "FEDFUNDS"
        - "DGS2"
        - "DGS5"
        - "DGS10"
        - "DGS30"
        - "DGS3MO"
        - "T10Y2Y"
        - "T10YIE"
        - "BAMLC0A0CM"
        # Monetary aggregates & Fed balance sheet
        - "M1SL"
        - "M2SL"
        - "BOGMBASE"
        - "WALCL"
        # GDP & national accounts
        - "GDP"
        - "GDPC1"
        # Employment & labor
        - "UNRATE"
        - "U6RATE"
        - "PAYEMS"
        - "CIVPART"       # Labor force participation (FRED id; replaced invalid BLS LNS11300000).
                          # BLS CES0000000001/LNS14000000 dropped — PAYEMS/UNRATE are the FRED equivalents.
        - "ICSA"
        - "CCSA"
        - "AWHMAN"
        # Inflation
        - "CPIAUCSL"
        - "CPIAUCNS"      # CPI all items, not seasonally adjusted (FRED id; replaced invalid BLS CUUR0000SA0)
        - "CPILFESL"      # Core CPI ex food & energy, SA (FRED id; replaced invalid BLS CUUR0000SA0L1E)
        - "WPUFD49207"
        - "PCEPI"
        - "PCEPILFE"
        # Consumer spending & income
        - "PCE"
        - "PI"
        - "PSAVERT"
        # Production & activity
        - "INDPRO"
        - "TCU"
        - "RSXFS"
        - "TOTBKCR"
        - "DRTSCILM"
        # Housing
        - "HOUST"
        - "HOUST1F"
        - "PERMIT"
        - "EXHOSLUSM495S"
        - "CSUSHPISA"
        - "MSPUS"
        - "RRVRUSQ156N"
        - "MORTGAGE30US"
        # Sentiment
        - "UMCSENT"
        # Energy & commodities
        - "DCOILWTICO"
        # International & FX
        - "DTWEXBGS"
        # Business cycle
        - "USREC"
      year:
        type: yearRange
        start: "{env:GOVDATA_START_YEAR:2020}"
        end: current
        dataLag: 0
        releaseMonth: 2  # FRED data typically available within days

    # Materialization configuration
    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: "type=fred_indicators/series=*/year=*/"
      partition:
        columns: [type, series, year]
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        targetFileSizeBytes: 134217728  # 128MB target for optimal read performance
        batchPartitionColumns: [year]
        incrementalKeys: [year]
        runMaintenance: true
        snapshotRetentionDays: 7
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

  # --- NATIONAL ACCOUNTS ---
  - name: national_accounts
    pattern: "type=national_accounts/frequency=*/year=*/tablename=*/national_accounts.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR
        - name: frequency
          type: VARCHAR
        - name: year
          type: INTEGER
        - name: tablename
          type: VARCHAR
    comment: >
      National Income and Product Accounts (NIPA) data from BEA covering comprehensive economic statistics. Includes ALL NIPA tables across 8 sections: 1=Domestic Product & Income (GDP, national income), 2=Personal Income & Outlays (wages, consumer spending), 3=Government (receipts, expenditures), 4=Foreign Transactions (exports, imports), 5=Saving & Investment (capital formation), 6=Industry (sectoral data), 7=Supplemental (per capita, additional details), 8=Not Seasonally Adjusted. Tables dynamically discovered from BEA reference catalog.
    columns:
      # Source columns from NationalAccountsTransformer output (snake_case)
      - name: table_name
        type: string
        source: table_name
        nullable: true
        comment: BEA table identifier (e.g., 'T10101')
      - name: line_number_raw
        type: string
        source: line_number_raw
        nullable: true
        comment: Line number within the BEA table (raw string)
      - name: line_description
        type: string
        source: line_description
        nullable: true
        comment: Description of the GDP component
      - name: series_code
        type: string
        source: series_code
        nullable: true
        comment: BEA series code for this component
      - name: time_period
        type: string
        source: time_period
        nullable: true
        comment: BEA time period (e.g., '2023' for annual, '2023Q1' for quarterly)
      - name: data_value
        type: string
        source: data_value
        nullable: true
        comment: Raw data value from BEA API
      - name: cl_unit
        type: string
        source: cl_unit
        nullable: true
        comment: Units of measurement (e.g., 'Millions of Dollars')
      - name: unit_mult
        type: string
        source: unit_mult
        nullable: true
        comment: Unit multiplier
      - name: note_ref
        type: string
        source: note_ref
        nullable: true
        comment: Note reference
      # Computed columns derived from source columns
      - name: table_id
        expression: "table_name"
        comment: BEA table identifier for GDP components
      - name: line_number
        expression: "CAST(line_number_raw AS INTEGER)"
        comment: Line number within the BEA table
      - name: year
        expression: "CAST(SUBSTR(time_period, 1, 4) AS INTEGER)"
        comment: Year extracted from time period
      - name: value
        expression: "CASE WHEN data_value IN ('(NA)', '(D)', '(NM)', '---') THEN NULL ELSE CAST(REPLACE(data_value, ',', '') AS DOUBLE) END"
        comment: Component value in millions of dollars (NULL for unavailable data)
      - name: units
        expression: "cl_unit"
        comment: Units of measurement
      - name: frequency
        expression: "CASE WHEN time_period LIKE '%Q%' THEN 'Q' WHEN LENGTH(time_period) = 4 THEN 'A' ELSE NULL END"
        comment: Data frequency (A=Annual, Q=Quarterly)

    # API Configuration
    download:
      enabled: true
      method: GET
      baseUrl: "https://apps.bea.gov/api/data"
      authentication:
        type: query_param
        paramName: UserID
        envVar: BEA_API_KEY  # Set API key in environment
      queryParams:
        UserID:
          type: auth
        method:
          type: constant
          value: GetData
        datasetname:
          type: constant
          value: NIPA
        TableName:
          type: expression
          value: "{tablename}"
        Frequency:
          type: expression
          value: "{frequency}"
        Year:
          type: expression
          value: "{year}"
        ResultFormat:
          type: constant
          value: JSON
      response:
        format: json
        dataPath: "BEAAPI.Results.Data"
        errorPath: "BEAAPI.Results.Error"
      rateLimit:  # API rate limiting
        minIntervalMs: 500  # Milliseconds between requests
        maxRetries: 5
        retryDelayMs: 5000

    # HTTP Source configuration for EtlPipeline
    source:
      type: http
      url: "https://apps.bea.gov/api/data"
      method: GET
      parameters:
        UserID: "{env:BEA_API_KEY}"
        method: "GetData"
        DataSetName: "NIPA"
        TableName: "{tablename}"
        Frequency: "{frequency}"
        Year: "{effective_year}"
        ResultFormat: "JSON"
      response:
        format: json
        # Note: dataPath removed because responseTransformer already extracts the data
        errorPath: "BEAAPI.Results.Error"
      rateLimit:
        requestsPerSecond: 1.5
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    # Custom hooks for BEA response handling
    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.econ.NationalAccountsTransformer"

    # Dimension definitions for ETL iteration
    dimensions:
      type:
        - national_accounts
      frequency: *bea_frequencies  # Use anchor: A, Q
      year: *year_range_from_2020  # Use anchor for year range
      tablename:
        # Section 1: Domestic Product and Income (Core GDP)
        - T10101   # Percent Change From Preceding Period in Real GDP
        - T10105   # Gross Domestic Product
        - T10301   # Real Gross Domestic Product, Quantity Indexes
        - T10303   # Real Gross Domestic Product, Chained Dollars
        # Section 2: Personal Income and Outlays
        - T20100   # Personal Income and Its Disposition
        - T20200   # Personal Consumption Expenditures by Major Type
        # Section 3: Government
        - T30100   # Federal Government Current Receipts and Expenditures
        # Section 4: Foreign Transactions
        - T40100   # Foreign Transactions in GDP
        - T40205B  # Exports and Imports of Goods and Services

    # Materialization configuration
    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: "type=national_accounts/frequency=*/year=*/tablename=*/"
      partition:
        columns: [type, frequency, year, tablename]
        valueSource:
          year: effective_year
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        targetFileSizeBytes: 134217728  # 128MB target for optimal read performance
        batchPartitionColumns: [year]
        incrementalKeys: [year]
        runMaintenance: true
        snapshotRetentionDays: 7
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

  # --- STATE PERSONAL INCOME (BULK DOWNLOAD) ---
  # Efficient bulk download approach replacing 12,000+ API calls with single ~16MB download
  - name: state_personal_income
    pattern: "type=*/year=*/*.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR
        - name: year
          type: INTEGER
    comment: >
      State personal income from BEA Regional Economic Accounts (SAINC tables).
      Uses bulk download approach - single 16MB ZIP file contains all data since 1929.
      Much more efficient than per-year/geo/linecode API calls.

    # Simplified dimensions - no per-API-call iteration needed
    dimensions:
      type:
        - state_personal_income  # Static table type

    columns:
      - name: geo_fips
        type: string
        nullable: true
        comment: FIPS code for the geographic area (e.g., '01000' for Alabama)
      - name: geo_name
        type: string
        nullable: true
        comment: Name of the geographic area (state name)
      - name: region
        type: string
        nullable: true
        comment: Census region
      - name: table_name
        type: string
        nullable: true
        comment: BEA table identifier (e.g., SAINC1, SAINC30)
      - name: line_code
        type: string
        nullable: true
        comment: BEA line code for specific metric
      - name: industry_classification
        type: string
        nullable: true
        comment: Industry classification code
      - name: description
        type: string
        nullable: true
        comment: Description of the metric
      - name: unit
        type: string
        nullable: true
        comment: Unit of measurement
      - name: year
        type: integer
        nullable: true
        comment: Year (unpivoted from column headers)
      - name: data_value
        type: double
        nullable: true
        comment: Value for this year (unpivoted from wide format)


    # API Configuration - references bulk download
    download:
      bulkDownload: bea_sainc_bulk

    # Freshness: BEA republishes the static SAINC.zip on annual benchmark revisions.
    # A single HEAD probe of Last-Modified re-triggers ingest when the vintage changes;
    # without it, complete year-partitions stay frozen and miss BEA revisions.
    freshness:
      type: last_modified

    # HTTP Source configuration for bulk download
    source:
      type: http
      url: "https://apps.bea.gov/regional/zip/SAINC.zip"
      method: GET
      extractPattern: "*__ALL_AREAS_*.csv"  # Extract the ALL_AREAS CSV from ZIP
      response:
        format: csv
      # Wide-to-narrow transformation: years as columns -> Year + DataValue rows
      wideToNarrow:
        keyColumns: [GeoFIPS, GeoName, Region, TableName, LineCode, IndustryClassification, Description, Unit]
        valueColumnPattern: "^\\d{4}$"  # Match 4-digit year columns (1929-2024)
        keyColumnName: year
        valueColumnName: data_value
        skipValues: ["(NA)", "(D)", "(L)", "(NM)", ""]  # BEA notation for missing/suppressed data
        columnMapping:
          GeoFIPS: geo_fips
          GeoName: geo_name
          Region: region
          TableName: table_name
          LineCode: line_code
          IndustryClassification: industry_classification
          Description: description
          Unit: unit
      rateLimit:
        requestsPerSecond: 1.0
        maxRetries: 3
      rawCache:
        enabled: true

    # Materialization configuration
    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: "type=*/year=*/"
      partition:
        columns: [type, year]
      options:
        compression: snappy
        batchSize: 100000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        targetFileSizeBytes: 134217728
        batchPartitionColumns: [year]
        incrementalKeys: [year]
        runMaintenance: true
        snapshotRetentionDays: 7
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

