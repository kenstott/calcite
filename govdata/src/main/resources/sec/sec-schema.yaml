# ============================================================================
# Securities and Exchange Commission Schema (SEC)
# ============================================================================
# Data Sources:
#   - SEC EDGAR API - Company filings (10-K, 10-Q, 8-K, etc.)
#   - XBRL Documents - Structured financial data
#   - Form 3/4/5 - Insider trading transactions
#   - Stock Price APIs - Yahoo Finance, AlphaVantage
#
# Features:
#   - Document-based ETL with multi-table extraction
#   - XBRL parsing for financial line items and contexts
#   - MD&A text extraction from HTML filings
#   - Rate-limited SEC EDGAR compliance (10 req/sec)
#   - Supports both Iceberg and Parquet output formats
# ============================================================================

schemaName: "${SCHEMA_NAME:sec}"
dataLagYears: 0
materializeDirectory: "${GOVDATA_PARQUET_DIR}/source=sec"
refreshInterval: "PT1H"

comment: >
  Securities and Exchange Commission financial data including XBRL filings (10-K, 10-Q, 8-K),
  insider trading transactions, stock prices, and earnings transcripts. Enables financial
  analysis, regulatory compliance monitoring, and investment research across public companies.
  Uses document-based ETL to extract multiple tables from each SEC filing.

# ============================================================================
# COLUMN TEMPLATES
# ============================================================================

column_templates:

  # --- Filing Identification Columns ---

  cik_column: &cik_column
    name: cik
    type: string
    nullable: false
    comment: Central Index Key (unique SEC company identifier, 10 digits zero-padded)

  accession_number_column: &accession_number
    name: accession_number
    type: string
    nullable: false
    comment: SEC accession number (unique filing identifier, format 0000000000-00-000000)

  filing_date_column: &filing_date
    name: filing_date
    type: string
    nullable: false
    comment: Date the filing was submitted to SEC (ISO 8601 format)

  filing_type_column: &filing_type
    name: filing_type
    type: string
    nullable: false
    comment: Type of SEC filing (e.g., '10-K', '10-Q', '8-K', 'DEF 14A')

  # --- Period Columns ---

  period_start_column: &period_start
    name: period_start
    type: string
    nullable: true
    comment: Start date of the reporting period (ISO 8601 format)

  period_end_column: &period_end
    name: period_end
    type: string
    nullable: true
    comment: End date of the reporting period (ISO 8601 format)

  # --- XBRL Columns ---

  concept_column: &concept_column
    name: concept
    type: string
    nullable: false
    comment: XBRL concept name (e.g., 'us-gaap:Assets', 'dei:EntityRegistrantName')

  context_ref_column: &context_ref
    name: context_ref
    type: string
    nullable: false
    comment: Reference to context element defining the reporting period and entity

  unit_ref_column: &unit_ref
    name: unit_ref
    type: string
    nullable: true
    comment: Raw unit reference as reported in the source XBRL document

  unit_ref_normalized_column: &unit_ref_normalized
    name: unit_ref_normalized
    type: string
    nullable: true
    comment: Canonical unit (e.g. USD, shares, pure, usdPerShare); equals unit_ref when no normalization rule matches

  value_numeric_column: &value_numeric
    name: value_numeric
    type: double
    nullable: true
    comment: Best-effort numeric representation; not the original filing value

  value_numeric_method_column: &value_numeric_method
    name: value_numeric_method
    type: string
    nullable: true
    comment: Provenance of value_numeric — direct, heuristic, or null if no conversion possible

  # --- Text Columns ---

  paragraph_text_column: &paragraph_text
    name: paragraph_text
    type: string
    nullable: false
    comment: Full text content of the paragraph

  footnote_refs_column: &footnote_refs
    name: footnote_refs
    type: string
    nullable: true
    comment: Comma-separated list of footnote references

  # --- Partition Column Definitions ---

  partition_cik: &partition_cik
    name: cik
    type: VARCHAR

  partition_filing_type: &partition_filing_type
    name: filing_type
    type: VARCHAR

  partition_year: &partition_year
    name: year
    type: INTEGER

  partition_ticker: &partition_ticker
    name: ticker
    type: VARCHAR

  # --- Standard SEC Partition Set ---
  # Partition by year only for optimal 128MB file sizes.
  # CIK filtering uses Parquet/Iceberg statistics on sorted data.

  sec_partitions: &sec_partitions
    style: hive
    columnDefinitions:
      - *partition_year

  stock_partitions: &stock_partitions
    style: hive
    columnDefinitions:
      - *partition_year

# ============================================================================
# DIMENSION VALUES
# ============================================================================

dimension_values:

  # --- Filing Type Dimensions ---

  annual_filing_types: &annual_filing_types
    - "10-K"
    - "10-K/A"
    - "20-F"
    - "40-F"

  quarterly_filing_types: &quarterly_filing_types
    - "10-Q"
    - "10-Q/A"

  current_report_types: &current_report_types
    - "8-K"
    - "8-K/A"

  insider_filing_types: &insider_filing_types
    - "3"
    - "4"
    - "5"

  institutional_filing_types: &institutional_filing_types
    - "13F-HR"
    - "13F-HR/A"

  beneficial_ownership_types: &beneficial_ownership_types
    - "SC 13D"
    - "SC 13D/A"
    - "SC 13G"
    - "SC 13G/A"

  all_filing_types: &all_filing_types
    - "10-K"
    - "10-K/A"
    - "10-Q"
    - "10-Q/A"
    - "8-K"
    - "8-K/A"
    - "20-F"
    - "40-F"
    - "DEF 14A"
    - "S-1"
    - "S-3"
    - "424B2"
    - "424B5"
    - "3"
    - "4"
    - "5"
    - "13F-HR"
    - "13F-HR/A"
    - "SC 13D"
    - "SC 13D/A"
    - "SC 13G"
    - "SC 13G/A"

  # --- Year Range ---
  # SEC defaults to 2010 (vs global 2000) due to XBRL adoption timeline
  # Override: SEC_START_YEAR for SEC-only, GOVDATA_START_YEAR for all schemas
  # Fallback chain: SEC_START_YEAR -> GOVDATA_START_YEAR -> 2010

  year_range: &year_range
    type: yearRange
    start: "${SEC_START_YEAR:${GOVDATA_START_YEAR:2010}}"
    end: "${SEC_END_YEAR:${GOVDATA_END_YEAR:${CURRENT_YEAR}}}"

# ============================================================================
# DOCUMENT SOURCE CONFIGURATION
# ============================================================================
# SEC uses document-based ETL: download filing documents, then extract
# multiple tables from each document using XbrlToParquetConverter
# ============================================================================

document_source_defaults: &document_source_defaults
  type: document

  # SEC EDGAR metadata endpoint
  metadataUrl: "https://data.sec.gov/submissions/CIK{cik}.json"

  # Filing document URL pattern
  documentUrl: "https://www.sec.gov/Archives/edgar/data/{cik}/{accession}/{document}"

  # Rate limiting for SEC compliance (max 10 req/sec, we use 8)
  rateLimit:
    requestsPerSecond: 8
    retryOn: [429, 503]
    maxRetries: 5
    retryDelayMs: 5000

  # Required SEC headers
  headers:
    User-Agent: "Apache Calcite SEC Adapter (apache-calcite@apache.org)"
    Accept-Encoding: "gzip, deflate"

  # Response transformer for metadata
  responseTransformer: "org.apache.calcite.adapter.govdata.sec.EdgarResponseTransformer"

  # Document converter for XBRL/HTML to Parquet
  documentConverter: "org.apache.calcite.adapter.govdata.sec.XbrlToParquetConverter"

  # Cache configuration
  rawCache:
    enabled: true
    directory: "${GOVDATA_CACHE_DIR}/sec"
    manifestFile: "cache-manifest.json"

# ============================================================================
# MATERIALIZATION DEFAULTS
# ============================================================================

materialize_defaults: &materialize_defaults
  enabled: true
  format: "${MATERIALIZE_FORMAT:iceberg}"  # iceberg or parquet
  options:
    compression: snappy
    batchSize: 50000
    stagingMode: local

iceberg_defaults: &iceberg_defaults
  warehousePath: "${GOVDATA_PARQUET_DIR}/source=sec/SEC"
  catalogType: hadoop
  targetFileSizeBytes: 134217728  # 128MB
  runMaintenance: true
  snapshotRetentionDays: 7
  runCompaction: true
  compactionTargetFileSizeBytes: 134217728  # 128MB
  compactionMinFiles: 5

parquet_defaults: &parquet_defaults
  compression: snappy
  rowGroupSize: 134217728  # 128MB

# ============================================================================
# TABLES
# ============================================================================
# Note: Uses "partitionedTables" key as required by FileSchemaFactory for
# Hive-style partitioned tables with pattern-based file discovery.
# ============================================================================

partitionedTables:

  # ==========================================================================
  # FILING METADATA
  # ==========================================================================
  # Core reference table for all SEC filings
  # Extracted from submissions.json metadata endpoint
  # ==========================================================================

  - name: filing_metadata
    pattern: "year=*/*metadata*.parquet"
    partitions: *sec_partitions

    comment: >
      SEC filing metadata for all public company submissions. Forms include:
      10-K (annual report with audited financials), 10-Q (quarterly report),
      8-K (current report for material events like earnings, M&A, executive changes),
      DEF 14A (proxy statement for shareholder meetings), and Form 3/4/5 (insider trading).
      Use for: identifying available filings, filtering by company/date/type, joining to
      other SEC tables, and tracking filing history.

    columns:
      - *cik_column
      - *accession_number
      - *filing_type
      - *filing_date
      - name: year
        type: int
        nullable: false
        comment: Filing year for Iceberg partitioning
      - name: primary_document
        type: string
        nullable: true
        comment: Primary document filename in the filing
      - name: company_name
        type: string
        nullable: true
        comment: Legal name of the registrant company
      - name: period_of_report
        type: string
        nullable: true
        comment: Reporting period end date (ISO 8601 format)
      - name: acceptance_datetime
        type: string
        nullable: true
        comment: Date and time the filing was accepted by SEC
      - name: file_size
        type: long
        nullable: true
        comment: Total size of filing in bytes
      - name: fiscal_year
        type: int
        nullable: true
        comment: Fiscal year of the reporting period
      - name: state_of_incorporation
        type: string
        nullable: true
        comment: State or jurisdiction of incorporation
      - name: fiscal_year_end
        type: string
        nullable: true
        comment: Fiscal year end date (MMDD format)
      - name: business_address
        type: string
        nullable: true
        comment: Physical business address of the company
      - name: mailing_address
        type: string
        nullable: true
        comment: Mailing address for correspondence
      - name: phone
        type: string
        nullable: true
        comment: Company phone number
      - name: sic_code
        type: string
        nullable: true
        comment: Standard Industrial Classification code
      - name: irs_number
        type: string
        nullable: true
        comment: IRS Employer Identification Number (EIN)
      - name: ticker
        type: string
        nullable: true
        comment: Stock ticker symbol (if available)


    # Metadata is extracted from submissions.json API
    source:
      <<: *document_source_defaults
      extractionType: metadata

    # Skip standard ETL - tables are populated by DocumentETLProcessor
    # Custom hooks for SEC dimension resolution
    hooks:
      enabled: false
      dimensionResolver: "org.apache.calcite.adapter.govdata.sec.CikResolver"

    dimensions:
      cik:
        type: custom
        resolver: "org.apache.calcite.adapter.govdata.sec.CikResolver"
        # Default test CIKs - can be overridden via operand
        values:
          - "0000320193"   # Apple
          # - "0000070858"   # Bank of America - commented out for faster testing
          - "0000018230"   # Caterpillar
        properties:
          source: "${CIK_SOURCE:config}"  # config, sp500, russell2000, nasdaq100
      filing_type: *all_filing_types
      year: *year_range

    materialize:
      <<: *materialize_defaults
      rowBatchSize: 50000  # Prevent OOM on first run — each year can have hundreds of thousands of filings
      output:
        pattern: "year=*/"
      partition:
        columns: [year]
      iceberg:
        <<: *iceberg_defaults
        tableName: filing_metadata
        sortOrder: [cik, accession_number]
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ==========================================================================
  # FINANCIAL LINE ITEMS
  # ==========================================================================
  # XBRL facts extracted from 10-K, 10-Q filings
  # ==========================================================================

  - name: financial_line_items
    pattern: "year=*/*facts*.parquet"
    partitions: *sec_partitions
    hooks:
      enabled: false

    comment: >
      XBRL financial facts extracted from 10-K (annual) and 10-Q (quarterly) filings.
      Contains structured data for balance sheet, income statement, and cash flow items
      using standardized US-GAAP taxonomy (e.g., Assets, Revenue, NetIncome).
      Use for: financial ratio analysis, trend analysis across quarters/years, peer
      comparisons, screening for specific metrics, and building financial models.

    columns:
      - *cik_column
      - *accession_number
      - *filing_date
      - name: year
        type: int
        nullable: false
        comment: Filing year for Iceberg partitioning
      - *concept_column
      - *context_ref
      - *unit_ref
      - *unit_ref_normalized
      - name: value
        type: string
        nullable: true
        comment: Text value of the fact element
      - name: full_text
        type: string
        nullable: true
        comment: Full text content for TextBlock elements (narrative disclosures)
      - *value_numeric
      - *value_numeric_method
      - *period_start
      - *period_end
      - name: is_instant
        type: boolean
        nullable: false
        comment: Whether this is an instant-in-time fact (true) or duration fact (false)
      - *footnote_refs
      - name: element_id
        type: string
        nullable: false
        comment: Unique element identifier for linking to other elements
      - name: decimals
        type: int
        nullable: true
        comment: Decimal precision of the numeric value
      - name: scale
        type: int
        nullable: true
        comment: Scale factor applied to the value


    source:
      <<: *document_source_defaults
      extractionType: xbrl_facts
      documentTypes:
        - "*.xml"
        - "*_htm.xml"
        - "*.xbrl"

    dimensions:
      cik:
        type: inherited  # Inherited from filing_metadata
      filing_type:
        - "10-K"
        - "10-K/A"
        - "10-Q"
        - "10-Q/A"
        - "20-F"
      year: *year_range

    materialize:
      <<: *materialize_defaults
      rowBatchSize: 50000
      fileChunkSize: 5
      output:
        pattern: "year=*/"
      partition:
        columns: [year]
      iceberg:
        <<: *iceberg_defaults
        tableName: financial_line_items
        sortOrder: [cik, accession_number, concept]
        batchPartitionColumns: [year]

  # ==========================================================================
  # FILING CONTEXTS
  # ==========================================================================
  # XBRL context definitions for reporting periods and dimensions
  # ==========================================================================

  - name: filing_contexts
    enabled: true
    pattern: "year=*/*contexts*.parquet"
    partitions: *sec_partitions
    hooks:
      enabled: false

    comment: >
      XBRL context definitions from 10-K and 10-Q filings that specify the reporting
      period and entity for each financial fact. Contexts define whether a value is
      a point-in-time snapshot (instant) or covers a duration (e.g., fiscal quarter).
      Use for: understanding the time period of financial data, segment-level analysis,
      and resolving dimensional breakdowns (e.g., revenue by geography or product line).

    columns:
      - *cik_column
      - *accession_number
      - *filing_date
      - name: year
        type: int
        nullable: false
        comment: Filing year for Iceberg partitioning
      - name: context_id
        type: string
        nullable: false
        comment: Unique identifier for this context element
      - name: entity_identifier
        type: string
        nullable: false
        comment: Entity identifier (typically CIK number)
      - name: entity_scheme
        type: string
        nullable: true
        comment: Entity identifier scheme (e.g., 'http://www.sec.gov/CIK')
      - *period_start
      - *period_end
      - name: period_instant
        type: string
        nullable: true
        comment: Instant date for point-in-time facts (ISO 8601 format)
      - name: segment
        type: string
        nullable: true
        comment: Segment dimension information (XML fragment)
      - name: scenario
        type: string
        nullable: true
        comment: Scenario dimension information (XML fragment)


    source:
      <<: *document_source_defaults
      extractionType: xbrl_contexts

    dimensions:
      cik:
        type: inherited
      filing_type:
        - "10-K"
        - "10-K/A"
        - "10-Q"
        - "10-Q/A"
      year: *year_range

    materialize:
      <<: *materialize_defaults
      rowBatchSize: 50000
      fileChunkSize: 5
      output:
        pattern: "year=*/"
      partition:
        columns: [year]
      iceberg:
        <<: *iceberg_defaults
        tableName: filing_contexts
        sortOrder: [cik, accession_number, context_id]
        batchPartitionColumns: [year]

  # ==========================================================================
  # MD&A SECTIONS
  # ==========================================================================
  # Management Discussion & Analysis text extracted from HTML filings
  # ==========================================================================

  - name: mda_sections
    pattern: "year=*/*mda*.parquet"
    partitions: *sec_partitions
    hooks:
      enabled: false

    comment: >
      Management Discussion & Analysis (MD&A) text from 10-K (Item 7) and 10-Q (Item 2)
      filings. MD&A is a required narrative section where management explains the
      company's financial condition, results of operations, and known risks/uncertainties.
      Use for: sentiment analysis, risk factor monitoring, NLP-based insights, comparing
      management tone across periods, and identifying forward-looking statements.

    columns:
      - *cik_column
      - *accession_number
      - *filing_date
      - name: year
        type: int
        nullable: false
        comment: Filing year for Iceberg partitioning
      - name: section
        type: string
        nullable: false
        comment: Item section identifier (e.g., 'Item 7', 'Item 7A')
      - name: subsection
        type: string
        nullable: true
        comment: Immediate heading enclosing this chunk (null when no heading context)
      - name: section_path
        type: string
        nullable: true
        comment: Full heading breadcrumb as ' > '-delimited string for cluster analysis
      - name: paragraph_continuation
        type: boolean
        nullable: true
        comment: True when this chunk is a continuation of an oversized split element
      - name: paragraph_number
        type: int
        nullable: false
        comment: Sequential paragraph number within the subsection
      - *paragraph_text
      - *footnote_refs


    source:
      <<: *document_source_defaults
      extractionType: mda_text
      documentTypes:
        - "*.htm"
        - "*.html"
      extractionStrategies:
        - regex_item7
        - direct_search
        - html_element_specific
        - aggressive_fallback

    dimensions:
      cik:
        type: inherited
      filing_type:
        - "10-K"
        - "10-K/A"
        - "10-Q"
        - "10-Q/A"
        - "8-K"
        - "8-K/A"
      year: *year_range

    materialize:
      <<: *materialize_defaults
      rowBatchSize: 10000
      output:
        pattern: "year=*/"
      partition:
        columns: [year]
      iceberg:
        <<: *iceberg_defaults
        tableName: mda_sections
        sortOrder: [cik, accession_number, section, paragraph_number]
        batchPartitionColumns: [year]

  # ==========================================================================
  # XBRL RELATIONSHIPS
  # ==========================================================================
  # Calculation and presentation linkbase relationships
  # ==========================================================================

  - name: xbrl_relationships
    pattern: "year=*/*relationships*.parquet"
    partitions: *sec_partitions
    hooks:
      enabled: false

    comment: >
      XBRL linkbase relationships from 10-K and 10-Q filings showing how financial
      concepts connect (e.g., Assets = CurrentAssets + NoncurrentAssets). Includes
      calculation links (mathematical rollups) and presentation links (display order).
      Use for: validating financial statement math, reconstructing statement hierarchy,
      understanding concept relationships, and building automated financial models.

    columns:
      - *cik_column
      - *accession_number
      - *filing_date
      - name: year
        type: int
        nullable: false
        comment: Filing year for Iceberg partitioning
      - name: linkbase_type
        type: string
        nullable: false
        comment: Type of linkbase relationship (presentation, calculation, definition)
      - name: arc_role
        type: string
        nullable: false
        comment: Arc role defining relationship type (e.g., parent-child, summation-item)
      - name: link_role
        type: string
        nullable: true
        comment: Role URI of the extended link element containing this arc (e.g., presentation role URL)
      - name: from_concept
        type: string
        nullable: false
        comment: Source concept in the relationship
      - name: to_concept
        type: string
        nullable: false
        comment: Target concept in the relationship
      - name: weight
        type: double
        nullable: true
        comment: Calculation weight (+1 for addition, -1 for subtraction)
      - name: "order"
        type: double
        nullable: true
        comment: Presentation order for display sequencing
      - name: preferred_label
        type: string
        nullable: true
        comment: Preferred label role for presentation


    source:
      <<: *document_source_defaults
      extractionType: xbrl_linkbases
      documentTypes:
        - "*_cal.xml"
        - "*_pre.xml"
        - "*_def.xml"

    dimensions:
      cik:
        type: inherited
      filing_type:
        - "10-K"
        - "10-K/A"
        - "10-Q"
        - "10-Q/A"
      year: *year_range

    materialize:
      <<: *materialize_defaults
      rowBatchSize: 50000
      fileChunkSize: 5
      output:
        pattern: "year=*/"
      partition:
        columns: [year]
      iceberg:
        <<: *iceberg_defaults
        tableName: xbrl_relationships
        sortOrder: [cik, accession_number, linkbase_type, from_concept]
        batchPartitionColumns: [year]

  # ==========================================================================
  # INSIDER TRANSACTIONS
  # ==========================================================================
  # Form 3/4/5 insider trading data
  # ==========================================================================

  - name: insider_transactions
    pattern: "year=*/*insider*.parquet"
    partitions: *sec_partitions
    hooks:
      enabled: false

    comment: >
      Insider trading transactions from Form 3 (initial ownership), Form 4 (changes in
      ownership within 2 days), and Form 5 (annual summary). Required filings by company
      officers, directors, and 10%+ shareholders showing their buy/sell activity.
      Use for: tracking insider sentiment, identifying unusual trading patterns, corporate
      governance analysis, and generating buy/sell signals based on insider activity.

    columns:
      - *cik_column
      - *accession_number
      - *filing_date
      - name: year
        type: int
        nullable: false
        comment: Filing year for Iceberg partitioning
      - *filing_type
      - name: reporting_person_cik
        type: string
        nullable: false
        comment: CIK of the reporting insider
      - name: reporting_person_name
        type: string
        nullable: false
        comment: Name of the reporting insider
      - name: is_director
        type: boolean
        nullable: false
        comment: Whether the insider is a director
      - name: is_officer
        type: boolean
        nullable: false
        comment: Whether the insider is an officer
      - name: is_ten_percent_owner
        type: boolean
        nullable: false
        comment: Whether the insider owns 10% or more of the company
      - name: officer_title
        type: string
        nullable: true
        comment: Title of the officer (if applicable)
      - name: transaction_date
        type: string
        nullable: true
        comment: Date of the transaction (ISO 8601 format) - null for holdings
      - name: transaction_code
        type: string
        nullable: true
        comment: Transaction code (P=purchase, S=sale, A=award, H=holding, I=initial appointment with no securities)
      - name: security_title
        type: string
        nullable: true
        comment: Title of the security transacted
      - name: shares_transacted
        type: double
        nullable: true
        comment: Number of shares bought or sold (null for holdings)
      - name: price_per_share
        type: double
        nullable: true
        comment: Price per share in the transaction
      - name: shares_owned_after
        type: double
        nullable: true
        comment: Shares beneficially owned after the transaction
      - name: acquired_disposed_code
        type: string
        nullable: true
        comment: Whether shares were acquired (A) or disposed (D) - null for holdings
      - name: ownership_type
        type: string
        nullable: true
        comment: Type of ownership (direct or indirect)
      - name: footnotes
        type: string
        nullable: true
        comment: Additional footnotes and explanations


    source:
      <<: *document_source_defaults
      extractionType: insider_html_tables
      documentTypes:
        - "*.xml"  # Form 4 XML format
        - "*.html"

    dimensions:
      cik:
        type: inherited
      filing_type: *insider_filing_types
      year: *year_range

    materialize:
      <<: *materialize_defaults
      rowBatchSize: 25000
      output:
        pattern: "year=*/"
      partition:
        columns: [year]
      iceberg:
        <<: *iceberg_defaults
        tableName: insider_transactions
        sortOrder: [cik, transaction_date, reporting_person_cik]
        batchPartitionColumns: [year]

  # ==========================================================================
  # INSTITUTIONAL HOLDINGS (13F)
  # ==========================================================================
  # Form 13F-HR quarterly holdings from institutional investment managers
  # ==========================================================================

  - name: institutional_holdings
    pattern: "year=*/*13f*.parquet"
    partitions: *sec_partitions
    hooks:
      enabled: false

    comment: >
      Institutional investment manager holdings from Form 13F-HR. Filed quarterly
      by managers with $100M+ in qualifying assets. Contains per-security positions
      with share counts, market value, and voting authority. Known as "whale watching"
      data — tracks positions of Berkshire Hathaway, Bridgewater, Renaissance, etc.
      Use for: tracking institutional ownership changes, identifying crowded trades,
      monitoring activist accumulation, and building factor models.

    columns:
      - *cik_column
      - *accession_number
      - *filing_date
      - name: year
        type: int
        nullable: false
        comment: Filing year for Iceberg partitioning
      - *filing_type
      - name: manager_name
        type: string
        nullable: true
        comment: Name of the filing investment manager
      - name: manager_cik
        type: string
        nullable: true
        comment: CIK of the filing investment manager
      - name: report_period
        type: date
        nullable: true
        comment: Calendar quarter end date for the report (ISO 8601)
      - name: issuer_name
        type: string
        nullable: true
        comment: Name of the security issuer (company name)
        source: nameOfIssuer
      - name: title_of_class
        type: string
        nullable: true
        comment: Title/class of the security (e.g., COM, CL A, PFD)
        source: titleOfClass
      - name: cusip
        type: string
        nullable: true
        comment: CUSIP identifier (9-character)
      - name: value_thousands
        type: double
        nullable: true
        comment: Market value in thousands of USD
      - name: shares_or_principal
        type: double
        nullable: true
        comment: Number of shares or principal amount
        source: sshPrnamt
      - name: shares_or_principal_type
        type: string
        nullable: true
        comment: SH for shares, PRN for principal amount
        source: sshPrnamtType
      - name: investment_discretion
        type: string
        nullable: true
        comment: Investment discretion (SOLE, DFND, OTR)
        source: investmentDiscretion
      - name: voting_authority_sole
        type: double
        nullable: true
        comment: Shares with sole voting authority
      - name: voting_authority_shared
        type: double
        nullable: true
        comment: Shares with shared voting authority
      - name: voting_authority_none
        type: double
        nullable: true
        comment: Shares with no voting authority
      - name: put_call
        type: string
        nullable: true
        comment: Put or Call indicator for options (null for common stock)

    source:
      <<: *document_source_defaults
      extractionType: form_13f_xml
      documentTypes:
        - "*.xml"

    dimensions:
      cik:
        type: inherited
      filing_type: *institutional_filing_types
      year: *year_range

    materialize:
      <<: *materialize_defaults
      rowBatchSize: 25000
      output:
        pattern: "year=*/"
      partition:
        columns: [year]
      iceberg:
        <<: *iceberg_defaults
        tableName: institutional_holdings
        sortOrder: [cik, report_period, cusip]
        batchPartitionColumns: [year]

  # ==========================================================================
  # BENEFICIAL OWNERSHIP (13D/G)
  # ==========================================================================
  # Schedule 13D/G beneficial ownership filings (>5% holders)
  # ==========================================================================

  - name: beneficial_ownership
    pattern: "year=*/*13dg*.parquet"
    partitions: *sec_partitions
    hooks:
      enabled: false

    comment: >
      Beneficial ownership filings from Schedule 13D (activist >5% holders) and
      Schedule 13G (passive >5% holders). Discloses who owns large stakes, how many
      shares, percent of class, source of funds, and critically — the purpose of the
      transaction (Item 4). 13D filers may push for M&A, board changes, or restructuring.
      Use for: tracking activist campaigns, monitoring ownership concentration, detecting
      accumulation patterns, and governance risk analysis.

    columns:
      - *cik_column
      - *accession_number
      - *filing_date
      - name: year
        type: int
        nullable: false
        comment: Filing year for Iceberg partitioning
      - *filing_type
      - name: subject_company
        type: string
        nullable: true
        comment: Name of the company whose shares are held
      - name: subject_cik
        type: string
        nullable: true
        comment: CIK of the subject company
      - name: filer_name
        type: string
        nullable: true
        comment: Name of the beneficial owner filing the schedule
      - name: filer_cik
        type: string
        nullable: true
        comment: CIK of the beneficial owner
      - name: date_of_event
        type: string
        nullable: true
        comment: Date of event requiring filing (ISO 8601)
      - name: title_of_class
        type: string
        nullable: true
        comment: Title/class of securities (e.g., Common Stock)
      - name: cusip
        type: string
        nullable: true
        comment: CUSIP identifier of the security
      - name: percent_of_class
        type: double
        nullable: true
        comment: Percent of class beneficially owned
      - name: shares_beneficially_owned
        type: double
        nullable: true
        comment: Number of shares beneficially owned
      - name: sole_voting_power
        type: double
        nullable: true
        comment: Shares with sole voting power
      - name: shared_voting_power
        type: double
        nullable: true
        comment: Shares with shared voting power
      - name: sole_dispositive_power
        type: double
        nullable: true
        comment: Shares with sole dispositive power
      - name: shared_dispositive_power
        type: double
        nullable: true
        comment: Shares with shared dispositive power
      - name: type_of_reporting_person
        type: string
        nullable: true
        comment: Type code (IN=individual, CO=corporation, IA=investment adviser, etc.)
      - name: source_of_funds
        type: string
        nullable: true
        comment: Source of funds (WC=working capital, BK=bank, OO=other)
      - name: purpose_of_transaction
        type: string
        nullable: true
        comment: Item 4 text describing intent (investment, activist, M&A, etc.)

    source:
      <<: *document_source_defaults
      extractionType: form_13dg_html
      documentTypes:
        - "*.htm"
        - "*.html"
        - "*.xml"

    dimensions:
      cik:
        type: inherited
      filing_type: *beneficial_ownership_types
      year: *year_range

    materialize:
      <<: *materialize_defaults
      rowBatchSize: 25000
      output:
        pattern: "year=*/"
      partition:
        columns: [year]
      iceberg:
        <<: *iceberg_defaults
        tableName: beneficial_ownership
        sortOrder: [subject_cik, filing_date, filer_cik]
        batchPartitionColumns: [year]

  # ==========================================================================
  # EARNINGS TRANSCRIPTS
  # ==========================================================================
  # 8-K earnings release sections
  # ==========================================================================

  - name: earnings_transcripts
    pattern: "year=*/*earnings*.parquet"
    partitions: *sec_partitions
    hooks:
      enabled: false

    comment: >
      Earnings-related content from 8-K filings (Item 2.02 - Results of Operations).
      8-K forms are "current reports" filed within 4 days of material events; Item 2.02
      covers earnings releases with quarterly results, guidance, and press release text.
      Use for: earnings surprise analysis, guidance tracking, management commentary on
      results, and correlating announcements with stock price movements.

    columns:
      - *cik_column
      - *accession_number
      - *filing_date
      - name: year
        type: int
        nullable: false
        comment: Filing year for Iceberg partitioning
      - *filing_type
      - name: exhibit_number
        type: string
        nullable: true
        comment: Exhibit number within the filing
      - name: section_type
        type: string
        nullable: false
        comment: Section type (prepared_remarks, qa_session)
      - name: paragraph_number
        type: int
        nullable: false
        comment: Sequential paragraph number
      - *paragraph_text
      - name: speaker_name
        type: string
        nullable: true
        comment: Name of the speaker (for Q&A sections)
      - name: speaker_role
        type: string
        nullable: true
        comment: Role/title of the speaker


    source:
      <<: *document_source_defaults
      extractionType: earnings_text
      documentTypes:
        - "*.htm"
        - "*.html"
      itemFilter: ["2.02"]  # Item 2.02 = Results of Operations

    dimensions:
      cik:
        type: inherited
      filing_type: *current_report_types
      year: *year_range

    materialize:
      <<: *materialize_defaults
      rowBatchSize: 5000
      output:
        pattern: "year=*/"
      partition:
        columns: [year]
      iceberg:
        <<: *iceberg_defaults
        tableName: earnings_transcripts
        sortOrder: [cik, accession_number, section_type, paragraph_number]
        batchPartitionColumns: [year]

  # ==========================================================================
  # STOCK PRICES
  # ==========================================================================
  # Daily OHLCV data from external price APIs
  # ==========================================================================

  - name: stock_prices
    enabled: false
    pattern: "stock_prices/year=*/*_prices.parquet"
    partitions: *stock_partitions
    hooks:
      enabled: false

    comment: >
      Daily stock price data (OHLCV) for SEC-reporting companies. Not from SEC filings
      but from market data providers (Yahoo Finance, AlphaVantage). Linked to SEC data
      via ticker symbol to enable correlation of filings with market reactions.
      Use for: event studies around filing dates, correlating insider trades with price
      moves, backtesting strategies, and calculating market-based metrics (beta, volatility).

    columns:
      - *cik_column
      - name: year
        type: int
        nullable: false
        comment: Trading year for Iceberg partitioning
      - name: ticker
        type: string
        nullable: false
        comment: Stock ticker symbol (e.g., 'AAPL', 'MSFT')
      - name: date
        type: string
        nullable: false
        comment: Trading date (ISO 8601 format)
      - name: open
        type: double
        nullable: false
        comment: Opening price for the trading day
      - name: high
        type: double
        nullable: false
        comment: Highest price during the trading day
      - name: low
        type: double
        nullable: false
        comment: Lowest price during the trading day
      - name: close
        type: double
        nullable: false
        comment: Closing price for the trading day
      - name: volume
        type: long
        nullable: false
        comment: Number of shares traded during the day
      - name: adjusted_close
        type: double
        nullable: true
        comment: Closing price adjusted for splits and dividends
      - name: split_coefficient
        type: double
        nullable: true
        comment: Stock split multiplier (1.0 if no split)
      - name: dividend
        type: double
        nullable: true
        comment: Dividend amount paid on this date (if any)


    # Stock prices use standard HTTP API source (not document)
    source:
      type: http
      url: "https://query1.finance.yahoo.com/v8/finance/chart/{ticker}"
      method: GET
      parameters:
        period1: "{start_timestamp}"
        period2: "{end_timestamp}"
        interval: "1d"
        events: "history,div,split"
      response:
        format: json
        dataPath: "chart.result[0]"
      rateLimit:
        requestsPerSecond: 2
        retryOn: [429, 503]
        maxRetries: 3
      responseTransformer: "org.apache.calcite.adapter.govdata.sec.YahooFinanceTransformer"

      # Fallback to AlphaVantage if Yahoo fails
      fallback:
        url: "https://www.alphavantage.co/query"
        parameters:
          function: "TIME_SERIES_DAILY_ADJUSTED"
          symbol: "{ticker}"
          outputsize: "full"
          apikey: "{env:ALPHAVANTAGE_API_KEY}"
        response:
          format: json
          dataPath: "Time Series (Daily)"
        responseTransformer: "org.apache.calcite.adapter.govdata.sec.AlphaVantageResponseTransformer"

    dimensions:
      ticker:
        type: derived
        sourceTable: filing_metadata
        sourceColumn: ticker
        filter: "ticker IS NOT NULL"
      year: *year_range

    materialize:
      <<: *materialize_defaults
      rowBatchSize: 100000
      output:
        pattern: "stock_prices/year=*/"
      partition:
        columns: [year]
      iceberg:
        <<: *iceberg_defaults
        tableName: stock_prices
        sortOrder: [ticker, date]
        batchPartitionColumns: [year]

  # ==========================================================================
  # VECTORIZED CHUNKS (Optional)
  # ==========================================================================
  # Semantic text chunks with Jina embeddings for similarity search
  # ==========================================================================

  - name: vectorized_chunks
    pattern: "year=*/*chunks*.parquet"
    partitions: *sec_partitions
    hooks:
      enabled: true
      postProcess:
        - name: gpu_embeddings
          script: "scripts/vss-gpu-runner.sh"
          args: ["--table", "vectorized_chunks", "--schema", "sec"]
          async: true
          onFailure: warn
    enabled: "${ENABLE_VECTORIZATION:true}"

    comment: >
      Semantic text chunks from 10-K and 10-Q filings with Jina embeddings.
      Text is chunked (SemanticTextChunker), enriched with context tags and
      cross-references (SecTextVectorizer), then normalized for temporal/monetary
      consistency (TextNormalizer). Embeddings computed via DuckDB quackformers.
      Use for: semantic similarity search, RAG Q&A, and topic clustering.

    columns:
      - *cik_column
      - *accession_number
      - name: year
        type: int
        nullable: false
        comment: Filing year for Iceberg partitioning
      - name: chunk_id
        type: string
        nullable: false
        comment: Unique identifier for this chunk
      - name: source_type
        type: string
        nullable: false
        comment: Origin type (mda_paragraph, footnote, risk_factor, earnings)
      - name: section
        type: string
        nullable: true
        comment: Parent section (e.g., 'Item 7', 'Note 1')
      - name: subsection
        type: string
        nullable: true
        comment: Heading immediately enclosing this chunk (e.g., 'Results of Operations')
      - name: section_path
        type: string
        nullable: true
        comment: Full heading breadcrumb as ' > '-delimited string for community/cluster analysis
      - name: paragraph_continuation
        type: boolean
        nullable: true
        comment: True when this chunk is a continuation piece of an oversized prose or atomic element
      - name: sequence
        type: int
        nullable: false
        comment: Order within parent section
      - *filing_date
      - name: chunk_text
        type: string
        nullable: false
        comment: Original text chunk before enrichment
      - name: enriched_text
        type: string
        nullable: false
        comment: >
          Normalized text with context tags, cross-references, and standardized
          temporal/monetary expressions. This is what gets embedded.
      # Embedding column - generated by GPU bulk processor after table materialization
      # See hooks.postProcess above for GPU bulk generation configuration
      - name: embedding
        type: array<double>
        nullable: true
        bulkGenerator: gpu_embeddings
        comment: 384-dim snowflake-arctic-embed-xs embedding via GPU bulk generation
      - name: content_type
        type: string
        nullable: true
        comment: Content classification (paragraph, table, list, heading, mixed)
      - name: financial_concepts
        type: string
        nullable: true
        comment: Comma-separated list of referenced financial concepts
      # Earnings-specific columns for linking back to earnings_transcripts
      - name: exhibit_number
        type: string
        nullable: true
        comment: Exhibit number within the filing (for earnings source_type)
      - name: speaker_name
        type: string
        nullable: true
        comment: Name of speaker for Q&A earnings sections
      - name: speaker_role
        type: string
        nullable: true
        comment: Role/title of speaker (CEO, CFO, Analyst, etc.)
      - name: paragraph_number
        type: int
        nullable: true
        comment: Original paragraph number in earnings_transcripts for traceability


    # Source is handled by DocumentETLProcessor + IcebergMaterializer, not standard ETL
    # Removing source section allows SchemaLifecycleProcessor to run hooks only

    dimensions:
      cik:
        type: inherited
      filing_type: *all_filing_types
      year: *year_range

    materialize:
      <<: *materialize_defaults
      rowBatchSize: 5000
      output:
        pattern: "year=*/"
      partition:
        columns: [year]
      iceberg:
        <<: *iceberg_defaults
        tableName: vectorized_chunks
        sortOrder: [cik, accession_number, chunk_id]
        batchPartitionColumns: [year]

# ============================================================================
# CONSTRAINTS
# ============================================================================
# Table constraints (metadata only - not enforced by database).
# Consolidated at schema level for consistency with census/econ schemas.
# Primary keys document unique row identifiers.
# Foreign keys document relationships to guide query optimization.
# ============================================================================

constraints:

  filing_metadata:
    primaryKey: [cik, accession_number]
    indexes:
      - [filing_date]
      - [company_name]
      - [ticker]
      - [sic_code]
      - [state_of_incorporation]
    foreignKeys:
      - columns: [state_of_incorporation]
        targetSchema: "${GEO_SCHEMA_NAME:GEO}"
        targetTable: states
        targetColumns: [state_abbr]
        comment: Links filing state of incorporation to geographic state data

  financial_line_items:
    primaryKey: [cik, accession_number, element_id]
    indexes:
      - [concept]
      - [period_end]
      - [value_numeric]
    foreignKeys:
      - columns: [cik, accession_number]
        targetTable: filing_metadata
        targetColumns: [cik, accession_number]
      - columns: [cik, accession_number, context_ref]
        targetTable: filing_contexts
        targetColumns: [cik, accession_number, context_id]
        comment: Context IDs are only unique within a filing, requires composite FK

  filing_contexts:
    primaryKey: [cik, accession_number, context_id]
    foreignKeys:
      - columns: [cik, accession_number]
        targetTable: filing_metadata
        targetColumns: [cik, accession_number]

  mda_sections:
    primaryKey: [cik, accession_number, section, paragraph_number]
    foreignKeys:
      - columns: [cik, accession_number]
        targetTable: filing_metadata
        targetColumns: [cik, accession_number]

  xbrl_relationships:
    primaryKey: [cik, accession_number, linkbase_type, from_concept, to_concept]
    foreignKeys:
      - columns: [cik, accession_number]
        targetTable: filing_metadata
        targetColumns: [cik, accession_number]

  insider_transactions:
    primaryKey: [cik, accession_number, reporting_person_cik, security_title, transaction_code]
    indexes:
      - [transaction_date]
      - [reporting_person_name]
      - [transaction_code]
    foreignKeys:
      - columns: [cik, accession_number]
        targetTable: filing_metadata
        targetColumns: [cik, accession_number]
        comment: Each Form 3/4/5 is a distinct filing with its own accession number

  earnings_transcripts:
    primaryKey: [cik, accession_number, section_type, paragraph_number]
    foreignKeys:
      - columns: [cik, accession_number]
        targetTable: filing_metadata
        targetColumns: [cik, accession_number]

  institutional_holdings:
    primaryKey: [cik, accession_number, cusip]
    indexes:
      - [report_period]
      - [issuer_name]
      - [cusip]
      - [manager_cik]
    foreignKeys:
      - columns: [cik, accession_number]
        targetTable: filing_metadata
        targetColumns: [cik, accession_number]

  beneficial_ownership:
    primaryKey: [cik, accession_number, filer_cik]
    indexes:
      - [subject_cik]
      - [filer_name]
      - [percent_of_class]
    foreignKeys:
      - columns: [cik, accession_number]
        targetTable: filing_metadata
        targetColumns: [cik, accession_number]

  stock_prices:
    primaryKey: [ticker, date]
    foreignKeys:
      - columns: [cik]
        targetTable: filing_metadata
        targetColumns: [cik]
      - columns: [ticker]
        targetSchema: "${REF_SCHEMA_NAME:ref}"
        targetTable: figi_instruments
        targetColumns: [ticker]
        comment: Links stock price series to OpenFIGI instrument identifier

  vectorized_chunks:
    primaryKey: [cik, accession_number, chunk_id]
    foreignKeys:
      - columns: [cik, accession_number]
        targetTable: filing_metadata
        targetColumns: [cik, accession_number]

# ============================================================================
# VIEWS
# ============================================================================
# Pre-defined views for common analytical queries
# ============================================================================

views:

  - name: latest_filings
    comment: Most recent filing of each type per company
    sql: >
      SELECT fm.* FROM filing_metadata fm
      INNER JOIN (
        SELECT cik, filing_type, MAX(filing_date) as max_date
        FROM filing_metadata
        GROUP BY cik, filing_type
      ) latest ON fm.cik = latest.cik
        AND fm.filing_type = latest.filing_type
        AND fm.filing_date = latest.max_date

  - name: revenue_trends
    comment: Revenue line items across quarters for trend analysis
    sql: >
      SELECT
        fm.company_name,
        fm.ticker,
        fli.period_end,
        fli.value_numeric as revenue
      FROM financial_line_items fli
      JOIN filing_metadata fm ON fli.cik = fm.cik AND fli.accession_number = fm.accession_number
      WHERE fli.concept LIKE '%Revenue%'
        AND fli.value_numeric IS NOT NULL
      ORDER BY fm.cik, fli.period_end

  - name: insider_activity_summary
    comment: Aggregated insider trading activity by company
    sql: >
      SELECT
        fm.company_name,
        fm.ticker,
        it.transaction_code,
        COUNT(*) as transaction_count,
        SUM(it.shares_transacted) as total_shares,
        AVG(it.price_per_share) as avg_price
      FROM insider_transactions it
      JOIN filing_metadata fm ON it.cik = fm.cik
      WHERE it.transaction_code IN ('P', 'S')
      GROUP BY fm.company_name, fm.ticker, it.transaction_code

  - name: company_financial_profile
    comment: >
      Denormalised company identity: SEC filing metadata joined to GLEIF CIK-LEI
      bridge and GLEIF entity registry. One row per company — enables CIK-to-LEI
      resolution and cross-border corporate entity analysis.
    sql: >
      SELECT
        fm.cik,
        fm.company_name,
        fm.ticker,
        fm.sic_code,
        fm.state_of_incorporation,
        fm.irs_number,
        gcm.lei,
        ge.legal_name,
        ge.jurisdiction,
        ge.headquarters_country,
        ge.headquarters_city,
        COUNT(DISTINCT fm.accession_number) AS total_filings,
        MAX(fm.filing_date)                 AS latest_filing_date
      FROM filing_metadata fm
      LEFT JOIN "ref"."gleif_cik_mapping" gcm ON fm.cik = gcm.cik
      LEFT JOIN "ref"."gleif_entities"    ge  ON gcm.lei = ge.lei
      GROUP BY fm.cik, fm.company_name, fm.ticker, fm.sic_code,
               fm.state_of_incorporation, fm.irs_number,
               gcm.lei, ge.legal_name, ge.jurisdiction,
               ge.headquarters_country, ge.headquarters_city
