# ============================================================================
# Cyber Vulnerability Schema — Iceberg Smoke Test
# ============================================================================
# Minimal schema for local Iceberg verification: kev_catalog + cwe_catalog only.
# Uses Hadoop catalog with local warehouse path.
# ============================================================================

schemaName: "${CYBER_VULN_SCHEMA_NAME:cyber_vuln}"
materializeDirectory: "${GOVDATA_PARQUET_DIR}"

comment: >
  Minimal cyber_vuln schema for Iceberg smoke testing (kev_catalog + cwe_catalog).

partitionedTables:

  - name: cwe_catalog
    pattern: "type=cwe_catalog"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR

    columns:
      - name: cwe_id
        type: string
        nullable: false
      - name: name
        type: string
        nullable: true
      - name: abstraction
        type: string
        nullable: true
      - name: structure
        type: string
        nullable: true
      - name: status
        type: string
        nullable: true
      - name: description
        type: string
        nullable: true
      - name: extended_description
        type: string
        nullable: true
      - name: parent_ids
        type: string
        nullable: true
      - name: cwe_url
        type: string
        nullable: true

    source:
      type: http
      url: "https://cwe.mitre.org/data/xml/cwec_latest.xml.zip"
      method: GET
      extractPattern: "*.xml"
      response:
        format: json
      rateLimit:
        requestsPerSecond: 0.5
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.cyber.vuln.CweResponseTransformer"

    dimensions:
      type:
        - cwe_catalog

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: false
        runCompaction: false

  - name: kev_catalog
    pattern: "type=kev_catalog"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR

    columns:
      - name: cve_id
        type: string
        nullable: false
      - name: vendor_project
        type: string
        nullable: true
      - name: product
        type: string
        nullable: true
      - name: vulnerability_name
        type: string
        nullable: true
      - name: date_added
        type: string
        nullable: true
      - name: short_description
        type: string
        nullable: true
      - name: required_action
        type: string
        nullable: true
      - name: due_date
        type: string
        nullable: true
      - name: known_ransomware_use
        type: string
        nullable: true
      - name: notes_urls
        type: string
        nullable: true
      - name: cwes
        type: string
        nullable: true
      - name: catalog_version
        type: string
        nullable: true

    source:
      type: http
      url: "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 1.0
        maxRetries: 3
      rawCache:
        enabled: false

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.cyber.vuln.CisaKevResponseTransformer"

    dimensions:
      type:
        - kev_catalog

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: false
        runCompaction: false

  # ==========================================================================
  # VULNERABILITIES — NVD CVE 2.0, 7-day window smoke test
  # ==========================================================================
  - name: vulnerabilities
    pattern: "type=vulnerabilities"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR

    columns:
      - name: cve_id
        type: string
        nullable: false
      - name: published
        type: string
        nullable: true
      - name: last_modified
        type: string
        nullable: true
      - name: vuln_status
        type: string
        nullable: true
      - name: description_en
        type: string
        nullable: true
      - name: cvss_v2_score
        type: double
        nullable: true
      - name: cvss_v2_vector
        type: string
        nullable: true
      - name: cvss_v31_score
        type: double
        nullable: true
      - name: cvss_v31_vector
        type: string
        nullable: true
      - name: cvss_v31_severity
        type: string
        nullable: true
      - name: cvss_v40_score
        type: double
        nullable: true
      - name: cwe_ids
        type: string
        nullable: true
      - name: source
        type: string
        nullable: true

    source:
      type: http
      url: "https://services.nvd.nist.gov/rest/json/cves/2.0"
      method: GET
      headers:
        apiKey: "${CYBER_NVD_API_KEY:}"
      parameters:
        lastModStartDate: "2026-04-30T00:00:00.000"
        lastModEndDate: "2026-04-30T23:59:59.999"
        resultsPerPage: "2000"
      response:
        format: json
      rateLimit:
        requestsPerSecond: 0.167
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.cyber.vuln.NvdResponseTransformer"

    dimensions:
      type:
        - vulnerabilities

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: false
        runCompaction: false

  # ==========================================================================
  # VULNERABILITY_CWES — NVD CVE→CWE junction, materialized at ingest
  # ==========================================================================
  - name: vulnerability_cwes
    pattern: "type=vulnerability_cwes"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR

    columns:
      - name: cve_id
        type: string
        nullable: false
      - name: cwe_id
        type: string
        nullable: false

    source:
      type: http
      url: "https://services.nvd.nist.gov/rest/json/cves/2.0"
      method: GET
      headers:
        apiKey: "${CYBER_NVD_API_KEY:}"
      parameters:
        lastModStartDate: "2026-04-30T00:00:00.000"
        lastModEndDate: "2026-04-30T23:59:59.999"
        resultsPerPage: "2000"
      response:
        format: json
      rateLimit:
        requestsPerSecond: 0.167
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.cyber.vuln.NvdVulnCwesResponseTransformer"

    dimensions:
      type:
        - vulnerability_cwes

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: false
        runCompaction: false

  # ==========================================================================
  # KEV_CWES — CISA KEV CVE→CWE junction, materialized at ingest
  # ==========================================================================
  - name: kev_cwes
    pattern: "type=kev_cwes"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR

    columns:
      - name: cve_id
        type: string
        nullable: false
      - name: cwe_id
        type: string
        nullable: false

    source:
      type: http
      url: "https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 1.0
        maxRetries: 3
      rawCache:
        enabled: false

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.cyber.vuln.CisaKevCwesResponseTransformer"

    dimensions:
      type:
        - kev_cwes

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: false
        runCompaction: false

# ============================================================================
# VIEWS
# ============================================================================

views:

  - name: kev_enriched
    comment: >
      KEV entries enriched with NVD vulnerability data via LEFT JOIN.
      Orphaned KEV entries (no matching NVD record) still appear with NULL NVD columns.
    sql: >
      SELECT k.cve_id, k.vendor_project, k.product, k.vulnerability_name,
             k.date_added, k.short_description, k.required_action, k.due_date,
             k.known_ransomware_use, k.notes_urls, k.cwes, k.catalog_version,
             v.published, v.last_modified, v.vuln_status, v.description_en,
             v.cvss_v2_score, v.cvss_v31_score, v.cvss_v31_severity, v.cvss_v40_score
      FROM kev_catalog k
      LEFT JOIN vulnerabilities v ON k.cve_id = v.cve_id

  - name: vuln_cwe_enriched
    comment: >
      Vulnerability-CWE junction enriched with CWE catalog details via LEFT JOIN.
      Unresolved CWE IDs still appear with NULL catalog columns.
    sql: >
      SELECT vc.cve_id, vc.cwe_id,
             c.name AS cwe_name, c.abstraction, c.status, c.description
      FROM vulnerability_cwes vc
      LEFT JOIN cwe_catalog c ON vc.cwe_id = c.cwe_id

  - name: kev_cwe_enriched
    comment: >
      KEV CWE references enriched with CWE catalog details via LEFT JOIN.
      Unresolved CWE IDs still appear with NULL catalog columns.
    sql: >
      SELECT kc.cve_id, kc.cwe_id,
             c.name AS cwe_name, c.abstraction, c.status, c.description
      FROM kev_cwes kc
      LEFT JOIN cwe_catalog c ON kc.cwe_id = c.cwe_id
