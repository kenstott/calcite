# ============================================================================
# Cyber Threat Schema (CYBER_THREAT)
# ============================================================================
# Threat intelligence, exploit data, IOC feeds, ATT&CK taxonomy, and
# standards/compliance mappings.
#
#   - attack_techniques, attack_tactics, etc.: no TTL (versioned releases)
#   - exploits: no TTL (append-only with date_published for windowing)
#   - nist_controls, cis_controls, owasp_top10: no TTL (version-pinned)
#
# Partition note: IOC tables partition by first_seen date for efficient pruning.
# ============================================================================

schemaName: "${CYBER_THREAT_SCHEMA_NAME:cyber_threat}"
materializeDirectory: "${GOVDATA_PARQUET_DIR}"

# OTX incremental fetch is now driven by the threat_pulses freshness watermark, not a fixed
# day window: type:version probes the max pulse `modified` (one page) and watermark_var
# (otxModifiedSince) feeds it back as modified_since on the next production-daily run. The
# write/fetch mode is keyed on cyber_threat.otxWriteMode (set by the launch script: "append"
# for production daily, "replace" for historical/DQ/cold). See the threat_pulses table below.

# OTX pull-cache TTL (days). OFF by default (0). Idempotence comes from threat_pulses'
# version watermark (skips the write when the max `modified` is unchanged, and bounds the fetch
# to pulses modified since the last run). This cache is a rarely-used opt-in escape hatch for
# when even the bounded re-pagination is too costly (e.g. heavy local testing): set >0 to reuse
# the assembled population for that many days. Read via ModelOperand cyber_threat.otxCacheTtlDays.
otxCacheTtlDays: "${CYBER_OTX_CACHE_TTL_DAYS:0}"

comment: >
  Cyber threat intelligence, exploit data, IOC feeds, MITRE ATT&CK taxonomy,
  and standards/compliance mappings. Part of the govdata cyber sub-domain.

# ============================================================================
# PARTITIONED TABLES
# ============================================================================

partitionedTables:

  # ==========================================================================
  # ATT&CK TECHNIQUES
  # ==========================================================================
  - name: attack_techniques
    releaseWindow:
      dow: [0]              # MITRE ATT&CK major releases April/October; Sunday catches all updates
    pattern: "type=attack_techniques.parquet"
    dataset_type: snapshot          # full STIX bundle replaced wholesale each release
    freshness:
      type: etag                    # GitHub-raw content-hash ETag; skip when the bundle is unchanged
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR

    comment: >
      MITRE ATT&CK technique and sub-technique records from STIX2 bundle.
      Technique ID is extracted from external_references where
      source_name == "mitre-attack". Sub-technique parent resolved via
      subtechnique-of relationship objects. Domain controlled by
      CYBER_ATTACK_DOMAIN env var (enterprise, ics, mobile).

    columns:
      - name: technique_id
        type: string
        nullable: false
        comment: ATT&CK technique ID (e.g., T1055.011)
      - name: stix_id
        type: string
        nullable: true
        comment: STIX2 object ID
      - name: name
        type: string
        nullable: true
        comment: Technique name
      - name: description
        type: string
        nullable: true
        comment: Technique description
      - name: tactic_short_names
        type: string
        nullable: true
        comment: Pipe-delimited tactic short names from kill_chain_phases
      - name: platforms
        type: string
        nullable: true
        comment: Pipe-delimited target platforms (x_mitre_platforms)
      - name: data_sources
        type: string
        nullable: true
        comment: Pipe-delimited data sources (x_mitre_data_sources)
      - name: is_subtechnique
        type: boolean
        nullable: true
        comment: True if this is a sub-technique (x_mitre_is_subtechnique)
      - name: parent_technique_id
        type: string
        nullable: true
        comment: Parent technique ID for sub-techniques (via subtechnique-of relationship)
      - name: domain
        type: string
        nullable: true
        comment: ATT&CK domain (enterprise-attack, ics-attack, mobile-attack)
      - name: detection
        type: string
        nullable: true
        comment: Detection guidance
      - name: mitre_version
        type: string
        nullable: true
        comment: ATT&CK version string (x_mitre_version)

    source:
      type: http
      url: "https://raw.githubusercontent.com/mitre-attack/attack-stix-data/master/enterprise-attack/enterprise-attack.json"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 0.5
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.cyber.threat.MitreAttackResponseTransformer"

    dimensions:
      type:
        - attack_techniques

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: true
        snapshotRetentionDays: 1
        runCompaction: true
        overwritePartitions: true   # snapshot: replace the type=<table> partition each run (idempotent)

  # ==========================================================================
  # IOC URLs — URLhaus malicious URL feed
  # ==========================================================================
  - name: ioc_urls
    pattern: "type=ioc_urls/first_seen=${first_seen}.parquet"
    dataset_type: snapshot          # full URLhaus dump re-fetched; overwrite replaces each first_seen partition
    # DQ sample cap (GOVDATA_DQ mode): the URLhaus full dump is hundreds of thousands of URLs;
    # cap the DQ sample so materialization stays fast. Cache-safe — the zip body is cached in
    # full during fetch (before the iterator), so the cap only trims rows written to Iceberg.
    dqRowLimit: 5000
    freshness:
      type: etag                    # abuse.ch content ETag; skip when the dump is unchanged
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR
        - name: first_seen
          type: VARCHAR

    comment: >
      URLhaus malicious URL indicators. Delivered as ZIP archive containing CSV;
      must decompress before parsing. Comment lines prefixed with #.
      Tags are comma-delimited. Partitioned by first_seen date for TTL pruning.

    columns:
      - name: url_id
        type: string
        nullable: true
        comment: URLhaus numeric ID
      - name: url
        type: string
        nullable: false
        comment: Malicious URL
      - name: url_status
        type: string
        nullable: true
        comment: URL status (online, offline)
      - name: date_added
        type: string
        nullable: true
        comment: Date added to URLhaus
      - name: last_online
        type: string
        nullable: true
        comment: Last time URL was observed online
      - name: threat
        type: string
        nullable: true
        comment: Threat classification
      - name: tags
        type: string
        nullable: true
        comment: Comma-delimited tags (as provided by URLhaus)
      - name: urlhaus_link
        type: string
        nullable: true
        comment: URLhaus entry page
      - name: reporter
        type: string
        nullable: true
        comment: Reporter handle
      - name: source
        type: string
        nullable: true
        comment: Feed source (urlhaus)
      - name: first_seen
        type: string
        nullable: true
        comment: Partition column (date of first observation, mapped from dateadded)

    source:
      type: http
      url: "https://urlhaus.abuse.ch/downloads/csv/"
      method: GET
      extractPattern: "*.txt"
      response:
        format: csv
        hasHeader: false
        columnNames: "id,dateadded,url,url_status,last_online,threat,tags,urlhaus_link,reporter"
      rowFilter:
        column: "id"
        pattern: "^[0-9]"
      rateLimit:
        requestsPerSecond: 0.5
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.cyber.threat.UrlhausResponseTransformer"

    dimensions:
      type:
        - ioc_urls

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type, first_seen]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: true
        snapshotRetentionDays: 1
        runCompaction: true
        overwritePartitions: true   # replace each first_seen partition present in the current feed

  # ==========================================================================
  # IOC HASHES — MalwareBazaar malware sample hashes
  # ==========================================================================
  - name: ioc_hashes
    pattern: "type=ioc_hashes/first_seen=${first_seen}.parquet"
    dataset_type: snapshot          # MalwareBazaar recent dump re-fetched; overwrite per first_seen partition
    freshness:
      type: etag                    # abuse.ch content ETag; skip when the dump is unchanged
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR
        - name: first_seen
          type: VARCHAR

    comment: >
      MalwareBazaar malware sample hashes. Plain CSV (no ZIP). Comment lines
      prefixed with #. vtpercent and imphash may be string "n/a" — coerce to null.
      Partitioned by first_seen date for TTL pruning.

    columns:
      - name: sha256
        type: string
        nullable: false
        comment: SHA-256 hash (transformer emits final column names; no source remap)
      - name: md5
        type: string
        nullable: true
        comment: MD5 hash
      - name: sha1
        type: string
        nullable: true
        comment: SHA-1 hash
      - name: first_seen_utc
        type: string
        nullable: true
        comment: First seen UTC timestamp
      - name: reporter
        type: string
        nullable: true
        comment: Reporter handle
      - name: file_name
        type: string
        nullable: true
        comment: Original file name
      - name: file_type
        type: string
        nullable: true
        comment: Detected file type
      - name: mime_type
        type: string
        nullable: true
        comment: MIME type
      - name: signature
        type: string
        nullable: true
        comment: Malware family signature
      - name: clamav
        type: string
        nullable: true
        comment: ClamAV detection name
      - name: vt_percent
        type: double
        nullable: true
        comment: VirusTotal detection percentage (null when n/a)
      - name: imphash
        type: string
        nullable: true
        comment: Import hash (null when n/a)
      - name: ssdeep
        type: string
        nullable: true
        comment: ssdeep fuzzy hash
      - name: tlsh
        type: string
        nullable: true
        comment: TLSH fuzzy hash
      - name: source
        type: string
        nullable: true
        comment: Feed source (malwarebazaar)
      - name: first_seen
        type: string
        nullable: true
        comment: Partition column (date of first observation)

    source:
      type: http
      url: "https://bazaar.abuse.ch/export/csv/recent/"
      method: GET
      response:
        format: csv
        hasHeader: false
        columnNames: "first_seen,sha256_hash,md5_hash,sha1_hash,reporter,file_name,file_type_guess,mime_type,signature,clamav,vtpercent,imphash,ssdeep,tlsh"
      rowFilter:
        column: "sha256_hash"
        pattern: "^[A-Fa-f0-9]"
      rateLimit:
        requestsPerSecond: 0.5
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.cyber.threat.MalwareBazaarResponseTransformer"

    dimensions:
      type:
        - ioc_hashes

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type, first_seen]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: true
        snapshotRetentionDays: 1
        runCompaction: true
        overwritePartitions: true   # replace each first_seen partition present in the current feed

  # ==========================================================================
  # IOC IPs — Feodo Tracker C2 IP blocklist
  # ==========================================================================
  - name: ioc_ips
    pattern: "type=ioc_ips/first_seen=${first_seen}.parquet"
    dataset_type: snapshot          # Feodo blocklist re-fetched; overwrite per first_seen partition
    freshness:
      type: etag                    # abuse.ch content ETag; skip when the blocklist is unchanged
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR
        - name: first_seen
          type: VARCHAR

    comment: >
      Feodo Tracker botnet C2 IP blocklist. JSON from /downloads/ipblocklist.json
      (not botnet_ip_blacklist.json). ~5 active entries typically.
      Partitioned by first_seen date for TTL pruning.

    columns:
      - name: ip_address
        type: string
        nullable: false
        comment: C2 IP address
      - name: port
        type: integer
        nullable: true
        comment: C2 port
      - name: status
        type: string
        nullable: true
        comment: Status (online, offline)
      - name: hostname
        type: string
        nullable: true
        comment: Resolved hostname
      - name: as_number
        type: integer
        nullable: true
        comment: Autonomous system number
      - name: as_name
        type: string
        nullable: true
        comment: Autonomous system name
      - name: country
        type: string
        nullable: true
        comment: Country code (ISO 3166-1 alpha-2)
      - name: first_seen
        type: string
        nullable: true
        comment: First observed date (partition column)
      - name: last_online
        type: string
        nullable: true
        comment: Last observed online date
      - name: malware_family
        type: string
        nullable: true
        comment: Associated malware family
      - name: source
        type: string
        nullable: true
        comment: Feed source (feodo)

    source:
      type: http
      url: "https://feodotracker.abuse.ch/downloads/ipblocklist.json"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 1.0
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.cyber.threat.FeodoResponseTransformer"

    dimensions:
      type:
        - ioc_ips

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type, first_seen]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: true
        snapshotRetentionDays: 1
        runCompaction: true
        overwritePartitions: true   # replace each first_seen partition present in the current feed

  # ==========================================================================
  # IOC MIXED — ThreatFox IOC feed (all indicator types)
  # ==========================================================================
  - name: ioc_mixed
    freshness:
      type: hash
    pattern: "type=ioc_mixed/first_seen=${first_seen}.parquet"
    dataset_type: snapshot          # ThreatFox POST API (no HEAD freshness); key-gated in CyberSchemaFactory
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR
        - name: first_seen
          type: VARCHAR

    comment: >
      ThreatFox IOC feed covering ip:port, domain, url, md5_hash, and sha256_hash
      indicator types. Auth-Key header is mandatory even for free tier; anonymous
      POST returns {"error":"Unauthorized"}. Partitioned by first_seen date for
      TTL pruning.

    columns:
      - name: ioc_id
        type: string
        nullable: true
        comment: ThreatFox IOC ID
      - name: ioc_value
        type: string
        nullable: false
        comment: IOC value (IP:port, domain, URL, or hash)
      - name: ioc_type
        type: string
        nullable: true
        comment: IOC type (ip:port, domain, url, md5_hash, sha256_hash)
      - name: threat_type
        type: string
        nullable: true
        comment: Threat type classification
      - name: malware_key
        type: string
        nullable: true
        comment: Malware identifier key
      - name: malware_printable
        type: string
        nullable: true
        comment: Human-readable malware name
      - name: malware_aliases
        type: string
        nullable: true
        comment: Pipe-delimited malware aliases
      - name: first_seen_utc
        type: string
        nullable: true
        comment: First seen UTC timestamp
      - name: last_seen_utc
        type: string
        nullable: true
        comment: Last seen UTC timestamp
      - name: confidence_level
        type: integer
        nullable: true
        comment: Confidence level (0-100)
      - name: is_compromised
        type: boolean
        nullable: true
        comment: True if indicator is a compromised legitimate asset
      - name: reference
        type: string
        nullable: true
        comment: Reference URL
      - name: tags
        type: string
        nullable: true
        comment: Pipe-delimited tags
      - name: reporter
        type: string
        nullable: true
        comment: Reporter handle
      - name: anonymous
        type: boolean
        nullable: true
        comment: True if submitted anonymously
      - name: source
        type: string
        nullable: true
        comment: Feed source (threatfox)
      - name: first_seen
        type: string
        nullable: true
        comment: Partition column (date of first observation)

    source:
      type: http
      url: "https://threatfox-api.abuse.ch/api/v1/"
      method: POST
      headers:
        Auth-Key: "${CYBER_THREATFOX_API_KEY:}"
        Content-Type: "application/json"
      body:
        query: "get_iocs"
        days: 1
      response:
        format: json
        dataPath: "data"
      rateLimit:
        requestsPerSecond: 0.5
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.cyber.threat.ThreatFoxResponseTransformer"

    dimensions:
      type:
        - ioc_mixed

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type, first_seen]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: true
        snapshotRetentionDays: 1
        runCompaction: true
        overwritePartitions: true   # replace each first_seen partition present in the current feed

  # ==========================================================================
  # NIST SP 800-53 Rev 5 Controls
  # ==========================================================================
  - name: nist_controls
    pattern: "type=nist_controls.parquet"
    dataset_type: snapshot
    freshness:
      type: etag                    # OSCAL catalog JSON; skip when the GitHub-raw ETag is unchanged
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR

    comment: >
      NIST SP 800-53 Rev 5 security controls. Sourced from the usnistgov/oscal-content
      GitHub repository in OSCAL JSON format. Includes both base controls and enhancements
      (e.g., AC-2(1)). Description assembled from statement/item parts recursively.

    columns:
      - name: control_id
        type: string
        nullable: false
        comment: Control identifier (e.g., AC-1, AC-2(1))
      - name: family_code
        type: string
        nullable: true
        comment: Two-letter family code (e.g., AC, SI)
      - name: family_name
        type: string
        nullable: true
        comment: Control family name (e.g., Access Control)
      - name: title
        type: string
        nullable: true
        comment: Control title
      - name: description
        type: string
        nullable: true
        comment: Assembled control statement prose (up to 4000 chars)
      - name: enhancement_of
        type: string
        nullable: true
        comment: Parent control_id for enhancements; null for base controls
      - name: framework
        type: string
        nullable: true
        comment: Framework name (NIST SP 800-53)
      - name: version
        type: string
        nullable: true
        comment: Framework version (Rev 5)
      - name: source
        type: string
        nullable: true
        comment: Data source identifier

    source:
      type: http
      url: "https://raw.githubusercontent.com/usnistgov/oscal-content/main/nist.gov/SP800-53/rev5/json/NIST_SP-800-53_rev5_catalog.json"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 0.5
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.cyber.threat.NistControlsResponseTransformer"

    dimensions:
      type:
        - nist_controls

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: true
        snapshotRetentionDays: 1
        runCompaction: true
        overwritePartitions: true   # snapshot: replace the type=<table> partition each run (idempotent)

  # ==========================================================================
  # NIST Cybersecurity Framework (CSF) 2.0
  # ==========================================================================
  - name: nist_csf_functions
    pattern: "type=nist_csf_functions.parquet"
    dataset_type: snapshot
    freshness:
      type: etag                    # OSCAL CSF catalog JSON; skip when the GitHub-raw ETag is unchanged
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR

    comment: >
      NIST CSF 2.0 subcategories. One row per subcategory (most granular level).
      3-level hierarchy: Function → Category → Subcategory.
      6 functions: GV (Govern), ID (Identify), PR (Protect), DE (Detect), RS (Respond), RC (Recover).

    columns:
      - name: function_id
        type: string
        nullable: false
        comment: Function code (GV, ID, PR, DE, RS, RC)
      - name: function_name
        type: string
        nullable: true
        comment: Function name (GOVERN, IDENTIFY, etc.)
      - name: category_id
        type: string
        nullable: true
        comment: Category identifier (e.g., GV.OC)
      - name: category_name
        type: string
        nullable: true
        comment: Category label
      - name: subcategory_id
        type: string
        nullable: false
        comment: Subcategory identifier (e.g., GV.OC-01)
      - name: subcategory_description
        type: string
        nullable: true
        comment: Subcategory statement prose
      - name: framework_version
        type: string
        nullable: true
        comment: CSF version (2.0)
      - name: source
        type: string
        nullable: true
        comment: Data source identifier

    source:
      type: http
      url: "https://raw.githubusercontent.com/usnistgov/oscal-content/main/nist.gov/CSF/v2.0/json/NIST_CSF_v2.0_catalog.json"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 0.5
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.cyber.threat.NistCsfResponseTransformer"

    dimensions:
      type:
        - nist_csf_functions

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: true
        snapshotRetentionDays: 1
        runCompaction: true
        overwritePartitions: true   # snapshot: replace the type=<table> partition each run (idempotent)

  # ==========================================================================
  # CIS Controls v8 Safeguards
  # ==========================================================================
  - name: cis_controls
    freshness:
      type: etag
    pattern: "type=cis_controls.parquet"
    dataset_type: snapshot          # no freshness: transformer self-fetches ~153 per-safeguard RST files
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR

    comment: >
      CIS Controls v8 safeguards from the CISecurity/ControlsAssessmentSpecification
      GitHub repository (RST format). 18 controls, ~153 safeguards. The transformer
      fetches individual RST files for each safeguard and parses title, description,
      asset type, security function, and implementation groups.

    columns:
      - name: control_id
        type: string
        nullable: false
        comment: CIS Control number (1-18)
      - name: control_title
        type: string
        nullable: true
        comment: CIS Control title
      - name: safeguard_id
        type: string
        nullable: false
        comment: Safeguard identifier (e.g., 1.1, 2.3)
      - name: title
        type: string
        nullable: true
        comment: Safeguard title
      - name: description
        type: string
        nullable: true
        comment: Safeguard description (up to 2000 chars)
      - name: asset_type
        type: string
        nullable: true
        comment: Asset type from implementation table (e.g., Devices, Applications)
      - name: security_function
        type: string
        nullable: true
        comment: Security function (Identify, Protect, Detect, Respond, Recover)
      - name: ig_group
        type: string
        nullable: true
        comment: Implementation groups string (e.g., 1, 2, 3 or 2, 3)
      - name: version
        type: string
        nullable: true
        comment: CIS Controls version (v8)
      - name: source
        type: string
        nullable: true
        comment: Data source identifier

    source:
      type: http
      url: "https://raw.githubusercontent.com/CISecurity/ControlsAssessmentSpecification/master/control-1/index.rst"
      method: GET
      response:
        format: text
      rateLimit:
        requestsPerSecond: 2.0
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.cyber.threat.CisControlsResponseTransformer"

    dimensions:
      type:
        - cis_controls

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: true
        snapshotRetentionDays: 1
        runCompaction: true
        overwritePartitions: true   # snapshot: replace the type=<table> partition each run (idempotent)

  # ==========================================================================
  # OWASP Top 10 (2021)
  # ==========================================================================
  - name: owasp_top10
    freshness:
      type: etag
    pattern: "type=owasp_top10.parquet"
    dataset_type: snapshot          # no freshness: transformer self-fetches 10 per-entry Markdown files
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR

    comment: >
      OWASP Top 10 2021 entries parsed from Markdown files in the OWASP/Top10 GitHub repo.
      No canonical JSON exists; 10 Markdown files are fetched and parsed by the transformer.

    columns:
      - name: entry_id
        type: string
        nullable: false
        comment: OWASP entry ID (e.g., A01:2021)
      - name: rank
        type: integer
        nullable: true
        comment: Rank (1-10)
      - name: name
        type: string
        nullable: true
        comment: Entry name (e.g., Broken Access Control)
      - name: overview
        type: string
        nullable: true
        comment: Overview section prose (up to 2000 chars)
      - name: cwe_ids
        type: string
        nullable: true
        comment: Pipe-delimited CWE IDs mentioned in the entry
      - name: year
        type: integer
        nullable: true
        comment: OWASP Top 10 year (2021)
      - name: source
        type: string
        nullable: true
        comment: Data source identifier

    source:
      type: http
      url: "https://raw.githubusercontent.com/OWASP/Top10/master/2021/docs/en/A01_2021-Broken_Access_Control.md"
      method: GET
      response:
        format: text
      rateLimit:
        requestsPerSecond: 2.0
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.cyber.threat.OwaspTop10ResponseTransformer"

    dimensions:
      type:
        - owasp_top10

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: true
        snapshotRetentionDays: 1
        runCompaction: true
        overwritePartitions: true   # snapshot: replace the type=<table> partition each run (idempotent)

  # ==========================================================================
  # ATT&CK → NIST 800-53 Mappings
  # ==========================================================================
  - name: attack_to_nist_mappings
    releaseWindow:
      dow: [0]              # Updated with each ATT&CK release (April/October); Sunday refresh
    pattern: "type=attack_to_nist_mappings.parquet"
    dataset_type: snapshot
    freshness:
      type: etag                    # single mapping JSON; skip when the GitHub-raw ETag is unchanged
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR

    comment: >
      MITRE ATT&CK to NIST SP 800-53 control mappings from the
      center-for-threat-informed-defense/mappings-explorer GitHub repository.
      ATT&CK v16.1 mapped to NIST 800-53 Rev 5 enterprise domain.
      Records with status=non_mappable are excluded.

    columns:
      - name: technique_id
        type: string
        nullable: false
        comment: ATT&CK technique ID (e.g., T1566, T1566.001)
      - name: attack_object_name
        type: string
        nullable: true
        comment: ATT&CK technique name
      - name: nist_control_id
        type: string
        nullable: false
        comment: NIST 800-53 control ID (e.g., CM-03)
      - name: capability_group
        type: string
        nullable: true
        comment: Control family code (e.g., CM, AC)
      - name: capability_description
        type: string
        nullable: true
        comment: Control name
      - name: mapping_type
        type: string
        nullable: true
        comment: Mapping relationship type (mitigates)
      - name: comments
        type: string
        nullable: true
        comment: Mapping rationale
      - name: status
        type: string
        nullable: true
        comment: Mapping status (complete)
      - name: source_version
        type: string
        nullable: true
        comment: ATT&CK and NIST versions used for mapping
      - name: source
        type: string
        nullable: true
        comment: Data source identifier

    source:
      type: http
      url: "https://raw.githubusercontent.com/center-for-threat-informed-defense/mappings-explorer/main/mappings/nist_800_53/attack-16.1/nist_800_53-rev5/enterprise/nist_800_53-rev5_attack-16.1-enterprise.json"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 0.5
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.cyber.threat.AttackToNistResponseTransformer"

    dimensions:
      type:
        - attack_to_nist_mappings

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: true
        snapshotRetentionDays: 1
        runCompaction: true
        overwritePartitions: true   # snapshot: replace the type=<table> partition each run (idempotent)

  # ==========================================================================
  # AlienVault OTX Threat Pulses
  # ==========================================================================
  - name: threat_pulses
    pattern: "type=threat_pulses/first_seen=${first_seen}.parquet"
    dataset_type: snapshot          # OTX cursor-paginated GET; freshness via the version probe below
    # Freshness = max pulse `modified`, read from a 1-row probe of the subscribed feed (which is
    # ordered modified-desc), so it costs a single page. The token gates the write (skip when the
    # max is unchanged) and, via watermark_var, is the daily delta bound: the next daily run fetches
    # only pulses modified since this max (see OtxResponseTransformer). Historical/cold runs full-load.
    freshness:
      type: version
      probe_url: "https://otx.alienvault.com/api/v1/pulses/subscribed?limit=1"
      version_field: "results[0].modified"
      watermark_var: otxModifiedSince
    # DQ sample cap (GOVDATA_DQ mode): OTX cursor-pages through all subscribed pulses (~8.6k);
    # the cap stops pagination early. Cache-safe — the paginated cache commits only on full
    # drain, so a capped run leaves the existing cache untouched.
    dqRowLimit: 2000
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR
        - name: first_seen
          type: VARCHAR

    comment: >
      AlienVault OTX subscribed-pulse threat intelligence. Requires CYBER_OTX_API_KEY
      environment variable (free registration at otx.alienvault.com). Cursor-based
      pagination via the "next" URL in the response envelope. Partitioned by first_seen
      (date portion of created) for TTL pruning.

    columns:
      - name: pulse_id
        type: string
        nullable: false
        comment: OTX pulse UUID
      - name: name
        type: string
        nullable: true
        comment: Pulse name
      - name: author
        type: string
        nullable: true
        comment: Author username
      - name: tags
        type: string
        nullable: true
        comment: Pipe-delimited tags
      - name: targeted_countries
        type: string
        nullable: true
        comment: Pipe-delimited ISO country codes
      - name: malware_families
        type: string
        nullable: true
        comment: Pipe-delimited malware family display names
      - name: attack_ids
        type: string
        nullable: true
        comment: Pipe-delimited ATT&CK technique IDs
      - name: ioc_count
        type: integer
        nullable: true
        comment: Number of IOC indicators in this pulse
      - name: created
        type: string
        nullable: true
        comment: Creation timestamp (ISO-8601)
      - name: modified
        type: string
        nullable: true
        comment: Last modified timestamp (ISO-8601)
      - name: tlp
        type: string
        nullable: true
        comment: Traffic Light Protocol classification
      - name: source
        type: string
        nullable: true
        comment: Feed source (otx)
      - name: first_seen
        type: string
        nullable: true
        comment: Partition column (date portion of created)

    source:
      type: http
      url: "https://otx.alienvault.com/api/v1/pulses/subscribed"
      method: GET
      headers:
        X-OTX-API-KEY: "${CYBER_OTX_API_KEY:}"
      response:
        format: json
        dataPath: "results"
      rateLimit:
        requestsPerSecond: 2.0
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.cyber.threat.OtxResponseTransformer"

    dimensions:
      type:
        - threat_pulses

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type, first_seen]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: true
        snapshotRetentionDays: 1
        runCompaction: true
        overwritePartitions: true   # default + historical/DQ: replace each first_seen partition
        # Production daily appends instead — accumulating pulse version history in each first_seen
        # partition (query the current view via max(modified) per pulse_id). otxWriteMode is set
        # by the launch script ("append" only for production daily; "replace" for historical, DQ
        # sample, and any run that omits it), so the write mirrors the transformer's fetch mode.
        appendWhenOperand: "cyber_threat.otxWriteMode"
        appendWhenValue: "append"

# ============================================================================
# CONSTRAINTS
# ============================================================================

constraints:

  attack_techniques:
    primaryKey: [type, technique_id]

  ioc_urls:
    primaryKey: [type, url, first_seen]

  ioc_hashes:
    primaryKey: [type, sha256, first_seen]

  ioc_ips:
    primaryKey: [type, ip_address, first_seen]
    foreignKeys:
      - columns: [country]
        targetSchema: "${REF_SCHEMA_NAME:ref}"
        targetTable: countries
        targetColumns: [iso_alpha2]
        comment: Links IOC IP geolocation country (ISO 3166-1 alpha-2) to ref.countries

  ioc_mixed:
    primaryKey: [type, ioc_value, first_seen]

  nist_controls:
    primaryKey: [type, control_id]

  nist_csf_functions:
    primaryKey: [type, subcategory_id]

  cis_controls:
    primaryKey: [type, safeguard_id]

  owasp_top10:
    primaryKey: [type, entry_id]

  attack_to_nist_mappings:
    primaryKey: [type, technique_id, nist_control_id]
    foreignKeys:
      - columns: [technique_id]
        targetTable: attack_techniques
        targetColumns: [technique_id]
        comment: Links each ATT&CK technique mapping to its technique definition
      - columns: [nist_control_id]
        targetTable: nist_controls
        targetColumns: [control_id]
        comment: Links each mapping to the NIST 800-53 control it satisfies

  threat_pulses:
    primaryKey: [type, pulse_id, first_seen]

# ============================================================================
# Views
# ============================================================================

views:

  - name: active_threat_intel
    comment: >
      Unified indicator-of-compromise view across IP, URL, and hash IOC tables.
      Normalises all three sources to a common schema for cross-indicator analysis.
    sql: >
      SELECT
        'ip'        AS ioc_type,
        ip_address  AS ioc_value,
        first_seen,
        country,
        malware_family AS threat,
        as_name        AS context
      FROM ioc_ips
      UNION ALL
      SELECT
        'url'   AS ioc_type,
        url     AS ioc_value,
        first_seen,
        NULL    AS country,
        threat,
        tags    AS context
      FROM ioc_urls
      UNION ALL
      SELECT
        'hash'     AS ioc_type,
        sha256     AS ioc_value,
        first_seen,
        NULL       AS country,
        signature  AS threat,
        file_type  AS context
      FROM ioc_hashes
