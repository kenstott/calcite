# ============================================================================
# U.S. Energy Data Schema (ENERGY)
# ============================================================================
# Data Sources:
#   - EIA API v2 (Energy Information Administration)
#       - Electricity generation, retail sales, state energy consumption
#       - Natural gas storage, petroleum stocks, refinery operations
#       - Fossil fuel (crude oil) production
#   - EIA Bulk Downloads (ZIP/XLSX)
#       - EIA-861 Annual Electric Power Industry Report (utility survey)
#       - EIA-860 Annual Electric Generator Report (power plants)
#       - EIA-860M Monthly Generator Inventory (capacity changes)
#   - EIA Petroleum Imports (EIA-814 monthly XLSX)
#   - MSHA Bulk Pipeline (pipe-delimited CSV ZIP)
#       - Coal mine production and demographics (MinesProdYearly)
#
# Features:
#   - Cross-references with geo.states via state_abbr
#   - Hive-style partitioning for efficient querying
#   - Rate-limited EIA API integration (10 req/sec)
#   - OFFSET pagination for EIA API v2 endpoints
#   - TEXT format for bulk XLSX/ZIP sources; transformers handle extraction
# ============================================================================

schemaName: "${SCHEMA_NAME:energy}"
materializeDirectory: "${ENERGY_PARQUET_DIR:${GOVDATA_PARQUET_DIR}/energy}"

comment: >
  Comprehensive U.S. energy data from the Energy Information Administration (EIA) and
  Mine Safety and Health Administration (MSHA). Covers electricity generation and retail
  prices, utility operations, power plant inventory, generator capacity changes, fossil
  fuel production, state energy consumption, natural gas storage, petroleum stocks, crude
  oil imports, refinery operations, and coal mine production. All state-level tables join
  with geo.states via state_abbr. EIA API tables use OFFSET pagination against v2 endpoints.
  Bulk tables (EIA-860, EIA-861, EIA-860M, EIA-814) use TEXT format with transformers that
  download, extract, and parse XLSX/ZIP archives.

# ============================================================================
# COLUMN TEMPLATES
# ============================================================================

column_templates:

  state_abbr_column: &state_abbr_column
    name: state_abbr
    type: string
    nullable: true
    comment: 2-letter state abbreviation (e.g., 'CA')

  state_description_column: &state_description_column
    name: state_description
    type: string
    nullable: true
    comment: Full state name

  partition_type: &partition_type
    name: type
    type: VARCHAR

  partition_year: &partition_year
    name: year
    type: INTEGER

  partition_month: &partition_month
    name: month
    type: VARCHAR

  standard_partitions: &standard_partitions
    style: hive
    columnDefinitions:
      - *partition_type
      - *partition_year

  # Sub-annual tables (EIA monthly + weekly series) partition by year+month so each
  # per-month fetch lands its own partition. overwritePartitions:true then replaces a
  # single month rather than the whole year. The framework keys a per-month completion
  # marker (year_NA_MM_...) off the canonical month dimension.
  standard_partitions_monthly: &standard_partitions_monthly
    style: hive
    columnDefinitions:
      - *partition_type
      - *partition_year
      - *partition_month

  eia_rate_limit: &eia_rate_limit
    requestsPerSecond: 10.0
    retryOn: [429, 503]
    maxRetries: 3

  raw_cache_enabled: &raw_cache_enabled
    enabled: true

  iceberg_common: &iceberg_common
    warehousePath: "${ENERGY_PARQUET_DIR:${GOVDATA_PARQUET_DIR}/energy}"
    catalogType: hadoop
    runCompaction: true
    compactionTargetFileSizeBytes: 134217728
    compactionMinFiles: 5

# ============================================================================
# DIMENSION VALUES
# ============================================================================

dimension_values:

  # Calendar months for sub-annual EIA series. The year range walks each (year, month);
  # zero-padded to match the EIA v2 YYYY-MM period format used in the URL. Descending so
  # the daily worker fetches the newest month of the current year first. Each (year, month)
  # is its own raw-cache entry and its own per-period completion marker.
  eia_months: &eia_months
    type: list
    values: ["01","02","03","04","05","06","07","08","09","10","11","12"]
    descending: true

  # Default EIA electricity generation year range (monthly data)
  eia_elec_gen_years: &eia_elec_gen_years
    type: yearRange
    start: "${GOVDATA_START_YEAR:2010}"
    end: current
    dataLag: 2

  # EIA retail sales year range
  eia_elec_price_years: &eia_elec_price_years
    type: yearRange
    start: "${GOVDATA_START_YEAR:2010}"
    end: current
    dataLag: 2

  # EIA-861 utility annual year range (2008+; pre-2008 XLSX format differs).
  # dataLag: 3 — the f861{effective_year}.zip archive only publishes through current-3
  # (in 2026 the newest real archive is f8612023.zip; 2024+ 301-redirect to an HTML
  # landing page). The URL templates {effective_year} to hit the available file.
  eia_utility_years: &eia_utility_years
    type: yearRange
    start: "${GOVDATA_START_YEAR:2010}"
    end: current
    dataLag: 3

  # EIA-860 power plant annual year range.
  # dataLag: 3 — the eia860{effective_year}.zip archive only publishes through
  # current-3 (e.g. in 2026 the newest real archive is eia8602023.zip; 2024+ 301-redirect
  # to an HTML landing page). The URL templates {effective_year} to hit the available file.
  eia_plant_years: &eia_plant_years
    type: yearRange
    start: "${GOVDATA_START_YEAR:2010}"
    end: current
    dataLag: 3

  # EIA-860M capacity changes year range (monthly snapshot files available from 2015).
  # dataLag: 1 — the december_generator{effective_year}.xlsx snapshot publishes through
  # current-1 (in 2026 the newest is december_generator2025.xlsx; 2026 still 301-redirects
  # to an HTML landing page). The URL templates {effective_year} to hit the available file.
  eia_capacity_years: &eia_capacity_years
    type: yearRange
    start: "${GOVDATA_START_YEAR:2010}"
    end: current
    dataLag: 1

  # EIA fossil fuel production (crude API) year range
  eia_fossil_years: &eia_fossil_years
    type: yearRange
    start: "${GOVDATA_START_YEAR:2010}"
    end: current
    dataLag: 2

  # EIA SEDS state energy consumption year range
  eia_seds_years: &eia_seds_years
    type: yearRange
    start: "${GOVDATA_START_YEAR:2010}"
    end: current
    dataLag: 2

  # EIA natural gas storage year range (weekly data available from 2000)
  eia_gas_storage_years: &eia_gas_storage_years
    type: yearRange
    start: "${GOVDATA_START_YEAR:2010}"
    end: current
    dataLag: 1

  # EIA petroleum stocks year range (weekly data).
  # dataLag: 0 — weekly stocks are published continuously and are current, so the
  # data year equals the iteration year (no publish lag); {year} == effective_year.
  eia_pet_stocks_years: &eia_pet_stocks_years
    type: yearRange
    start: "${GOVDATA_START_YEAR:2010}"
    end: current
    dataLag: 0

  # EIA crude oil imports year range (EIA-814 monthly XLSX)
  eia_crude_imp_years: &eia_crude_imp_years
    type: yearRange
    start: "${GOVDATA_START_YEAR:2010}"
    end: current
    dataLag: 2

  # EIA refinery operations year range
  eia_refinery_years: &eia_refinery_years
    type: yearRange
    start: "${GOVDATA_START_YEAR:2010}"
    end: current
    dataLag: 2

  # MSHA coal mines year range (MinesProdYearly contains all history; transformer filters by year)
  msha_coal_years: &msha_coal_years
    type: yearRange
    start: "${GOVDATA_START_YEAR:2010}"
    end: current
    dataLag: 1

# ============================================================================
# PARTITIONED TABLES
# ============================================================================

partitionedTables:

  # ---------------------------------------------------------------------------
  # EIA ELECTRICITY GENERATION - Monthly generation and fuel consumption by state
  # ---------------------------------------------------------------------------
  - name: eia_electricity_generation
    pattern: "type=eia_elec_gen/year=*/month=*/*.parquet"
    # DQ sample cap (GOVDATA_DQ mode): ~120k rows/year (state × source × sector × 12 months),
    # fetched per-year (backfill_period: annual) via ~24 paginated EIA API pages. Cap each
    # year's sample so DQ stops paginating early; prod loads everything.
    dqRowLimit: 25000
    partitions: *standard_partitions_monthly
    comment: >
      EIA API v2 electric power operational data. Monthly electricity generation
      (thousand MWh), total fuel consumption (MMBtu), fuel consumption for electricity
      generation (MMBtu), cost per MMBtu, sulfur content, and ash content. Broken down
      by state, energy source, and sector. One row per state + energy source + sector +
      year-month. Cross-references geo.states via state_abbr.

    dimensions:
      type:
        - eia_elec_gen
      year: *eia_elec_gen_years
      month: *eia_months

    columns:
      - name: generation_year
        type: integer
        nullable: false
        comment: Calendar year of the generation period
      - name: generation_month
        type: integer
        nullable: false
        comment: Calendar month (1-12) of the generation period
      - <<: *state_abbr_column
      - <<: *state_description_column
      - name: energy_source_code
        type: string
        nullable: true
        comment: EIA energy source code (e.g., 'COL', 'NG', 'NUC', 'SUN')
      - name: energy_source
        type: string
        nullable: true
        comment: Full energy source description
      - name: sector_code
        type: string
        nullable: true
        comment: EIA sector code (e.g., '1', '2', '98', '99')
      - name: sector
        type: string
        nullable: true
        comment: Sector description (e.g., 'Electric Utility', 'IPP Non-CHP')
      - name: generation_thousand_mwh
        type: double
        nullable: true
        comment: Net electricity generation in thousand MWh
      - name: fuel_consumed_total_mmbtu
        type: double
        nullable: true
        comment: Total fuel consumed in MMBtu (all purposes)
      - name: fuel_consumed_for_eg_mmbtu
        type: double
        nullable: true
        comment: Fuel consumed for electricity generation in MMBtu
      - name: fuel_cost_per_mmbtu
        type: double
        nullable: true
        comment: Fuel cost per MMBtu in dollars
      - name: sulfur_content
        type: double
        nullable: true
        comment: Sulfur content percentage of fuel
      - name: ash_content
        type: double
        nullable: true
        comment: Ash content percentage of fuel

    backfill_period: annual

    source:
      type: http
      url: "https://api.eia.gov/v2/electricity/electric-power-operational-data/data?frequency=monthly&start={period_start}&end={period_end}&data[]=generation&data[]=total-consumption-btu&data[]=consumption-for-eg-btu&data[]=cost-per-btu&data[]=sulfur-content&data[]=ash-content"
      method: GET
      parameters:
        api_key: "${ENERGY_EIA_API_KEY:}"
        length: "5000"
      response:
        format: json
        dataPath: "$.response.data"
        pagination:
          type: OFFSET
          totalPath: "$.response.total"
          pageSize: 5000
          limitParam: "length"
          offsetParam: "offset"
      rateLimit: *eia_rate_limit
      rawCache: *raw_cache_enabled

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.energy.EiaElectricityGenerationTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=eia_elec_gen/year=*/month=*/"
      partition:
        columns: [type, year, month]
      iceberg:
        <<: *iceberg_common
        tableName: eia_electricity_generation
        batchPartitionColumns: [year, month]
        incrementalKeys: [year, month]

  # ---------------------------------------------------------------------------
  # EIA ELECTRICITY PRICES - Annual retail electricity sales and prices by state
  # ---------------------------------------------------------------------------
  - name: eia_electricity_prices
    pattern: "type=eia_elec_price/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      EIA API v2 retail electricity sales data. Annual (and optionally monthly) average
      price (cents/kWh), revenue (million dollars), sales (million kWh), and customer
      counts by state and sector. One row per state + sector + year (+ month if available).
      Cross-references geo.states via state_abbr.

    dimensions:
      type:
        - eia_elec_price
      year: *eia_elec_price_years

    columns:
      - name: price_year
        type: integer
        nullable: false
        comment: Calendar year
      - name: price_month
        type: integer
        nullable: true
        comment: Calendar month (1-12), null for annual aggregates
      - <<: *state_abbr_column
      - <<: *state_description_column
      - name: sector_code
        type: string
        nullable: true
        comment: EIA customer sector code (e.g., 'RES', 'COM', 'IND', 'TRA', 'ALL')
      - name: sector
        type: string
        nullable: true
        comment: Sector description (e.g., 'Residential', 'Commercial', 'Industrial')
      - name: avg_price_cents_kwh
        type: double
        nullable: true
        comment: Average retail electricity price in cents per kWh
      - name: revenue_million_dollars
        type: double
        nullable: true
        comment: Total revenue in million dollars
      - name: sales_million_kwh
        type: double
        nullable: true
        comment: Total electricity sales in million kWh
      - name: customers
        type: integer
        nullable: true
        comment: Number of customer accounts

    source:
      type: http
      url: "https://api.eia.gov/v2/electricity/retail-sales/data?frequency=annual&start={effective_year}&end={effective_year}&data[]=price&data[]=revenue&data[]=sales&data[]=customers"
      method: GET
      parameters:
        api_key: "${ENERGY_EIA_API_KEY:}"
        length: "5000"
      response:
        format: json
        dataPath: "$.response.data"
        pagination:
          type: OFFSET
          totalPath: "$.response.total"
          pageSize: 5000
          limitParam: "length"
          offsetParam: "offset"
      rateLimit: *eia_rate_limit
      rawCache: *raw_cache_enabled

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.energy.EiaRetailSalesTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=eia_elec_price/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        <<: *iceberg_common
        tableName: eia_electricity_prices
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # EIA UTILITY ANNUAL - EIA-861 Annual Electric Power Industry Report
  # ---------------------------------------------------------------------------
  - name: eia_utility_annual
    pattern: "type=eia_utility/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      EIA Form 861 annual electric utility survey. Covers all electric utilities, retail
      power marketers, and energy service providers. Fields include entity type, NERC region,
      service type, customer counts and sales by sector (residential, commercial, industrial,
      transportation), revenue, peak demand, and net generation. One row per utility + year.
      The transformer downloads and parses the annual ZIP archive of XLSX files from EIA.
      Cross-references geo.states via state_abbr.

    dimensions:
      type:
        - eia_utility
      year: *eia_utility_years

    columns:
      - name: utility_id
        type: integer
        nullable: false
        comment: EIA utility identifier
      - name: report_year
        type: integer
        nullable: false
        comment: Report year
      - name: utility_name
        type: string
        nullable: true
        comment: Utility company name
      - name: entity_type
        type: string
        nullable: true
        comment: Entity type code (e.g., 'C', 'I', 'M', 'S', 'F', 'G', 'P', 'Q', 'W')
      - <<: *state_abbr_column
      - name: ba_code
        type: string
        nullable: true
        comment: Balancing authority code
      - name: nerc_region
        type: string
        nullable: true
        comment: NERC reliability region code
      - name: service_type
        type: string
        nullable: true
        comment: Service type (Bundled, Energy, Delivery)
      - name: data_type
        type: string
        nullable: true
        comment: Data type indicator
      - name: activity_generation
        type: boolean
        nullable: true
        comment: Whether utility engages in generation
      - name: activity_transmission
        type: boolean
        nullable: true
        comment: Whether utility engages in transmission
      - name: activity_distribution
        type: boolean
        nullable: true
        comment: Whether utility engages in distribution
      - name: customers_residential
        type: integer
        nullable: true
        comment: Number of residential customer accounts
      - name: customers_commercial
        type: integer
        nullable: true
        comment: Number of commercial customer accounts
      - name: customers_industrial
        type: integer
        nullable: true
        comment: Number of industrial customer accounts
      - name: customers_transportation
        type: integer
        nullable: true
        comment: Number of transportation customer accounts
      - name: customers_total
        type: integer
        nullable: true
        comment: Total number of customer accounts
      - name: sales_residential_mwh
        type: double
        nullable: true
        comment: Electricity sales to residential customers in MWh
      - name: sales_commercial_mwh
        type: double
        nullable: true
        comment: Electricity sales to commercial customers in MWh
      - name: sales_industrial_mwh
        type: double
        nullable: true
        comment: Electricity sales to industrial customers in MWh
      - name: sales_transportation_mwh
        type: double
        nullable: true
        comment: Electricity sales to transportation customers in MWh
      - name: sales_total_mwh
        type: double
        nullable: true
        comment: Total electricity sales in MWh
      - name: revenue_residential_thousand
        type: double
        nullable: true
        comment: Revenue from residential customers in thousands of dollars
      - name: revenue_commercial_thousand
        type: double
        nullable: true
        comment: Revenue from commercial customers in thousands of dollars
      - name: revenue_industrial_thousand
        type: double
        nullable: true
        comment: Revenue from industrial customers in thousands of dollars
      - name: revenue_total_thousand
        type: double
        nullable: true
        comment: Total revenue in thousands of dollars
      - name: summer_peak_demand_mw
        type: double
        nullable: true
        comment: Summer peak demand in MW
      - name: winter_peak_demand_mw
        type: double
        nullable: true
        comment: Winter peak demand in MW
      - name: net_generation_mwh
        type: double
        nullable: true
        comment: Net electricity generation in MWh

    source:
      type: http
      url: "https://www.eia.gov/electricity/data/eia861/archive/zip/f861{effective_year}.zip"
      method: GET
      response:
        format: TEXT
      rawCache: *raw_cache_enabled

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.energy.Eia861UtilityTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=eia_utility/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        <<: *iceberg_common
        tableName: eia_utility_annual
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # EIA POWER PLANTS - EIA-860 Annual Electric Generator Report
  # ---------------------------------------------------------------------------
  - name: eia_power_plants
    pattern: "type=eia_plant/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      EIA Form 860 annual electric generator inventory. One row per generator (plant +
      generator ID + year). Includes plant and utility identifiers, geographic location
      (state, county, city, lat/lon), NERC region, balancing authority, technology,
      prime mover, energy sources, capacity (nameplate, summer, winter, minimum load),
      ownership type, operating status, operating and retirement dates, and energy storage
      flag. Transformer downloads and parses the annual ZIP archive from EIA.
      Cross-references geo.states via state_abbr; joins eia_utility_annual via utility_id.

    dimensions:
      type:
        - eia_plant
      year: *eia_plant_years

    columns:
      - name: plant_id
        type: integer
        nullable: false
        comment: EIA plant identifier
      - name: generator_id
        type: string
        nullable: false
        comment: Generator identifier within the plant
      - name: report_year
        type: integer
        nullable: false
        comment: Report year
      - name: plant_name
        type: string
        nullable: true
        comment: Plant name
      - name: utility_id
        type: integer
        nullable: true
        comment: EIA utility identifier (links to eia_utility_annual)
      - name: utility_name
        type: string
        nullable: true
        comment: Utility company name
      - <<: *state_abbr_column
      - name: county_name
        type: string
        nullable: true
        comment: County name
      - name: county_fips
        type: string
        nullable: true
        comment: 5-digit county FIPS code
      - name: city
        type: string
        nullable: true
        comment: City or town name
      - name: latitude
        type: double
        nullable: true
        comment: Plant latitude
      - name: longitude
        type: double
        nullable: true
        comment: Plant longitude
      - name: nerc_region
        type: string
        nullable: true
        comment: NERC reliability region
      - name: balancing_authority_code
        type: string
        nullable: true
        comment: Balancing authority code
      - name: balancing_authority_name
        type: string
        nullable: true
        comment: Balancing authority name
      - name: primary_purpose_naics
        type: integer
        nullable: true
        comment: Primary purpose NAICS code
      - name: regulatory_status
        type: string
        nullable: true
        comment: Regulatory status (e.g., Regulated, Nonutility)
      - name: sector_code
        type: integer
        nullable: true
        comment: EIA sector code
      - name: sector
        type: string
        nullable: true
        comment: Sector description
      - name: technology
        type: string
        nullable: true
        comment: Generation technology (e.g., 'Conventional Steam Coal', 'Onshore Wind Turbine')
      - name: prime_mover
        type: string
        nullable: true
        comment: Prime mover code (e.g., 'ST', 'GT', 'IC', 'WT', 'PV')
      - name: energy_source_1
        type: string
        nullable: true
        comment: Primary energy source code
      - name: energy_source_2
        type: string
        nullable: true
        comment: Secondary energy source code
      - name: energy_source_3
        type: string
        nullable: true
        comment: Tertiary energy source code
      - name: nameplate_capacity_mw
        type: double
        nullable: true
        comment: Nameplate (installed) capacity in MW
      - name: net_summer_capacity_mw
        type: double
        nullable: true
        comment: Net summer capacity in MW
      - name: net_winter_capacity_mw
        type: double
        nullable: true
        comment: Net winter capacity in MW
      - name: minimum_load_mw
        type: double
        nullable: true
        comment: Minimum load in MW
      - name: ownership_code
        type: string
        nullable: true
        comment: Ownership type code
      - name: operating_status
        type: string
        nullable: true
        comment: Operating status code
      - name: operating_month
        type: integer
        nullable: true
        comment: Month generator began commercial operation
      - name: operating_year
        type: integer
        nullable: true
        comment: Year generator began commercial operation
      - name: planned_retirement_month
        type: integer
        nullable: true
        comment: Planned retirement month
      - name: planned_retirement_year
        type: integer
        nullable: true
        comment: Planned retirement year
      - name: energy_storage_flag
        type: boolean
        nullable: true
        comment: Whether generator includes energy storage capability

    source:
      type: http
      url: "https://www.eia.gov/electricity/data/eia860/archive/xls/eia860{effective_year}.zip"
      method: GET
      response:
        format: TEXT
      rawCache: *raw_cache_enabled

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.energy.Eia860PowerPlantsTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=eia_plant/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        <<: *iceberg_common
        tableName: eia_power_plants
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # EIA CAPACITY CHANGES - EIA-860M Monthly Generator Capacity Changes
  # ---------------------------------------------------------------------------
  - name: eia_capacity_changes
    pattern: "type=eia_capacity/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      EIA Form 860M monthly generator inventory snapshot for December of each year.
      Captures planned additions and planned retirements with capacity (nameplate, summer,
      winter, energy storage). One row per generator change record per snapshot. The
      December file provides the most complete annual picture; prior months may be fetched
      for intra-year pipeline analysis. Transformer parses the XLSX directly.
      Cross-references geo.states via state_abbr; joins eia_power_plants via plant_id.

    dimensions:
      type:
        - eia_capacity
      year: *eia_capacity_years

    columns:
      - name: plant_id
        type: integer
        nullable: false
        comment: EIA plant identifier
      - name: generator_id
        type: string
        nullable: false
        comment: Generator identifier within the plant
      - name: snapshot_year
        type: integer
        nullable: false
        comment: Year of the monthly snapshot file
      - name: snapshot_month
        type: integer
        nullable: false
        comment: Month of the monthly snapshot file (12 for December)
      - name: change_type
        type: string
        nullable: false
        comment: Type of capacity change (e.g., 'Planned Addition', 'Planned Retirement', 'New Unit')
      - name: change_year
        type: integer
        nullable: true
        comment: Year the change is expected to take effect
      - name: change_month
