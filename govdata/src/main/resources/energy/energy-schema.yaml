  # ---------------------------------------------------------------------------
  # EIA FOSSIL FUEL PRODUCTION - Crude oil and natural gas production
  # ---------------------------------------------------------------------------
  - name: eia_fossil_fuel_production
    pattern: "type=eia_fossil/year=*/month=*/*.parquet"
    partitions: *standard_partitions_monthly
    comment: >
      EIA API v2 petroleum crude oil production by state and month. The transformer
      also fetches the EIA natural gas production summary endpoint internally and unions
      both series into the output, so each partition contains both crude oil and natural
      gas rows distinguished by the fuel_type column. One row per EIA area + fuel type +
      process + year-month. Cross-references geo.states via state_abbr.

    dimensions:
      type:
        - eia_fossil
      year: *eia_fossil_years
      month: *eia_months

    columns:
      - name: production_year
        type: integer
        nullable: false
        comment: Calendar year of production
      - name: production_month
        type: integer
        nullable: false
        comment: Calendar month (1-12) of production
      - name: eia_area_code
        type: string
        nullable: true
        comment: EIA area/region code (may be state abbreviation or PADD code)
      - <<: *state_abbr_column
      - name: fuel_type
        type: string
        nullable: false
        comment: Fuel type ('crude_oil' or 'natural_gas')
      - name: process_code
        type: string
        nullable: true
        comment: EIA process code identifying the production activity
      - name: process_name
        type: string
        nullable: true
        comment: Process description
      - name: production_volume
        type: double
        nullable: true
        comment: Production volume in units specified by production_unit
      - name: production_unit
        type: string
        nullable: true
        comment: Unit of measure (e.g., 'Thousand Barrels', 'Million Cubic Feet')
      - name: series_id
        type: string
        nullable: true
        comment: EIA time series identifier
      - name: series_description
        type: string
        nullable: true
        comment: Full series description

    backfill_period: annual

    source:
      type: http
      url: "https://api.eia.gov/v2/petroleum/crd/crpdn/data?frequency=monthly&start={period_start}&end={period_end}&data[]=value"
      method: GET
      parameters:
        api_key: "${ENERGY_EIA_API_KEY:}"
        length: "5000"
      response:
        format: json
        dataPath: "$.response.data"
        pagination:
          type: OFFSET
          totalPath: "$.response.total"
          pageSize: 5000
          limitParam: "length"
          offsetParam: "offset"
      rateLimit: *eia_rate_limit
      rawCache: *raw_cache_enabled

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.energy.EiaFossilFuelTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=eia_fossil/year=*/month=*/"
      partition:
        columns: [type, year, month]
      iceberg:
        <<: *iceberg_common
        tableName: eia_fossil_fuel_production
        batchPartitionColumns: [year, month]
        incrementalKeys: [year, month]

  # ---------------------------------------------------------------------------
  # EIA STATE ENERGY CONSUMPTION - SEDS State Energy Data System
  # ---------------------------------------------------------------------------
  - name: eia_state_energy_consumption
    pattern: "type=eia_seds/year=*/*.parquet"
    # DQ sample cap (GOVDATA_DQ mode): the bulk SEDS.zip is one cumulative fetch of the full
    # history (millions of state × MSN × year rows). Cap the stream so DQ samples fast; prod full.
    dqRowLimit: 25000
    partitions: *standard_partitions
    comment: >
      EIA API v2 State Energy Data System (SEDS). Annual energy consumption, expenditure,
      and price by state, sector, fuel type, and MSN (energy series code). The MSN code
      encodes fuel, sector, and metric in a compact 5-character string. The transformer
      decodes MSN values and maps them to human-readable sector, fuel_type, units,
      consumption_bbtu, expenditure_million, and price_per_mmbtu columns where applicable.
      One row per state + MSN + year. Cross-references geo.states via state_abbr.

    # Single cumulative fetch: the bulk SEDS.zip carries the full annual history; the
    # transformer streams it once and partitions by the data year (no per-year dimension).
    dimensions:
      type:
        - eia_seds

    columns:
      - name: year
        type: integer
        nullable: false
        comment: Calendar year (partition column)
      - name: consumption_year
        type: integer
        nullable: false
        comment: Calendar year
      - <<: *state_abbr_column
      - name: state_name
        type: string
        nullable: true
        comment: Full state name
      - name: msn
        type: string
        nullable: false
        comment: EIA Mnemonic Series Name (5-char code, e.g., 'TETCB', 'NGRCB')
      - name: sector
        type: string
        nullable: true
        comment: Sector decoded from MSN (e.g., 'Residential', 'Commercial', 'Transportation', 'Total')
      - name: fuel_type
        type: string
        nullable: true
        comment: Fuel type decoded from MSN (e.g., 'Natural Gas', 'Coal', 'Petroleum')
      - name: value
        type: double
        nullable: true
        comment: Raw numeric value from the API response
      - name: units
        type: string
        nullable: true
        comment: Units for the value field
      - name: consumption_bbtu
        type: double
        nullable: true
        comment: Energy consumption in billion BTU (null if MSN is not a consumption series)
      - name: expenditure_million
        type: double
        nullable: true
        comment: Expenditure in million dollars (null if MSN is not an expenditure series)
      - name: price_per_mmbtu
        type: double
        nullable: true
        comment: Price per million BTU (null if MSN is not a price series)
      - name: series_description
        type: string
        nullable: true
        comment: Full human-readable description of the SEDS series

    # Bulk download: one cumulative SEDS.zip replaces the per-year paginated EIA API v2 fan-out.
    freshness:
      type: last_modified
    source:
      type: http
      url: "https://www.eia.gov/opendata/bulk/SEDS.zip"
      method: GET
      response:
        format: json
      rawCache: *raw_cache_enabled

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.energy.EiaSedsBulkTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=eia_seds/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        <<: *iceberg_common
        tableName: eia_state_energy_consumption
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # EIA NATURAL GAS STORAGE - Weekly underground storage by region
  # ---------------------------------------------------------------------------
  - name: eia_natural_gas_storage
    pattern: "type=eia_gas_storage/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      EIA API v2 weekly natural gas underground storage data. Covers working gas,
      base gas, total gas, injections, and withdrawals by EIA storage region (East,
      West, Midwest, Mountain, Pacific, South Central, Salt, Non-Salt, National).
      One row per region + storage type + report date. Useful for gas market signal
      analysis and year-over-year storage comparison.

    # Single cumulative fetch: the bulk NG.zip carries the full weekly history; the
    # transformer streams it once and partitions by the data year (no per-year dimension).
    dimensions:
      type:
        - eia_gas_storage

    columns:
      - name: year
        type: integer
        nullable: false
        comment: Calendar year of the report date (partition column)
      - name: report_date
        type: string
        nullable: false
        comment: Report date in ISO format (YYYY-MM-DD)
      - name: storage_year
        type: integer
        nullable: false
        comment: Calendar year of the report date
      - name: storage_week
        type: integer
        nullable: false
        comment: Week number within the year (ISO week)
      - name: eia_region_code
        type: string
        nullable: true
        comment: EIA storage region code (e.g., 'R10', 'R20', 'R30', 'NAT')
      - name: region
        type: string
        nullable: true
        comment: Region description (e.g., 'East', 'West', 'National')
      - name: storage_type_code
        type: string
        nullable: true
        comment: Storage type code (e.g., 'SAW' = total working gas, 'SAS' = salt, 'SAN' = non-salt)
      - name: storage_type
        type: string
        nullable: true
        comment: Storage type description
      - name: volume_bcf
        type: double
        nullable: true
        comment: Volume in billion cubic feet
      - name: units
        type: string
        nullable: true
        comment: Units for volume (typically 'Bcf')
      - name: series_id
        type: string
        nullable: true
        comment: EIA time series identifier

    # Bulk download: one cumulative NG.zip replaces the per-year paginated EIA API v2 fan-out.
    # The streaming transformer downloads + unzips + explodes the storage series itself.
    freshness:
      type: last_modified
    source:
      type: http
      url: "https://www.eia.gov/opendata/bulk/NG.zip"
      method: GET
      response:
        format: json
      rawCache: *raw_cache_enabled

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.energy.EiaNgStorageBulkTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=eia_gas_storage/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        <<: *iceberg_common
        tableName: eia_natural_gas_storage
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # EIA PETROLEUM STOCKS - Weekly petroleum product stocks by PADD
  # ---------------------------------------------------------------------------
  - name: eia_petroleum_stocks
    pattern: "type=eia_pet_stocks/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      EIA API v2 weekly petroleum product stocks. Covers crude oil and refined products
      (gasoline, distillate, jet fuel, residual fuel, etc.) by PADD district and national
      totals. One row per area + product + process + report date. Supports supply
      disruption analysis, seasonal inventory tracking, and refinery margin signals.

    dimensions:
      type:
        - eia_pet_stocks
      year: *eia_pet_stocks_years

    columns:
      - name: report_date
        type: string
        nullable: false
        comment: Report date in ISO format (YYYY-MM-DD)
      - name: stock_year
        type: integer
        nullable: false
        comment: Calendar year of the report date
      - name: stock_week
        type: integer
        nullable: false
        comment: Week number within the year (ISO week)
      - name: eia_area_code
        type: string
        nullable: true
        comment: EIA area code (e.g., 'SAE', 'USA', 'PAD1', 'PAD2')
      - name: padd
        type: string
        nullable: true
        comment: PADD district description or 'National'
      - name: product_code
        type: string
        nullable: true
        comment: EIA petroleum product code (e.g., 'EPC0', 'EPM0', 'EPD0')
      - name: product
        type: string
        nullable: true
        comment: Product description (e.g., 'Crude Oil', 'Finished Motor Gasoline')
      - name: process_code
        type: string
        nullable: true
        comment: EIA process code identifying the stock measurement
      - name: process_name
        type: string
        nullable: true
        comment: Process description
      - name: stocks_kbbl
        type: double
        nullable: true
        comment: Stocks in thousand barrels
      - name: series_id
        type: string
        nullable: true
        comment: EIA time series identifier
      - name: series_description
        type: string
        nullable: true
        comment: Full series description

    source:
      type: http
      url: "https://api.eia.gov/v2/petroleum/stoc/wstk/data?frequency=weekly&start={year}-01-01&end={year}-12-31&data[]=value"
      method: GET
      parameters:
        api_key: "${ENERGY_EIA_API_KEY:}"
        length: "5000"
      response:
        format: json
        dataPath: "$.response.data"
        pagination:
          type: OFFSET
          totalPath: "$.response.total"
          pageSize: 5000
          limitParam: "length"
          offsetParam: "offset"
      rateLimit: *eia_rate_limit
      rawCache: *raw_cache_enabled

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.energy.EiaPetroleumStocksTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=eia_pet_stocks/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        <<: *iceberg_common
        tableName: eia_petroleum_stocks
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # EIA CRUDE OIL IMPORTS - EIA-814 Monthly Import Survey
  # ---------------------------------------------------------------------------
  - name: eia_crude_oil_imports
    pattern: "type=eia_crude_imp/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      EIA Form 814 monthly crude oil import survey. The transformer iterates all 12
      monthly XLSX files for the given year (URL pattern impa{yy}{m}.xlsx where yy is
      2-digit year and m is 1-based month digit) and unions them into a single partition.
      One row per import transaction per month (importer + origin country + entry port +
      receiving refinery). Includes API gravity, sulfur content, and volume in thousand
      barrels. Cross-references geo.states via state_abbr (refinery state).

    dimensions:
      type:
        - eia_crude_imp
      year: *eia_crude_imp_years

    columns:
      - name: rpt_period
        type: string
        nullable: false
        comment: Reporting period in YYYYMM format
      - name: import_year
        type: integer
        nullable: false
        comment: Import year
      - name: import_month
        type: integer
        nullable: false
        comment: Import month (1-12)
      - name: importer_name
        type: string
        nullable: false
        comment: Name of the importing company
      - name: origin_country
        type: string
        nullable: true
        comment: Country of origin name
      - name: origin_country_code
        type: integer
        nullable: false
        comment: EIA country code for the origin country
      - name: entry_port_code
        type: string
        nullable: true
        comment: PADD district code for the entry port
      - name: entry_port_city
        type: string
        nullable: true
        comment: Entry port city name
      - name: entry_padd
        type: integer
        nullable: true
        comment: PADD district number of the entry port
      - name: dest_padd
        type: integer
        nullable: true
        comment: PADD district number of the destination refinery
      - name: receiving_company
        type: string
        nullable: true
        comment: Company receiving the crude at the destination
      - name: refinery_site_id
        type: integer
        nullable: false
        comment: EIA refinery site identifier
      - name: refinery_site_name
        type: string
        nullable: true
        comment: Refinery site name
      - name: refinery_state_abbr
        type: string
        nullable: true
        comment: 2-letter state abbreviation of the receiving refinery
      - name: api_gravity
        type: double
        nullable: true
        comment: API gravity of the imported crude
      - name: sulfur_content_pct
        type: double
        nullable: true
        comment: Sulfur content as a percentage by weight
      - name: volume_kbbl
        type: integer
        nullable: true
        comment: Volume imported in thousand barrels

    source:
      type: http
      url: "https://www.eia.gov/petroleum/imports/companylevel/"
      method: GET
      response:
        format: TEXT
      rawCache: *raw_cache_enabled

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.energy.Eia814CrudeImportsTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=eia_crude_imp/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        <<: *iceberg_common
        tableName: eia_crude_oil_imports
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # EIA REFINERY OPERATIONS - Monthly refinery input and capacity data
  # ---------------------------------------------------------------------------
  - name: eia_refinery_operations
    pattern: "type=eia_refinery/year=*/month=*/*.parquet"
    partitions: *standard_partitions_monthly
    comment: >
      EIA API v2 petroleum refinery process data in tall format. One row per EIA area +
      series (process_code) + year-month. Key series include crude inputs to distillation
      (CRDISS), operable distillation capacity (CAPACITY), and utilization rate (UTIL).
      Additional series cover catalytic cracking, coking, reforming, and other secondary
      processes. Pivoting into wide format is done via the refinery_utilization_summary view.
      One row per area + series_id + report year-month.

    dimensions:
      type:
        - eia_refinery
      year: *eia_refinery_years
      month: *eia_months

    columns:
      - name: report_year
        type: integer
        nullable: false
        comment: Calendar year
      - name: report_month
        type: integer
        nullable: false
        comment: Calendar month (1-12)
      - name: eia_area_code
        type: string
        nullable: true
        comment: EIA area code (e.g., PADD code or 'USA')
      - name: padd
        type: string
        nullable: true
        comment: PADD district description or 'National'
      - name: series_id
        type: string
        nullable: true
        comment: EIA time series identifier
      - name: process_code
        type: string
        nullable: true
        comment: EIA refinery process code
      - name: metric_name
        type: string
        nullable: true
        comment: Metric description (e.g., 'Crude Oil Input to Atmospheric Crude Oil Distillation Units')
      - name: units
        type: string
        nullable: true
        comment: Units of measure (e.g., 'Thousand Barrels per Day')
      - name: value
        type: double
        nullable: true
        comment: Metric value

    backfill_period: annual

    source:
      type: http
      url: "https://api.eia.gov/v2/petroleum/pnp/refp/data?frequency=monthly&start={period_start}&end={period_end}&data[]=value"
      method: GET
      parameters:
        api_key: "${ENERGY_EIA_API_KEY:}"
        length: "5000"
      response:
        format: json
        dataPath: "$.response.data"
        pagination:
          type: OFFSET
          totalPath: "$.response.total"
          pageSize: 5000
          limitParam: "length"
          offsetParam: "offset"
      rateLimit: *eia_rate_limit
      rawCache: *raw_cache_enabled

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.energy.EiaRefineryOperationsTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=eia_refinery/year=*/month=*/"
      partition:
        columns: [type, year, month]
      iceberg:
        <<: *iceberg_common
        tableName: eia_refinery_operations
        batchPartitionColumns: [year, month]
        incrementalKeys: [year, month]

  # ---------------------------------------------------------------------------
  # MSHA COAL MINES - MSHA MinesProdYearly coal production data
  # ---------------------------------------------------------------------------
  - name: eia_coal_mines
    pattern: "type=msha_coal/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      MSHA MinesProdYearly coal mine production data (pipe-delimited CSV ZIP). The
      transformer downloads MinesProdYearly.zip and Mines.zip, performs an inner join on
      mine_id, filters to coal mines (COAL_METAL_IND = 'C'), and returns one row per
      mine + subunit + year. Includes mine demographics, operator/controller identity,
      geographic location (lat/lon, county, state), mine type and status, production
      volume in short tons, employee count, annual hours, labor productivity, and
      average seam height (underground mines). The transformer filters by the requested
      year dimension. Cross-references geo.states via state_abbr.

    dimensions:
      type:
        - msha_coal
      year: *msha_coal_years

    columns:
      - name: mine_id
        type: string
        nullable: false
        comment: MSHA mine identifier
      - name: report_year
        type: integer
        nullable: false
        comment: Production report year
      - name: mine_name
        type: string
        nullable: true
        comment: Mine name
      - name: controller_name
        type: string
        nullable: true
        comment: Mine controller company name
      - name: operator_name
        type: string
        nullable: true
        comment: Mine operator company name
      - <<: *state_abbr_column
      - name: county_fips
        type: string
        nullable: true
        comment: 5-digit county FIPS code
      - name: county_name
        type: string
        nullable: true
        comment: County name
      - name: latitude
        type: double
        nullable: true
        comment: Mine latitude
      - name: longitude
        type: double
        nullable: true
        comment: Mine longitude
      - name: mine_type
        type: string
        nullable: true
        comment: Mine type (e.g., 'Surface', 'Underground')
      - name: subunit_code
        type: string
        nullable: false
        comment: MSHA subunit code (e.g., '01' = Underground, '02' = Surface, '03' = Auger)
      - name: subunit
        type: string
        nullable: true
        comment: Subunit description
      - name: mine_status
        type: string
        nullable: true
        comment: Mine status (e.g., 'Active', 'Temporarily Idled', 'Abandoned')
      - name: production_short_tons
        type: double
        nullable: true
        comment: Coal production in short tons
      - name: avg_employee_count
        type: double
        nullable: true
        comment: Average number of employees
      - name: annual_hours
        type: double
        nullable: true
        comment: Total employee hours worked
      - name: labor_productivity
        type: double
        nullable: true
        comment: Labor productivity in short tons per employee hour
      - name: avg_mine_height_inches
        type: double
        nullable: true
        comment: Average mine height in inches (underground mines only)

    source:
      type: http
      url: "https://arlweb.msha.gov/OpenGovernmentData/DataSets/MinesProdYearly.zip"
      method: GET
      response:
        format: TEXT
      rawCache: *raw_cache_enabled

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.energy.MshaCoalMinesTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=msha_coal/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        <<: *iceberg_common
        tableName: eia_coal_mines
        batchPartitionColumns: [year]
        incrementalKeys: [year]

# ============================================================================
# CONSTRAINTS
# ============================================================================

constraints:

  eia_electricity_generation:
    primaryKey: [state_abbr, energy_source_code, sector_code, generation_year, generation_month]
    foreignKeys:
      - columns: [state_abbr]
        targetSchema: geo
        targetTable: states
        targetColumns: [state_abbr]

  eia_electricity_prices:
    primaryKey: [state_abbr, sector_code, price_year, price_month]
    foreignKeys:
      - columns: [state_abbr]
        targetSchema: geo
        targetTable: states
        targetColumns: [state_abbr]

  eia_utility_annual:
    primaryKey: [utility_id, report_year]
    foreignKeys:
      - columns: [state_abbr]
        targetSchema: geo
        targetTable: states
        targetColumns: [state_abbr]

  eia_power_plants:
    primaryKey: [plant_id, generator_id, report_year]
    foreignKeys:
      - columns: [state_abbr]
        targetSchema: geo
        targetTable: states
        targetColumns: [state_abbr]
      - columns: [utility_id]
        targetTable: eia_utility_annual
        targetColumns: [utility_id]

  eia_capacity_changes:
    primaryKey: [plant_id, generator_id, snapshot_year, snapshot_month, change_type]
    foreignKeys:
      - columns: [state_abbr]
        targetSchema: geo
        targetTable: states
        targetColumns: [state_abbr]
      - columns: [plant_id]
        targetTable: eia_power_plants
        targetColumns: [plant_id]

  eia_fossil_fuel_production:
    primaryKey: [eia_area_code, fuel_type, process_code, production_year, production_month]
    foreignKeys:
      - columns: [state_abbr]
        targetSchema: geo
        targetTable: states
        targetColumns: [state_abbr]

  eia_state_energy_consumption:
    primaryKey: [state_abbr, msn, consumption_year]
    foreignKeys:
      - columns: [state_abbr]
        targetSchema: geo
        targetTable: states
        targetColumns: [state_abbr]

  eia_natural_gas_storage:
    primaryKey: [eia_region_code, storage_type_code, report_date]

  eia_petroleum_stocks:
    primaryKey: [eia_area_code, product_code, process_code, report_date]

  eia_crude_oil_imports:
    primaryKey: [importer_name, origin_country_code, refinery_site_id, rpt_period]
    foreignKeys:
      - columns: [refinery_state_abbr]
        targetSchema: geo
        targetTable: states
        targetColumns: [state_abbr]

  eia_refinery_operations:
    primaryKey: [eia_area_code, series_id, report_year, report_month]

  eia_coal_mines:
    primaryKey: [mine_id, subunit_code, report_year]
    foreignKeys:
      - columns: [state_abbr]
        targetSchema: geo
        targetTable: states
        targetColumns: [state_abbr]

# ============================================================================
# VIEWS
# ============================================================================

views:

  - name: state_energy_mix
    comment: >
      Annual renewable and fossil fuel generation mix by state. Aggregates
      eia_electricity_generation by state and year, computing total generation
      and generation by broad fuel category (renewables, nuclear, fossil, other).
      Calculates renewable percentage and fossil percentage for trend analysis.
      One row per state + year. Joins geo.states for full state name and FIPS.
    sql: >
      SELECT
        g.state_abbr,
        MAX(g.state_description)                                           AS state_name,
        g.generation_year,
        SUM(g.generation_thousand_mwh)                                     AS total_gen_thousand_mwh,
        SUM(CASE
              WHEN g.energy_source_code IN ('SUN','DPV','WND','WAT','GEO','WAS','OBG','OBS','OBL','MLG','PC','WH','AB')
              THEN g.generation_thousand_mwh ELSE 0 END)                   AS renewable_gen_thousand_mwh,
        SUM(CASE
              WHEN g.energy_source_code IN ('NUC')
              THEN g.generation_thousand_mwh ELSE 0 END)                   AS nuclear_gen_thousand_mwh,
        SUM(CASE
              WHEN g.energy_source_code IN ('COL','NG','DFO','RFO','KER','JF','PG','SGC','WC','SC','BIT','SUB','LIG')
              THEN g.generation_thousand_mwh ELSE 0 END)                   AS fossil_gen_thousand_mwh,
        SUM(CASE
              WHEN g.energy_source_code NOT IN ('SUN','DPV','WND','WAT','GEO','WAS','OBG','OBS','OBL','MLG','PC','WH','AB','NUC','COL','NG','DFO','RFO','KER','JF','PG','SGC','WC','SC','BIT','SUB','LIG')
              THEN g.generation_thousand_mwh ELSE 0 END)                   AS other_gen_thousand_mwh,
        CASE
          WHEN SUM(g.generation_thousand_mwh) > 0
          THEN 100.0 * SUM(CASE
                WHEN g.energy_source_code IN ('SUN','DPV','WND','WAT','GEO','WAS','OBG','OBS','OBL','MLG','PC','WH','AB')
                THEN g.generation_thousand_mwh ELSE 0 END)
               / SUM(g.generation_thousand_mwh)
          ELSE NULL
        END                                                                AS renewable_pct,
        CASE
          WHEN SUM(g.generation_thousand_mwh) > 0
          THEN 100.0 * SUM(CASE
                WHEN g.energy_source_code IN ('COL','NG','DFO','RFO','KER','JF','PG','SGC','WC','SC','BIT','SUB','LIG')
                THEN g.generation_thousand_mwh ELSE 0 END)
               / SUM(g.generation_thousand_mwh)
          ELSE NULL
        END                                                                AS fossil_pct
      FROM eia_electricity_generation g
      GROUP BY g.state_abbr, g.generation_year

  - name: utility_scorecard
    comment: >
      Utility-level performance scorecard joining EIA-861 annual survey data with
      aggregated operating capacity from EIA-860 power plants. One row per utility +
      report year. Shows entity type, state, customer counts, total sales, total revenue,
      and sum of net summer capacity across all operating generators owned by the utility.
    sql: >
      SELECT
        u.utility_id,
        u.report_year,
        u.utility_name,
        u.entity_type,
        u.state_abbr,
        u.nerc_region,
        u.customers_total,
        u.sales_total_mwh,
        u.revenue_total_thousand,
        u.summer_peak_demand_mw,
        u.winter_peak_demand_mw,
        COALESCE(p.operating_capacity_mw, 0.0)                            AS operating_capacity_mw,
        COALESCE(p.generator_count, 0)                                     AS generator_count
      FROM eia_utility_annual u
      LEFT JOIN (
        SELECT
          utility_id,
          report_year,
          SUM(net_summer_capacity_mw)                                      AS operating_capacity_mw,
          COUNT(*)                                                          AS generator_count
        FROM eia_power_plants
        WHERE operating_status IN ('OP','SB','OS','RE')
        GROUP BY utility_id, report_year
      ) p ON u.utility_id = p.utility_id AND u.report_year = p.report_year

  - name: capacity_pipeline
    comment: >
      Planned capacity additions and retirements from EIA-860M monthly snapshots.
      Aggregates eia_capacity_changes by state, expected change year, technology, fuel
      category, and change type. Provides a forward-looking pipeline of new capacity
      entering service and old capacity retiring. One row per state + change_year +
      technology + fuel_category + change_type.
    sql: >
      SELECT
        c.state_abbr,
        c.change_year,
        c.change_month,
        c.technology,
        c.energy_source_code,
        CASE
          WHEN c.energy_source_code IN ('SUN','DPV','WND','WAT','GEO','WAS','OBG','OBS','OBL','MLG')
            THEN 'Renewable'
          WHEN c.energy_source_code IN ('NUC')
            THEN 'Nuclear'
          WHEN c.energy_source_code IN ('COL','BIT','SUB','LIG','WC','SC')
            THEN 'Coal'
          WHEN c.energy_source_code IN ('NG','LFG','OG','BFG','SNG')
            THEN 'Natural Gas'
          WHEN c.energy_source_code IN ('DFO','RFO','KER','JF','PG')
            THEN 'Petroleum'
          WHEN c.energy_source_code IN ('MWH','CEP')
            THEN 'Storage'
          ELSE 'Other'
        END                                                                AS fuel_category,
        c.change_type,
        COUNT(*)                                                           AS unit_count,
        SUM(c.nameplate_capacity_mw)                                       AS total_nameplate_mw,
        SUM(c.net_summer_capacity_mw)                                      AS total_summer_mw
      FROM eia_capacity_changes c
      WHERE c.change_type IN ('Planned Addition', 'Planned Retirement', 'New Unit', 'Retirement')
      GROUP BY
        c.state_abbr, c.change_year, c.change_month,
        c.technology, c.energy_source_code,
        CASE
          WHEN c.energy_source_code IN ('SUN','DPV','WND','WAT','GEO','WAS','OBG','OBS','OBL','MLG')
            THEN 'Renewable'
          WHEN c.energy_source_code IN ('NUC')
            THEN 'Nuclear'
          WHEN c.energy_source_code IN ('COL','BIT','SUB','LIG','WC','SC')
            THEN 'Coal'
          WHEN c.energy_source_code IN ('NG','LFG','OG','BFG','SNG')
            THEN 'Natural Gas'
          WHEN c.energy_source_code IN ('DFO','RFO','KER','JF','PG')
            THEN 'Petroleum'
          WHEN c.energy_source_code IN ('MWH','CEP')
            THEN 'Storage'
          ELSE 'Other'
        END,
        c.change_type

  - name: weekly_gas_storage_signal
    comment: >
      Weekly natural gas working gas storage levels (SAW series) with year-over-year
      comparison. Uses LAG window function to compute the prior year same-week volume
      for YoY delta and percent change calculation. One row per region + report date.
      Useful as a market signal for gas price forecasting.
    sql: >
      SELECT
        s.report_date,
        s.storage_year,
        s.storage_week,
        s.eia_region_code,
        s.region,
        s.volume_bcf                                                       AS working_gas_bcf,
        LAG(s.volume_bcf, 52) OVER (
          PARTITION BY s.eia_region_code
          ORDER BY s.report_date
        )                                                                  AS prior_year_bcf,
        s.volume_bcf - LAG(s.volume_bcf, 52) OVER (
          PARTITION BY s.eia_region_code
          ORDER BY s.report_date
        )                                                                  AS yoy_change_bcf,
        CASE
          WHEN LAG(s.volume_bcf, 52) OVER (
            PARTITION BY s.eia_region_code
            ORDER BY s.report_date
          ) > 0
          THEN 100.0 * (s.volume_bcf - LAG(s.volume_bcf, 52) OVER (
            PARTITION BY s.eia_region_code
            ORDER BY s.report_date
          )) / LAG(s.volume_bcf, 52) OVER (
            PARTITION BY s.eia_region_code
            ORDER BY s.report_date
          )
          ELSE NULL
        END                                                                AS yoy_change_pct
      FROM eia_natural_gas_storage s
      WHERE s.storage_type_code = 'SWO'

  - name: state_energy_burden
    comment: >
      State-level energy burden estimate joining annual residential electricity prices
      with state energy consumption. Computes an implied annual residential electricity
      bill estimate from average price and total residential electricity sales divided
      by customer count. One row per state + year. Joins geo.states for full state name.
    sql: >
      SELECT
        p.state_abbr,
        MAX(p.state_description)                                           AS state_name,
        p.price_year                                                       AS report_year,
        p.avg_price_cents_kwh                                              AS residential_price_cents_kwh,
        p.sales_million_kwh                                                AS residential_sales_million_kwh,
        p.customers                                                        AS residential_customers,
        CASE
          WHEN p.customers > 0
          THEN (p.sales_million_kwh * 1000000.0 / p.customers) * (p.avg_price_cents_kwh / 100.0)
          ELSE NULL
        END                                                                AS implied_annual_bill_dollars,
        c.consumption_bbtu                                                 AS total_energy_consumption_bbtu,
        c.expenditure_million                                              AS total_energy_expenditure_million
      FROM eia_electricity_prices p
      LEFT JOIN eia_state_energy_consumption c
        ON p.state_abbr = c.state_abbr
        AND p.price_year = c.consumption_year
        AND c.msn = 'TETCB'
      WHERE p.sector_code = 'RES'
        AND p.price_month IS NULL
      GROUP BY p.state_abbr, p.price_year, p.avg_price_cents_kwh,
               p.sales_million_kwh, p.customers, c.consumption_bbtu, c.expenditure_million

  - name: refinery_utilization_summary
    comment: >
      Refinery utilization summary pivoted from tall eia_refinery_operations data.
      Uses CASE expressions on process_code to pivot key series into named columns:
      crude_input_kbd (crude distillation input), operable_capacity_kbd (operable
      distillation capacity), and utilization_rate (crude input / operable capacity).
      One row per EIA area + PADD + report year + report month.
    sql: >
      SELECT
        r.eia_area_code,
        r.padd,
        r.report_year,
        r.report_month,
        MAX(CASE
          WHEN r.process_code = 'CRDISS' OR r.series_id LIKE '%CRDISS%'
          THEN r.value ELSE NULL
        END)                                                               AS crude_input_kbd,
        MAX(CASE
          WHEN r.process_code = 'CAPACITY' OR r.series_id LIKE '%OPEFWRD%'
          THEN r.value ELSE NULL
        END)                                                               AS operable_capacity_kbd,
        MAX(CASE
          WHEN r.process_code = 'UTILIZATION' OR r.series_id LIKE '%UTILP%'
          THEN r.value ELSE NULL
        END)                                                               AS utilization_rate_pct,
        MAX(CASE
          WHEN r.process_code = 'CATCRACK' OR r.series_id LIKE '%CATCRD%'
          THEN r.value ELSE NULL
        END)                                                               AS catalytic_cracking_kbd,
        MAX(CASE
          WHEN r.process_code = 'COKING' OR r.series_id LIKE '%COKCRD%'
          THEN r.value ELSE NULL
        END)                                                               AS coking_kbd,
        MAX(CASE
          WHEN r.process_code = 'REFORMING' OR r.series_id LIKE '%REFCRD%'
          THEN r.value ELSE NULL
        END)                                                               AS reforming_kbd,
        CASE
          WHEN MAX(CASE
            WHEN r.process_code = 'CAPACITY' OR r.series_id LIKE '%OPEFWRD%'
            THEN r.value ELSE NULL END) > 0
          THEN 100.0 * MAX(CASE
            WHEN r.process_code = 'CRDISS' OR r.series_id LIKE '%CRDISS%'
            THEN r.value ELSE NULL END)
            / MAX(CASE
            WHEN r.process_code = 'CAPACITY' OR r.series_id LIKE '%OPEFWRD%'
            THEN r.value ELSE NULL END)
          ELSE NULL
        END                                                                AS computed_utilization_pct
      FROM eia_refinery_operations r
      GROUP BY r.eia_area_code, r.padd, r.report_year, r.report_month
