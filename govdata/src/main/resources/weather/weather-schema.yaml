# ============================================================================
# U.S. Weather and Climate Data Schema (WEATHER)
# ============================================================================
# Data Sources:
#   - NWS (weather.gov) - Weather stations and severe weather alerts (no auth)
#   - NOAA CDO v2 - Historical monthly/annual climate summaries (token auth)
#   - NOAA GHCND / drought monitor / HMS smoke - daily observations (no auth)
#
# NOTE: EPA AQS air-quality tables were moved to the `environment` schema
# (see environment-schema.yaml) — air quality is a distinct domain from weather.
#
# Features:
#   - Cross-references with geo.states via state_abbr and state_fips
#   - Cross-references with geo.counties via county_fips
#   - Token-gated table enablement (CDO requires NOAA_CDO_TOKEN)
#   - Hive-style partitioning for efficient querying
# ============================================================================

schemaName: "${SCHEMA_NAME:weather}"
dataLagYears: 1
materializeDirectory: "${GOVDATA_PARQUET_DIR}"

comment: >
  U.S. weather and climate data from NWS (weather.gov), NOAA Climate Data Online
  (CDO v2), and NOAA bulk observation feeds. NWS tables provide weather station
  metadata and active severe weather alerts by state (no auth required). CDO
  tables provide historical monthly and annual climate summaries (GSOM/GSOY) with
  temperature, precipitation, and snowfall metrics (requires NOAA_CDO_TOKEN). All
  state-level tables join with geo.states via state_abbr or state_fips; county-grain
  tables join geo.counties via county_fips. (EPA AQS air-quality data now lives in
  the environment schema.)

# ============================================================================
# COLUMN TEMPLATES
# ============================================================================

column_templates:

  state_abbr_column: &state_abbr_column
    name: state_abbr
    type: string
    nullable: false
    comment: "2-letter state abbreviation (e.g., 'CA')"

  state_fips_column: &state_fips_column
    name: state_fips
    type: string
    nullable: false
    comment: "2-digit state FIPS code (e.g., '06' for California)"

  year_column: &year_column
    name: year
    type: integer
    nullable: false
    comment: Calendar year

  partition_type: &partition_type
    name: type
    type: VARCHAR

  partition_year: &partition_year
    name: year
    type: INTEGER

  partition_state_abbr: &partition_state_abbr
    name: state_abbr
    type: VARCHAR

  partition_state_fips: &partition_state_fips
    name: state_fips
    type: VARCHAR

  partition_month: &partition_month
    name: month
    type: VARCHAR

  nws_partitions: &nws_partitions
    style: hive
    columnDefinitions:
      - *partition_type
      - *partition_state_abbr

  cdo_station_partitions: &cdo_station_partitions
    style: hive
    columnDefinitions:
      - *partition_type
      - *partition_state_fips

  standard_partitions: &standard_partitions
    style: hive
    columnDefinitions:
      - *partition_type
      - *partition_year

  ghcnd_station_partitions: &ghcnd_station_partitions
    style: hive
    columnDefinitions:
      - *partition_type

  drought_partitions: &drought_partitions
    style: hive
    columnDefinitions:
      - *partition_type
      - *partition_year
      - *partition_state_abbr

  hms_partitions: &hms_partitions
    style: hive
    columnDefinitions:
      - *partition_type
      - *partition_year
      - *partition_month

  normals_partitions: &normals_partitions
    style: hive
    columnDefinitions:
      - *partition_type
      - *partition_state_fips

# ============================================================================
# DIMENSION VALUES
# ============================================================================

