          year: effective_year
      iceberg:
        <<: *patents_iceberg_common
        tableName: trademark_classification
        runMaintenance: true
        snapshotRetentionDays: 1
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  - name: trademark_intl_class
    pattern: "type=trademark_intl_class/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      Faithful landing of USPTO TRCFECO2 intl_class.csv — international (Nice) class codes,
      one row per (serial_no, intl_class_cd).
    dimensions:
      type:
        - trademark_intl_class
      year: *year_range
    columns:
      - {name: serial_no, type: string, nullable: false, comment: "Corresponding case file serial number"}
      - {name: intl_class_cd, type: string, nullable: true, comment: "International (Nice) class code"}
      - {name: class_id, type: string, nullable: true, comment: "Corresponding classification record ID"}
      - name: year
        type: integer
        nullable: false
        comment: Application filing year (Iceberg partition)
    source: *trademark_source
    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.patents.TrademarkIntlClassTransformer"
    materialize:
      format: iceberg
      output:
        pattern: "type=trademark_intl_class/year=*/"
      partition:
