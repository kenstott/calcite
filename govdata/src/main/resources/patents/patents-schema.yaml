# ============================================================================
# U.S. Patents and Trademarks Schema (PATENTS)
# ============================================================================
# Data Sources:
#   - USPTO PatentsView bulk TSV downloads (S3: data.patentsview.org)
#       - Patent grants: 5-file ETL join (g_patent + g_application +
#         g_patent_abstract + g_figures + citation aggregates)
#       - Inventors: g_inventor_disambiguated.tsv (~8 GB uncompressed)
#       - Assignees: g_assignee_disambiguated.tsv + location join
#       - CPC classifications: g_cpc_current.tsv
#       - Claims: per-year g_claims_{year}.tsv.zip
#       - Brief summaries: per-year g_brf_sum_text_{year}.tsv.zip
#   - USPTO Trademark bulk CSV (trademark.USPTO.gov)
#       - 5-file join: case_file + owner + classification + intl_class + statement
#
# Run Cadence:
#   - Quarterly: PatentsView releases updated bulk files ~6 weeks after
#     each quarter end. Active months: 3, 6, 9, 12. All other months
#     are BLACKOUT — worker-81 (daily) calls within_release_window and
#     exits immediately if the month is not in {3, 6, 9, 12}.
#   - Worker 80 (initial/historical): full backfill 2010 through
#     GOVDATA_INCREMENTAL_START_YEAR - 1; release-window check skipped.
#
# Incremental Strategy:
#   - Year-partitioned tables: transformer receives year from dimension context
#   - Full-dump files (g_patent.tsv etc.): transformer downloads once,
#     caches to GOVDATA_CACHE_DIR/patents/, re-uses within quarterly TTL,
#     filters output to the requested grant_year.
#   - Per-year ZIPs (claims, summaries): transformer downloads only the
#     {grant_year} file; no cross-year cache needed.
#
# Cross-Schema References:
#   - geo.states / geo.counties via state_fips, county_fips
#   - sec (via entity extraction — not wired here)
#   - census.acs (county-level STEM pipeline)
#   - econ.bls_employment (tech cluster analysis via CPC section G)
# ============================================================================

schemaName: "${SCHEMA_NAME:patents}"
# Ingest config operand — declared in the model, read in code via ModelOperand (never getenv).
includeDesignPatents: "${PATENTS_INCLUDE_DESIGN:false}"
# Full-dump TSVs are re-read once per year; a DQ rebuild spans several years back-to-back.
workerTimeoutMinutes: 180
materializeDirectory: "${GOVDATA_PARQUET_DIR}"

comment: >
  USPTO patent grant and trademark application data from PatentsView bulk downloads
  and USPTO trademark bulk CSV. Patent tables are year-partitioned by grant_year (1976+).
  Trademark tables are year-partitioned by application_year. Claims and summaries include
  vector embedding columns (FLOAT[]) populated at ingestion time via batched embedding
  calls. Full-dump files are cached locally under GOVDATA_CACHE_DIR/patents/ with a
  quarterly TTL to avoid re-downloading on every year invocation.

# ============================================================================
# COLUMN TEMPLATES
# ============================================================================

column_templates:

  grant_year_column: &grant_year_column
    name: grant_year
    type: integer
    nullable: false
    comment: Calendar year of patent grant; primary partition key

  patent_id_column: &patent_id_column
    name: patent_id
    type: string
    comment: USPTO patent number (e.g., 10123456)

  state_fips_column: &state_fips_column
    name: state_fips
    type: string
    nullable: true
    comment: 2-digit state FIPS code; FK to geo.states

  county_fips_column: &county_fips_column
    name: county_fips
    type: string
    nullable: true
    comment: 5-digit county FIPS code; FK to geo.counties

  country_code_column: &country_code_column
    name: country_code
    type: string
    nullable: true
    comment: 2-letter ISO country code

  latitude_column: &latitude_column
    name: latitude
    type: double
    nullable: true
    comment: Latitude from g_location_disambiguated

  longitude_column: &longitude_column
    name: longitude
    type: double
    nullable: true
    comment: Longitude from g_location_disambiguated

  partition_type: &partition_type
    name: type
    type: VARCHAR

  partition_year: &partition_year
    name: year
    type: INTEGER

  partition_quarter: &partition_quarter
    name: quarter
    type: VARCHAR

  standard_partitions: &standard_partitions
    style: hive
    columnDefinitions:
      - *partition_type
      - *partition_year

  # Faithful append-only snapshot tables (patent_id / location_id keyed) carry no grant year.
  # They partition by [type, quarter]: each quarterly full-dump release lands a new partition,
  # so the table is append-only and old releases drop on whatever retention cadence applies.
  snapshot_partitions: &snapshot_partitions
    style: hive
    columnDefinitions:
      - *partition_type
      - *partition_quarter

  patents_iceberg_common: &patents_iceberg_common
    warehousePath: "${GOVDATA_PARQUET_DIR}/patents"
    catalogType: hadoop
    runCompaction: true
    compactionTargetFileSizeBytes: 134217728
    compactionMinFiles: 5

  # Forever/snapshot tables load the whole dump in one shot into a single quarter partition.
  # Inline compaction would re-merge millions of rows on every rebuild and dominate runtime —
  # defer it to a separate maintenance pass. Same warehouse, no inline compaction.
  patents_snapshot_iceberg_common: &patents_snapshot_iceberg_common
    warehousePath: "${GOVDATA_PARQUET_DIR}/patents"
    catalogType: hadoop
    runCompaction: false

  raw_cache_enabled: &raw_cache_enabled
    enabled: true

# ============================================================================
# DIMENSION VALUES
# ============================================================================

dimension_values:

  year_range: &year_range
    type: yearRange
    start: "${GOVDATA_START_YEAR:2010}"
    end: "${GOVDATA_END_YEAR:current}"
    dataLag: 1
    # Process newest year first — one descending sequence from today across daily + historical.
    descending: true

  # Current release token (e.g. 2026Q2), injected by GovDataSchemaFactory. Not sent to any API.
  # Transformers stamp it into full-dump cache filenames so a new quarter lands a fresh path and
  # re-downloads the latest ODP bulk file (superseding the 90-day TTL); the snapshot tables also
  # use it as their partition value so each quarterly release appends a new partition.
  current_quarter: &current_quarter
    - "${GOVDATA_CURRENT_QUARTER_TOKEN}"

# ============================================================================
# PARTITIONED TABLES
# ============================================================================

partitionedTables:

  # ---------------------------------------------------------------------------
  # PATENT_GRANTS — Core patent dimension table
  # ---------------------------------------------------------------------------
  - name: patent_grants
    pattern: "type=patent_grants/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      One row per granted utility patent (design patents excluded by default;
      set PATENTS_INCLUDE_DESIGN=true to include). Faithful recreation of g_patent.tsv —
      no joins. patent_date carries the grant year, so the table self-partitions by
      grant_year. Abstract, filing date, and figure counts live in their own faithful
      tables (patent_abstracts, patent_applications, patent_figures), joined on patent_id
      at query time.

    dimensions:
      type:
        - patent_grants
      year: *year_range
      quarter: *current_quarter

    columns:
      - *patent_id_column
      - *grant_year_column
      - name: patent_date
        type: string
        nullable: true
        comment: Date of patent grant (YYYY-MM-DD)
      - name: patent_type
        type: string
        nullable: true
        comment: utility / design / plant
      - name: patent_title
        type: string
        nullable: true
        comment: Patent title
      - name: num_claims
        type: integer
        nullable: true
        comment: Number of claims
      - name: wipo_kind
        type: string
        nullable: true
        comment: WIPO kind code (B1, B2, etc.)
      - name: withdrawn
        type: boolean
        nullable: true
        comment: Whether patent was withdrawn; filter to false for active grants

    source:
      type: http
      url: "https://api.uspto.gov/api/v1/datasets/products/files/PVGPATDIS/g_patent.tsv.zip"
      method: GET
      skipResponseBody: true
      response:
        format: JSON
      rawCache: *raw_cache_enabled

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.patents.PatentGrantsTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=patent_grants/year=*/"
      partition:
        columns: [type, year]
        valueSource:
          year: effective_year
      iceberg:
        <<: *patents_iceberg_common
        tableName: patent_grants
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # PATENT_ASSIGNEES — Patent ownership at grant time
  # ---------------------------------------------------------------------------
  - name: patent_assignees
    pattern: "type=patent_assignees"
    partitions: *snapshot_partitions
    comment: >
      Faithful recreation of g_assignee_disambiguated.tsv — one row per patent-assignee
      combination, keyed by patent_id, no joins and no year. location_id is the foreign key
      into patent_locations; join there for geography and to patent_grants for a grant year.
      Loaded once per quarter as a full snapshot.

    dimensions:
      type:
        - patent_assignees
      quarter: *current_quarter

    columns:
      - *patent_id_column
      - name: assignee_sequence
        type: integer
        nullable: true
        comment: Order when patent has multiple assignees (0-based)
      - name: assignee_id
        type: string
        nullable: true
        comment: PatentsView disambiguated assignee ID
      - name: assignee_organization
        type: string
        nullable: true
        comment: Organization name; null for individual assignees
      - name: assignee_name_first
        type: string
        nullable: true
        comment: First name; null for org assignees
      - name: assignee_name_last
        type: string
        nullable: true
        comment: Last name; null for org assignees
      - name: assignee_type
        type: string
        nullable: true
        comment: US company / foreign company / US government / individual
      - name: location_id
        type: string
        nullable: true
        comment: FK into patent_locations for geographic fields

    source:
      type: http
      url: "https://api.uspto.gov/api/v1/datasets/products/files/PVGPATDIS/g_assignee_disambiguated.tsv.zip"
      method: GET
      skipResponseBody: true
      response:
        format: JSON
      rawCache: *raw_cache_enabled

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.patents.PatentAssigneesTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=patent_assignees"
      partition:
        columns: [type, quarter]
      iceberg:
        <<: *patents_snapshot_iceberg_common
        tableName: patent_assignees
        batchPartitionColumns: [quarter]

  # ---------------------------------------------------------------------------
  # PATENT_INVENTORS — Inventor listing per patent
  # ---------------------------------------------------------------------------
  - name: patent_inventors
    pattern: "type=patent_inventors"
    partitions: *snapshot_partitions
    comment: >
      Faithful recreation of g_inventor_disambiguated.tsv (~8 GB uncompressed) — one row per
      patent-inventor combination, keyed by patent_id, no joins and no year. location_id is the
      foreign key into patent_locations; join there for geography and to patent_grants for a
      grant year. Loaded once per quarter as a full snapshot.

    dimensions:
      type:
        - patent_inventors
      quarter: *current_quarter

    columns:
      - *patent_id_column
      - name: inventor_id
        type: string
        nullable: true
        comment: PatentsView disambiguated inventor ID
      - name: inventor_sequence
        type: integer
        nullable: true
        comment: Inventor order on patent (0 = first/primary)
      - name: name_first
        type: string
        nullable: true
        comment: First name
      - name: name_last
        type: string
        nullable: true
        comment: Last name
      - name: gender_code
        type: string
        nullable: true
        comment: M / F (inferred by PatentsView disambiguation); useful for diversity analysis
      - name: location_id
        type: string
        nullable: true
        comment: FK into patent_locations for geographic fields

    source:
      type: http
      url: "https://api.uspto.gov/api/v1/datasets/products/files/PVGPATDIS/g_inventor_disambiguated.tsv.zip"
      method: GET
      skipResponseBody: true
      response:
        format: JSON
      rawCache: *raw_cache_enabled

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.patents.PatentInventorsTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=patent_inventors"
      partition:
        columns: [type, quarter]
      iceberg:
        <<: *patents_snapshot_iceberg_common
        tableName: patent_inventors
        batchPartitionColumns: [quarter]

  # ---------------------------------------------------------------------------
  # PATENT_CPC_CLASSES — CPC technology classification per patent
  # ---------------------------------------------------------------------------
  - name: patent_cpc_classes
    pattern: "type=patent_cpc"
    partitions: *snapshot_partitions
    comment: >
      Faithful recreation of g_cpc_current.tsv — one row per patent-CPC code combination,
      keyed by patent_id, no joins and no year. CPC is the primary technology taxonomy for
      patent analysis. Join to patent_grants on patent_id for a grant year. Loaded once per
      quarter as a full snapshot.

    dimensions:
      type:
        - patent_cpc
      quarter: *current_quarter

    columns:
      - *patent_id_column
      - name: cpc_sequence
        type: integer
        nullable: true
        comment: CPC code sequence on patent
      - name: cpc_section
        type: string
        nullable: true
        comment: CPC section (A-H, Y)
      - name: cpc_class
        type: string
        nullable: true
        comment: CPC class (2-char, e.g., H04)
      - name: cpc_subclass
        type: string
        nullable: true
        comment: CPC subclass (1-char, e.g., L)
      - name: cpc_group
        type: string
        nullable: true
        comment: Full CPC classification string (e.g., H04L0009000)
      - name: cpc_type
        type: string
        nullable: true
        comment: i (inventive) or a (additional)

    source:
      type: http
      url: "https://api.uspto.gov/api/v1/datasets/products/files/PVGPATDIS/g_cpc_current.tsv.zip"
      method: GET
      skipResponseBody: true
      response:
        format: JSON
      rawCache: *raw_cache_enabled

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.patents.PatentCpcClassesTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=patent_cpc"
      partition:
        columns: [type, quarter]
      iceberg:
        <<: *patents_snapshot_iceberg_common
        tableName: patent_cpc_classes
        batchPartitionColumns: [quarter]

  # ---------------------------------------------------------------------------
  # PATENT_ABSTRACTS — Faithful g_patent_abstract.tsv snapshot
  # ---------------------------------------------------------------------------
  - name: patent_abstracts
    pattern: "type=patent_abstracts"
    partitions: *snapshot_partitions
    comment: >
      Faithful recreation of g_patent_abstract.tsv — one row per patent abstract, keyed by
      patent_id. Join to patent_grants on patent_id for a grant year. Loaded once per quarter.

    dimensions:
      type:
        - patent_abstracts
      quarter: *current_quarter

    columns:
      - *patent_id_column
      - name: patent_abstract
        type: string
        nullable: true
        comment: Patent abstract text

    source:
      type: http
      url: "https://api.uspto.gov/api/v1/datasets/products/files/PVGPATDIS/g_patent_abstract.tsv.zip"
      method: GET
      skipResponseBody: true
      response:
        format: JSON
      rawCache: *raw_cache_enabled

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.patents.PatentAbstractsTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=patent_abstracts"
      partition:
        columns: [type, quarter]
      iceberg:
        <<: *patents_snapshot_iceberg_common
        tableName: patent_abstracts
        batchPartitionColumns: [quarter]

  # ---------------------------------------------------------------------------
  # PATENT_APPLICATIONS — Faithful g_application.tsv snapshot
  # ---------------------------------------------------------------------------
  - name: patent_applications
    pattern: "type=patent_applications"
    partitions: *snapshot_partitions
    comment: >
      Faithful recreation of g_application.tsv — one row per application record, keyed by
      patent_id. Join to patent_grants on patent_id for a grant year. Loaded once per quarter.

    dimensions:
      type:
        - patent_applications
      quarter: *current_quarter

    columns:
      - *patent_id_column
      - name: filing_date
        type: string
        nullable: true
        comment: Original application filing date (YYYY-MM-DD)
      - name: patent_application_type
        type: string
        nullable: true
        comment: Application type (e.g., utility, continuation)

    source:
      type: http
      url: "https://api.uspto.gov/api/v1/datasets/products/files/PVGPATDIS/g_application.tsv.zip"
      method: GET
      skipResponseBody: true
      response:
        format: JSON
      rawCache: *raw_cache_enabled

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.patents.PatentApplicationsTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=patent_applications"
      partition:
        columns: [type, quarter]
      iceberg:
        <<: *patents_snapshot_iceberg_common
        tableName: patent_applications
        batchPartitionColumns: [quarter]

  # ---------------------------------------------------------------------------
  # PATENT_FIGURES — Faithful g_figures.tsv snapshot
  # ---------------------------------------------------------------------------
  - name: patent_figures
    pattern: "type=patent_figures"
    partitions: *snapshot_partitions
    comment: >
      Faithful recreation of g_figures.tsv — one row per patent figure/sheet count record,
      keyed by patent_id. Join to patent_grants on patent_id for a grant year. Loaded once
      per quarter.

    dimensions:
      type:
        - patent_figures
      quarter: *current_quarter

    columns:
      - *patent_id_column
      - name: num_figures
        type: integer
        nullable: true
        comment: Number of figures
      - name: num_sheets
        type: integer
        nullable: true
        comment: Number of drawing sheets

    source:
      type: http
      url: "https://api.uspto.gov/api/v1/datasets/products/files/PVGPATDIS/g_figures.tsv.zip"
      method: GET
      skipResponseBody: true
      response:
        format: JSON
      rawCache: *raw_cache_enabled

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.patents.PatentFiguresTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=patent_figures"
      partition:
        columns: [type, quarter]
      iceberg:
        <<: *patents_snapshot_iceberg_common
        tableName: patent_figures
        batchPartitionColumns: [quarter]

  # ---------------------------------------------------------------------------
  # PATENT_LOCATIONS — Faithful g_location_disambiguated.tsv snapshot
  # ---------------------------------------------------------------------------
  - name: patent_locations
    pattern: "type=patent_locations"
    partitions: *snapshot_partitions
    comment: >
      Faithful recreation of g_location_disambiguated.tsv — one row per disambiguated
      location, keyed by location_id. FK target for patent_inventors.location_id and
      patent_assignees.location_id. Loaded once per quarter.

    dimensions:
      type:
        - patent_locations
      quarter: *current_quarter

    columns:
      - name: location_id
        type: string
        nullable: false
        comment: PatentsView disambiguated location ID (PK)
      - name: state_fips
        type: string
        nullable: true
        comment: State FIPS code
      - name: county_fips
        type: string
        nullable: true
        comment: County FIPS code
      - name: country_code
        type: string
        nullable: true
        comment: Disambiguated country code
      - name: latitude
        type: double
        nullable: true
        comment: Latitude
      - name: longitude
        type: double
        nullable: true
        comment: Longitude

    source:
      type: http
      url: "https://api.uspto.gov/api/v1/datasets/products/files/PVGPATDIS/g_location_disambiguated.tsv.zip"
      method: GET
      skipResponseBody: true
      response:
        format: JSON
      rawCache: *raw_cache_enabled

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.patents.PatentLocationsTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=patent_locations"
      partition:
        columns: [type, quarter]
      iceberg:
        <<: *patents_snapshot_iceberg_common
        tableName: patent_locations
        batchPartitionColumns: [quarter]

  # ---------------------------------------------------------------------------
  # PATENT_CLAIMS — Individual patent claims with vector embeddings
  # ---------------------------------------------------------------------------
  - name: patent_claims
    pattern: "type=patent_claims/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      One row per patent claim. Claims define the legal scope of the patent —
      the most analytically useful text component. Per-year source files:
      g_claims_{year}.tsv.zip from the PatentsView claims/ subdirectory.
      The embedding column is populated at ingestion time via batched embedding
      calls. For dependent claims, the transformer prepends the parent independent
      claim text before embedding to capture full legal scope.

    dimensions:
      type:
        - patent_claims
      year: *year_range
      quarter: *current_quarter

    columns:
      - *patent_id_column
      - *grant_year_column
      - name: claim_sequence
        type: integer
        nullable: true
        comment: Processing order of claim (1-based)
      - name: claim_number
        type: integer
        nullable: true
        comment: Claim number as printed in the patent
      - name: claim_text
        type: string
        nullable: true
        comment: Full claim text
      - name: dependent
        type: string
        nullable: true
        comment: NULL = independent claim; otherwise a "claim N" reference to the parent's claim_number (verbatim from PatentsView)
      - name: exemplary
        type: boolean
        nullable: true
        comment: Claim designated as exemplary; useful for ML classification

    source:
      type: http
      url: "https://api.uspto.gov/api/v1/datasets/products/files/PVGPATTXT/g_claims_{effective_year}.tsv.zip"
      method: GET
      skipResponseBody: true
      response:
        format: JSON
      rawCache: *raw_cache_enabled

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.patents.PatentClaimsTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=patent_claims/year=*/"
      partition:
        columns: [type, year]
        valueSource:
          year: effective_year
      iceberg:
        <<: *patents_iceberg_common
        tableName: patent_claims
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # PATENT_SUMMARIES — Brief summary text with vector embeddings
  # ---------------------------------------------------------------------------
  - name: patent_summaries
    pattern: "type=patent_summaries/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      One row per patent. Brief summary section text from the patent specification.
      More concise than the full description; covers key aspects and distinguishing
      features over prior art. Per-year source files:
      g_brf_sum_text_{year}.tsv.zip from the PatentsView brief-summary-text/ subdirectory.
      The embedding column is populated at ingestion time.

    dimensions:
      type:
        - patent_summaries
      year: *year_range
      quarter: *current_quarter

    columns:
      - *patent_id_column
      - *grant_year_column
      - name: summary_text
        type: string
        nullable: true
        comment: Full brief summary section text

    source:
      type: http
      url: "https://api.uspto.gov/api/v1/datasets/products/files/PVGPATTXT/g_brf_sum_text_{effective_year}.tsv.zip"
      method: GET
      skipResponseBody: true
      response:
        format: JSON
      rawCache: *raw_cache_enabled

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.patents.PatentSummariesTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=patent_summaries/year=*/"
      partition:
        columns: [type, year]
        valueSource:
          year: effective_year
      iceberg:
        <<: *patents_iceberg_common
        tableName: patent_summaries
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # TRADEMARK_APPLICATIONS — USPTO trademark applications and registrations
  # ---------------------------------------------------------------------------
  - name: trademark_applications
    pattern: "type=trademark_apps/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      One row per trademark application. USPTO trademark bulk dataset is a 13-table
      relational dataset. This flat table requires ETL join of 5 files on serial_no:
      case_file.csv (79 columns, core attributes), owner.csv (applicant identity),
      classification.csv (US class codes), intl_class.csv (international class codes),
      statement.csv (goods and services text). Files are cached locally with quarterly TTL
      and filtered by application_year (parsed from filing_dt). applicant_state is a
      2-letter code, not FIPS — join to geo.states for FIPS.

    dimensions:
      type:
        - trademark_apps
      year: *year_range

    columns:
      - name: serial_no
        type: string
        comment: USPTO trademark serial number (primary key)
      - name: registration_no
        type: string
        nullable: true
        comment: Registration number; null if pending
      - name: application_year
        type: integer
        nullable: false
        comment: Year parsed from filing_dt; partition key
      - name: filing_dt
        type: string
        nullable: true
        comment: Application filing date (YYYYMMDD)
      - name: registration_dt
        type: string
        nullable: true
        comment: Registration date; null if not registered
      - name: abandon_dt
        type: string
        nullable: true
        comment: Abandonment date; null for live marks
      - name: mark_id_char
        type: string
        nullable: true
        comment: Trademark text; null for design marks
      - name: mark_draw_cd
        type: string
        nullable: true
        comment: Drawing code 1=typed 2=design 3=stylized 4=standard char 5=color
      - name: cfh_status_cd
        type: string
        nullable: true
        comment: Status code (live/dead/registered/abandoned/cancelled)
      - name: cfh_status_dt
        type: string
        nullable: true
        comment: Date of current status
      - name: publication_dt
        type: string
        nullable: true
        comment: Date published for opposition
      - name: renewal_dt
        type: string
        nullable: true
        comment: Most recent renewal date
      - name: std_char_claim_in
        type: string
        nullable: true
        comment: Standard character mark flag (T/F)
      - name: applicant_name
        type: string
        nullable: true
        comment: Owner/applicant name from owner.csv
      - name: applicant_type
        type: string
        nullable: true
        comment: Owner type code
      - name: applicant_state
        type: string
        nullable: true
        comment: 2-letter state code (not FIPS); join to geo.states for FIPS
      - name: applicant_country
        type: string
        nullable: true
        comment: 2-letter ISO country code
      - name: goods_services_class
        type: string
        nullable: true
        comment: International class(es) comma-separated (1-45)
      - name: goods_services_description
        type: string
        nullable: true
        comment: Description of goods/services (truncated to 2000 chars)

    source:
      type: http
      url: "https://api.uspto.gov/api/v1/datasets/products/files/TRCFECO2/"
      method: GET
      headers:
        X-Api-Key: "${USPTO_API_KEY}"
      skipResponseBody: true
      response:
        format: JSON
      rawCache: *raw_cache_enabled

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.patents.TrademarkApplicationsTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=trademark_apps/year=*/"
      partition:
        columns: [type, year]
        valueSource:
          year: effective_year
      iceberg:
        <<: *patents_iceberg_common
        tableName: trademark_applications
        batchPartitionColumns: [year]
        incrementalKeys: [year]

# ============================================================================
# CONSTRAINTS
# ============================================================================

constraints:
  patent_grants:
    primaryKey: [patent_id]
  patent_assignees:
    primaryKey: [patent_id, assignee_sequence]
    foreignKeys:
      - columns: [patent_id]
        targetTable: patent_grants
        targetColumns: [patent_id]
        comment: Links assignee row to parent patent grant
      - columns: [location_id]
        targetTable: patent_locations
        targetColumns: [location_id]
        comment: Links assignee to its disambiguated location
  patent_inventors:
    primaryKey: [patent_id, inventor_sequence]
    foreignKeys:
      - columns: [patent_id]
        targetTable: patent_grants
        targetColumns: [patent_id]
        comment: Links inventor row to parent patent grant
      - columns: [location_id]
        targetTable: patent_locations
        targetColumns: [location_id]
        comment: Links inventor to its disambiguated location
  patent_cpc_classes:
    primaryKey: [patent_id, cpc_sequence]
    foreignKeys:
      - columns: [patent_id]
        targetTable: patent_grants
        targetColumns: [patent_id]
        comment: Links CPC classification row to parent patent grant
  patent_abstracts:
    primaryKey: [patent_id]
    foreignKeys:
      - columns: [patent_id]
        targetTable: patent_grants
        targetColumns: [patent_id]
        comment: Links abstract to parent patent grant
  patent_applications:
    primaryKey: [patent_id]
    foreignKeys:
      - columns: [patent_id]
        targetTable: patent_grants
        targetColumns: [patent_id]
        comment: Links application record to parent patent grant
  patent_figures:
    primaryKey: [patent_id]
    foreignKeys:
      - columns: [patent_id]
        targetTable: patent_grants
        targetColumns: [patent_id]
        comment: Links figure-count record to parent patent grant
  patent_locations:
    primaryKey: [location_id]
    foreignKeys:
      - columns: [state_fips]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: states
        targetColumns: [state_fips]
        comment: Links location to geographic state
      - columns: [county_fips]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: counties
        targetColumns: [county_fips]
        comment: Links location to geographic county
      - columns: [country_code]
        targetSchema: "${REF_SCHEMA_NAME:ref}"
        targetTable: countries
        targetColumns: [iso_alpha2]
        comment: Links location country (2-letter ISO) to ref.countries
  patent_claims:
    primaryKey: [patent_id, claim_sequence]
    foreignKeys:
      - columns: [patent_id]
        targetTable: patent_grants
        targetColumns: [patent_id]
        comment: Links claim row to parent patent grant
  patent_summaries:
    primaryKey: [patent_id]
    foreignKeys:
      - columns: [patent_id]
        targetTable: patent_grants
        targetColumns: [patent_id]
        comment: Links summary row to parent patent grant
  trademark_applications:
    primaryKey: [serial_no]
    foreignKeys:
      - columns: [applicant_state]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: states
        targetColumns: [state_abbr]
        comment: Links applicant state (2-letter code, not FIPS) to geographic state
      - columns: [applicant_country]
        targetSchema: "${REF_SCHEMA_NAME:ref}"
        targetTable: countries
        targetColumns: [iso_alpha2]
        comment: Links applicant country (2-letter ISO) to ref.countries
