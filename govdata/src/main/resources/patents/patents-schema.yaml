# ============================================================================
# CONSTRAINTS
# ============================================================================

constraints:
  patent_grants:
    primaryKey: [patent_id]
  # NOTE: The patent_id -> patent_grants foreign keys on the six full-dump snapshot tables
  # below (patent_assignees, patent_inventors, patent_cpc_classes, patent_abstracts,
  # patent_applications, patent_figures) are INFORMATIONAL only. Each snapshot lands the entire
  # PatentsView dump (grants back to 1976) with no year filter, while patent_grants materializes
  # only GOVDATA_START_YEAR+ (2010 by default). Patent_ids granted before the grant window
  # therefore have no parent row — the constraint documents the join, it is not referentially
  # complete. (patent_claims / patent_summaries are year-partitioned to the same window and do
  # not have this gap.)
  patent_assignees:
    primaryKey: [patent_id, assignee_sequence]
    foreignKeys:
      - columns: [patent_id]
        targetTable: patent_grants
        targetColumns: [patent_id]
        comment: Links assignee row to parent patent grant (informational — see note in constraints)
      - columns: [location_id]
        targetTable: patent_locations
        targetColumns: [location_id]
        comment: Links assignee to its disambiguated location
  patent_inventors:
    primaryKey: [patent_id, inventor_sequence]
    foreignKeys:
      - columns: [patent_id]
        targetTable: patent_grants
        targetColumns: [patent_id]
        comment: Links inventor row to parent patent grant (informational — see note in constraints)
      - columns: [location_id]
        targetTable: patent_locations
        targetColumns: [location_id]
        comment: Links inventor to its disambiguated location
  patent_cpc_classes:
    primaryKey: [patent_id, cpc_sequence]
    foreignKeys:
      - columns: [patent_id]
        targetTable: patent_grants
        targetColumns: [patent_id]
        comment: Links CPC classification row to parent patent grant (informational — see note in constraints)
  patent_abstracts:
    primaryKey: [patent_id]
    foreignKeys:
      - columns: [patent_id]
        targetTable: patent_grants
        targetColumns: [patent_id]
        comment: Links abstract to parent patent grant (informational — see note in constraints)
  patent_applications:
    primaryKey: [patent_id]
    foreignKeys:
      - columns: [patent_id]
        targetTable: patent_grants
        targetColumns: [patent_id]
        comment: Links application record to parent patent grant (informational — see note in constraints)
  patent_figures:
    primaryKey: [patent_id]
    foreignKeys:
      - columns: [patent_id]
        targetTable: patent_grants
        targetColumns: [patent_id]
        comment: Links figure-count record to parent patent grant (informational — see note in constraints)
  patent_locations:
    primaryKey: [location_id]
    foreignKeys:
      - columns: [state_fips]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_fips]
        comment: Links location to geographic state
      - columns: [county_fips]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: counties
        targetColumns: [county_fips]
        comment: Links location to geographic county
      - columns: [country_code]
        targetSchema: "${REF_SCHEMA_NAME:ref}"
        targetTable: countries
        targetColumns: [iso_alpha2]
        comment: Links location country (2-letter ISO) to ref.countries
  patent_claims:
    primaryKey: [patent_id, claim_sequence]
    foreignKeys:
      - columns: [patent_id]
        targetTable: patent_grants
        targetColumns: [patent_id]
        comment: Links claim row to parent patent grant
  patent_summaries:
    primaryKey: [patent_id]
    foreignKeys:
      - columns: [patent_id]
        targetTable: patent_grants
        targetColumns: [patent_id]
        comment: Links summary row to parent patent grant
  trademark_case_file:
    primaryKey: [serial_no]
  trademark_owner:
    primaryKey: [serial_no, own_seq]
    foreignKeys:
      - columns: [serial_no]
        targetTable: trademark_case_file
        targetColumns: [serial_no]
        comment: Owner rows belong to a case_file application
      - columns: [own_addr_state_cd]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_abbr]
        comment: Owner state (2-letter code, not FIPS) to geographic state
      - columns: [own_addr_country_cd]
        targetSchema: "${REF_SCHEMA_NAME:ref}"
        targetTable: countries
        targetColumns: [iso_alpha2]
        comment: Owner country (2-letter ISO) to ref.countries
  trademark_classification:
    primaryKey: [serial_no, class_id]
    foreignKeys:
      - columns: [serial_no]
        targetTable: trademark_case_file
        targetColumns: [serial_no]
  trademark_intl_class:
    primaryKey: [serial_no, intl_class_cd]
    foreignKeys:
      - columns: [serial_no]
        targetTable: trademark_case_file
        targetColumns: [serial_no]
      - columns: [serial_no, class_id]
        targetTable: trademark_classification
        targetColumns: [serial_no, class_id]
        comment: Links the international (Nice) class row to its parent US classification record
  trademark_statement:
    primaryKey: [serial_no, statement_type_cd]
    foreignKeys:
      - columns: [serial_no]
        targetTable: trademark_case_file
        targetColumns: [serial_no]

views:
  # Application-level trademark view: one row per serial_no, reconstructed from the faithful source
  # tables — replaces the former ETL join, preserving the previous flat columns. The primary owner
  # (lowest own_seq) supplies applicant_*; applicant_state is a 2-letter code (not FIPS) → geo.states.
  - name: trademark_applications
    comment: >
      One row per trademark application (serial_no), joined from trademark_case_file + owner +
      intl_class + statement. Replaces the old ETL-joined table. applicant_state is a 2-letter
      code (not FIPS) — join geo.states.
    sql: >
      SELECT
        cf.serial_no,
        cf.registration_no,
        cf.year AS application_year,
        cf.filing_dt,
        cf.registration_dt,
        cf.abandon_dt,
        cf.mark_id_char,
        cf.mark_draw_cd,
        cf.cfh_status_cd,
        cf.cfh_status_dt,
        cf.publication_dt,
        cf.renewal_dt,
        cf.std_char_claim_in,
        o.applicant_name,
        o.applicant_type,
        o.applicant_state,
        o.applicant_country,
        ic.goods_services_class,
        st.goods_services_description
      FROM trademark_case_file cf
      LEFT JOIN (
        SELECT serial_no,
          arg_min(own_name, TRY_CAST(own_seq AS INTEGER)) AS applicant_name,
          arg_min(own_type_cd, TRY_CAST(own_seq AS INTEGER)) AS applicant_type,
          arg_min(own_addr_state_cd, TRY_CAST(own_seq AS INTEGER)) AS applicant_state,
          arg_min(own_addr_country_cd, TRY_CAST(own_seq AS INTEGER)) AS applicant_country
        FROM trademark_owner GROUP BY serial_no
      ) o ON o.serial_no = cf.serial_no
      LEFT JOIN (
        SELECT serial_no, string_agg(intl_class_cd, ',') AS goods_services_class
        FROM trademark_intl_class GROUP BY serial_no
      ) ic ON ic.serial_no = cf.serial_no
      LEFT JOIN (
        SELECT serial_no, arg_max(statement_text, length(statement_text)) AS goods_services_description
        FROM trademark_statement GROUP BY serial_no
      ) st ON st.serial_no = cf.serial_no
