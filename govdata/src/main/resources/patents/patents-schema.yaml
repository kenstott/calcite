      - {name: own_seq, type: string, nullable: true, comment: "Sequence of owner records within the same party type"}
      - {name: own_id, type: string, nullable: true, comment: "Unique identifier for the owner record"}
      - {name: own_name, type: string, nullable: true, comment: "Name of the owning party"}
      - {name: own_type_cd, type: string, nullable: true, comment: "Owning party type code (e.g. original applicant, new owner)"}
      - {name: own_entity_cd, type: string, nullable: true, comment: "Owner legal entity type code"}
      - {name: own_entity_desc, type: string, nullable: true, comment: "Owner entity description or statement"}
      - {name: own_composed_of, type: string, nullable: true, comment: "Owner 'composed of' statement"}
      - {name: own_altn_name, type: string, nullable: true, comment: "Owner alternative names (DBA/AKA)"}
      - {name: own_addr_1, type: string, nullable: true, comment: "Owner address line 1"}
      - {name: own_addr_2, type: string, nullable: true, comment: "Owner address line 2"}
      - {name: own_addr_city, type: string, nullable: true, comment: "City or foreign designation of the owner address"}
      - {name: own_addr_state_cd, type: string, nullable: true, comment: "State code of the owner address"}
      - {name: own_addr_postal, type: string, nullable: true, comment: "US or foreign postal code of the owner address"}
      - {name: own_addr_country_cd, type: string, nullable: true, comment: "Country code of the owner address"}
      - {name: own_addr_other_cd, type: string, nullable: true, comment: "Other region (non-country) code of the owner address"}
      - {name: own_nalty_state_cd, type: string, nullable: true, comment: "State code of the owner's place of origin"}
      - {name: own_nalty_country_cd, type: string, nullable: true, comment: "Country code of the owner's place of origin"}
      - {name: own_nalty_other_cd, type: string, nullable: true, comment: "Other region (non-country) code of the owner's place of origin"}
      - name: year
        type: integer
        nullable: false
        comment: Application filing year (Iceberg partition)
    source: *trademark_source
    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.patents.TrademarkOwnerTransformer"
    materialize:
      format: iceberg
      output:
        pattern: "type=trademark_owner/year=*/"
      partition:
        columns: [type, year]
        valueSource:
          year: effective_year
      iceberg:
        <<: *patents_iceberg_common
        tableName: trademark_owner
        runMaintenance: true
        snapshotRetentionDays: 1
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  - name: trademark_classification
    pattern: "type=trademark_classification/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      Faithful landing of USPTO TRCFECO2 classification.csv — US class + first-use dates + status,
      one row per (serial_no, class_id).
    dimensions:
      type:
        - trademark_classification
      year: *year_range
    columns:
      - {name: serial_no, type: string, nullable: false, comment: "Corresponding case file serial number"}
      - {name: class_id, type: string, nullable: true, comment: "Unique identifier for the classification record"}
      - {name: class_primary_cd, type: string, nullable: true, comment: "Classification primary code"}
      - {name: class_status_cd, type: string, nullable: true, comment: "Classification status code"}
      - {name: class_status_dt, type: string, nullable: true, comment: "Date the classification status was recorded (YYYYMMDD)"}
      - {name: class_intl_count, type: string, nullable: true, comment: "Number of international classes"}
      - {name: class_us_count, type: string, nullable: true, comment: "Number of US classes"}
      - {name: first_use_any_dt, type: string, nullable: true, comment: "First-use-anywhere date, converted to a date value (YYYYMMDD)"}
      - {name: first_use_any_dt_raw, type: string, nullable: true, comment: "First-use-anywhere date, as entered in the source XML"}
      - {name: first_use_com_dt, type: string, nullable: true, comment: "First-use-in-commerce date, converted to a date value (YYYYMMDD)"}
      - {name: first_use_com_dt_raw, type: string, nullable: true, comment: "First-use-in-commerce date, as entered in the source XML"}
      - name: year
