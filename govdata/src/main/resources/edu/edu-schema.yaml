    comment: >
      Dept of Ed College Scorecard institution-level outcomes. Earnings, debt,
      completion rates, and enrollment demographics. One row per institution per
      vintage year. Joins to ipeds_institutions via id=unitid or ope8_id=opeid.
      API key required (API_DATA_GOV); PrivacySuppressed values are null.
      Earnings field is mean (not median) at 10yr — median available at 8yr.

    columns:
