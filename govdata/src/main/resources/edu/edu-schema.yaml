        comment: "Mean earnings 10yr after entry for working non-enrolled students (note: mean, not median)"
      - name: median_earnings_8yr
        type: double
        nullable: true
        comment: Median earnings 8yr after entry (earnings.8_yrs_after_entry.median_earnings)
      - name: median_family_income
