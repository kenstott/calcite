# ============================================================================
# Education Schema — K-12 and Higher Education institutional data
# K-12 sources: Urban Institute Education Data Portal (educationdata.urban.org)
#   No API key required; covers CCD, CRDC, NAEP
# Higher ed: Urban Institute API (IPEDS) + College Scorecard API (key required)
#   API_DATA_GOV — free at api.data.gov/signup
# ============================================================================

schemaName: "edu"
materializeDirectory: "${GOVDATA_PARQUET_DIR}"

comment: >
  Institutional education data for K-12 districts, schools, and higher education.
  K-12 tables cover NCES Common Core of Data (CCD), Civil Rights Data Collection
  (CRDC), and NAEP assessments. Higher-ed tables cover IPEDS directory, completions,
  financials, and College Scorecard outcomes. All sourced via the Urban Institute
  Education Data Portal API (free, unauthenticated) except College Scorecard
  (free API key required). Complements census.acs_education (population attainment)
  — this schema describes the institutions themselves.

partitionedTables:

  # ==========================================================================
  # CCD DISTRICTS — NCES Local Education Agency directory, annual
  # Urban Institute API: school-districts/ccd/directory/{year}/
  # ~18,000 LEAs per year; 1986–present
  # ==========================================================================
  - name: ccd_districts
    releaseWindow:
      months: [7, 8]        # NCES posts CCD preliminary July, revised August
    pattern: "year={year}"
    partitions:
      style: hive
      columnDefinitions:
        - name: year
          type: INTEGER

    comment: >
      NCES Common Core of Data — Local Education Agency (district) directory.
      One row per LEA per school year (year = end year; 2022 = 2021-22).
      Primary join target for ccd_schools (leaid) and geo.school_districts (sd_lea = leaid).
      Staff FTE fields (teachers, counselors, psychologists) enable resource equity analysis.

    columns:
      - name: leaid
        type: string
        nullable: false
        comment: NCES LEA ID (7-digit string) — PK component
      - name: year
        type: int
        nullable: false
        comment: School year end year (e.g. 2022 = 2021-22) — PK component
      - name: lea_name
        type: string
        nullable: true
        comment: District name
      - name: fips
        type: int
        nullable: true
        comment: State FIPS code (integer 1-56) — FK to geo.states.state_fips
      - name: state_abbr
        type: string
        nullable: true
        comment: 2-letter state abbreviation from state_location field
      - name: county_code
        type: string
        nullable: true
        comment: 4-digit county code from API; pad to 5 digits for geo.counties.county_fips join
      - name: county_name
        type: string
        nullable: true
        comment: County name
      - name: urban_centric_locale
        type: int
        nullable: true
        comment: NCES locale code (11=city large, 12=city mid, 13=city small, 21=suburb large, 31=town fringe, 41=rural fringe)
      - name: cbsa
        type: int
        nullable: true
        comment: Core-Based Statistical Area code
      - name: latitude
        type: double
        nullable: true
        comment: LEA mailing address latitude
      - name: longitude
        type: double
        nullable: true
        comment: LEA mailing address longitude
      - name: agency_type
        type: int
        nullable: true
        comment: 1=local, 2=supervisory union component, 3=state agency, 4=federal, 7=independent charter
      - name: agency_level
        type: int
        nullable: true
        comment: 1=elementary, 2=secondary, 3=K-12, 4=other
      - name: agency_charter_indicator
        type: int
        nullable: true
        comment: 1=charter LEA, 0=not charter
      - name: lowest_grade_offered
        type: int
        nullable: true
        comment: Lowest grade offered (-1=PK, 0=K, 1-12)
      - name: highest_grade_offered
        type: int
        nullable: true
        comment: Highest grade offered
      - name: number_of_schools
        type: int
        nullable: true
        comment: Number of operational schools in LEA
      - name: enrollment
        type: int
        nullable: true
        comment: Total student enrollment (may be null for some administrative LEAs)
      - name: spec_ed_students
        type: int
        nullable: true
        comment: Students receiving special education services
      - name: english_language_learners
        type: int
        nullable: true
        comment: English language learner students
      - name: teachers_total_fte
        type: double
        nullable: true
        comment: Total FTE classroom teachers across all grade levels
      - name: guidance_counselors_total_fte
        type: double
        nullable: true
        comment: Total FTE guidance counselors
      - name: school_counselors_fte
        type: double
        nullable: true
        comment: FTE school counselors
      - name: school_psychologists_fte
        type: double
        nullable: true
        comment: FTE school psychologists
      - name: librarian_specialists_fte
        type: double
        nullable: true
        comment: FTE librarian/media specialists
      - name: staff_total_fte
        type: double
        nullable: true
        comment: Total FTE all staff categories
      - name: state_leg_district_lower
        type: string
        nullable: true
        comment: State lower legislative district
      - name: state_leg_district_upper
        type: string
        nullable: true
        comment: State upper legislative district
      - name: congress_district_id
        type: int
        nullable: true
        comment: Congressional district ID

    source:
      type: http
      url: "https://educationdata.urban.org/api/v1/school-districts/ccd/directory/{year}/"
      method: GET
      response:
        format: json
        dataPath: "results"
        pagination:
          type: PAGE
          pageSize: 10000
          pageParam: "page"
      rateLimit:
        requestsPerSecond: 2.0
        maxRetries: 2
        retryOn: [429, 500, 503]
      rawCache:
        enabled: true
      incremental:
        yearParam: "year"
        yearRange:
          start: "${GOVDATA_START_YEAR:2010}"

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.edu.CcdDistrictsResponseTransformer"

    dimensions:
      year:
        type: yearRange
        start: "${GOVDATA_START_YEAR:2010}"
        minYear: 2015
        dataLag: 2

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [year]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: false
        runCompaction: false

  # ==========================================================================
  # CCD SCHOOLS — NCES individual school directory, annual
  # Urban Institute API: schools/ccd/directory/{year}/
  # ~100,000 schools per year; 1986–present
  # ==========================================================================
  - name: ccd_schools
    releaseWindow:
      months: [7, 8]        # NCES posts CCD preliminary July, revised August
    pattern: "year={year}"
    partitions:
      style: hive
      columnDefinitions:
        - name: year
          type: INTEGER

    comment: >
      NCES Common Core of Data — individual school directory.
      One row per school per year. Joins to ccd_districts via leaid.
      free_or_reduced_price_lunch enables poverty proxy at the school level.
      Biennial CRDC data joins via ncessch = crdc_schools.ncessch.

    columns:
      - name: ncessch
        type: string
        nullable: false
        comment: NCES school ID (12-digit string) — PK component
      - name: leaid
        type: string
        nullable: false
        comment: Parent LEA ID (7-digit) — FK to ccd_districts.leaid
      - name: year
        type: int
        nullable: false
        comment: School year end year — PK component
      - name: school_name
        type: string
        nullable: true
        comment: School name
      - name: fips
        type: int
        nullable: true
        comment: State FIPS (integer) — FK to geo.states.state_fips
      - name: county_code
        type: string
        nullable: true
        comment: 4-digit county code; pad to 5 digits for geo.counties.county_fips join
      - name: latitude
        type: double
        nullable: true
        comment: School latitude
      - name: longitude
        type: double
        nullable: true
        comment: School longitude
      - name: urban_centric_locale
        type: int
        nullable: true
        comment: NCES locale code
      - name: cbsa
        type: string
        nullable: true
        comment: CBSA code (string in API)
      - name: school_level
        type: int
        nullable: true
        comment: 1=elementary, 2=middle, 3=high, 4=other combined
      - name: school_type
        type: int
        nullable: true
        comment: 1=regular, 2=special ed, 3=vocational, 4=alternative
      - name: school_status
        type: int
        nullable: true
        comment: 1=open, 2=closed, 3=new, 4=added, 5=changed agency, 6=reopened, 8=future
      - name: lowest_grade_offered
        type: int
        nullable: true
        comment: Lowest grade (-1=PK, 0=K, 1-12)
      - name: highest_grade_offered
        type: int
        nullable: true
        comment: Highest grade offered
      - name: charter
        type: int
        nullable: true
        comment: Charter school indicator (1=yes, 0=no)
      - name: magnet
        type: int
        nullable: true
        comment: Magnet school indicator (1=yes, 0=no)
      - name: virtual
        type: int
        nullable: true
        comment: Virtual school indicator (1=yes, 0=no, 2=supplemental)
      - name: shared_time
        type: int
        nullable: true
        comment: Shared-time school (students also attend another school)
      - name: title_i_status
        type: int
        nullable: true
        comment: Title I status code (5=schoolwide, 6=targeted assistance, 7=eligible not participating)
      - name: title_i_eligible
        type: int
        nullable: true
        comment: Title I eligible (1=yes, 0=no)
      - name: title_i_schoolwide
        type: int
        nullable: true
        comment: Schoolwide Title I program (1=yes, 0=no)
      - name: teachers_fte
        type: double
        nullable: true
        comment: FTE classroom teachers
      - name: enrollment
        type: int
        nullable: true
        comment: Total student enrollment
      - name: free_lunch
        type: int
        nullable: true
        comment: Students approved for free lunch (NSLP)
      - name: reduced_price_lunch
        type: int
        nullable: true
        comment: Students approved for reduced-price lunch
      - name: free_or_reduced_price_lunch
        type: int
        nullable: true
        comment: Combined free+reduced lunch count; divide by enrollment for poverty proxy
      - name: direct_certification
        type: int
        nullable: true
        comment: Students directly certified for free meals (SNAP/TANF households)
      - name: lunch_program
        type: int
        nullable: true
        comment: Lunch program type code
      - name: bureau_indian_education
        type: int
        nullable: true
        comment: Bureau of Indian Education school indicator
      - name: congress_district_id
        type: int
        nullable: true
        comment: Congressional district
      - name: state_leg_district_lower
        type: string
        nullable: true
        comment: State lower legislative district
      - name: state_leg_district_upper
        type: string
        nullable: true
        comment: State upper legislative district

    source:
      type: http
      url: "https://educationdata.urban.org/csv/ccd/schools_ccd_directory.csv"
      method: GET
      response:
        format: csv
        pagination:
          type: NONE
      rateLimit:
        requestsPerSecond: 1.0
        maxRetries: 2
        retryOn: [500, 503]
      rawCache:
        enabled: true
      responsePartitioning:
        fields:
          year: "year"
        yearFilter:
          field: "year"
          start: 2015

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.edu.CcdSchoolsResponseTransformer"

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [year]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: false
        runCompaction: false

  # ==========================================================================
  # NAEP SCORES — Nation's Report Card state-level assessment results
  # Source: api.nationsreportcard.gov — unauthenticated; biennial
  # Note: hostname may not resolve from all networks; ETL should handle gracefully
  # ==========================================================================
  - name: naep_scores
    releaseWindow:
      months: [1, 2, 3]     # NAEP results published January–March
      yearParity: odd        # Biennial odd-year cycles (2019, 2021, 2023…)
    pattern: "year={year}"
    partitions:
      style: hive
      columnDefinitions:
        - name: year
          type: INTEGER

    comment: >
      NAEP (National Assessment of Educational Progress) state-level results.
      One row per state × year × subject × grade × subgroup.
      jurisdiction=0 is the national aggregate. Joins to ccd_districts via fips=state_fips.
      Available biennially (even years for grade 4/8 main NAEP).

    columns:
      - name: jurisdiction
        type: int
        nullable: false
        comment: State FIPS code (0 = national aggregate) — PK component
      - name: jurisdiction_name
        type: string
        nullable: true
        comment: State name or "National"
      - name: year
        type: int
        nullable: false
        comment: Assessment year — PK component
      - name: subject
        type: string
        nullable: false
        comment: MAT=mathematics, RED=reading — PK component
      - name: grade
        type: int
        nullable: false
        comment: 4 or 8 — PK component
      - name: variable_type
        type: string
        nullable: false
        comment: Disaggregation type (TOTAL, Race/Ethnicity, Gender, NAEP Eligibility) — PK component
      - name: subgroup_name
        type: string
        nullable: false
        comment: Subgroup label (All students, Male, White, Black, etc.) — PK component
      - name: avg_score
        type: double
        nullable: true
        comment: Average NAEP scale score
      - name: is_displayable
        type: int
        nullable: true
        comment: 1 if statistically displayable (sufficient sample size)

    source:
      type: http
      url: "https://www.nationsreportcard.gov/Dataservice/GetAdhocData.aspx?type=data&subject=MAT&grade={grade}&subscale=MRPCM&variable=TOTAL&jurisdiction=NP,AL,AK,AZ,AR,CA,CO,CT,DE,DC,FL,GA,HI,ID,IL,IN,IA,KS,KY,LA,ME,MD,MA,MI,MN,MS,MO,MT,NE,NV,NH,NJ,NM,NY,NC,ND,OH,OK,OR,PA,RI,SC,SD,TN,TX,UT,VT,VA,WA,WV,WI,WY&stattype=MN:MN&Year={year}"
      method: GET
      urlRules:
        - url: "https://www.nationsreportcard.gov/Dataservice/GetAdhocData.aspx?type=data&subject=MAT&grade={grade}&subscale=MRPCM&variable=TOTAL&jurisdiction=NP,AL,AK,AZ,AR,CA,CO,CT,DE,DC,FL,GA,HI,ID,IL,IN,IA,KS,KY,LA,ME,MD,MA,MI,MN,MS,MO,MT,NE,NV,NH,NJ,NM,NY,NC,ND,OH,OK,OR,PA,RI,SC,SD,TN,TX,UT,VT,VA,WA,WV,WI,WY&stattype=MN:MN&Year={year}"
          variableMatch:
            subscale: MRPCM
        - url: "https://www.nationsreportcard.gov/Dataservice/GetAdhocData.aspx?type=data&subject=RED&grade={grade}&subscale=RRPCM&variable=TOTAL&jurisdiction=NP,AL,AK,AZ,AR,CA,CO,CT,DE,DC,FL,GA,HI,ID,IL,IN,IA,KS,KY,LA,ME,MD,MA,MI,MN,MS,MO,MT,NE,NV,NH,NJ,NM,NY,NC,ND,OH,OK,OR,PA,RI,SC,SD,TN,TX,UT,VT,VA,WA,WV,WI,WY&stattype=MN:MN&Year={year}"
          variableMatch:
            subscale: RRPCM
      response:
        format: json
        dataPath: "result"
        pagination:
          type: NONE
      rateLimit:
        requestsPerSecond: 1.0
        maxRetries: 3
        retryOn: [429, 500, 503]
        skipOn: [400]          # non-assessment years (e.g. 2021, 2023 — no main NAEP) return 400; skip rather than fail the pipeline
      rawCache:
        enabled: true
      incremental:
        yearParam: "year"
        yearRange:
          start: "${GOVDATA_START_YEAR:2010}"

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.edu.NaepScoresResponseTransformer"

    dimensions:
      year:
        type: yearRange       # was 'year_range' (underscore) — UNHANDLED, so minYear/maxYear were silently ignored. NAEP non-assessment/odd/future years fast-fail HTTP 400 (handled by skipOn:[400]); only administered years (2022, 2024, …) return data.
        start: "${GOVDATA_START_YEAR:2010}"
        minYear: 2013
        maxYear: 2024         # latest administered NAEP assessment (2024); bump when a newer cycle publishes. (NaepYearsDimensionResolver was unusable: GetAdhocData.aspx has no type=Years endpoint — returns 400.)
      grade:
        - "4"
        - "8"
      subscale:
        - MRPCM
        - RRPCM

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [year]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: false
        runCompaction: false

  # ==========================================================================
  # NAEP ACHIEVEMENT LEVELS — proficiency distribution from ALD stattype calls
  # Source: api.nationsreportcard.gov GetAdhocData, stattype=ALD:BA/BC/PR/AD
  # Same key structure as naep_scores; one row per key × level (4 levels each)
  # Joins to naep_scores via (jurisdiction, year, subject, grade, variable_type, subgroup_name)
  # ==========================================================================
  - name: naep_achievement_levels
    releaseWindow:
      months: [1, 2, 3]
      yearParity: odd
    pattern: "year={year}"
    partitions:
      style: hive
      columnDefinitions:
        - name: year
          type: INTEGER

    comment: >
      NAEP proficiency level distributions sourced from GetAdhocData ALD stattype calls.
      One row per state × year × subject × grade × subgroup × level.
      level values: below_basic, basic, proficient, advanced.
      pct is the percentage of students at that level for the given key.
      Joins to naep_scores via (jurisdiction, year, subject, grade, variable_type, subgroup_name).

    columns:
      - name: jurisdiction
        type: int
        nullable: false
        comment: State FIPS code (0 = national aggregate) — PK component
      - name: jurisdiction_name
        type: string
        nullable: true
        comment: State name or "National"
      - name: year
        type: int
        nullable: false
        comment: Assessment year — PK component
      - name: subject
        type: string
        nullable: false
        comment: MAT=mathematics, RED=reading — PK component
      - name: grade
        type: int
        nullable: false
        comment: 4 or 8 — PK component
      - name: variable_type
        type: string
        nullable: false
        comment: Disaggregation type (TOTAL, Race/Ethnicity, Gender, NAEP Eligibility) — PK component
      - name: subgroup_name
        type: string
        nullable: false
        comment: Subgroup label (All students, Male, White, Black, etc.) — PK component
      - name: level
        type: string
        nullable: false
        comment: Proficiency level — PK component; below_basic, basic, proficient, advanced
      - name: pct
        type: double
        nullable: true
        comment: Percentage of students at this proficiency level
      - name: is_displayable
        type: int
        nullable: true
        comment: 1 if statistically displayable

    source:
      type: http
      url: "https://www.nationsreportcard.gov/Dataservice/GetAdhocData.aspx?type=data&subject=MAT&grade={grade}&subscale=MRPCM&variable=TOTAL&jurisdiction=NP,AL,AK,AZ,AR,CA,CO,CT,DE,DC,FL,GA,HI,ID,IL,IN,IA,KS,KY,LA,ME,MD,MA,MI,MN,MS,MO,MT,NE,NV,NH,NJ,NM,NY,NC,ND,OH,OK,OR,PA,RI,SC,SD,TN,TX,UT,VT,VA,WA,WV,WI,WY&stattype=ALD:BA&Year={year}"
      method: GET
      urlRules:
        - url: "https://www.nationsreportcard.gov/Dataservice/GetAdhocData.aspx?type=data&subject=MAT&grade={grade}&subscale=MRPCM&variable=TOTAL&jurisdiction=NP,AL,AK,AZ,AR,CA,CO,CT,DE,DC,FL,GA,HI,ID,IL,IN,IA,KS,KY,LA,ME,MD,MA,MI,MN,MS,MO,MT,NE,NV,NH,NJ,NM,NY,NC,ND,OH,OK,OR,PA,RI,SC,SD,TN,TX,UT,VT,VA,WA,WV,WI,WY&stattype=ALD:BA&Year={year}"
          variableMatch:
            subscale: MRPCM
            level: BA
        - url: "https://www.nationsreportcard.gov/Dataservice/GetAdhocData.aspx?type=data&subject=MAT&grade={grade}&subscale=MRPCM&variable=TOTAL&jurisdiction=NP,AL,AK,AZ,AR,CA,CO,CT,DE,DC,FL,GA,HI,ID,IL,IN,IA,KS,KY,LA,ME,MD,MA,MI,MN,MS,MO,MT,NE,NV,NH,NJ,NM,NY,NC,ND,OH,OK,OR,PA,RI,SC,SD,TN,TX,UT,VT,VA,WA,WV,WI,WY&stattype=ALD:PR&Year={year}"
          variableMatch:
            subscale: MRPCM
            level: PR
        - url: "https://www.nationsreportcard.gov/Dataservice/GetAdhocData.aspx?type=data&subject=MAT&grade={grade}&subscale=MRPCM&variable=TOTAL&jurisdiction=NP,AL,AK,AZ,AR,CA,CO,CT,DE,DC,FL,GA,HI,ID,IL,IN,IA,KS,KY,LA,ME,MD,MA,MI,MN,MS,MO,MT,NE,NV,NH,NJ,NM,NY,NC,ND,OH,OK,OR,PA,RI,SC,SD,TN,TX,UT,VT,VA,WA,WV,WI,WY&stattype=ALD:AD&Year={year}"
          variableMatch:
            subscale: MRPCM
            level: AD
        - url: "https://www.nationsreportcard.gov/Dataservice/GetAdhocData.aspx?type=data&subject=RED&grade={grade}&subscale=RRPCM&variable=TOTAL&jurisdiction=NP,AL,AK,AZ,AR,CA,CO,CT,DE,DC,FL,GA,HI,ID,IL,IN,IA,KS,KY,LA,ME,MD,MA,MI,MN,MS,MO,MT,NE,NV,NH,NJ,NM,NY,NC,ND,OH,OK,OR,PA,RI,SC,SD,TN,TX,UT,VT,VA,WA,WV,WI,WY&stattype=ALD:BA&Year={year}"
          variableMatch:
            subscale: RRPCM
            level: BA
        - url: "https://www.nationsreportcard.gov/Dataservice/GetAdhocData.aspx?type=data&subject=RED&grade={grade}&subscale=RRPCM&variable=TOTAL&jurisdiction=NP,AL,AK,AZ,AR,CA,CO,CT,DE,DC,FL,GA,HI,ID,IL,IN,IA,KS,KY,LA,ME,MD,MA,MI,MN,MS,MO,MT,NE,NV,NH,NJ,NM,NY,NC,ND,OH,OK,OR,PA,RI,SC,SD,TN,TX,UT,VT,VA,WA,WV,WI,WY&stattype=ALD:PR&Year={year}"
          variableMatch:
            subscale: RRPCM
            level: PR
        - url: "https://www.nationsreportcard.gov/Dataservice/GetAdhocData.aspx?type=data&subject=RED&grade={grade}&subscale=RRPCM&variable=TOTAL&jurisdiction=NP,AL,AK,AZ,AR,CA,CO,CT,DE,DC,FL,GA,HI,ID,IL,IN,IA,KS,KY,LA,ME,MD,MA,MI,MN,MS,MO,MT,NE,NV,NH,NJ,NM,NY,NC,ND,OH,OK,OR,PA,RI,SC,SD,TN,TX,UT,VT,VA,WA,WV,WI,WY&stattype=ALD:AD&Year={year}"
          variableMatch:
            subscale: RRPCM
            level: AD
      response:
        format: json
        dataPath: "result"
        pagination:
          type: NONE
      rateLimit:
        requestsPerSecond: 1.0
        maxRetries: 3
        retryOn: [429, 500, 503]
        skipOn: [400]
      rawCache:
        enabled: true
      incremental:
        yearParam: "year"
        yearRange:
          start: "${GOVDATA_START_YEAR:2010}"

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.edu.NaepAchievementLevelsResponseTransformer"

    dimensions:
      year:
        type: yearRange       # was 'year_range' (underscore) — UNHANDLED, so minYear/maxYear were silently ignored. NAEP non-assessment/odd/future years fast-fail HTTP 400 (handled by skipOn:[400]); only administered years (2022, 2024, …) return data.
        start: "${GOVDATA_START_YEAR:2010}"
        minYear: 2013
        maxYear: 2024         # latest administered NAEP assessment (2024); bump when a newer cycle publishes. (NaepYearsDimensionResolver was unusable: GetAdhocData.aspx has no type=Years endpoint — returns 400.)
      grade:
        - "4"
        - "8"
      subscale:
        - MRPCM
        - RRPCM
      level:
        - BA
        - PR
        - AD

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [year]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: false
        runCompaction: false

  # ==========================================================================
  # CRDC SCHOOLS — Civil Rights Data Collection, biennial equity metrics
  # Urban Institute API: schools/crdc/{topic}/{year}/
  # Available years: 2013, 2015, 2017, 2019, 2021 (biennial; 2021 is latest as of 2026)
  # Sub-endpoints: directory, chronic-absenteeism, offenses, teachers-staff
  # ==========================================================================
  - name: crdc_schools
    releaseWindow:
      months: [10, 11, 12]  # CRDC even-year surveys published ~18 months later (Oct–Dec)
      yearParity: odd        # Publication year is odd (e.g., 2020-21 survey → released late 2022/2023)
    pattern: "year={year}/crdc_topic={crdc_topic}"
    partitions:
      style: hive
      columnDefinitions:
        - name: year
          type: INTEGER
        - name: crdc_topic
          type: VARCHAR

    # DQ sample cap (GOVDATA_DQ mode): ~100k schools per (year × crdc_topic). Each (year,topic)
    # is a separate fetch-unit, so the cap samples every topic in every year — preserving the
    # per-topic column coverage the all-null check depends on — while bounding materialization.
    # Cache-safe — JSON pages are cached in full during fetch before the iterator caps rows.
    dqRowLimit: 5000

    comment: >
      CRDC school-level equity data consolidated from four Urban Institute sub-endpoints.
      crdc_topic dimension selects the sub-endpoint: directory, chronic-absenteeism,
      offenses, teachers-staff. Join to ccd_schools via ncessch. crdc_id = ncessch for
      most schools. Available biennially (2013, 2015, 2017, 2020, 2021); 2021 is latest.

    columns:
      - name: crdc_id
        type: string
        nullable: true
        comment: >
          Best available PK component for CRDC records; more properly an AK (alternate key).
          Equals ncessch for schools in the NCES universe. Chronic-absenteeism pre-2022 data
          may be null (transformer backfills from ncessch). For schools outside NCES
          (private/charter), crdc_id is the only identifier; ncessch will be null instead.
      - name: ncessch
        type: string
        nullable: true
        comment: NCES school ID — FK to ccd_schools.ncessch; null for ~1,800 non-NCES schools
      - name: leaid
        type: string
        nullable: true
        comment: LEA ID — FK to ccd_districts.leaid
      - name: fips
        type: int
        nullable: true
        comment: State FIPS
      - name: year
        type: int
        nullable: false
        comment: Survey year (2011, 2013, 2015, 2017) — PK component
      - name: crdc_topic
        type: string
        nullable: false
        comment: "Sub-endpoint dimension: directory, chronic-absenteeism, offenses, teachers-staff — PK component"
      # --- directory sub-endpoint ---
      - name: charter_crdc
        type: int
        nullable: true
        comment: Charter school per CRDC report (may differ from CCD value)
      - name: magnet_crdc
        type: int
        nullable: true
        comment: Magnet school per CRDC
      - name: alt_school
        type: int
        nullable: true
        comment: Alternative school indicator
      - name: primarily_serve_students_w_dis
        type: int
        nullable: true
        comment: School primarily serves students with disabilities
      # --- chronic-absenteeism sub-endpoint ---
      - name: race
        type: string
        nullable: true
        comment: Race/ethnicity disaggregation (HI=Hispanic, BL=Black, WH=White, etc.; MF=all)
      - name: sex
        type: string
        nullable: true
        comment: Sex disaggregation (M=male, F=female, MF=both)
      - name: disability
        type: string
        nullable: true
        comment: Disability status disaggregation (WD=with disability, WOD=without, TOT=total)
      - name: lep
        type: string
        nullable: true
        comment: Limited English proficiency disaggregation
      - name: students_chronically_absent
        type: int
        nullable: true
        comment: Count of chronically absent students (>10% days missed) for this subgroup
      # --- offenses sub-endpoint ---
      - name: firearm_incident_ind
        type: int
        nullable: true
        comment: Any firearm incident reported (0/1)
      - name: homicide_ind
        type: double
        nullable: true
        comment: Homicide incident indicator
      - name: rape_incidents
        type: double
        nullable: true
        comment: Number of rape allegations
      - name: sexual_battery_incidents
        type: double
        nullable: true
        comment: Number of sexual battery incidents
      - name: attack_w_weapon_incidents
        type: double
        nullable: true
        comment: Attacks with a weapon (non-firearm)
      - name: attack_no_weapon_incidents
        type: double
        nullable: true
        comment: Attacks without a weapon
      - name: possession_firearm_incidents
        type: double
        nullable: true
        comment: Firearm possession incidents
      # --- teachers-staff sub-endpoint ---
      - name: teachers_fte_crdc
        type: double
        nullable: true
        comment: Total FTE teachers per CRDC report
      - name: teachers_certified_fte
        type: double
        nullable: true
        comment: FTE certified teachers
      - name: teachers_uncertified_fte
        type: double
        nullable: true
        comment: FTE uncertified/emergency-certified teachers
      - name: counselors_fte
        type: double
        nullable: true
        comment: FTE school counselors
      - name: psychologists_fte
        type: double
        nullable: true
        comment: FTE school psychologists
      - name: social_workers_fte
        type: double
        nullable: true
        comment: FTE school social workers
      - name: nurses_fte
        type: double
        nullable: true
        comment: FTE nurses
      - name: security_guard_fte
        type: double
        nullable: true
        comment: FTE security guards
      - name: law_enforcement_fte
        type: double
        nullable: true
        comment: FTE sworn law enforcement officers

    source:
      type: http
      url: "https://educationdata.urban.org/api/v1/schools/crdc/directory/{year}/"
      method: GET
      response:
        format: json
        dataPath: "results"
        pagination:
          type: PAGE
          pageSize: 10000
          pageParam: "page"
      urlRules:
        - url: "https://educationdata.urban.org/api/v1/schools/crdc/chronic-absenteeism/{year}/"
          variableMatch:
            crdc_topic: chronic-absenteeism
        - url: "https://educationdata.urban.org/api/v1/schools/crdc/offenses/{year}/"
          variableMatch:
            crdc_topic: offenses
        - url: "https://educationdata.urban.org/api/v1/schools/crdc/teachers-staff/{year}/"
          variableMatch:
            crdc_topic: teachers-staff
      rateLimit:
        requestsPerSecond: 2.0
        maxRetries: 2
        retryOn: [429, 500, 503]
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.edu.CrdcSchoolsResponseTransformer"

    dimensions:
      year:
        type: yearRange       # was 'year_range' (underscore) — UNHANDLED by the resolver, so minYear was silently ignored and the dim fell back to raw startYear..endYear, fetching non-existent future years
        start: "${GOVDATA_START_YEAR:2010}"
        minYear: 2013
        maxYear: 2022         # latest CRDC collection (2020-21 cycle, published as year 2022); bump when a newer cycle publishes. Without this the Urban API HANGS (Read timed out, ~6min/topic) on non-existent 2023-2026.
      crdc_topic:
        - directory
        - chronic-absenteeism
        - offenses
        - teachers-staff

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [year, crdc_topic]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: false
        runCompaction: false

  # ==========================================================================
  # IPEDS INSTITUTIONS — NCES HD survey, annual
  # Urban Institute API: college-university/ipeds/directory/{year}/
  # ~6,700 active institutions per year; 1986–present
  # Confirmed working: 6,440 records for year=2020
  # Tuition/fees are in a SEPARATE endpoint: academic-year-tuition/{year}/
  # ==========================================================================
  - name: ipeds_institutions
    releaseWindow:
      months: [11]          # IPEDS Fall Data Collection releases November
    pattern: "year={year}"
    partitions:
      style: hive
      columnDefinitions:
        - name: year
          type: INTEGER

    comment: >
      NCES IPEDS Institutional Characteristics (HD survey) directory.
      One row per institution per year. Joins to geo.counties via county_fips
      (pad integer to 5-char string). Enrollment is NOT here (IPEDS EF survey).
      Tuition/fees are NOT here — see ipeds_tuition table (academic-year-tuition endpoint).
      college_scorecard joins via unitid = college_scorecard.id.
      ipeds_completions and ipeds_financials join via unitid.

    columns:
      - name: unitid
        type: int
        nullable: false
        comment: IPEDS unit ID (integer) — PK component
      - name: opeid
        type: string
        nullable: true
        comment: OPE ID 8-digit — FK to college_scorecard.ope8_id
      - name: year
        type: int
        nullable: false
        comment: Survey year — PK component
      - name: inst_name
        type: string
        nullable: true
        comment: Institution name (INSTNM in bulk CSV)
      - name: inst_alias
        type: string
        nullable: true
        comment: Institution alias or common name
      - name: address
        type: string
        nullable: true
        comment: Street address
      - name: city
        type: string
        nullable: true
        comment: City
      - name: state_abbr
        type: string
        nullable: true
        comment: State abbreviation — FK to geo.states.state_abbr
      - name: zip
        type: string
        nullable: true
        comment: ZIP code
      - name: fips
        type: int
        nullable: true
        comment: State FIPS (integer) — FK to geo.states.state_fips
      - name: county_fips
        type: int
        nullable: true
        comment: County FIPS integer (COUNTYCD in bulk); source for county_fips_str
      - name: county_fips_str
        type: string
        nullable: true
        comment: County FIPS zero-padded to 5 chars (e.g. '06037') — FK to geo.counties.county_fips
      - name: county_name
        type: string
        nullable: true
        comment: County name
      - name: longitude
        type: double
        nullable: true
        comment: Longitude (LONGITUD in bulk CSV)
      - name: latitude
        type: double
        nullable: true
        comment: Latitude
      - name: sector
        type: int
        nullable: true
        comment: 0=admin, 1=public 4yr, 2=private nonprofit 4yr, 3=private for-profit 4yr, 4=public 2yr, 5=private nonprofit 2yr, 6=private for-profit 2yr, 7=public <2yr, 8=private nonprofit <2yr, 9=private for-profit <2yr
      - name: inst_control
        type: int
        nullable: true
        comment: 1=public, 2=private nonprofit, 3=private for-profit
      - name: institution_level
        type: int
        nullable: true
        comment: 1=4yr or higher, 2=2-4yr, 3=<2yr
      - name: hbcu
        type: int
        nullable: true
        comment: Historically Black College or University (1=yes, 0=no)
      - name: hospital
        type: int
        nullable: true
        comment: Institution has hospital (1=yes, 0=no)
      - name: medical_degree
        type: int
        nullable: true
        comment: Medical degree offered (1=yes, 0=no)
      - name: tribal_college
        type: int
        nullable: true
        comment: Tribal college or university (1=yes, 0=no)
      - name: land_grant
        type: int
        nullable: true
        comment: Land-grant institution (1=yes, 0=no)
      - name: inst_size
        type: int
        nullable: true
        comment: 1=<1000 students, 2=1000-4999, 3=5000-9999, 4=10000-19999, 5=20000+
      - name: degree_granting
        type: int
        nullable: true
        comment: Degree-granting institution (1=yes, 0=no)
      - name: title_iv_indicator
        type: int
        nullable: true
        comment: Title IV federal financial aid eligible
      - name: offering_undergrad
        type: int
        nullable: true
        comment: Undergraduate programs offered (1=yes)
      - name: offering_grad
        type: int
        nullable: true
        comment: Graduate programs offered (1=yes)
      - name: cc_basic_2021
        type: int
        nullable: true
        comment: Carnegie Classification basic 2021 (integer code; see carnegie.edu for legend)
      - name: cbsa
        type: int
        nullable: true
        comment: CBSA code
      - name: cbsa_type
        type: int
        nullable: true
        comment: 1=metropolitan, 2=micropolitan
      - name: url_school
        type: string
        nullable: true
        comment: Institution website URL

    source:
      type: http
      url: "https://educationdata.urban.org/csv/ipeds/colleges_ipeds_directory.csv"
      method: GET
      response:
        format: csv
        pagination:
          type: NONE
      rateLimit:
        requestsPerSecond: 1.0
        maxRetries: 2
        retryOn: [500, 503]
      rawCache:
        enabled: true
      responsePartitioning:
        fields:
          year: "year"
        yearFilter:
          field: "year"
          start: 2015

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.edu.IpedsInstitutionsResponseTransformer"

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [year]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: false
        runCompaction: false

  # ==========================================================================
  # IPEDS COMPLETIONS — NCES C survey, degrees awarded by field of study
  # Urban Institute API: college-university/ipeds/completions-cip-2/{year}/
  # ~4.2M rows/year (fully disaggregated: institution × CIP × award level × major × race × sex)
  # Confirmed working: 4,159,980 records for year=2022
  # ==========================================================================
  - name: ipeds_completions
    releaseWindow:
      months: [11]          # IPEDS Fall Data Collection releases November
    pattern: "year={year}"
    partitions:
      style: hive
      columnDefinitions:
        - name: year
          type: INTEGER

    # DQ sample cap (GOVDATA_DQ mode): completions is ~4.2M rows/year fully disaggregated.
    # Each year is a separate ZIP fetch-unit, so the cap samples every year while bounding
    # the 4.2M → N Iceberg writes (the slow part). Cache-safe — the ZIP body is cached in
    # full during fetch (before the iterator), so prod (no GOVDATA_DQ) still loads everything.
    dqRowLimit: 5000

    comment: >
      NCES IPEDS Completions survey (C_A bulk CSV). One row per (unitid, year, cipcode,
      majornum, award_level). Race/ethnicity and sex counts are wide columns (ctotalt,
      caiant, casiat, cbkaat, chispt, cnhpit, cwhitt, c2mort, cunknt, cnralt and
      per-sex _m/_w variants). cipcode is the full 6-digit dotted string (e.g. "52.0101").
      Source: nces.ed.gov/ipeds/datacenter/data/C{year}_A.zip. Available 2010–present.

    columns:
      - name: unitid
        type: int
        nullable: false
        comment: IPEDS unit ID — PK component; FK to ipeds_institutions.unitid
      - name: year
        type: int
        nullable: false
        comment: Award year — PK component; injected from URL dimension
      - name: cipcode
        type: string
        nullable: false
        comment: 6-digit CIP field of study (e.g. "52.0101") — PK component
      - name: majornum
        type: int
        nullable: false
        comment: 1=first major, 2=second major — PK component
      - name: award_level
        type: int
        nullable: false
        comment: IPEDS award level — PK component; 1=<1yr cert, 2=1-2yr cert, 3=Associate, 5=Bachelor's, 7=Master's, 17=Doctoral research, 18=Doctoral professional, 19=Doctoral other
      - name: ctotalt
        type: int
        nullable: true
        comment: Total completions (all races, both sexes)
      - name: ctotalm
        type: int
        nullable: true
        comment: Total completions — men
      - name: ctotalw
        type: int
        nullable: true
        comment: Total completions — women
      - name: caiant
        type: int
        nullable: true
        comment: American Indian/Alaska Native — total
      - name: caianm
        type: int
        nullable: true
        comment: American Indian/Alaska Native — men
      - name: caianw
        type: int
        nullable: true
        comment: American Indian/Alaska Native — women
      - name: casiat
        type: int
        nullable: true
        comment: Asian — total
      - name: casiam
        type: int
        nullable: true
        comment: Asian — men
      - name: casiaw
        type: int
        nullable: true
        comment: Asian — women
      - name: cbkaat
        type: int
        nullable: true
        comment: Black or African American — total
      - name: cbkaam
        type: int
        nullable: true
        comment: Black or African American — men
      - name: cbkaaw
        type: int
        nullable: true
        comment: Black or African American — women
      - name: chispt
        type: int
        nullable: true
        comment: Hispanic or Latino — total
      - name: chispm
        type: int
        nullable: true
        comment: Hispanic or Latino — men
      - name: chispw
        type: int
        nullable: true
        comment: Hispanic or Latino — women
      - name: cnhpit
        type: int
        nullable: true
        comment: Native Hawaiian/Other Pacific Islander — total
      - name: cnhpim
        type: int
        nullable: true
        comment: Native Hawaiian/Other Pacific Islander — men
      - name: cnhpiw
        type: int
        nullable: true
        comment: Native Hawaiian/Other Pacific Islander — women
      - name: cwhitt
        type: int
        nullable: true
        comment: White — total
      - name: cwhitm
        type: int
        nullable: true
        comment: White — men
      - name: cwhitw
        type: int
        nullable: true
        comment: White — women
      - name: c2mort
        type: int
        nullable: true
        comment: Two or more races — total
      - name: c2morm
        type: int
        nullable: true
        comment: Two or more races — men
      - name: c2morw
        type: int
        nullable: true
        comment: Two or more races — women
      - name: cunknt
        type: int
        nullable: true
        comment: Race/ethnicity unknown — total
      - name: cunknm
        type: int
        nullable: true
        comment: Race/ethnicity unknown — men
      - name: cunknw
        type: int
        nullable: true
        comment: Race/ethnicity unknown — women
      - name: cnralt
        type: int
        nullable: true
        comment: Nonresident alien — total
      - name: cnralm
        type: int
        nullable: true
        comment: Nonresident alien — men
      - name: cnralw
        type: int
        nullable: true
        comment: Nonresident alien — women

    source:
      type: http
      url: "https://nces.ed.gov/ipeds/datacenter/data/C{year}_A.zip"
      method: GET
      response:
        format: csv
        extractPattern: "?{year}_a_??.csv"
        extractPatternFallback: "?{year}_a.csv"
      rateLimit:
        requestsPerSecond: 1.0
        maxRetries: 2
        retryOn: [429, 503]
        skipOn: [404, 500]
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.edu.IpedsCompletionsResponseTransformer"

    dimensions:
      year:
        type: yearRange
        start: "${GOVDATA_START_YEAR:2010}"
        minYear: 2010

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [year]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: false
        runCompaction: false

  # ==========================================================================
  # IPEDS FINANCIALS — NCES F survey, revenues and expenditures
  # Source: NCES bulk CSV ZIPs — nces.ed.gov/ipeds/datacenter/data/
  # Three form types per fiscal year (combined in one table via form_type column):
  #   F1A = GASB (public institutions)           ~3,900 rows/year
  #   F2  = FASB larger (private non-profit)     ~3,600 rows/year
  #   F3  = FASB smaller (private non-profit)    ~4,200 rows/year
  # URL pattern: F{YY1}{YY2}_F{FORM}.zip  e.g. F2122_F1A.zip = FY2021-22 GASB
  # Available: FY1987-88 through FY2021-22 (final); FY2022-23 provisional (~half coverage)
  # NOTE: Urban Institute API stops at 2017 — use NCES bulk ZIP for all years.
  # Column names use NCES coded names (F1B01, F1C011 etc.); transformer maps to canonical.
  # ==========================================================================
  - name: ipeds_financials
    releaseWindow:
      months: [1]           # IPEDS Finance survey lags other surveys; releases January
    pattern: "year={year}/form_type={form_type}"
    partitions:
      style: hive
      columnDefinitions:
        - name: year
          type: INTEGER
        - name: form_type
          type: VARCHAR

    comment: >
      NCES IPEDS Finance survey (F survey). Revenues, expenditures, endowment, and
      net position per institution per fiscal year. Sourced from NCES bulk ZIP downloads
      (nces.ed.gov/ipeds/datacenter/data/). Three form_type variants cover all institutions:
      F1A=GASB public, F2=FASB larger private, F3=FASB smaller private non-profit.
      All monetary values in dollars. Transformer maps NCES coded column names to canonical
      names. FY2022-23 is provisional (flag with is_provisional=true); FY2021-22 is the
      most recent final release. Joins to ipeds_institutions via unitid.

    columns:
      - name: unitid
        type: int
        nullable: false
        comment: IPEDS unit ID — PK component; FK to ipeds_institutions.unitid
      - name: year
        type: int
        nullable: false
        comment: Fiscal year end (end year of academic year, e.g. 2022 = FY2021-22) — PK component
      - name: form_type
        type: string
        nullable: false
        comment: NCES form variant — PK component; F1A=GASB public, F2=FASB larger private, F3=FASB smaller private
      - name: is_provisional
        type: int
        nullable: false
        comment: 1 if this is a provisional release (FY2022-23 and later); 0 if final
      - name: rev_tuition_fees_gross
        type: double
        nullable: true
        comment: Gross tuition and fees revenue before allowances
      - name: rev_tuition_fees_net
        type: double
        nullable: true
        comment: Net tuition and fees revenue after discounts/allowances
      - name: rev_appropriations_state
        type: double
        nullable: true
        comment: State appropriations revenue
      - name: rev_appropriations_fed
        type: double
        nullable: true
        comment: Federal appropriations revenue
      - name: rev_grants_contracts_federal
        type: double
        nullable: true
        comment: Federal grants and contracts revenue
      - name: rev_grants_contracts_state
        type: double
        nullable: true
        comment: State grants and contracts revenue
      - name: rev_fed_approps_grants
        type: double
        nullable: true
        comment: Combined federal appropriations + grants revenue
      - name: rev_state_local_approps_grants
        type: double
        nullable: true
        comment: Combined state/local appropriations + grants revenue
      - name: rev_gifts_grants_contracts
        type: double
        nullable: true
        comment: Private gifts, grants, and contracts revenue
      - name: rev_investment_return
        type: double
        nullable: true
        comment: Return on investments and endowment
      - name: rev_auxiliary_enterprises_net
        type: double
        nullable: true
        comment: Auxiliary enterprises net revenue (housing, dining, bookstore)
      - name: rev_operating
        type: double
        nullable: true
        comment: Total operating revenues
      - name: rev_nonoperating
        type: double
        nullable: true
        comment: Total nonoperating revenues
      - name: rev_total_current
        type: double
        nullable: true
        comment: Total all revenues and additions
      - name: sch_pell_grant
        type: double
        nullable: true
        comment: Pell grant scholarships/fellowships
      - name: sch_grants_institutional
        type: double
        nullable: true
        comment: Unrestricted institutional grants awarded
      - name: sch_total_student_aid
        type: double
        nullable: true
        comment: Total student aid awarded
      - name: sch_allowances_tuition_fees
        type: double
        nullable: true
        comment: Discount/allowance applied to tuition and fees
      - name: exp_instruc_total
        type: double
        nullable: true
        comment: Instruction expenditures total
      - name: exp_research_total
        type: double
        nullable: true
        comment: Research expenditures total
      - name: exp_pub_serv_total
        type: double
        nullable: true
        comment: Public service expenditures total
      - name: exp_acad_supp_total
        type: double
        nullable: true
        comment: Academic support expenditures (libraries, computing, curriculum)
      - name: exp_student_serv_total
        type: double
        nullable: true
        comment: Student services expenditures (admissions, registrar, athletics)
      - name: exp_inst_supp_total
        type: double
        nullable: true
        comment: Institutional support expenditures (executive management, finance, HR)
      - name: exp_aux_ent_total
        type: double
        nullable: true
        comment: Auxiliary enterprises expenditures
      - name: exp_net_grant_aid_total
        type: double
        nullable: true
        comment: Net grant aid and fellowships expenditures
      - name: exp_total_current
        type: double
        nullable: true
        comment: Total expenses and deductions
      - name: exp_total_salaries
        type: double
        nullable: true
        comment: Total salary expenditures across all functions
      - name: endowment_beg
        type: double
        nullable: true
        comment: Endowment assets beginning of year
      - name: endowment_end
        type: double
        nullable: true
        comment: Endowment assets end of year
      - name: assets
        type: double
        nullable: true
        comment: Total assets
      - name: liabilities
        type: double
        nullable: true
        comment: Total liabilities
      - name: net_position_end
        type: double
        nullable: true
        comment: Net position / net assets at end of year
      - name: longterm_debt
        type: double
        nullable: true
        comment: Long-term debt outstanding

    source:
      type: http
      url: "https://nces.ed.gov/ipeds/datacenter/data/F{fiscal_yy1}{fiscal_yy2}_{form_type}.zip"
      method: GET
      # ZIP contains base file and _rv (revised) file. Prefer _rv; fall back to base.
      extractPattern: "f{fiscal_yy1}{fiscal_yy2}_{form_type_lower}_rv.csv"
      extractPatternFallback: "f{fiscal_yy1}{fiscal_yy2}_{form_type_lower}.csv"
      response:
        format: csv
        # X-prefixed columns are imputation flags — transformer must skip them.
        # Column coding differs per form_type; transformer maps all three to canonical names:
        #   F1A: F1B01=tuition_net, F1C011=instruction, F1H01/02=endowment_beg/end
        #   F2:  F2B01=tuition_net, F2C01=instruction, F2H01/02=endowment_beg/end
        #   F3:  F3B01=tuition_net, F3C01=instruction, F3G01/02=endowment_beg/end
      rateLimit:
        requestsPerSecond: 0.5
        maxRetries: 3
        retryOn: [500, 503]
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.edu.IpedsFinancialsResponseTransformer"
      dimensionResolver: "org.apache.calcite.adapter.govdata.edu.IpedsFinancialsDimensionResolver"

    dimensions:
      year:
        type: yearRange
        start: "${GOVDATA_START_YEAR:2010}"
        minYear: 2015
      fiscal_yy1:
        type: custom
      fiscal_yy2:
        type: custom
      form_type:
        - F1A
        - F2
        - F3

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [year, form_type]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: false
        runCompaction: false

  # ==========================================================================
  # IPEDS TUITION — NCES IC_AY survey, annual published tuition and fees
  # Urban Institute API: college-university/ipeds/academic-year-tuition/{year}/
  # ~17,000 rows/year (institution × level_of_study × tuition_type)
  # Confirmed working: 17,296 records for year=2019
  # ==========================================================================
  - name: ipeds_tuition
    releaseWindow:
      months: [11]          # IPEDS Fall Data Collection releases November
    pattern: "year={year}"
    partitions:
      style: hive
      columnDefinitions:
        - name: year
          type: INTEGER

    comment: >
      NCES IPEDS IC_AY (Institutional Characteristics — Academic Year) survey.
      Published tuition and fees by institution, level of study, and tuition type.
      One row per (unitid, year, level_of_study, tuition_type).
      level_of_study: 1=undergraduate, 2=graduate.
      tuition_type: 1=in-district, 2=in-state, 3=out-of-state, 4=out-of-district.
      Use tuition_type=2 for in-state and tuition_type=3 for out-of-state comparisons.

    columns:
      - name: unitid
        type: int
        nullable: false
        comment: IPEDS unit ID — PK component; FK to ipeds_institutions.unitid
      - name: year
        type: int
        nullable: false
        comment: Academic year — PK component
      - name: fips
        type: int
        nullable: true
        comment: State FIPS (denormalized)
      - name: level_of_study
        type: int
        nullable: false
        comment: 1=undergraduate, 2=graduate — PK component
      - name: tuition_type
        type: int
        nullable: false
        comment: 1=in-district, 2=in-state, 3=out-of-state, 4=out-of-district — PK component
      - name: tuition_fees_ft
        type: int
        nullable: true
        comment: Full-time tuition and fees (combined)
      - name: tuition_ft
        type: int
        nullable: true
        comment: Full-time tuition only
      - name: fees_ft
        type: int
        nullable: true
        comment: Full-time required fees only
      - name: credit_hour_charge_pt
        type: int
        nullable: true
        comment: Per-credit-hour charge for part-time students
      - name: tuition_published
        type: int
        nullable: true
        comment: Published (sticker) tuition
      - name: fees_published
        type: int
        nullable: true
        comment: Published required fees
      - name: tuition_fees_published
        type: int
        nullable: true
        comment: Published total tuition and fees

    source:
      type: http
      url: "https://educationdata.urban.org/api/v1/college-university/ipeds/academic-year-tuition/{year}/"
      method: GET
      response:
        format: json
        dataPath: "results"
        pagination:
          type: PAGE
          pageSize: 10000
          pageParam: "page"
      rateLimit:
        requestsPerSecond: 2.0
        maxRetries: 2
        retryOn: [429, 500, 503]
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.edu.IpedsTuitionResponseTransformer"

    dimensions:
      year:
        type: yearRange
        start: "${GOVDATA_START_YEAR:2010}"
        minYear: 2015
        maxYear: 2021   # Urban Institute academic-year-tuition endpoint only has data through 2021

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [year]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: false
        runCompaction: false

