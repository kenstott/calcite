        nullable: true
        comment: Share of students receiving Pell grants (latest.aid.pell_grant_rate)
      - name: completion_rate_4yr
        type: double
        nullable: true
        comment: 6-year completion rate at 150% time for 4yr institutions
      - name: completion_rate_2yr
        type: double
        nullable: true
        comment: Completion rate for <4yr institutions
      - name: retention_rate_fulltime
