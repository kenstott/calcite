          pageSize: 100
          limitParam: "per_page"
          pageParam: "page"
          countPath: "metadata.total"
      rateLimit:
        requestsPerSecond: 2.0
        maxRetries: 5
        retryOn: [429, 500, 503]
      rawCache:
        enabled: true
      incremental:
        yearParam: "year"
        yearRange:
          start: "${GOVDATA_START_YEAR:2010}"

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.edu.CollegeScorecardResponseTransformer"

    dimensions:
      year:
        type: yearRange
        start: "${GOVDATA_START_YEAR:2010}"
        minYear: 2018

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [year]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: false
        runCompaction: false

  # ==========================================================================
  # COLLEGE SCORECARD PROGRAMS — program-level earnings by CIP code
  # API: api.data.gov/ed/collegescorecard/v1/schools.json
  # Programs nested under latest.programs.cip_4_digit; ~150,000 program rows per year
  # ==========================================================================
  - name: college_scorecard_programs
    releaseWindow:
      months: [10]          # College Scorecard annual cohort data releases October
    pattern: "year={year}"
    partitions:
      style: hive
      columnDefinitions:
        - name: year
          type: INTEGER

    # DQ sample cap (GOVDATA_DQ mode): ~150k program rows/year, paginated 100/page (~1,500
    # API calls/year). Each year is a separate fetch-unit, so the cap samples every year and
    # stops pagination after ~30 pages. Cache-safe — paginated cache commits only on full
    # drain, so a capped run leaves the prod cache untouched.
    dqRowLimit: 3000

    comment: >
      Dept of Ed College Scorecard program-level outcomes by CIP 4-digit code.
      One row per institution × program × credential level per year.
      Earnings by field of study — the most granular post-graduation outcome data.
      Joins to ipeds_completions via (unitid=unit_id, cipcode LIKE cip_code+'%').
      PrivacySuppressed values are null.

    columns:
      - name: unit_id
        type: int
        nullable: false
        comment: IPEDS unit ID — PK component; FK to ipeds_institutions.unitid
      - name: ope6_id
        type: string
        nullable: true
        comment: OPE ID 6-digit
      - name: year
        type: int
        nullable: false
        comment: Data vintage year — PK component
      - name: cip_code
        type: string
        nullable: false
        comment: 4-digit CIP code (e.g. "0199") — PK component
      - name: cip_title
        type: string
        nullable: true
        comment: CIP field of study title
      - name: credential_level
        type: int
        nullable: false
        comment: Credential level code — PK component; 1=certificate <1yr, 2=certificate 1-2yr, 3=associate, 5=bachelor's, 7=master's, 17=doctoral
      - name: credential_title
        type: string
        nullable: true
        comment: Credential level description
      - name: ipeds_awards
        type: int
        nullable: true
        comment: IPEDS completions count for this program (counts.ipeds_awards1)
      - name: median_earnings_1yr
        type: int
        nullable: true
        comment: Median earnings 1yr after completion (earnings.1_yr.overall_median_earnings)
      - name: median_earnings_4yr
        type: int
        nullable: true
        comment: Median earnings 4yr after completion
      - name: median_earnings_5yr
        type: int
        nullable: true
        comment: Median earnings 5yr after completion
      - name: pell_median_earnings_1yr
        type: int
        nullable: true
        comment: Pell grant recipient median earnings 1yr after completion
      - name: nonpell_median_earnings_1yr
        type: int
        nullable: true
        comment: Non-Pell recipient median earnings 1yr after completion

    source:
      type: http
      url: "https://api.data.gov/ed/collegescorecard/v1/schools.json"
      method: GET
      parameters:
        api_key: "${API_DATA_GOV}"
        per_page: "100"
        fields: "latest.programs.cip_4_digit.unit_id,latest.programs.cip_4_digit.ope6_id,latest.programs.cip_4_digit.code,latest.programs.cip_4_digit.title,latest.programs.cip_4_digit.credential.level,latest.programs.cip_4_digit.credential.title,latest.programs.cip_4_digit.counts.ipeds_awards1,latest.programs.cip_4_digit.earnings.1_yr.overall_median_earnings,latest.programs.cip_4_digit.earnings.4_yr.overall_median_earnings,latest.programs.cip_4_digit.earnings.5_yr.overall_median_earnings,latest.programs.cip_4_digit.earnings.1_yr.pell_median_earnings,latest.programs.cip_4_digit.earnings.1_yr.nonpell_median_earnings"
      response:
        format: json
        dataPath: "results"
        pagination:
          type: PAGE_ZERO
          pageSize: 100
          limitParam: "per_page"
          pageParam: "page"
          countPath: "metadata.total"
      rateLimit:
        requestsPerSecond: 2.0
