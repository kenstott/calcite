# ============================================================================
# Views
# ============================================================================

views:

  - name: district_resources
    comment: >
      District enrollment and staffing resource ratios. Joins CCD district
      directory to school-level lunch program aggregates for a poverty proxy.
      One row per district per year.
    sql: >
      SELECT
        d.leaid,
        d.year,
        d.lea_name,
        d.fips,
        d.state_abbr,
        d.county_code,
        d.urban_centric_locale,
        d.enrollment,
        d.number_of_schools,
        d.teachers_total_fte,
        d.guidance_counselors_total_fte,
        d.school_psychologists_fte,
        d.enrollment / NULLIF(d.teachers_total_fte, 0)                    AS pupil_teacher_ratio,
        s.free_or_reduced_price_lunch                                      AS district_frpl_count,
        s.free_or_reduced_price_lunch * 1.0 / NULLIF(s.enrollment, 0)     AS frpl_rate
      FROM ccd_districts d
      LEFT JOIN (
        SELECT leaid, year,
               SUM(free_or_reduced_price_lunch) AS free_or_reduced_price_lunch,
               SUM(enrollment)                  AS enrollment
        FROM ccd_schools
        GROUP BY leaid, year
      ) s ON d.leaid = s.leaid AND d.year = s.year

  - name: naep_state_trends
    comment: >
      NAEP aggregate trends for all-student subgroup by state, subject, and grade.
      Filters to variable_type=TOTAL to avoid double-counting disaggregations.
      One row per state × year × subject × grade.
    sql: >
      SELECT
        n.jurisdiction,
        n.jurisdiction_name,
        n.year,
        n.subject,
        n.grade,
        n.avg_score
      FROM naep_scores n
      WHERE n.variable_type = 'TOTAL'
        AND n.subgroup_name = 'All students'

  - name: school_equity_profile
    comment: >
      School-level equity view joining CCD enrollment data with CRDC safety and
      staffing metrics. Uses CRDC teachers-staff topic for staffing, offenses topic
      for safety incidents. Filters CRDC to total subgroup (race=MF) to avoid
      row multiplication from disaggregated chronic absenteeism rows.
    sql: >
      SELECT
        s.ncessch,
        s.school_name,
        s.leaid,
        s.year,
        s.enrollment,
        s.free_or_reduced_price_lunch,
        s.free_or_reduced_price_lunch * 1.0 / NULLIF(s.enrollment, 0)  AS frpl_rate,
        s.charter,
        s.school_level,
        ts.counselors_fte,
        ts.psychologists_fte,
        ts.teachers_certified_fte,
        ts.teachers_uncertified_fte,
        o.firearm_incident_ind,
        o.rape_incidents,
        o.possession_firearm_incidents
      FROM ccd_schools s
      LEFT JOIN crdc_schools ts
        ON s.ncessch = ts.ncessch
        AND ts.crdc_topic = 'teachers-staff'
        AND ts.year = (
          CASE WHEN s.year >= 2017 THEN 2017
               WHEN s.year >= 2015 THEN 2015
               WHEN s.year >= 2013 THEN 2013
               ELSE 2013 END
        )
      LEFT JOIN crdc_schools o
        ON s.ncessch = o.ncessch
        AND o.crdc_topic = 'offenses'
        AND o.year = ts.year

  - name: institution_outcomes
    comment: >
      Higher education institution outcomes: IPEDS directory joined to College
      Scorecard earnings and debt, plus in-state undergraduate tuition from ipeds_tuition.
      One row per institution per year. Covers both 2yr and 4yr institutions.
    sql: >
      SELECT
        i.unitid,
        i.inst_name,
        i.city,
        i.state_abbr,
        i.county_fips,
        i.year,
        i.sector,
        i.inst_control,
        i.institution_level,
        i.hbcu,
        i.tribal_college,
        i.inst_size,
        t.tuition_fees_ft AS tuition_in_state,
        t_out.tuition_fees_ft AS tuition_out_state,
        sc.pell_grant_rate,
        sc.completion_rate_4yr,
        sc.completion_rate_2yr,
        sc.median_debt_completers,
        sc.median_debt_noncompleters,
        sc.mean_earnings_10yr,
        sc.median_earnings_8yr,
        sc.median_family_income,
        sc.default_rate_3yr,
        sc.avg_net_price_public,
        sc.avg_net_price_private
      FROM ipeds_institutions i
      LEFT JOIN ipeds_tuition t
        ON i.unitid = t.unitid AND i.year = t.year
        AND t.level_of_study = 1 AND t.tuition_type = 2
      LEFT JOIN ipeds_tuition t_out
        ON i.unitid = t_out.unitid AND i.year = t_out.year
        AND t_out.level_of_study = 1 AND t_out.tuition_type = 3
      LEFT JOIN college_scorecard sc
        ON i.unitid = sc.id AND i.year = sc.year

  - name: field_of_study_roi
    comment: >
      Program-level return on investment: College Scorecard earnings by CIP code
      and credential joined to IPEDS completions counts. Enables ranking fields
      of study by earnings at 1yr, 4yr, and 5yr after completion.
    sql: >
      SELECT
        p.unit_id,
        p.year,
        p.cip_code,
        p.cip_title,
        p.credential_level,
        p.credential_title,
        p.ipeds_awards,
        p.median_earnings_1yr,
        p.median_earnings_4yr,
        p.median_earnings_5yr,
        p.pell_median_earnings_1yr,
        p.nonpell_median_earnings_1yr,
        i.inst_name,
        i.state_abbr,
        i.sector
      FROM college_scorecard_programs p
      LEFT JOIN ipeds_institutions i
        ON p.unit_id = i.unitid AND p.year = i.year

  - name: district_charter_profile
    comment: >
      District-level summary of school types: charter, magnet, Title I, and virtual
      school counts derived from ccd_schools. Joins to ccd_districts for district
      name and enrollment context. One row per district per year.
    sql: >
      SELECT
        d.leaid,
        d.year,
        d.lea_name,
        d.fips,
        d.state_abbr,
        d.enrollment                                                        AS district_enrollment,
        d.number_of_schools,
        d.teachers_total_fte,
        SUM(CASE WHEN s.charter = 1 THEN 1 ELSE 0 END)                     AS charter_school_count,
        SUM(CASE WHEN s.magnet = 1 THEN 1 ELSE 0 END)                      AS magnet_school_count,
        SUM(CASE WHEN s.virtual = 1 THEN 1 ELSE 0 END)                     AS virtual_school_count,
        SUM(CASE WHEN s.title_i_schoolwide = 1 THEN 1 ELSE 0 END)          AS title_i_schoolwide_count,
        SUM(CASE WHEN s.title_i_eligible = 1 THEN 1 ELSE 0 END)            AS title_i_eligible_count,
        SUM(CASE WHEN s.school_status = 1 THEN 1 ELSE 0 END)               AS open_school_count,
        SUM(s.enrollment)                                                   AS school_enrollment_sum,
        SUM(s.free_or_reduced_price_lunch) * 1.0
          / NULLIF(SUM(s.enrollment), 0)                                    AS district_frpl_rate,
        SUM(CASE WHEN s.charter = 1 THEN 1 ELSE 0 END) * 1.0
          / NULLIF(COUNT(*), 0)                                             AS charter_share
      FROM ccd_districts d
      JOIN ccd_schools s
        ON d.leaid = s.leaid AND d.year = s.year
      GROUP BY
        d.leaid, d.year, d.lea_name, d.fips, d.state_abbr,
        d.enrollment, d.number_of_schools, d.teachers_total_fte

  - name: institution_completions_summary
    comment: >
      Institution-level completions totals by award level per year.
      Collapses ipeds_completions to one row per institution per year by summing
      awards for all race=99 (total), sex=99 (total), majornum=1 (first-major)
      rows. Joins to ipeds_institutions for institutional context.
      award_level codes: 3=Associate, 5=Bachelor, 7=Master, 17/18/19=Doctoral.
    sql: >
      SELECT
        i.unitid,
        i.inst_name,
        i.year,
        i.state_abbr,
        i.sector,
        i.inst_control,
        i.hbcu,
        i.tribal_college,
        SUM(CASE WHEN c.award_level = 3
            THEN c.awards ELSE 0 END)                                       AS associate_total,
        SUM(CASE WHEN c.award_level = 5
            THEN c.awards ELSE 0 END)                                       AS bachelor_total,
        SUM(CASE WHEN c.award_level = 7
            THEN c.awards ELSE 0 END)                                       AS masters_total,
        SUM(CASE WHEN c.award_level IN (17, 18, 19)
            THEN c.awards ELSE 0 END)                                       AS doctoral_total,
        SUM(CASE WHEN c.award_level IN (1, 2)
            THEN c.awards ELSE 0 END)                                       AS certificate_total,
        SUM(c.awards)                                                       AS completions_total
      FROM ipeds_institutions i
      LEFT JOIN ipeds_completions c
        ON i.unitid = c.unitid AND i.year = c.year
        AND c.race = 99 AND c.sex = 99 AND c.majornum = 1
      GROUP BY
        i.unitid, i.inst_name, i.year, i.state_abbr, i.sector,
        i.inst_control, i.hbcu, i.tribal_college

  - name: ipeds_financial_efficiency
    comment: >
      Institution-level financial efficiency ratios from IPEDS Finance survey.
      tuition_dependency = net_tuition / total_revenue; a ratio > 0.70 signals
      heavy reliance on tuition. Form type is preserved so GASB/FASB institutions
      can be filtered or compared. One row per institution per fiscal year.
    sql: >
      SELECT
        f.unitid,
        f.year,
        f.form_type,
        f.is_provisional,
        i.inst_name,
        i.state_abbr,
        i.sector,
        i.inst_control,
        i.hbcu,
        f.rev_tuition_fees_net,
        f.rev_total_current,
        f.exp_instruc_total,
        f.endowment_end,
        f.net_position_end,
        f.rev_tuition_fees_net / NULLIF(f.rev_total_current, 0)            AS tuition_dependency_ratio,
        f.exp_total_salaries / NULLIF(f.exp_total_current, 0)              AS salary_share_of_expenses,
        f.sch_total_student_aid / NULLIF(f.rev_tuition_fees_gross, 0)      AS institutional_discount_rate
      FROM ipeds_financials f
      LEFT JOIN ipeds_institutions i
        ON f.unitid = i.unitid AND f.year = i.year

  - name: district_naep_spending
    comment: >
      Achievement gap analysis: NAEP state scores joined to district resource
      levels. Aggregates district data to state level for NAEP join. Enables
      correlation of per-pupil resources with assessment outcomes.
    sql: >
      SELECT
        n.jurisdiction,
        n.jurisdiction_name,
        n.year,
        n.subject,
        n.grade,
        n.avg_score,
        d.total_enrollment,
        d.avg_pupil_teacher_ratio,
        d.avg_frpl_rate,
        d.district_count
      FROM naep_scores n
      LEFT JOIN (
        SELECT
          fips,
          year,
          SUM(enrollment)                                               AS total_enrollment,
          AVG(enrollment / NULLIF(teachers_total_fte, 0))              AS avg_pupil_teacher_ratio,
          COUNT(*)                                                      AS district_count,
          SUM(school_frpl.frpl_count) * 1.0 / NULLIF(SUM(enrollment), 0) AS avg_frpl_rate
        FROM ccd_districts d2
        LEFT JOIN (
          SELECT leaid, year, SUM(free_or_reduced_price_lunch) AS frpl_count
          FROM ccd_schools GROUP BY leaid, year
        ) school_frpl ON d2.leaid = school_frpl.leaid AND d2.year = school_frpl.year
        GROUP BY fips, year
      ) d ON n.jurisdiction = d.fips AND n.year = d.year
      WHERE n.variable_type = 'TOTAL' AND n.subgroup_name = 'All students'

  # --------------------------------------------------------------------------
  # Inter-domain views (require geo schema)
  # --------------------------------------------------------------------------

  - name: institution_county_context
    comment: >
      IPEDS institutions enriched with county name from geo.counties.
      Joins via county_fips_str (zero-padded 5-digit FIPS computed by transformer).
      geo.counties is partitioned by year; this view uses the latest available geo year.
      Requires geo schema present in the same Calcite model.
      One row per institution per year (geo join may expand slightly if multi-year geo present).
    sql: >
      SELECT
        i.unitid,
        i.inst_name,
        i.year,
        i.state_abbr,
        i.fips,
        i.county_fips,
        i.county_fips_str,
        i.county_name                                                       AS ipeds_county_name,
        c.county_name                                                       AS geo_county_name,
        c.state_fips                                                        AS geo_state_fips,
        i.city,
        i.latitude,
        i.longitude,
        i.sector,
        i.inst_control,
        i.inst_size,
        i.hbcu,
        i.tribal_college,
        i.degree_granting
      FROM ipeds_institutions i
      LEFT JOIN geo.counties c
        ON i.county_fips_str = c.county_fips

  - name: state_naep_geography
    comment: >
      NAEP state-level assessment scores joined to geo.states for state name
      and geographic context. Filters to all-student total rows to avoid
      double-counting disaggregations. jurisdiction=0 (national aggregate)
      will not join to geo.states and is retained with null geo fields.
      Requires geo schema present in the same Calcite model.
    sql: >
      SELECT
        n.jurisdiction,
        n.jurisdiction_name,
        s.state_name                                                        AS geo_state_name,
        s.state_abbr                                                        AS geo_state_abbr,
        n.year,
        n.subject,
        n.grade,
        n.avg_score,
        n.is_displayable
      FROM naep_scores n
      LEFT JOIN geo.states s
        ON n.jurisdiction = s.state_fips
      WHERE n.variable_type = 'TOTAL'
        AND n.subgroup_name = 'All students'

  - name: naep_proficiency_summary
    comment: >
      NAEP mean scores with proficiency level distributions in a single pivot row.
      Joins naep_scores to naep_achievement_levels via the full natural key.
      Filters to all-student TOTAL subgroup. One row per state × year × subject × grade.
      pct_* columns are null when achievement level data has not been ingested.
    sql: >
      SELECT
        n.jurisdiction,
        n.jurisdiction_name,
        n.year,
        n.subject,
        n.grade,
        n.avg_score,
        MAX(CASE WHEN a.level = 'below_basic'  THEN a.pct END)              AS pct_below_basic,
        MAX(CASE WHEN a.level = 'basic'         THEN a.pct END)              AS pct_basic,
        MAX(CASE WHEN a.level = 'proficient'    THEN a.pct END)              AS pct_proficient,
        MAX(CASE WHEN a.level = 'advanced'      THEN a.pct END)              AS pct_advanced
      FROM naep_scores n
      LEFT JOIN naep_achievement_levels a
        ON  a.jurisdiction  = n.jurisdiction
        AND a.year          = n.year
        AND a.subject       = n.subject
        AND a.grade         = n.grade
        AND a.variable_type = n.variable_type
        AND a.subgroup_name = n.subgroup_name
      WHERE n.variable_type = 'TOTAL'
        AND n.subgroup_name = 'All students'
      GROUP BY
        n.jurisdiction, n.jurisdiction_name, n.year, n.subject, n.grade, n.avg_score

# ============================================================================
# CONSTRAINTS
# ============================================================================

constraints:

  ccd_districts:
    primaryKey: [year, leaid]
    foreignKeys:
      - columns: [fips]
        targetSchema: "geo"
        targetTable: states
        targetColumns: [state_fips]
        comment: Links district state to geographic state record

  ccd_schools:
    primaryKey: [year, ncessch]
    foreignKeys:
      - columns: [leaid, year]
        targetTable: ccd_districts
        targetColumns: [leaid, year]
        comment: Links school to parent LEA district record
      - columns: [fips]
        targetSchema: "geo"
        targetTable: states
        targetColumns: [state_fips]
        comment: Links school state to geographic state record

  naep_scores:
    primaryKey: [year, jurisdiction, subject, grade, variable_type, subgroup_name]
    foreignKeys:
      - columns: [jurisdiction]
        targetSchema: "geo"
        targetTable: states
        targetColumns: [state_fips]
        comment: Links NAEP state to geo.states; jurisdiction=0 (national aggregate) will not match

  naep_achievement_levels:
    primaryKey: [year, jurisdiction, subject, grade, variable_type, subgroup_name, level]
    foreignKeys:
      - columns: [jurisdiction, year, subject, grade, variable_type, subgroup_name]
        targetTable: naep_scores
        targetColumns: [jurisdiction, year, subject, grade, variable_type, subgroup_name]
        comment: Links achievement level row to its corresponding mean score row

  crdc_schools:
    primaryKey: [year, crdc_topic, crdc_id]
    foreignKeys:
      - columns: [ncessch, year]
        targetTable: ccd_schools
        targetColumns: [ncessch, year]
        comment: Links CRDC school record to CCD school directory (crdc_id = ncessch for most schools)
      - columns: [leaid, year]
        targetTable: ccd_districts
        targetColumns: [leaid, year]
        comment: Links CRDC school to parent district; populated for directory sub-endpoint only

  ipeds_institutions:
    primaryKey: [year, unitid]
    foreignKeys:
      - columns: [fips]
        targetSchema: "geo"
        targetTable: states
        targetColumns: [state_fips]
        comment: Links institution state to geographic state record
      - columns: [county_fips_str]
        targetSchema: "geo"
        targetTable: counties
        targetColumns: [county_fips]
        comment: Links institution county to geo.counties; county_fips_str is zero-padded by transformer

  ipeds_completions:
    primaryKey: [year, unitid, cipcode, award_level, majornum, race, sex]
    foreignKeys:
      - columns: [unitid, year]
        targetTable: ipeds_institutions
        targetColumns: [unitid, year]
        comment: Links completion record to institution directory

  ipeds_tuition:
    primaryKey: [year, unitid, level_of_study, tuition_type]
    foreignKeys:
      - columns: [unitid, year]
        targetTable: ipeds_institutions
        targetColumns: [unitid, year]
        comment: Links tuition record to institution directory

  ipeds_financials:
    primaryKey: [year, form_type, unitid]
    foreignKeys:
      - columns: [unitid, year]
        targetTable: ipeds_institutions
        targetColumns: [unitid, year]
        comment: Links financial record to institution directory

  college_scorecard:
    primaryKey: [year, id]
    foreignKeys:
      - columns: [id, year]
        targetTable: ipeds_institutions
        targetColumns: [unitid, year]
        comment: Links Scorecard institution to IPEDS directory via unitid
      - columns: [state]
        targetSchema: "geo"
        targetTable: states
        targetColumns: [state_abbr]
        comment: Links institution state to geographic state record

  college_scorecard_programs:
    primaryKey: [year, unit_id, cip_code, credential_level]
    foreignKeys:
      - columns: [unit_id, year]
        targetTable: college_scorecard
        targetColumns: [id, year]
        comment: Links program-level record to institution-level Scorecard record
      - columns: [unit_id, year]
        targetTable: ipeds_institutions
        targetColumns: [unitid, year]
        comment: Direct link to IPEDS directory; bypasses college_scorecard for joins against ipeds tables
