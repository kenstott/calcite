      - name: avg_net_price_public
        type: int
        nullable: true
        comment: Average net price for public institutions after aid
      - name: avg_net_price_private
        type: int
        nullable: true
        comment: Average net price for private institutions after aid
      - name: tuition_in_state
        type: int
        nullable: true
        comment: In-state tuition (cost.tuition.in_state)
      - name: tuition_out_state
        type: int
        nullable: true
        comment: Out-of-state tuition (cost.tuition.out_of_state)

    source:
      type: http
      url: "https://api.data.gov/ed/collegescorecard/v1/schools.json"
      method: GET
      parameters:
        api_key: "${API_DATA_GOV}"
        per_page: "100"
        fields: "id,ope8_id,ope6_id,school.name,school.city,school.state,school.ownership,school.carnegie_basic,school.minority_serving.historically_black,school.minority_serving.tribal,school.minority_serving.hispanic,school.online_only,school.locale,latest.student.size,latest.aid.pell_grant_rate,latest.completion.completion_rate_4yr_150nt,latest.completion.completion_rate_less_than_4yr_150nt,latest.student.retention_rate.four_year.full_time,latest.aid.median_debt.completers.overall,latest.aid.median_debt.noncompleters,latest.earnings.10_yrs_after_entry.working_not_enrolled.mean_earnings,latest.earnings.8_yrs_after_entry.median_earnings,latest.student.demographics.median_family_income,latest.repayment.3_yr_default_rate,latest.cost.avg_net_price.public,latest.cost.avg_net_price.private,latest.cost.tuition.in_state,latest.cost.tuition.out_of_state"
