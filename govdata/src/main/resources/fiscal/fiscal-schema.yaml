  # ---------------------------------------------------------------------------
  # SSA OASDI/SSI BENEFITS BY COUNTY — statcomps XLSX via Wayback (delta by year)
  # ---------------------------------------------------------------------------
  - name: ssa_benefits_by_geography
    pattern: "type=ssa_benefits_by_geography/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      SSA OASDI and SSI beneficiary counts and total benefit dollars by county x
      program x benefit type x year — the largest federal mandatory-spending
      stream, geo-keyed and comparable per county against soi_income_by_county and
      usaspending_by_state. SSA publishes only multi-sheet XLSX reports on a
      WAF-protected host that 403s non-browser clients, so the provider fetches the
      Wayback-archived workbook (oasdi_sc / ssi_sc) and parses the per-state county
      tables (Table 4 counts + Table 5 dollars for OASDI; Table 3 for SSI). The
      ANSI Code column carries the county FIPS directly. beneficiary_type is a
      mutually-exclusive published category (OASDI leaves sum to 'total'). Amounts
      are the December total monthly benefits, in whole USD; avg_monthly is per
      beneficiary. SSI per-category dollars are not published (only the total).
    dqRowLimit: 50000

    dimensions:
      type:
        - ssa_benefits_by_geography
      year: *ssa_year_range

    columns:
      - <<: *state_fips_column
        nullable: false
      - name: state_name
        type: string
        nullable: true
        comment: State name (from the workbook tab)
      - <<: *county_fips_column
        nullable: false
      - name: county_name
        type: string
        nullable: true
        comment: County name
      - name: program
        type: string
        nullable: false
        comment: OASDI (Old-Age/Survivors/Disability) or SSI
      - name: beneficiary_type
        type: string
        nullable: false
        comment: >
          Published category — OASDI: total, retired_workers, retired_spouses,
          retired_children, survivors_widows_parents, survivors_children,
          disabled_workers, disabled_spouses, disabled_children (leaves sum to
          total); SSI: total, aged, blind_and_disabled
      - name: num_beneficiaries
        type: long
        nullable: true
        comment: Number of beneficiaries in current-payment status (December)
      - name: total_benefits_usd
        type: double
        nullable: true
        comment: Total December monthly benefits, USD (null for SSI non-total types)
      - name: avg_monthly_benefit_usd
        type: double
        nullable: true
        comment: Average monthly benefit per beneficiary, USD (derived)

    source:
      type: http
      # Nominal source; the provider fetches the Wayback-archived workbook per year.
      url: "https://www.ssa.gov/policy/docs/statcomps/oasdi_sc/"
      method: GET
      response:
        format: text
      rateLimit:
        requestsPerSecond: 0.5
        retryOn: [429, 500, 503]
        maxRetries: 3
      rawCache:
        enabled: false

    hooks:
      dataProvider: "org.apache.calcite.adapter.govdata.fiscal.SsaBenefitsProvider"

    materialize:
      format: iceberg
      output:
        pattern: "type=ssa_benefits_by_geography/year=*/"
      partition:
        columns: [type, year]
        valueSource:
          year: effective_year
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/fiscal"
        tableName: ssa_benefits_by_geography
        runMaintenance: true
        snapshotRetentionDays: 1
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 67108864
        compactionMinFiles: 3
        batchPartitionColumns: [year]
        incrementalKeys: [year]
        overwritePartitions: true

  # ---------------------------------------------------------------------------
  # SSA BENEFITS (ACS-DERIVED) — Census ACS county estimates (delta by year)
  # ---------------------------------------------------------------------------
  - name: ssa_benefits_by_geography_acs
    pattern: "type=ssa_benefits_by_geography_acs/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      County-level Social Security and SSI recipiency and dollars DERIVED from the
      Census ACS 5-year estimates — a fully open-API, WAF-free complement to the
      Wayback-sourced ssa_benefits_by_geography (which alone carries the SSA
      administrative beneficiary-type/program detail). One row per county x ACS
      vintage. These are SURVEY ESTIMATES on a HOUSEHOLD basis (not SSA
      administrative person counts): they cannot split OASI vs DI or beneficiary
      type, but give the geographic distribution of Social Security / SSI receipt
      and aggregate dollars with no archive.org dependency. Aggregate-dollar
      figures are survey-reported and run below SSA administrative totals. Source:
      api.census.gov/data/{year}/acs/acs5 (B19055/B19056/B19065/B19066).

    dimensions:
      type:
        - ssa_benefits_by_geography_acs
      year: *acs_year_range

    columns:
      - name: state_fips
        type: string
        nullable: false
        expression: 'src."state"'
        comment: 2-digit state FIPS (FK to geo.state_ref)
      - name: county_fips
        type: string
        nullable: false
        expression: 'src."state" || src."county"'
        comment: 5-digit county FIPS (FK to geo.counties)
      - name: county_name
        type: string
        nullable: true
        expression: 'src."NAME"'
        comment: County name (ACS NAME field)
      - name: total_households
        type: long
        nullable: true
        expression: 'TRY_CAST(src."B19055_001E" AS BIGINT)'
        comment: Total households (ACS B19055_001E)
      - name: households_with_social_security
        type: long
        nullable: true
        expression: 'TRY_CAST(src."B19055_002E" AS BIGINT)'
        comment: Households with Social Security income (ACS B19055_002E)
      - name: households_with_ssi
        type: long
        nullable: true
        expression: 'TRY_CAST(src."B19056_002E" AS BIGINT)'
        comment: Households with Supplemental Security Income (ACS B19056_002E)
      - name: aggregate_social_security_usd
        type: double
        nullable: true
        expression: 'TRY_CAST(src."B19065_001E" AS DOUBLE)'
        comment: Aggregate Social Security income, USD (ACS B19065_001E)
      - name: aggregate_ssi_usd
        type: double
        nullable: true
        expression: 'TRY_CAST(src."B19066_001E" AS DOUBLE)'
        comment: Aggregate Supplemental Security Income, USD (ACS B19066_001E)

    source:
      type: http
      url: "https://api.census.gov/data/{effective_year}/acs/acs5?get=NAME,B19055_001E,B19055_002E,B19056_002E,B19065_001E,B19066_001E&for=county:*&key={env:CENSUS_API_KEY}"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 2.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.geo.CensusResponseTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=ssa_benefits_by_geography_acs/year=*/"
      partition:
        columns: [type, year]
        valueSource:
          year: effective_year
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/fiscal"
        tableName: ssa_benefits_by_geography_acs
        runMaintenance: true
        snapshotRetentionDays: 1
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 67108864
        compactionMinFiles: 3
        batchPartitionColumns: [year]
        incrementalKeys: [year]
        overwritePartitions: true

# ============================================================================
# CONSTRAINTS
# ============================================================================
# PKs identify one observation. Most FKs are inter-schema, pointing at geo
# dimension tables via state/county keys; exempt_org_990 keys to
# exempt_org_master on EIN (the nonprofit entity spine).
# ============================================================================

constraints:

  soi_income_by_zip:
    # state_fips is REQUIRED in the key: zipcode=00000 is a per-state total row, so
    # (year, zip_code, agi_bracket) repeats once per state without state_fips. Cross-
    # state ZIPs are likewise disambiguated by their state.
    primaryKey: [year, state_fips, zip_code, agi_bracket]
    foreignKeys:
      - columns: [state_fips]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_fips]
      - columns: [state_abbr]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_abbr]

  soi_income_by_county:
    primaryKey: [year, county_fips, agi_bracket]
    foreignKeys:
      - columns: [state_fips]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_fips]
      - columns: [county_fips]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: counties
        targetColumns: [county_fips]

  county_migration_flows:
    primaryKey: [year, origin_county_fips, dest_county_fips]
    foreignKeys:
      - columns: [origin_county_fips]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: counties
        targetColumns: [county_fips]
      - columns: [dest_county_fips]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: counties
        targetColumns: [county_fips]

  exempt_org_master:
    primaryKey: [ein]
    foreignKeys:
      - columns: [state_abbr]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_abbr]

  exempt_org_990:
    primaryKey: [year, object_id]
    foreignKeys:
      - columns: [ein]
        targetTable: exempt_org_master
        targetColumns: [ein]

  usaspending_by_agency:
    primaryKey: [year, agency_name]

  usaspending_by_state:
    primaryKey: [year, state_abbr]
    foreignKeys:
      - columns: [state_abbr]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_abbr]

  sba_loan_approvals:
    foreignKeys:
      - columns: [borrower_state]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_abbr]
      - columns: [project_state]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_abbr]

  ssa_benefits_by_geography:
    primaryKey: [year, program, county_fips, beneficiary_type]
    foreignKeys:
      - columns: [state_fips]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_fips]
      - columns: [county_fips]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: counties
        targetColumns: [county_fips]

  ssa_benefits_by_geography_acs:
    primaryKey: [year, county_fips]
    foreignKeys:
      - columns: [state_fips]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_fips]
      - columns: [county_fips]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: counties
        targetColumns: [county_fips]

# ============================================================================
# VIEWS
# ============================================================================

views:

  - name: soi_income_by_county_year
    comment: >
      County-level revenue rollup: returns, AGI, and total income tax by county
      and tax year, summed across AGI brackets (excludes the state-total 000 rows).
    sql: >
      SELECT
        c.year,
        c.state_fips,
        c.county_fips,
        c.county_name,
        SUM(c.num_returns)            AS num_returns,
        SUM(c.num_individuals)        AS num_individuals,
        SUM(c.adjusted_gross_income)  AS adjusted_gross_income,
        SUM(c.total_income_tax)       AS total_income_tax
      FROM soi_income_by_county c
      WHERE c.county_fips NOT LIKE '%000'
      GROUP BY c.year, c.state_fips, c.county_fips, c.county_name

  - name: federal_money_by_state_year
    comment: >
      Both sides of the ledger per state and fiscal/tax year: SOI total income tax
      collected (from county rollup) beside USAspending obligations. A direct
      revenue-vs-outlay comparison keyed on geo.state_ref.
    sql: >
      SELECT
        s.year,
        s.state_abbr,
        s.state_name,
        s.obligated_amount           AS federal_obligations_usd,
        r.total_income_tax_thousands AS soi_income_tax_thousands
      FROM usaspending_by_state s
      LEFT JOIN (
        SELECT
          c.year,
          c.state_fips,
          SUM(c.total_income_tax) AS total_income_tax_thousands
        FROM soi_income_by_county c
        WHERE c.county_fips LIKE '%000'
        GROUP BY c.year, c.state_fips
      ) r
        ON r.year = s.year

  - name: nonprofit_financials
    comment: >
      Form 990 filings enriched with the exempt-org roster: financials from
      exempt_org_990 joined to name/state/NTEE/subsection from exempt_org_master
      on EIN — the nonprofit sector view.
    sql: >
      SELECT
        f.year,
        f.ein,
        COALESCE(m.org_name, f.org_name) AS org_name,
        m.state_abbr,
        m.ntee_code,
        m.subsection_code,
        f.return_type,
        f.tax_year,
        f.total_revenue,
        f.total_expenses,
        f.total_assets
      FROM exempt_org_990 f
      LEFT JOIN exempt_org_master m
        ON m.ein = f.ein
