# ============================================================================
# U.S. Public Lands Schema (LANDS)
# ============================================================================
# Data Sources:
#   - USDA Forest Service ArcGIS (national forest boundaries)
#   - USDA FS FACTS ArcGIS (timber sale program)
#   - USDA FIA DataMart (forest inventory and analysis)
#   - NPS ArcGIS (park unit boundaries)
#   - NPS IRMA Statistics API (visitation data)
#   - BLM ArcGIS (field office boundaries)
#   - ONRR Natural Resources Revenue Data (mineral royalties)
#
# Features:
#   - Static reference tables for land unit boundaries
#   - Hive-style partitioning for time-series economic data
#   - Iceberg materialization with annual/monthly incremental updates
#   - Cross-schema joins to geo, sec, econ, fec
# ============================================================================

schemaName: "${SCHEMA_NAME:lands}"
dataLagYears: 0
materializeDirectory: "${GOVDATA_PARQUET_DIR}"

comment: >
  U.S. federal public lands data covering USDA Forest Service, National Park Service,
  and Bureau of Land Management units. Includes land management boundaries, timber
  sale program contracts, forest inventory estimates, NPS visitation statistics, and
  Office of Natural Resources Revenue (ONRR) mineral royalty payments. Enables
  analysis of extractive industry activity on federal land, tourism economics, and
  timber/paper company revenue risk via SEC filings.

# ============================================================================
# COLUMN TEMPLATES
# ============================================================================

column_templates:

  state_fips_column: &state_fips_column
    name: state_fips
    type: string
    nullable: true
    comment: 2-digit FIPS code identifying the primary state (e.g., '06' for California)

  county_fips_column: &county_fips_column
    name: county_fips
    type: string
    nullable: true
    comment: 5-digit FIPS code for primary county (e.g., '06037' for Los Angeles County)

  geometry_wkt_column: &geometry_wkt_column
    name: geometry_wkt
    type: string
    nullable: true
    comment: Simplified boundary WKT polygon (for display only)

  partition_type: &partition_type
    name: type
    type: VARCHAR

  partition_year: &partition_year
    name: year
    type: INTEGER

  standard_partitions: &standard_partitions
    style: hive
    columnDefinitions:
      - *partition_type
      - *partition_year

  static_partitions: &static_partitions
    style: hive
    columnDefinitions:
      - *partition_type

# ============================================================================
# DIMENSION VALUES
# ============================================================================

dimension_values:

  lands_year_range: &lands_year_range
    type: yearRange
    start: "${GOVDATA_START_YEAR:2010}"
    end: current
    dataLag: 0

  nps_visit_year_range: &nps_visit_year_range
    type: yearRange
    start: "${GOVDATA_START_YEAR:2010}"
    end: current
    dataLag: 0

  onrr_year_range: &onrr_year_range
    type: yearRange
    start: "${GOVDATA_START_YEAR:2010}"
    end: current
    dataLag: 0

  all_fia_state_abbrs: &all_fia_state_abbrs
    type: json_catalog
    source: "/lands/fia-states.json"
    path: "[*].state_abbr"

# ============================================================================
# PARTITIONED TABLES
# ============================================================================

partitionedTables:

  # ---------------------------------------------------------------------------
  # NATIONAL FORESTS — USDA FS unit boundaries (static reference)
  # ---------------------------------------------------------------------------
  - name: national_forests
    pattern: "type=national_forests/*.parquet"
    partitions: *static_partitions
    comment: >
      USDA Forest Service National Forest and Grassland unit boundaries. ~175 units
      across 10 USFS regions. Reference/dimension table — joins to geo.states via
      state_fips and to timber_sales via forest_id. FK target for
      disasters.wildfire_perimeters.forest_id. Updated annually post-fire-season (October).

    dimensions:
      type:
        - national_forests

    columns:
      - name: forest_id
        type: string
        nullable: false
        comment: USDA FS unit ID (e.g., '0501')
      - name: forest_name
        type: string
        nullable: true
        comment: Unit name (e.g., 'Angeles National Forest')
      - name: region
        type: string
        nullable: true
        comment: USDA FS region number (01–10)
      - name: gross_acres
        type: double
        nullable: true
        comment: Total unit area in acres (GIS measurement)

    source:
      type: http
      url: "https://apps.fs.usda.gov/arcx/rest/services/EDW/EDW_ForestSystemBoundaries_01/MapServer/0/query?where=1%3D1&outFields=forestnumber%2Cforestname%2Cregion%2Cgis_acres&f=json&resultRecordCount=500"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 2.0
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.lands.UsfsForestBoundaryTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=national_forests/"
      partition:
        columns: [type]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/lands"
        tableName: national_forests
        catalogType: hadoop
        runCompaction: true
        compactionMinFiles: 1
        compactionTargetFileSizeBytes: 67108864
        overwritePartitions: true

  # ---------------------------------------------------------------------------
  # TIMBER HARVEST — USDA FS FACTS timber harvest activities (EDW_TimberHarvest_01)
  # ---------------------------------------------------------------------------
  - name: timber_sales
    pattern: "type=timber_sales/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      USDA Forest Service timber harvest activities from FACTS EDW. One row per
      completed harvest activity. Joins to national_forests via forest_code and to
      geo.states via state_abbr. Units_accomplished and uom describe harvest volume
      (CCF, MBF, ACRE, etc.). Enables analysis of federal timber activity by
      forest, district, and year. Source: EDW_TimberHarvest_01/MapServer/{layer}
      where layer is dispatched per year by UsfsTimberLayerResolver — layer 11
      covers 2021+, layer 0 covers 2011-2020, layers 1-7 cover earlier eras
      back to 1820. All layers publish the identical 71-field schema.

    dimensions:
      type:
        - timber_sales
      year: *lands_year_range
      layer:
        type: custom

    columns:
      - name: facts_id
        type: string
        nullable: false
        comment: FACTS activity unique ID (PK)
      - name: sale_name
        type: string
        nullable: true
        comment: Timber sale name
      - name: fy_completed
        type: integer
        nullable: false
        comment: Fiscal year completed (partition key)
      - name: fy_awarded
        type: integer
        nullable: true
        comment: Fiscal year awarded
      - name: forest_code
        type: string
        nullable: true
        comment: USFS administrative forest code (FK to national_forests.forest_id)
      - name: forest_name
        type: string
        nullable: true
        comment: Administrative forest name
      - name: district_code
        type: string
        nullable: true
        comment: Ranger district code
      - name: district_name
        type: string
        nullable: true
        comment: Ranger district name
      - name: state_abbr
        type: string
        nullable: true
        comment: 2-character state abbreviation
      - name: gis_acres
        type: double
        nullable: true
        comment: Activity area in acres (GIS measurement)
      - name: activity_code
        type: string
        nullable: true
        comment: FACTS activity code
      - name: activity_name
        type: string
        nullable: true
        comment: FACTS activity name
      - name: treatment_type
        type: string
        nullable: true
        comment: Treatment category (Salvage / Regeneration / etc.)
      - name: units_accomplished
        type: double
        nullable: true
        comment: Harvest volume or area units accomplished
      - name: uom
        type: string
        nullable: true
        comment: Unit of measure (CCF / MBF / ACRE / etc.)
      - name: cost_per_uom
        type: double
        nullable: true
        comment: Cost per unit of measure (USD)

    source:
      type: http
      url: "https://apps.fs.usda.gov/arcx/rest/services/EDW/EDW_TimberHarvest_01/MapServer/{layer}/query?where=FY_COMPLETED%3D%27{year}%27&outFields=FACTS_ID%2CSALE_NAME%2CFY_COMPLETED%2CFY_AWARDED%2CADMIN_FOREST_CODE%2CADMIN_FOREST_NAME%2CADMIN_DISTRICT_CODE%2CADMIN_DISTRICT_NAME%2CSTATE_ABBR%2CGIS_ACRES%2CACTIVITY_CODE%2CACTIVITY_NAME%2CTREATMENT_TYPE%2CNBR_UNITS_ACCOMPLISHED%2CUOM%2CCOST_PER_UOM&f=json&resultRecordCount=5000"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 2.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.lands.UsfsFactsTransformer"
      dimensionResolver: "org.apache.calcite.adapter.govdata.lands.UsfsTimberLayerResolver"

    materialize:
      format: iceberg
      output:
        pattern: "type=timber_sales/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/lands"
        tableName: timber_sales
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 67108864
        compactionMinFiles: 3
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # FOREST INVENTORY — USDA FIA per-state COND CSV
  # ---------------------------------------------------------------------------
  - name: forest_inventory
    pattern: "type=forest_inventory/*.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - *partition_type
    comment: >
      USDA Forest Service Forest Inventory and Analysis (FIA) state-level estimates
      derived from per-state {ST}_COND.csv files inside the FIA datamart's per-state
      ZIP archives (apps.fs.usda.gov/fia/datamart/CSV/{state}_CSV.zip). One row per
      inventory_year × state × forest_type_group × ownership_class. Filtered to
      COND_STATUS_CD=1 (accessible forest land). Basal area is a CONDPROP_UNADJ-weighted
      average of BALIVE. Joins to geo.states via state_fips. ETL fans out across states;
      cached per-state archives in $GOVDATA_CACHE_DIR/lands/ are shared across workers.
      Materialization keeps state as a row column, not a partition column, so that
      Iceberg per-partition compaction merges the 55 per-state ETL flushes into a
      single nationwide parquet.

    dimensions:
      type:
        - forest_inventory
      state: *all_fia_state_abbrs

    columns:
      - name: inventory_year
        type: integer
        nullable: false
        comment: FIA inventory year (INVYR)
      - <<: *state_fips_column
        nullable: false
      - name: forest_type_group
        type: string
        nullable: true
        comment: Forest type group name (e.g., 'Oak / hickory group', 'Douglas-fir group')
      - name: ownership_class
        type: string
        nullable: true
        comment: National Forest / Other Federal / State / Local / Private
      - name: basal_area_sqft
        type: double
        nullable: true
        comment: CONDPROP_UNADJ-weighted average of BALIVE (sq ft per acre)

    source:
      type: http
      url: "https://apps.fs.usda.gov/fia/datamart/CSV/{state}_CSV.zip"
      method: GET
      parallel: 4
      response:
        format: json

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.lands.FiaDatamartTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=forest_inventory/"
      partition:
        columns: [type]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/lands"
        tableName: forest_inventory
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 67108864
        compactionMinFiles: 3
        overwritePartitions: true

  # ---------------------------------------------------------------------------
  # FOREST METRICS — USDA FIA per-state TREE CSV (live-tree metrics)
  # ---------------------------------------------------------------------------
  - name: forest_metrics
    pattern: "type=forest_metrics/*.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - *partition_type
    comment: >
      USDA FIA tree-level metrics derived from per-state {ST}_TREE.csv joined to
      {ST}_COND.csv (both inside the per-state ZIP archive at
      apps.fs.usda.gov/fia/datamart/CSV/{state}_CSV.zip). One row per inventory_year ×
      state × forest_type_group × ownership_class. Columns are CONDPROP_UNADJ-weighted
      averages across live trees (STATUSCD=1) in accessible forest conditions
      (COND_STATUS_CD=1). Join to forest_inventory on
      (state_fips, inventory_year, forest_type_group, ownership_class) for combined
      basal-area + volume + carbon analysis. ETL fans out across states.

    dimensions:
      type:
        - forest_metrics
      state: *all_fia_state_abbrs

    columns:
      - name: inventory_year
        type: integer
        nullable: false
        comment: FIA inventory year (INVYR)
      - <<: *state_fips_column
        nullable: false
      - name: forest_type_group
        type: string
        nullable: true
        comment: Forest type group name (e.g., 'Oak / hickory group', 'Douglas-fir group')
      - name: ownership_class
        type: string
        nullable: true
        comment: National Forest / Other Federal / State / Local / Private
      - name: trees_per_acre
        type: double
        nullable: true
        comment: CONDPROP-weighted average of TPA_UNADJ across live trees (trees per acre)
      - name: live_volume_cuft
        type: double
        nullable: true
        comment: CONDPROP-weighted average live cubic-foot volume per acre (VOLCFNET × TPA_UNADJ)
      - name: carbon_stock_tons
        type: double
        nullable: true
        comment: CONDPROP-weighted average above-ground carbon stock, tons per acre (CARBON_AG × TPA_UNADJ / 2000)

    source:
      type: http
      url: "https://apps.fs.usda.gov/fia/datamart/CSV/{state}_CSV.zip"
      method: GET
      parallel: 4
      response:
        format: json

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.lands.FiaMetricsTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=forest_metrics/"
      partition:
        columns: [type]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/lands"
        tableName: forest_metrics
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 67108864
        compactionMinFiles: 3
        overwritePartitions: true

  # ---------------------------------------------------------------------------
  # FIA PLOTS — per-plot identification, fuzzed lat/lon, status
  # ---------------------------------------------------------------------------
  - name: fia_plots
    pattern: "type=fia_plots/*.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - *partition_type
    comment: >
      USDA FIA per-plot identification from per-state {ST}_PLOT.csv. One row per
      FIA plot. Lat/lon are USDA's publicly-released "fuzzed" coordinates (perturbed
      so exact plot locations cannot be inferred — FIADB P2 User Guide §2.5.1).
      plot_cn is the FIA-wide unique plot identifier; join targets are TREE/COND/
      SEEDLING via PLT_CN. ETL fans out across states.

    dimensions:
      type:
        - fia_plots
      state: *all_fia_state_abbrs

    columns:
      - name: plot_cn
        type: string
        nullable: false
        comment: FIA-wide unique plot control number (PK)
      - name: prev_plot_cn
        type: string
        nullable: true
        comment: Previous-cycle plot CN (FK to fia_plots.plot_cn for remeasurement chains)
      - name: inventory_year
        type: integer
        nullable: true
        comment: FIA inventory year (INVYR)
      - <<: *state_fips_column
        nullable: false
      - <<: *county_fips_column
      - name: plot_number
        type: integer
        nullable: true
        comment: USDA plot number within state/county
      - name: plot_status_cd
        type: integer
        nullable: true
        comment: 1=Sampled-forest, 2=Sampled-nonforest, 3=Nonsampled
      - name: plot_status_name
        type: string
        nullable: true
        comment: Human-readable plot status
      - name: lat
        type: double
        nullable: true
        comment: Fuzzed plot latitude (decimal degrees, NAD83)
      - name: lon
        type: double
        nullable: true
        comment: Fuzzed plot longitude (decimal degrees, NAD83)
      - name: elev_ft
        type: integer
        nullable: true
        comment: Plot elevation in feet
      - name: measure_year
        type: integer
        nullable: true
        comment: Year the plot was actually measured (MEASYEAR)

    source:
      type: http
      url: "https://apps.fs.usda.gov/fia/datamart/CSV/{state}_CSV.zip"
      method: GET
      parallel: 4
      response:
        format: json

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.lands.FiaPlotsTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=fia_plots/"
      partition:
        columns: [type]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/lands"
        tableName: fia_plots
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 67108864
        compactionMinFiles: 3
        overwritePartitions: true

  # ---------------------------------------------------------------------------
  # FIA TREE GRM — per-state/year/species annualized growth/removal/mortality
  # ---------------------------------------------------------------------------
  - name: fia_tree_grm
    pattern: "type=fia_tree_grm/*.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - *partition_type
    comment: >
      USDA FIA growth-removal-mortality (GRM) annualized estimates by state, inventory
      year, species, and estimation type. Derived by joining per-state
      {ST}_TREE_GRM_ESTN.csv against {ST}_TREE.csv on TRE_CN to attach SPCD, then
      aggregating per-tree ANN_NET_GROWTH/REMOVALS/MORTALITY into per-group totals.
      Units are determined by ESTN_UNITS for the row's ESTN_TYPE (typically cubic feet
      for volume estimates and square feet for basal area). ETL fans out across states.

    dimensions:
      type:
        - fia_tree_grm
      state: *all_fia_state_abbrs

    columns:
      - <<: *state_fips_column
        nullable: false
      - name: inventory_year
        type: integer
        nullable: false
        comment: FIA inventory year (INVYR)
      - name: species_code
        type: integer
        nullable: false
        comment: FIA species code (SPCD) — joins to REF_SPECIES upstream
      - name: estimation_type
        type: string
        nullable: true
        comment: ESTN_TYPE label (e.g., AL_FOREST, GS_TIMBER) — defines basis + units
      - name: ann_net_growth
        type: double
        nullable: true
        comment: Sum of per-tree ANN_NET_GROWTH for the group, in ESTN_UNITS
      - name: annual_removals
        type: double
        nullable: true
        comment: Sum of per-tree REMOVALS for the group, in ESTN_UNITS
      - name: annual_mortality
        type: double
        nullable: true
        comment: Sum of per-tree MORTALITY for the group, in ESTN_UNITS
      - name: tree_count
        type: long
        nullable: true
        comment: Number of tree records contributing to this aggregate

    source:
      type: http
      url: "https://apps.fs.usda.gov/fia/datamart/CSV/{state}_CSV.zip"
      method: GET
      parallel: 4
      response:
        format: json

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.lands.FiaTreeGrmTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=fia_tree_grm/"
      partition:
        columns: [type]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/lands"
        tableName: fia_tree_grm
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 67108864
        compactionMinFiles: 3
        overwritePartitions: true

  # ---------------------------------------------------------------------------
  # FIA SEEDLINGS — per-state/year/species seedling regeneration intensity
  # ---------------------------------------------------------------------------
  - name: fia_seedlings
    pattern: "type=fia_seedlings/*.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - *partition_type
    comment: >
      USDA FIA seedling regeneration estimates by state, inventory year, and species,
      derived from per-state {ST}_SEEDLING.csv. seedlings_per_acre is the sum of
      TPA_UNADJ across plot-conditions; seedling_count is the sum of microplot
      TREECOUNT observations. Pairs with forest_metrics for tree+regeneration analytics.

    dimensions:
      type:
        - fia_seedlings
      state: *all_fia_state_abbrs

    columns:
      - <<: *state_fips_column
        nullable: false
      - name: inventory_year
        type: integer
        nullable: false
        comment: FIA inventory year (INVYR)
      - name: species_code
        type: integer
        nullable: false
        comment: FIA species code (SPCD)
      - name: seedling_count
        type: long
        nullable: true
        comment: Sum of microplot seedling counts (TREECOUNT)
      - name: seedlings_per_acre
        type: double
        nullable: true
        comment: Sum of TPA_UNADJ across plot-conditions for the group
      - name: record_count
        type: long
        nullable: true
        comment: Number of SEEDLING rows contributing to this aggregate

    source:
      type: http
      url: "https://apps.fs.usda.gov/fia/datamart/CSV/{state}_CSV.zip"
      method: GET
      parallel: 4
      response:
        format: json

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.lands.FiaSeedlingsTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=fia_seedlings/"
      partition:
        columns: [type]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/lands"
        tableName: fia_seedlings
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 67108864
        compactionMinFiles: 3
        overwritePartitions: true

  # ---------------------------------------------------------------------------
  # FIA DOWN WOODY DEBRIS — per-state biomass tons/acre of CWD/FWD/duff+litter
  # ---------------------------------------------------------------------------
  - name: fia_down_woody_debris
    pattern: "type=fia_down_woody_debris/*.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - *partition_type
    comment: >
      USDA FIA down-woody-material biomass aggregated by state, inventory year,
      and debris category (coarse_woody, fine_woody, duff_litter). Derived from
      per-state {ST}_COND_DWM_CALC.csv. tons_per_acre is the condition-area
      weighted mean of the FIA per-condition adjusted dry-biomass tonnage for
      the category.

    dimensions:
      type:
        - fia_down_woody_debris
      state: *all_fia_state_abbrs

    columns:
      - <<: *state_fips_column
        nullable: false
      - name: inventory_year
        type: integer
        nullable: false
        comment: FIA inventory year (INVYR)
      - name: debris_category
        type: string
        nullable: false
        comment: One of coarse_woody, fine_woody, duff_litter
      - name: tons_per_acre
        type: double
        nullable: true
        comment: Condition-area weighted mean of category dry-biomass tons/acre
      - name: record_count
        type: long
        nullable: true
        comment: Number of COND_DWM_CALC rows contributing to this aggregate

    source:
      type: http
      url: "https://apps.fs.usda.gov/fia/datamart/CSV/{state}_CSV.zip"
      method: GET
      parallel: 4
      response:
        format: json

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.lands.FiaDownWoodyDebrisTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=fia_down_woody_debris/"
      partition:
        columns: [type]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/lands"
        tableName: fia_down_woody_debris
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 67108864
        compactionMinFiles: 3
        overwritePartitions: true

  # ---------------------------------------------------------------------------
  # FIA INVASIVES — invasive plant species cover by state-year-species
  # ---------------------------------------------------------------------------
  - name: fia_invasives
    pattern: "type=fia_invasives/*.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - *partition_type
    comment: >
      USDA FIA invasive plant species observations aggregated by state, inventory
      year, and species code, derived from per-state {ST}_INVASIVE_SUBPLOT_SPP.csv.
      cover_pct_avg is the mean COVER_PCT across reporting subplots. Not every
      state samples invasives every cycle.

    dimensions:
      type:
        - fia_invasives
      state: *all_fia_state_abbrs

    columns:
      - <<: *state_fips_column
        nullable: false
      - name: inventory_year
        type: integer
        nullable: false
        comment: FIA inventory year (INVYR)
      - name: species_code
        type: string
        nullable: false
        comment: FIA invasive species code (VEG_SPCD — USDA PLANTS symbol, alphanumeric)
      - name: cover_pct_avg
        type: double
        nullable: true
        comment: Average COVER_PCT across reporting subplots
      - name: subplot_count
        type: long
        nullable: true
        comment: Number of subplots reporting this species

    source:
      type: http
      url: "https://apps.fs.usda.gov/fia/datamart/CSV/{state}_CSV.zip"
      method: GET
      parallel: 4
      response:
        format: json

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.lands.FiaInvasivesTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=fia_invasives/"
      partition:
        columns: [type]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/lands"
        tableName: fia_invasives
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 67108864
        compactionMinFiles: 3
        overwritePartitions: true

  # ---------------------------------------------------------------------------
  # FIA POP EVALUATIONS — published evaluations with types (EXPVOL, EXPCURR, ...)
  # ---------------------------------------------------------------------------
  - name: fia_pop_evaluations
    pattern: "type=fia_pop_evaluations/*.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - *partition_type
    comment: >
      USDA FIA population evaluations — the statistically-valid samples used to
      publish state estimates. Joins {ST}_POP_EVAL.csv with {ST}_POP_EVAL_TYP.csv
      on EVAL_CN to emit one row per (evaluation, evaluation type) pair. eval_type
      values include EXPVOL (volume), EXPCURR (current area), EXPGROW, EXPMORT,
      EXPREMV, etc.

    dimensions:
      type:
        - fia_pop_evaluations
      state: *all_fia_state_abbrs

    columns:
      - <<: *state_fips_column
        nullable: false
      - name: eval_cn
        type: string
        nullable: false
        comment: POP_EVAL.CN — PK for the evaluation record
      - name: eval_grp_cn
        type: string
        nullable: true
        comment: POP_EVAL_GRP foreign key
      - name: eval_descr
        type: string
        nullable: true
        comment: Human-readable description of the evaluation
      - name: start_invyr
        type: integer
        nullable: true
        comment: First inventory year covered by the evaluation
      - name: end_invyr
        type: integer
        nullable: true
        comment: Last inventory year covered by the evaluation
      - name: eval_type
        type: string
        nullable: true
        comment: Evaluation type from POP_EVAL_TYP.EVAL_TYP (EXPVOL, EXPCURR, ...)

    source:
      type: http
      url: "https://apps.fs.usda.gov/fia/datamart/CSV/{state}_CSV.zip"
      method: GET
      parallel: 4
      response:
        format: json

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.lands.FiaPopEvaluationsTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=fia_pop_evaluations/"
      partition:
        columns: [type]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/lands"
        tableName: fia_pop_evaluations
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 67108864
        compactionMinFiles: 3
        overwritePartitions: true
  # NPS UNITS — National Park Service unit boundaries (static reference)
  # ---------------------------------------------------------------------------
  - name: nps_units
    pattern: "type=nps_units/*.parquet"
    partitions: *static_partitions
    comment: >
      National Park Service unit boundaries — parks, monuments, recreation areas,
      seashores, parkways, and all other NPS-designated units. ~430 units. Reference
      and dimension table; FK target for nps_visitation.unit_code. Joins to geo.states
      and geo.counties for gateway-community economic impact analysis. Updated annually
      in April following annual report administrative updates.

    dimensions:
      type:
        - nps_units

    columns:
      - name: unit_code
        type: string
        nullable: false
        comment: NPS 4-letter unit code (e.g., 'YOSE', 'GRCA')
      - name: unit_name
        type: string
        nullable: true
        comment: Full unit name
      - name: unit_type
        type: string
        nullable: true
        comment: National Parks / Monuments / Recreation Areas / Seashores / etc.
      - name: state_abbr
        type: string
        nullable: true
        comment: 2-character state abbreviation (e.g., 'CA', 'WY')
      - name: region
        type: string
        nullable: true
        comment: NPS region (e.g., 'Pacific West', 'Northeast')
      - name: gross_acres
        type: double
        nullable: true
        comment: Approximate unit area in acres (derived from GIS shape area)

    source:
      type: http
      url: "https://services1.arcgis.com/fBc8EJBxQRMcHlei/arcgis/rest/services/NPS_Land_Resources_Division_Boundary_and_Tract_Data_Service/FeatureServer/2/query?where=1%3D1&outFields=UNIT_CODE%2CUNIT_NAME%2CUNIT_TYPE%2CSTATE%2CREGION%2CShape__Area&f=json&resultRecordCount=1000"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 2.0
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.lands.NpsUnitBoundaryTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=nps_units/"
      partition:
        columns: [type]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/lands"
        tableName: nps_units
        catalogType: hadoop
        runCompaction: true
        compactionMinFiles: 1
        compactionTargetFileSizeBytes: 67108864
        overwritePartitions: true

  # ---------------------------------------------------------------------------
  # NPS VISITATION — NPS IRMA monthly visitation statistics
  # ---------------------------------------------------------------------------
  - name: nps_visitation
    pattern: "type=nps_visitation/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      National Park Service annual and monthly visitation statistics from the IRMA
      Statistics API. One row per unit_code × visit_year × visit_month. Covers
      recreational visits, overnight stays, backcountry use, and concession lodging.
      Joins to nps_units via unit_code and to econ.bls_employment via county_fips
      (from nps_units join) for gateway-county tourism employment correlation.

    dimensions:
      type:
        - nps_visitation
      year: *nps_visit_year_range

    columns:
      - name: unit_code
        type: string
        nullable: false
        comment: FK to nps_units (NPS 4-letter code)
      - name: visit_year
        type: integer
        nullable: false
        comment: Visit year (partition key)
      - name: visit_month
        type: integer
        nullable: false
        comment: Month (1–12); all rows are monthly (no annual summary rows)
      - name: recreation_visits
        type: integer
        nullable: true
        comment: Recreational visitor count
      - name: non_recreation_visits
        type: integer
        nullable: true
        comment: Non-recreational visits (commuters, government, etc.)

    source:
      type: http
      url: "https://irmaservices.nps.gov/Stats/v1/visitation?startMonth=1&startYear={year}&endMonth=12&endYear={year}"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 2.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.lands.NpsIrmaTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=nps_visitation/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/lands"
        tableName: nps_visitation
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 67108864
        compactionMinFiles: 3
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # BLM FIELD OFFICES — BLM administrative unit boundaries (static reference)
  # ---------------------------------------------------------------------------
  - name: blm_field_offices
    pattern: "type=blm_field_offices/*.parquet"
    partitions: *static_partitions
    comment: >
      Bureau of Land Management administrative unit boundaries — field offices and
      district offices that manage federal subsurface mineral rights, grazing
      allotments, and surface use permits. ~150 field offices. Primarily useful as
      a geographic reference for joining extractive industry activity to SEC filings
      and FEC oil/gas sector donor geography. Updated annually in June.

    dimensions:
      type:
        - blm_field_offices
      year: *lands_year_range

    columns:
      - name: office_code
        type: string
        nullable: false
        comment: BLM administrative unit code (e.g., 'UTMO')
      - name: office_name
        type: string
        nullable: true
        comment: Office name (e.g., 'Moab Field Office')
      - name: office_type
        type: string
        nullable: true
        comment: Field Office / District Office / State Office
      - name: state_abbr
        type: string
        nullable: true
        comment: 2-character state abbreviation (e.g., 'UT', 'WY')

    source:
      type: http
      url: "https://gis.blm.gov/arcgis/rest/services/admin_boundaries/BLM_Natl_AdminUnit_Generalized/FeatureServer/0/query?where=1%3D1&outFields=ADM_UNIT_CD%2CADMU_NAME%2CBLM_ORG_TYPE%2CADMIN_ST&f=json&resultRecordCount=500"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 2.0
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.lands.BlmFieldOfficeTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=blm_field_offices/"
      partition:
        columns: [type]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/lands"
        tableName: blm_field_offices
        catalogType: hadoop
        runCompaction: true
        compactionMinFiles: 1
        compactionTargetFileSizeBytes: 67108864
        overwritePartitions: true

  # ---------------------------------------------------------------------------
  # ONRR REVENUES — ONRR federal/tribal mineral royalties (bulk annual CSV)
  # ---------------------------------------------------------------------------
  - name: onrr_revenues
    pattern: "type=onrr_revenues/*.parquet"
    partitions: *static_partitions
    comment: >
      Office of Natural Resources Revenue (ONRR) royalty payments for oil, gas, coal,
      and other minerals extracted from federal and tribal lands. One row per
      fiscal-year × commodity × revenue-type × state × county combination. Full
      history from FY 2004 in a single bulk download. Primary financial link between
      BLM-managed subsurface rights and SEC 10-K disclosures for E&P and mining
      companies. Source: revenuedata.onrr.gov (domain moved from revenuedata.doi.gov
      in 2024). Refreshed quarterly as ONRR publishes new data.

    dimensions:
      type:
        - onrr_revenues

    columns:
      - name: fiscal_year
        source: "Fiscal Year"
        type: integer
        nullable: false
        comment: Fiscal year of revenue collection (FY 2004–present)
      - name: land_class
        source: "Land Class"
        type: string
        nullable: true
        comment: Federal / Native American / Federal Offshore
      - name: land_category
        source: "Land Category"
        type: string
        nullable: true
        comment: Onshore / Offshore / Gulf of Mexico / Pacific
      - name: state_name
        source: "State"
        type: string
        nullable: true
        comment: State name (e.g., 'Wyoming'); null for offshore rows
      - name: county_name
        source: "County"
        type: string
        nullable: true
        comment: County name; null for offshore/tribal rows
      - <<: *county_fips_column
        source: "FIPS Code"
        comment: 5-digit FIPS (null for offshore/tribal)
      - name: offshore_region
        source: "Offshore Region"
        type: string
        nullable: true
        comment: Offshore region name (Gulf of Mexico, Pacific, etc.); null for onshore
      - name: revenue_type
        source: "Revenue Type"
        type: string
        nullable: true
        comment: Royalties / Bonus / Rents / Other Revenues
      - name: mineral_lease_type
        source: "Mineral Lease Type"
        type: string
        nullable: true
        comment: Oil & Gas / Coal / Geothermal / Hardrock / etc.
      - name: commodity
        type: string
        nullable: true
        comment: Oil / Gas / Coal / Geothermal / Renewables / Other
      - name: product
        type: string
        nullable: true
        comment: Specific product (e.g., 'Crude Oil', 'Coalbed Methane')
      - name: revenue
        type: double
        nullable: true
        comment: Revenue collected (USD)

    source:
      type: http
      url: "https://revenuedata.onrr.gov/downloads/fiscal_year_revenue.csv"
      method: GET
      response:
        format: csv
        hasHeader: true
      rateLimit:
        requestsPerSecond: 1.0
        maxRetries: 3
      rawCache:
        enabled: true

    materialize:
      format: iceberg
      output:
        pattern: "type=onrr_revenues/"
      partition:
        columns: [type]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/lands"
        tableName: onrr_revenues
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 3

# ============================================================================
# CONSTRAINTS
# ============================================================================

constraints:

  national_forests:
    primaryKey: [forest_id]

  timber_sales:
    primaryKey: [facts_id]
    foreignKeys:
      - columns: [forest_code]
        targetTable: national_forests
        targetColumns: [forest_id]

  forest_inventory:
    primaryKey: [state_fips, inventory_year, forest_type_group, ownership_class]
    foreignKeys:
      - columns: [state_fips]
        targetSchema: geo
        targetTable: states
        targetColumns: [state_fips]

  forest_metrics:
    primaryKey: [state_fips, inventory_year, forest_type_group, ownership_class]
    foreignKeys:
      - columns: [state_fips, inventory_year, forest_type_group, ownership_class]
        targetTable: forest_inventory
        targetColumns: [state_fips, inventory_year, forest_type_group, ownership_class]

  nps_units:
    primaryKey: [unit_code]

  nps_visitation:
    primaryKey: [unit_code, visit_year, visit_month]
    foreignKeys:
      - columns: [unit_code]
        targetTable: nps_units
        targetColumns: [unit_code]

  blm_field_offices:
    primaryKey: [office_code]

  onrr_revenues:
    primaryKey: [fiscal_year, county_fips, land_class, commodity, revenue_type, product]
    foreignKeys:
      - columns: [county_fips]
        targetSchema: geo
        targetTable: counties
        targetColumns: [county_fips]

# ============================================================================
# VIEWS
# ============================================================================

views:

  - name: lands_forest_condition_metrics
    comment: >
      Joins forest_inventory (basal area from COND CSV) with forest_metrics (live-tree
      volume and carbon from TREE CSV) on the shared composite key. Provides a single
      row per state × forest type group × ownership class × inventory year with all
      five FIA-derived metrics. Use for carbon-stock trend analysis, timber-volume
      benchmarking, and cross-schema joins to sec.filing_metadata or econ.fred_indicators.
    sql: >
      SELECT
        fi.inventory_year,
        fi.state_fips,
        fi.forest_type_group,
        fi.ownership_class,
        fi.basal_area_sqft,
        fm.trees_per_acre,
        fm.live_volume_cuft,
        fm.carbon_stock_tons
      FROM forest_inventory fi
      JOIN forest_metrics fm
        ON fi.state_fips        = fm.state_fips
       AND fi.inventory_year    = fm.inventory_year
       AND fi.forest_type_group = fm.forest_type_group
       AND fi.ownership_class   = fm.ownership_class

  - name: lands_timber_by_forest_state
    comment: >
      Aggregates USFS timber harvest activities by fiscal year and state. Shows annual
      harvest area (gis_acres), units accomplished (volume/area), and activity count
      per state. Joins to national_forests via forest_code. Enables identification of
      states with highest federal timber harvest activity and trend analysis by forest.
    sql: >
      SELECT
        ts.fy_completed,
        ts.state_abbr,
        nf.region                         AS fs_region,
        ts.treatment_type,
        ts.uom,
        COUNT(ts.facts_id)                AS activity_count,
        SUM(ts.gis_acres)                 AS total_gis_acres,
        SUM(ts.units_accomplished)        AS total_units_accomplished
      FROM timber_sales ts
      LEFT JOIN national_forests nf ON ts.forest_code = nf.forest_id
      GROUP BY ts.fy_completed, ts.state_abbr, nf.region,
               ts.treatment_type, ts.uom

  - name: lands_nps_gateway_impact
    comment: >
      Joins NPS monthly visitation to park unit metadata for gateway economic impact
      analysis. Aggregates to annual totals per unit. Ready to join with
      econ.bls_employment on county data from nps_units.
    sql: >
      SELECT
        v.visit_year,
        u.unit_code,
        u.unit_name,
        u.unit_type,
        u.state_abbr,
        SUM(v.recreation_visits)          AS annual_recreation_visits,
        SUM(v.non_recreation_visits)      AS annual_non_recreation_visits
      FROM nps_visitation v
      JOIN nps_units u ON v.unit_code = u.unit_code
      GROUP BY v.visit_year, u.unit_code, u.unit_name, u.unit_type, u.state_abbr

  - name: lands_onrr_by_state_commodity
    comment: >
      Aggregates ONRR federal mineral royalty revenues by state, commodity, and fiscal
      year. Uses state_name directly (no FIPS join needed). Enables correlation with
      sec.filing_metadata company_name for E&P royalty exposure analysis and with
      econ.state_wages for energy sector employment vs. revenue trends.
    sql: >
      SELECT
        r.fiscal_year,
        r.state_name,
        r.land_class,
        r.commodity,
        r.revenue_type,
        SUM(r.revenue)                    AS total_revenue
      FROM onrr_revenues r
      GROUP BY r.fiscal_year, r.state_name, r.land_class,
               r.commodity, r.revenue_type

  - name: lands_nps_gateway_employment
    comment: >
      Correlates NPS annual park visitation with county-level employment and wages
      (econ.county_wages, BLS QCEW). Aggregates monthly visitation to annual totals
      per park unit, then joins to county_wages for the same year, total-industry rows
      (industry_code=10, own_code=0). Note: nps_units no longer carries county_fips;
      this view joins on state_abbr as a proxy for state-level employment context.
    sql: >
      SELECT
        v.visit_year                                              AS year,
        u.unit_code,
        u.unit_name,
        u.unit_type,
        u.state_abbr,
        SUM(v.recreation_visits)                                  AS annual_recreation_visits,
        SUM(v.non_recreation_visits)                              AS annual_non_recreation_visits
      FROM nps_visitation v
      JOIN nps_units u ON v.unit_code = u.unit_code
      GROUP BY v.visit_year, u.unit_code, u.unit_name, u.unit_type, u.state_abbr

  - name: lands_onrr_energy_revenues
    comment: >
      Aggregates ONRR federal mineral royalty revenues by state and fiscal year for
      the energy commodities (Oil, Gas, Coal). Enables trend analysis of federal
      energy royalty production by state. The next natural join is to
      sec.filing_metadata on fiscal_year to correlate with E&P company 10-K filings.
    sql: >
      SELECT
        r.fiscal_year,
        r.state_name,
        r.commodity,
        r.land_class,
        SUM(r.revenue)                    AS total_revenue
      FROM onrr_revenues r
      WHERE r.commodity IN ('Oil', 'Gas', 'Coal', 'Natural Gas', 'Oil & Gas (Unspecified)')
      GROUP BY r.fiscal_year, r.state_name, r.commodity, r.land_class

  - name: lands_timber_public_companies
    comment: >
      Correlates federal USFS timber harvest activity with SEC-registered timber and
      paper companies (sec.filing_metadata SIC 0800-0899 forestry, 2400-2499 lumber
      and wood products, 2600-2699 paper and allied products). Joins on fy_completed =
      fiscal_year to show, for each year, how many publicly traded timber/paper
      companies filed 10-Ks alongside the federal harvest activity count and acres.
      Useful for identifying publicly traded companies with material exposure to
      changes in federal timber supply policy.
    sql: >
      SELECT
        ts.fy_completed,
        ts.state_abbr,
        ts.treatment_type,
        SUM(ts.gis_acres)                 AS federal_harvest_acres,
        SUM(ts.units_accomplished)        AS federal_units_accomplished,
        MAX(ts.uom)                       AS uom,
        COUNT(DISTINCT f.cik)             AS public_company_count,
        COUNT(DISTINCT f.ticker)          AS ticker_count
      FROM timber_sales ts
      LEFT JOIN "sec"."filing_metadata" f
        ON ts.fy_completed = f.fiscal_year
        AND f.filing_type  = '10-K'
        AND (CAST(f.sic_code AS INTEGER) BETWEEN 800 AND 899
          OR CAST(f.sic_code AS INTEGER) BETWEEN 2400 AND 2499
          OR CAST(f.sic_code AS INTEGER) BETWEEN 2600 AND 2699)
      GROUP BY ts.fy_completed, ts.state_abbr, ts.treatment_type
