# ============================================================================
# U.S. Public Lands Schema (LANDS)
# ============================================================================
# Data Sources:
#   - USDA Forest Service ArcGIS (national forest boundaries)
#   - USDA FS FACTS ArcGIS (timber sale program)
#   - USDA FIA DataMart (forest inventory and analysis)
#   - NPS ArcGIS (park unit boundaries)
#   - NPS IRMA Statistics API (visitation data)
#   - BLM ArcGIS (field office boundaries)
#   - ONRR Natural Resources Revenue Data (mineral royalties)
#
# Features:
#   - Static reference tables for land unit boundaries
#   - Hive-style partitioning for time-series economic data
#   - Iceberg materialization with annual/monthly incremental updates
#   - Cross-schema joins to geo, sec, econ, fec
# ============================================================================

schemaName: "${SCHEMA_NAME:lands}"
dataLagYears: 0
materializeDirectory: "${GOVDATA_PARQUET_DIR}/lands"

comment: >
  U.S. federal public lands data covering USDA Forest Service, National Park Service,
  and Bureau of Land Management units. Includes land management boundaries, timber
  sale program contracts, forest inventory estimates, NPS visitation statistics, and
  Office of Natural Resources Revenue (ONRR) mineral royalty payments. Enables
  analysis of extractive industry activity on federal land, tourism economics, and
  timber/paper company revenue risk via SEC filings.

# ============================================================================
# COLUMN TEMPLATES
# ============================================================================

column_templates:

  state_fips_column: &state_fips_column
    name: state_fips
    type: string
    nullable: true
    comment: 2-digit FIPS code identifying the primary state (e.g., '06' for California)

  county_fips_column: &county_fips_column
    name: county_fips
    type: string
    nullable: true
    comment: 5-digit FIPS code for primary county (e.g., '06037' for Los Angeles County)

  geometry_wkt_column: &geometry_wkt_column
    name: geometry_wkt
    type: string
    nullable: true
    comment: Simplified boundary WKT polygon (for display only)

  partition_type: &partition_type
    name: type
    type: VARCHAR

  partition_year: &partition_year
    name: year
    type: INTEGER

  standard_partitions: &standard_partitions
    style: hive
    columnDefinitions:
      - *partition_type
      - *partition_year

  static_partitions: &static_partitions
    style: hive
    columnDefinitions:
      - *partition_type

# ============================================================================
# DIMENSION VALUES
# ============================================================================

dimension_values:

  lands_year_range: &lands_year_range
    type: yearRange
    start: "${LANDS_SINCE_YEAR:${GOVDATA_START_YEAR:2015}}"
    end: current
    dataLag: 0

  nps_visit_year_range: &nps_visit_year_range
    type: yearRange
    start: "${LANDS_SINCE_YEAR:${GOVDATA_START_YEAR:2015}}"
    end: current
    dataLag: 0

  onrr_year_range: &onrr_year_range
    type: yearRange
    start: "${LANDS_SINCE_YEAR:${GOVDATA_START_YEAR:2015}}"
    end: current
    dataLag: 0

# ============================================================================
# PARTITIONED TABLES
# ============================================================================

partitionedTables:

  # ---------------------------------------------------------------------------
  # NATIONAL FORESTS — USDA FS unit boundaries (static reference)
  # ---------------------------------------------------------------------------
  - name: national_forests
    pattern: "type=national_forests/*.parquet"
    partitions: *static_partitions
    comment: >
      USDA Forest Service National Forest and Grassland unit boundaries. ~175 units
      across 10 USFS regions. Reference/dimension table — joins to geo.states via
      state_fips and to timber_sales via forest_id. FK target for
      disasters.wildfire_perimeters.forest_id. Updated annually post-fire-season (October).

    dimensions:
      type:
        - national_forests

    columns:
      - name: forest_id
        type: string
        nullable: false
        comment: USDA FS unit ID (e.g., '0501')
      - name: forest_name
        type: string
        nullable: true
        comment: Unit name (e.g., 'Angeles National Forest')
      - name: region
        type: string
        nullable: true
        comment: USDA FS region number (01–10)
      - <<: *state_fips_column
        nullable: false
      - name: gross_acres
        type: double
        nullable: true
        comment: Total unit area in acres (GIS measurement)
      - name: proclaimed_acres
        type: double
        nullable: true
        comment: Proclaimed National Forest area in acres
      - <<: *geometry_wkt_column

    source:
      type: http
      url: "https://apps.fs.usda.gov/arcx/rest/services/EDW/EDW_ForestSystemBoundaries_01/FeatureServer/0/query?where=1%3D1&outFields=FORESTNUMBER%2CFORESTNAME%2CREGION%2CSTATE%2CGIS_ACRES%2CPROCLAIMED_ACRES&f=json&resultRecordCount=500"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 2.0
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.lands.UsfsForestBoundaryTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=national_forests/"
      partition:
        columns: [type]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/lands"
        tableName: national_forests
        catalogType: hadoop
        runCompaction: false

  # ---------------------------------------------------------------------------
  # TIMBER SALES — USDA FS FACTS timber sale program contracts
  # ---------------------------------------------------------------------------
  - name: timber_sales
    pattern: "type=timber_sales/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      USDA Forest Service timber sale program contracts from FACTS. One row per
      awarded contract. Joins to national_forests via forest_id and to geo.states
      and geo.counties via state_fips/county_fips. Volume and value data enable
      correlation with SEC 10-K disclosures for timber and paper companies.

    dimensions:
      type:
        - timber_sales
      year: *lands_year_range

    columns:
      - name: contract_id
        type: string
        nullable: false
        comment: FS timber sale contract number (e.g., 'OR095000008')
      - name: sale_name
        type: string
        nullable: true
        comment: Sale name
      - name: sale_year
        type: integer
        nullable: false
        comment: Year of contract award (partition key)
      - name: forest_id
        type: string
        nullable: true
        comment: FK to national_forests
      - <<: *state_fips_column
      - <<: *county_fips_column
      - name: sale_type
        type: string
        nullable: true
        comment: Lump Sum / Scale / Stewardship / Other
      - name: volume_mbf
        type: double
        nullable: true
        comment: Volume sold in thousand board feet (MBF)
      - name: appraised_value
        type: double
        nullable: true
        comment: Appraised stumpage value (USD)
      - name: sale_value
        type: double
        nullable: true
        comment: Awarded sale value (USD)
      - name: species_group
        type: string
        nullable: true
        comment: Softwood / Hardwood / Mixed
      - name: advertised_date
        type: date
        nullable: true
        comment: Date of advertisement (ISO format)
      - name: award_date
        type: date
        nullable: true
        comment: Date of contract award (ISO format)

    source:
      type: http
      url: "https://apps.fs.usda.gov/arcx/rest/services/EDW/EDW_TimberSaleProgram_01/FeatureServer/0/query?where=SALEYEAR%3D{year}&outFields=CONTRACT_ID%2CSALE_NAME%2CSALEYEAR%2CFOREST%2CFORESTNAME%2CCOUNTY_FIPS%2CSALETYPE%2CVOLUME%2CAPPRAISED_VALUE%2CSALE_VALUE%2CSPECIES_GROUP%2CADVERTISED_DATE%2CAWARD_DATE&f=json&resultRecordCount=5000"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 2.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.lands.UsfsFactsTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=timber_sales/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/lands"
        tableName: timber_sales
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 67108864
        compactionMinFiles: 3
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # FOREST INVENTORY — USDA FIA state-level area, volume, and carbon stock
  # ---------------------------------------------------------------------------
  - name: forest_inventory
    pattern: "type=forest_inventory/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      USDA Forest Service Forest Inventory and Analysis (FIA) state-level estimates.
      One row per state × forest_type_group × ownership_class × inventory_year.
      Includes forested land area, live tree volume, above-ground carbon stock, tree
      density, and basal area. Joins to geo.states via state_fips and to
      econ.bls_employment for forestry sector employment correlation.

    dimensions:
      type:
        - forest_inventory
      year: *lands_year_range

    columns:
      - name: inventory_year
        type: integer
        nullable: false
        comment: FIA estimation year (partition key)
      - <<: *state_fips_column
        nullable: false
      - name: forest_type_group
        type: string
        nullable: true
        comment: Forest type group (e.g., 'Oak-Hickory', 'Douglas-fir', 'Ponderosa pine')
      - name: ownership_class
        type: string
        nullable: true
        comment: National Forest / Other Federal / State / Private
      - name: land_area_acres
        type: double
        nullable: true
        comment: Forested land area in acres
      - name: live_volume_cuft
        type: double
        nullable: true
        comment: Live tree volume (cubic feet)
      - name: carbon_stock_tons
        type: double
        nullable: true
        comment: Above-ground carbon stock (short tons)
      - name: trees_per_acre
        type: double
        nullable: true
        comment: Average tree density (trees per acre)
      - name: basal_area_sqft
        type: double
        nullable: true
        comment: Basal area per acre (square feet; tree diameter proxy)

    source:
      type: http
      url: "https://apps.fs.usda.gov/api/fiadb-api/fullreport?rselected=State+Code+and+Name&cselected=Forest+type+group&wc={year}&outputFormat=JSON&colFilter=0"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 2.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.lands.FiaDatamartTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=forest_inventory/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/lands"
        tableName: forest_inventory
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 67108864
        compactionMinFiles: 3
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # NPS UNITS — National Park Service unit boundaries (static reference)
  # ---------------------------------------------------------------------------
  - name: nps_units
    pattern: "type=nps_units/*.parquet"
    partitions: *static_partitions
    comment: >
      National Park Service unit boundaries — parks, monuments, recreation areas,
      seashores, parkways, and all other NPS-designated units. ~430 units. Reference
      and dimension table; FK target for nps_visitation.unit_code. Joins to geo.states
      and geo.counties for gateway-community economic impact analysis. Updated annually
      in April following annual report administrative updates.

    dimensions:
      type:
        - nps_units

    columns:
      - name: unit_code
        type: string
        nullable: false
        comment: NPS 4-letter unit code (e.g., 'YOSE', 'GRCA')
      - name: unit_name
        type: string
        nullable: true
        comment: Full unit name
      - name: unit_type
        type: string
        nullable: true
        comment: National Park / Monument / Recreation Area / Seashore / Parkway / etc.
      - <<: *state_fips_column
      - <<: *county_fips_column
      - name: gross_acres
        type: double
        nullable: true
        comment: Total unit area in acres (GIS measurement)
      - name: established_date
        type: date
        nullable: true
        comment: Date of establishment
      - name: region
        type: string
        nullable: true
        comment: NPS region (e.g., 'Pacific West', 'Northeast')
      - <<: *geometry_wkt_column

    source:
      type: http
      url: "https://mapservices.nps.gov/arcgis/rest/services/NPS_Land_Resources/MapServer/2/query?where=1%3D1&outFields=UNIT_CODE%2CUNIT_NAME%2CUNIT_TYPE%2CSTATE_FIPS%2CCOUNTY_FIPS%2CGIS_ACRES%2CDATE_EST%2CREGION&f=json&resultRecordCount=1000"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 2.0
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.lands.NpsUnitBoundaryTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=nps_units/"
      partition:
        columns: [type]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/lands"
        tableName: nps_units
        catalogType: hadoop
        runCompaction: false

  # ---------------------------------------------------------------------------
  # NPS VISITATION — NPS IRMA monthly visitation statistics
  # ---------------------------------------------------------------------------
  - name: nps_visitation
    pattern: "type=nps_visitation/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      National Park Service annual and monthly visitation statistics from the IRMA
      Statistics API. One row per unit_code × visit_year × visit_month. Covers
      recreational visits, overnight stays, backcountry use, and concession lodging.
      Joins to nps_units via unit_code and to econ.bls_employment via county_fips
      (from nps_units join) for gateway-county tourism employment correlation.

    dimensions:
      type:
        - nps_visitation
      year: *nps_visit_year_range

    columns:
      - name: unit_code
        type: string
        nullable: false
        comment: FK to nps_units (NPS 4-letter code)
      - name: visit_year
        type: integer
        nullable: false
        comment: Visit year (partition key)
      - name: visit_month
        type: integer
        nullable: true
        comment: Month (1–12); null for annual summary rows
      - name: recreation_visits
        type: integer
        nullable: true
        comment: Recreational visitor count
      - name: recreation_hours
        type: double
        nullable: true
        comment: Total recreational visitor hours
      - name: tent_campers
        type: integer
        nullable: true
        comment: Tent and trailer camper nights
      - name: rv_campers
        type: integer
        nullable: true
        comment: RV camper nights
      - name: backcountry_campers
        type: integer
        nullable: true
        comment: Backcountry camper nights
      - name: non_recreation_visits
        type: integer
        nullable: true
        comment: Non-recreational visits (commuters, government, etc.)
      - name: concession_lodging_nights
        type: integer
        nullable: true
        comment: Concessioner lodging guest nights

    source:
      type: http
      url: "https://irma.nps.gov/Stats/api/v1/park/all/visitation/{year}"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 2.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.lands.NpsIrmaTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=nps_visitation/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/lands"
        tableName: nps_visitation
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 67108864
        compactionMinFiles: 3
        batchPartitionColumns: [year]
        incrementalKeys: [year]

  # ---------------------------------------------------------------------------
  # BLM FIELD OFFICES — BLM administrative unit boundaries (static reference)
  # ---------------------------------------------------------------------------
  - name: blm_field_offices
    pattern: "type=blm_field_offices/*.parquet"
    partitions: *static_partitions
    comment: >
      Bureau of Land Management administrative unit boundaries — field offices and
      district offices that manage federal subsurface mineral rights, grazing
      allotments, and surface use permits. ~150 field offices. Primarily useful as
      a geographic reference for joining extractive industry activity to SEC filings
      and FEC oil/gas sector donor geography. Updated annually in June.

    dimensions:
      type:
        - blm_field_offices

    columns:
      - name: office_code
        type: string
        nullable: false
        comment: BLM administrative unit code (e.g., 'UTMO')
      - name: office_name
        type: string
        nullable: true
        comment: Office name (e.g., 'Moab Field Office')
      - name: office_type
        type: string
        nullable: true
        comment: Field Office / District Office / State Office
      - <<: *state_fips_column
      - name: adm_acres
        type: double
        nullable: true
        comment: Administered surface acreage
      - <<: *geometry_wkt_column

    source:
      type: http
      url: "https://gis.blm.gov/arcgis/rest/services/lands_realty/BLM_National_Administrative_Units/FeatureServer/1/query?where=1%3D1&outFields=ADM_UNIT_CD%2CADMU_NAME%2CADMU_TYPE%2CSTATE_FIPS%2CGIS_ACRES&f=json&resultRecordCount=500"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 2.0
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.lands.BlmFieldOfficeTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=blm_field_offices/"
      partition:
        columns: [type]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/lands"
        tableName: blm_field_offices
        catalogType: hadoop
        runCompaction: false

  # ---------------------------------------------------------------------------
  # ONRR REVENUES — ONRR federal/tribal mineral royalties
  # ---------------------------------------------------------------------------
  - name: onrr_revenues
    pattern: "type=onrr_revenues/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      Office of Natural Resources Revenue (ONRR) production volumes and royalty
      payments for oil, gas, coal, and other minerals extracted from federal and
      tribal lands. One row per commodity-revenue-type-period combination by state
      and county. Primary financial link between BLM-managed subsurface rights and
      SEC 10-K disclosures for E&P and mining companies. Data published ~3 months
      in arrears (month N data arrives month N+3).

    dimensions:
      type:
        - onrr_revenues
      year: *onrr_year_range

    columns:
      - name: revenue_year
        type: integer
        nullable: false
        comment: Calendar year of production (partition key)
      - name: revenue_month
        type: integer
        nullable: true
        comment: Calendar month (1–12)
      - <<: *state_fips_column
      - <<: *county_fips_column
        comment: 5-digit FIPS (null for offshore/tribal)
      - name: land_class
        type: string
        nullable: true
        comment: Federal / Native American / Federal Offshore
      - name: land_category
        type: string
        nullable: true
        comment: Onshore / Offshore / Gulf of Mexico / Pacific
      - name: commodity
        type: string
        nullable: true
        comment: Oil / Gas / Coal / Geothermal / Renewables / Other
      - name: revenue_type
        type: string
        nullable: true
        comment: Royalties / Bonus / Rents / Other Revenues
      - name: product
        type: string
        nullable: true
        comment: Specific product (e.g., 'Coalbed Methane', 'Crude Oil')
      - name: volume
        type: double
        nullable: true
        comment: Production volume (units vary by commodity)
      - name: volume_unit
        type: string
        nullable: true
        comment: BBL / MCF / TON / KWH / ACRE
      - name: revenue
        type: double
        nullable: true
        comment: Revenue collected (USD)
      - name: company_name
        type: string
        nullable: true
        comment: Operating company name (fuzzy-join candidate for sec.filing_metadata)

    source:
      type: http
      url: "https://revenuedata.doi.gov/downloads/revenue/federal-revenue-by-location-{year}.csv"
      method: GET
      response:
        format: csv
        hasHeader: true
      rateLimit:
        requestsPerSecond: 1.0
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.lands.OnrrRevenueTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=onrr_revenues/year=*/"
      partition:
        columns: [type, year]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/lands"
        tableName: onrr_revenues
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5
        batchPartitionColumns: [year]
        incrementalKeys: [year]

# ============================================================================
# CONSTRAINTS
# ============================================================================

constraints:

  national_forests:
    primaryKey: [forest_id]
    foreignKeys:
      - columns: [state_fips]
        targetSchema: geo
        targetTable: states
        targetColumns: [state_fips]

  timber_sales:
    primaryKey: [contract_id]
    foreignKeys:
      - columns: [forest_id]
        targetTable: national_forests
        targetColumns: [forest_id]
      - columns: [state_fips]
        targetSchema: geo
        targetTable: states
        targetColumns: [state_fips]
      - columns: [county_fips]
        targetSchema: geo
        targetTable: counties
        targetColumns: [county_fips]

  forest_inventory:
    primaryKey: [state_fips, inventory_year, forest_type_group, ownership_class]
    foreignKeys:
      - columns: [state_fips]
        targetSchema: geo
        targetTable: states
        targetColumns: [state_fips]

  nps_units:
    primaryKey: [unit_code]
    foreignKeys:
      - columns: [state_fips]
        targetSchema: geo
        targetTable: states
        targetColumns: [state_fips]
      - columns: [county_fips]
        targetSchema: geo
        targetTable: counties
        targetColumns: [county_fips]

  nps_visitation:
    primaryKey: [unit_code, visit_year, visit_month]
    foreignKeys:
      - columns: [unit_code]
        targetTable: nps_units
        targetColumns: [unit_code]

  blm_field_offices:
    primaryKey: [office_code]
    foreignKeys:
      - columns: [state_fips]
        targetSchema: geo
        targetTable: states
        targetColumns: [state_fips]

  onrr_revenues:
    primaryKey: [revenue_year, revenue_month, state_fips, county_fips, land_class, commodity, revenue_type, product, company_name]
    foreignKeys:
      - columns: [state_fips]
        targetSchema: geo
        targetTable: states
        targetColumns: [state_fips]
      - columns: [county_fips]
        targetSchema: geo
        targetTable: counties
        targetColumns: [county_fips]

# ============================================================================
# VIEWS
# ============================================================================

views:

  - name: lands_timber_by_company_state
    comment: >
      Correlates USDA timber sale volume and value with SEC 10-K filing activity for
      timber and paper companies. Aggregates annual FS contract volume by state; joins
      to geo.states for reporting context. Enables identification of publicly traded
      companies with material exposure to federal timber supply changes.
    sql: >
      SELECT
        ts.sale_year,
        ts.state_fips,
        gs.state_name,
        nf.region                         AS fs_region,
        ts.species_group,
        COUNT(ts.contract_id)             AS contract_count,
        SUM(ts.volume_mbf)                AS total_volume_mbf,
        SUM(ts.sale_value)                AS total_sale_value,
        AVG(ts.sale_value / NULLIF(ts.volume_mbf, 0)) AS avg_price_per_mbf
      FROM timber_sales ts
      LEFT JOIN national_forests nf ON ts.forest_id = nf.forest_id
      LEFT JOIN "geo"."states" gs ON ts.state_fips = gs.state_fips
      GROUP BY ts.sale_year, ts.state_fips, gs.state_name, nf.region, ts.species_group

  - name: lands_nps_gateway_impact
    comment: >
      Joins NPS annual visitation to park unit metadata for gateway-county economic
      impact analysis. Annual totals (visit_month IS NULL) per unit. Ready to join
      with econ.bls_employment on county_fips from nps_units.
    sql: >
      SELECT
        v.visit_year,
        u.unit_code,
        u.unit_name,
        u.unit_type,
        u.county_fips,
        u.state_fips,
        gs.state_name,
        v.recreation_visits,
        v.tent_campers + v.rv_campers + v.backcountry_campers  AS total_camper_nights,
        v.concession_lodging_nights
      FROM nps_visitation v
      JOIN nps_units u ON v.unit_code = u.unit_code
      LEFT JOIN "geo"."states" gs ON u.state_fips = gs.state_fips
      WHERE v.visit_month IS NULL

  - name: lands_onrr_by_state_commodity
    comment: >
      Aggregates ONRR federal mineral royalty revenues by state, commodity, and year.
      Joins to geo.states for display names. Enables correlation with sec.filing_metadata
      company_name for E&P royalty exposure analysis and with econ.state_wages
      for energy sector employment vs. production volume trends.
    sql: >
      SELECT
        r.revenue_year,
        r.state_fips,
        gs.state_name,
        r.land_class,
        r.commodity,
        r.revenue_type,
        SUM(r.volume)                     AS total_volume,
        MAX(r.volume_unit)                AS volume_unit,
        SUM(r.revenue)                    AS total_revenue
      FROM onrr_revenues r
      LEFT JOIN "geo"."states" gs ON r.state_fips = gs.state_fips
      GROUP BY r.revenue_year, r.state_fips, gs.state_name,
               r.land_class, r.commodity, r.revenue_type

  - name: lands_nps_gateway_employment
    comment: >
      Correlates NPS annual park visitation with county-level employment and wages
      (econ.county_wages, BLS QCEW). Joins nps_units.county_fips to county_wages for
      the same year, total-industry rows (industry_code=10, own_code=0). Enables
      gateway-county economic impact analysis: does visitation growth track with
      local employment and wage growth in park-adjacent counties?
    sql: >
      SELECT
        v.visit_year                                              AS year,
        u.unit_code,
        u.unit_name,
        u.unit_type,
        u.county_fips,
        u.state_fips,
        v.recreation_visits,
        v.tent_campers + v.rv_campers + v.backcountry_campers    AS total_camper_nights,
        v.concession_lodging_nights,
        w.annual_avg_emplvl                                       AS county_total_employment,
        w.total_annual_wages                                      AS county_total_wages,
        w.annual_avg_wkly_wage                                    AS county_avg_weekly_wage
      FROM nps_visitation v
      JOIN nps_units u ON v.unit_code = u.unit_code
      LEFT JOIN "econ"."county_wages" w
        ON u.county_fips = w.county_fips
        AND v.visit_year  = w.year
        AND w.industry_code = '10'
        AND w.own_code      = '0'
      WHERE v.visit_month IS NULL

  - name: lands_onrr_energy_wages
    comment: >
      Correlates ONRR federal mineral royalty revenues with state-level mining and
      oil-and-gas employment (econ.state_wages, BLS QCEW NAICS 21). Joins on
      state_fips and revenue_year. Enables analysis of whether federal royalty
      production volumes track with energy-sector employment in producing states,
      and surfaces states where federal land revenues are large relative to
      private-sector energy wages.
    sql: >
      SELECT
        r.revenue_year                    AS year,
        r.state_fips,
        r.commodity,
        r.land_class,
        SUM(r.volume)                     AS total_volume,
        MAX(r.volume_unit)                AS volume_unit,
        SUM(r.revenue)                    AS total_revenue,
        MAX(w.annual_avg_emplvl)          AS state_mining_employment,
        MAX(w.total_annual_wages)         AS state_mining_total_wages,
        MAX(w.annual_avg_wkly_wage)       AS state_mining_avg_weekly_wage
      FROM onrr_revenues r
      LEFT JOIN "econ"."state_wages" w
        ON r.state_fips    = w.state_fips
        AND r.revenue_year = w.year
        AND w.industry_code = '21'
        AND w.own_code      = '5'
      GROUP BY r.revenue_year, r.state_fips, r.commodity, r.land_class

  - name: lands_timber_public_companies
    comment: >
      Correlates federal USFS timber sale activity with SEC-registered timber and
      paper companies (sec.filing_metadata SIC 0800-0899 forestry, 2400-2499 lumber
      and wood products, 2600-2699 paper and allied products). Joins on sale_year =
      fiscal_year to show, for each year, how many publicly traded timber/paper
      companies filed 10-Ks alongside the federal contract volume and value.
      Useful for identifying publicly traded companies with material exposure to
      changes in federal timber supply policy.
    sql: >
      SELECT
        ts.sale_year,
        ts.state_fips,
        ts.species_group,
        SUM(ts.volume_mbf)                AS federal_volume_mbf,
        SUM(ts.sale_value)                AS federal_sale_value,
        COUNT(DISTINCT f.cik)             AS public_company_count,
        COUNT(DISTINCT f.ticker)          AS ticker_count
      FROM timber_sales ts
      LEFT JOIN "sec"."filing_metadata" f
        ON ts.sale_year   = f.fiscal_year
        AND f.filing_type = '10-K'
        AND (CAST(f.sic_code AS INTEGER) BETWEEN 800 AND 899
          OR CAST(f.sic_code AS INTEGER) BETWEEN 2400 AND 2499
          OR CAST(f.sic_code AS INTEGER) BETWEEN 2600 AND 2699)
      GROUP BY ts.sale_year, ts.state_fips, ts.species_group
