        expression: 'src."ActivityStartDate"'
        comment: Sample date (YYYY-MM-DD)
      - name: activity_media
        type: string
        nullable: true
        expression: 'src."ActivityMediaName"'
        comment: Sample medium (Water, ...)
      - name: characteristic_name
        type: string
        nullable: true
        expression: 'src."CharacteristicName"'
        comment: Measured characteristic (e.g. Nitrate, pH, Lead)
      - name: sample_fraction
        type: string
        nullable: true
        expression: 'src."ResultSampleFractionText"'
        comment: Sample fraction (Total, Dissolved, ...)
      - name: result_value
        type: double
        nullable: true
        expression: 'TRY_CAST(src."ResultMeasureValue" AS DOUBLE)'
        comment: Measured result value
      - name: result_unit
        type: string
        nullable: true
        expression: 'src."ResultMeasure/MeasureUnitCode"'
        comment: Result unit of measure
      - name: usgs_pcode
        type: string
        nullable: true
        expression: 'src."USGSPCode"'
        comment: USGS parameter code
      - name: result_status
        type: string
        nullable: true
        expression: 'src."ResultStatusIdentifier"'
        comment: Result status (Accepted, Preliminary, ...)

    source:
      type: http
      url: "https://www.waterqualitydata.us/data/Result/search?statecode=US:{state}&startDateLo=01-01-{effective_year}&startDateHi=12-31-{effective_year}&mimeType=csv&zip=no"
      method: GET
      response:
        format: csv
      rateLimit:
        requestsPerSecond: 0.5
        retryOn: [429, 500, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    materialize:
      format: iceberg
      output:
        pattern: "type=water_quality_samples/state=*/year=*/"
      partition:
        columns: [type, state, year]
        valueSource:
          year: effective_year
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/environment"
        tableName: water_quality_samples
        catalogType: hadoop
        runMaintenance: true
        snapshotRetentionDays: 1
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 3
        batchPartitionColumns: [year]
        incrementalKeys: [year]
        overwritePartitions: true

