# ============================================================================
# VIEWS
# ============================================================================

views:

  - name: ghg_facility_annual
    comment: >
      Per-facility annual greenhouse-gas emissions (total metric tons CO2e) with
      geography, joining the emissions facts to the facility dimension.
    sql: >
      SELECT
        f.year,
        f.facility_id,
        f.facility_name,
        f.state_abbr,
        f.county_fips,
        f.latitude,
        f.longitude,
        f.naics_code,
        SUM(e.co2e_emission) AS total_co2e
      FROM ghg_facilities f
      JOIN ghg_emissions e
        ON f.facility_id = e.facility_id AND f.year = e.year
      GROUP BY f.year, f.facility_id, f.facility_name, f.state_abbr,
               f.county_fips, f.latitude, f.longitude, f.naics_code

  - name: facility_compliance
    comment: >
      Compliance/enforcement projection of epa_facilities — identity plus the
      inspection, penalty, and per-statute compliance-status columns.
    sql: >
      SELECT
        registry_id,
        facility_name,
        state_abbr,
        compliance_status,
        snc_flag,
        inspection_count,
        formal_action_count,
        total_penalties,
        caa_compliance_status,
        cwa_compliance_status,
        rcra_compliance_status,
        sdwa_compliance_status
      FROM epa_facilities

  - name: air_quality_annual_by_county
    comment: >
      County-year average of the annual mean concentration and peak AQI by
      pollutant — the headline air-quality rollup, joinable to geo.counties.
    sql: >
      SELECT
        a.year,
        a.state_fips,
        a.county_fips,
        a.parameter_name,
        AVG(a.arithmetic_mean) AS avg_concentration,
        MAX(a.aqi)             AS peak_aqi
      FROM air_quality_annual a
      GROUP BY a.year, a.state_fips, a.county_fips, a.parameter_name
