      and gage height (ft). Fetched per (state, year) from the NWIS daily-values
      service (RDB; concatenated per-site blocks with dynamically-named value
      columns, normalized by the transformer). Delta by year; current year is
      re-fetched. site_no joins water_sites.
    dqRowLimit: 50000

    dimensions:
      type:
        - streamflow
      state: *all_states
      year: *usgs_year_range

    columns:
      - name: site_no
        type: string
        nullable: false
        comment: USGS site number (FK to water_sites.site_no)
      - name: obs_date
        type: date
        nullable: false
        comment: Observation date
      - name: discharge_cfs
        type: double
        nullable: true
        comment: Daily mean discharge (cubic feet per second)
      - name: discharge_qual
        type: string
        nullable: true
        comment: Discharge qualifier (A=approved, P=provisional, e=estimated)
      - name: gage_height_ft
        type: double
        nullable: true
        comment: Daily mean gage height (feet)
      - name: gage_height_qual
        type: string
        nullable: true
        comment: Gage-height qualifier

    source:
      type: http
      url: "https://waterservices.usgs.gov/nwis/dv/?format=rdb&stateCd={state}&parameterCd=00060,00065&startDT={effective_year}-01-01&endDT={effective_year}-12-31"
      method: GET
      response:
        format: text
      rateLimit:
        requestsPerSecond: 1.0
        retryOn: [429, 500, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.environment.UsgsStreamflowRdbTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=streamflow/state=*/year=*/"
      partition:
        columns: [type, state, year]
        valueSource:
          year: effective_year
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/environment"
        tableName: streamflow
        runMaintenance: true
        snapshotRetentionDays: 1
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 3
        batchPartitionColumns: [year]
        incrementalKeys: [year]
        overwritePartitions: true

