# ============================================================================
# Reference Data Schema (REF)
# ============================================================================
# Cross-referencing tables that link financial identifiers across systems:
#   - GLEIF entities (LEI -> legal entity mapping)
#   - GLEIF CIK mapping (LEI <-> SEC CIK bridge)
#   - OpenFIGI instruments (ticker -> FIGI mapping)
#
# This is a standalone reference schema with no dependencies.
#
# GLEIF History Model:
#   GLEIF publishes a daily "golden copy" — a full point-in-time snapshot of
#   all ~3.2M LEI records. There are no historical archives; each day's file
#   replaces the previous. Delta files (intra-day, last-day, last-week,
#   last-month) are available for incremental updates but only cover changes
#   relative to the current golden copy, not historical state reconstruction.
#
#   Strategy: Download the full golden copy CSV (~450MB ZIP) on each ETL run.
#   The worker script discovers the latest URL from the GLEIF golden copy API.
#   For incremental updates, a future enhancement could use delta files.
# ============================================================================

schemaName: "${SCHEMA_NAME:ref}"
materializeDirectory: "${GOVDATA_PARQUET_DIR}"

comment: >
  Reference and cross-referencing tables for financial entity identification.
  Links SEC CIK identifiers to GLEIF LEI codes and OpenFIGI instrument
  identifiers. Enables cross-system entity resolution for financial data analysis.

# ============================================================================
# BULK DOWNLOADS
# ============================================================================
# Large data files shared across multiple tables to optimize download
# ============================================================================

bulkDownloads:

  # GLEIF Golden Copy — full LEI registry (~450MB ZIP, ~3.2M records)
  # Stable permalink — GLEIF API issues a 302 redirect to the current dated file.
  # Updated 3x/day (02:00, 10:00, 18:00 UTC). No authentication required.
  # The CSV ZIP is downloaded once and shared by gleif_entities and gleif_cik_mapping.
  gleif_golden_copy:
    cachePattern: "type=gleif_bulk/gleif-lei2-golden-copy.csv.zip"
    url: "https://goldencopy.gleif.org/api/v2/golden-copies/publishes/lei2/latest.csv"
    dimensions: {}
    comment: >
      GLEIF LEI-CDF 3.1 golden copy CSV download (~450MB compressed, 3.2M records).
      Contains all LEI records worldwide. Shared by gleif_entities and gleif_cik_mapping.

column_templates:

  # --- LEI Common Columns ---

  lei_column: &lei_column
    name: lei
    type: string
    nullable: false
    comment: Legal Entity Identifier (20-character alphanumeric)
    source: LEI

  legal_name_column: &legal_name_column
    name: legal_name
    type: string
    nullable: true
    comment: Legal name of the entity
    source: Entity.LegalName

  entity_status_column: &entity_status_column
    name: entity_status
    type: string
    nullable: true
    comment: Entity status (ACTIVE, INACTIVE, etc.)
    source: Entity.EntityStatus

  # --- FIGI Common Columns ---

  figi_column: &figi_column
    name: figi
    type: string
    nullable: false
    comment: Financial Instrument Global Identifier (12-character)

  ticker_column: &ticker_column
    name: ticker
    type: string
    nullable: true
    comment: Trading ticker symbol

# ============================================================================
# DIMENSION VALUES
# ============================================================================

dimension_values:

  ref_year_range: &ref_year_range
    type: yearRange
    start: "${GOVDATA_START_YEAR:2010}"
    end: current
    dataLag: 0

# ============================================================================
# PARTITIONED TABLES
# ============================================================================

partitionedTables:

  # ==========================================================================
  # GLEIF ENTITIES — Full LEI registry from bulk CSV download
  # ==========================================================================
  - name: gleif_entities
    # Full point-in-time GLEIF golden copy that ALREADY carries a per-record updated_at
    # (last_update = Registration.LastUpdateDate). computed_delta keeps only the rows whose
    # last_update advanced past the stored high-water mark and APPENDS them (materialize
    # overwritePartitions: false below), so each publish adds just the changed LEIs instead of
    # rewriting all ~3.2M rows — and last_update becomes the queryable history axis (group by it
    # for point-in-time / trend queries; "current" = latest last_update per lei). No synthesized
    # column: the source's own last_update is both the change key and the time axis.
    dataset_type: computed_delta
    freshness:
      type: last_modified   # pre-download gate: skip the ~450MB pull entirely when the golden copy file is unchanged
    pattern: "type=gleif_entities.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR

    comment: >
      GLEIF Legal Entity Identifier (LEI) records from the Global LEI Foundation
      golden copy CSV. Contains entity registration details, jurisdiction, legal
      form, addresses, and registration authority links. The
      registration_authority_entity_id field contains the SEC CIK number for
      entities registered with RA000602 (SEC).
      Source: GLEIF Golden Copy (goldencopy.gleif.org).

    columns:
      - *lei_column
      - *legal_name_column
      - name: legal_name_language
        type: string
        nullable: true
        comment: Language of the legal name (ISO 639-1)
        source: Entity.LegalName.xmllang
      - name: jurisdiction
        type: string
        nullable: true
        comment: Jurisdiction of legal formation (ISO 3166-2, e.g., US-DE)
        source: Entity.LegalJurisdiction
      - *entity_status_column
      - name: entity_legal_form
        type: string
        nullable: true
        comment: Entity legal form code (ELF code)
        source: Entity.LegalForm.EntityLegalFormCode
      - name: registration_authority_id
        type: string
        nullable: true
        comment: Registration authority identifier (e.g., RA000602 for SEC)
        source: Entity.RegistrationAuthority.RegistrationAuthorityID
      - name: registration_authority_entity_id
        type: string
        nullable: true
        comment: Entity ID at the registration authority (CIK for SEC registrants)
        source: Entity.RegistrationAuthority.RegistrationAuthorityEntityID
      - name: headquarters_country
        type: string
        nullable: true
        comment: Country of headquarters (ISO 3166-1 alpha-2)
        source: Entity.HeadquartersAddress.Country
      - name: headquarters_city
        type: string
        nullable: true
        comment: City of headquarters
        source: Entity.HeadquartersAddress.City
      - name: registered_country
        type: string
        nullable: true
        comment: Country of legal registration (ISO 3166-1 alpha-2)
        source: Entity.LegalAddress.Country
      - name: registered_city
        type: string
        nullable: true
        comment: City of legal registration
        source: Entity.LegalAddress.City
      - name: registration_date
        type: string
        nullable: true
        comment: Initial LEI registration date (ISO 8601)
        source: Registration.InitialRegistrationDate
      - name: last_update
        type: string
        nullable: true
        comment: Last update date of the LEI record (ISO 8601)
        source: Registration.LastUpdateDate
      - name: next_renewal
        type: string
        nullable: true
        comment: Next renewal date for the LEI (ISO 8601)
        source: Registration.NextRenewalDate

    download:
      bulkDownload: gleif_golden_copy

    source:
      type: http
      url: "https://goldencopy.gleif.org/api/v2/golden-copies/publishes/lei2/latest.csv"
      method: GET
      extractPattern: "*.csv"
      # computed_delta change key: only rows whose last_update exceeds the stored high-water mark
      # are kept and appended. last_update is the source's own Registration.LastUpdateDate.
      incremental:
        dateField: last_update
      response:
        format: csv
      rateLimit:
        requestsPerSecond: 1.0
        maxRetries: 3
      rawCache:
        enabled: true

    dimensions:
      type:
        - gleif_entities

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type]
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        batchPartitionColumns: [type]
        overwritePartitions: false   # APPEND the computed_delta rows; replace-partition would drop all prior LEI history
        runMaintenance: true
        snapshotRetentionDays: 1
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

  # ==========================================================================
  # GLEIF CIK MAPPING — LEI <-> SEC CIK bridge table
  # ==========================================================================
  - name: gleif_cik_mapping
    freshness:
      type: last_modified
    pattern: "type=gleif_cik_mapping.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR

    comment: >
      Bridge table mapping GLEIF LEI codes to SEC CIK numbers. Derived from
      the GLEIF golden copy CSV filtered where registration_authority_id =
      'RA000602' (SEC). Provides fast LEI <-> CIK lookups without scanning
      the full GLEIF dataset.

    columns:
      - *lei_column
      - name: cik
        type: string
        nullable: false
        comment: SEC Central Index Key (CIK) number
        source: Entity.RegistrationAuthority.RegistrationAuthorityEntityID
      - *legal_name_column
      - *entity_status_column

    download:
      bulkDownload: gleif_golden_copy

    source:
      type: http
      url: "https://goldencopy.gleif.org/api/v2/golden-copies/publishes/lei2/latest.csv"
      method: GET
      extractPattern: "*.csv"
      rowFilter:
        column: Entity.RegistrationAuthority.RegistrationAuthorityID
        pattern: "^RA000602$"
      response:
        format: csv
      rateLimit:
        requestsPerSecond: 1.0
        maxRetries: 3
      rawCache:
        enabled: true

    dimensions:
      type:
        - gleif_cik_mapping

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type]
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        batchPartitionColumns: [type]
        overwritePartitions: true
        runMaintenance: true
        snapshotRetentionDays: 1
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

  # ==========================================================================
  # SEC COMPANY TICKERS — Active US exchange-listed SEC filers
  # ==========================================================================
  - name: sec_company_tickers
    pattern: "type=sec_company_tickers.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR

    comment: >
      SEC EDGAR company ticker mapping. Contains ~10,000 active US exchange-listed
      companies with their SEC CIK and ticker symbol. Sourced from the SEC EDGAR
      company_tickers.json file (updated daily). Feeds the ticker dimension for
      figi_instruments — enables the full chain LEI → CIK → ticker → FIGI within
      the ref schema with no dependency on other schemas.
      Source: https://www.sec.gov/files/company_tickers.json

    columns:
      - name: cik
        type: string
        nullable: false
        comment: SEC Central Index Key (plain numeric string, matches gleif_cik_mapping.cik)
      - name: ticker
        type: string
        nullable: false
        comment: Exchange ticker symbol
      - name: title
        type: string
        nullable: true
        comment: Company name as registered with SEC
      # Point-in-time source with NO per-record updated_at: a computed column stamps the ingest
      # date (UTC today) so every snapshot carries its own history axis (group by as_of).
      # CURRENT_DATE is evaluated by DuckDB in the materialize SELECT and by the Java fallback
      # evaluator (IcebergMaterializationWriter.evaluateExpression date-function support).
      - name: as_of
        type: date
        nullable: false
        expression: 'CURRENT_DATE'
        comment: Ingest date this snapshot was materialized (UTC today; group by for history)

    source:
      type: http
      url: "https://www.sec.gov/files/company_tickers.json"
      method: GET
      headers:
        User-Agent: "govdata-etl kennethstott@gmail.com"
      response:
        format: json
      rateLimit:
        requestsPerSecond: 0.2
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.ref.SecCompanyTickersTransformer"

    dimensions:
      type:
        - sec_company_tickers
      month: ["${GOVDATA_CURRENT_MONTH:12}"]

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type, as_of]
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        batchPartitionColumns: [type, as_of]
        # as_of is a partition key, so replace-partitions is scoped to today's snapshot: a re-run
        # the same day replaces only as_of=today (idempotent), while prior days' partitions are
        # preserved — the table accumulates a per-day history keyed by as_of.
        overwritePartitions: true
        runMaintenance: true
        snapshotRetentionDays: 1
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

  # ==========================================================================
  # FIGI INSTRUMENTS — OpenFIGI instrument identifiers
  # ==========================================================================
  - name: figi_instruments
    freshness:
      type: hash
    pattern: "type=figi_instruments.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR
    enabled: "${OPENFIGI_API_KEY:}"

    comment: >
      Financial instrument identifiers from OpenFIGI. Maps tickers to FIGI codes
      with exchange, market sector, and security type information. Requires an
      OpenFIGI API key (set OPENFIGI_API_KEY environment variable). Rate limited
      to 25 requests/minute with API key, 5 requests/minute without.

    columns:
      - *figi_column
      - *ticker_column
      - name: name
        type: string
        nullable: true
        comment: Instrument name
      - name: exchange_code
        type: string
        nullable: true
        comment: Exchange code (e.g., US, LN, JP)
        source: exchCode
      - name: market_sector
        type: string
        nullable: true
        comment: Market sector (Equity, Govt, Corp, etc.)
        source: marketSector
      - name: security_type
        type: string
        nullable: true
        comment: Security type (Common Stock, ADR, ETF, etc.)
        source: securityType
      - name: security_type2
        type: string
        nullable: true
        comment: Secondary security type classification
        source: securityType2
      - name: security_description
        type: string
        nullable: true
        comment: Security description
        source: securityDescription
      - name: composite_figi
        type: string
        nullable: true
        comment: Composite FIGI (country-level aggregate identifier)
        source: compositeFIGI
      - name: share_class_figi
        type: string
        nullable: true
        comment: Share class FIGI
        source: shareClassFIGI

    source:
      type: http
      url: "https://api.openfigi.com/v3/mapping"
      method: POST
      headers:
        Content-Type: "application/json"
        X-OPENFIGI-APIKEY: "${OPENFIGI_API_KEY:}"
      body:
        idType: "TICKER"
        idValue: "{ticker}"
      bodyWrapArray: true
      response:
        format: json
      rateLimit:
        requestsPerSecond: 0.4
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      dataProvider: "org.apache.calcite.adapter.govdata.ref.FigiDataProvider"

    dimensions:
      type:
        - figi_instruments

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type]
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        batchPartitionColumns: [type]
        overwritePartitions: true
        runMaintenance: true
        snapshotRetentionDays: 1
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

  # ==========================================================================
  # COUNTRIES — country identity crosswalk (Census code <-> ISO <-> FIPS <-> BEA name)
  # ==========================================================================
  - name: countries
    # Country codes are extremely stable, so the ISO "spine" (alpha-3, numeric,
    # FIPS, M49 region/subregion/continent, currency) is a checked-in resource
    # (ref/country-enrichment.json, built by scripts/build-countries-ref-resources.py).
    # Only the Census Schedule C code list is fetched live, and freshness gates it
    # to a cheap daily HEAD — CountriesReferenceTransformer merges the two.
    freshness:
      type: last_modified
    pattern: "type=countries.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR

    comment: >
      Country identity crosswalk: one row per country carrying the Census 4-digit
      trade code, ISO 3166-1 alpha-2/alpha-3/numeric, FIPS 10-4, a name-based BEA
      area key, plus M49 region/subregion/continent and ISO 4217 currency. Lets the
      Census-coded trade tables (econ.trade_by_state / trade_exports / trade_imports),
      the ISO-3-coded econ.world_indicators, and the name-keyed BEA tables
      (econ.ita_data / fdi_*) all join to a single reference.
      Sources: Census Schedule C country list (live, freshness-gated) + a bundled
      ISO spine derived from DataHub datasets/country-codes (public domain).

    columns:
      - name: census_cty_code
        type: string
        nullable: false
        comment: Census 4-digit foreign-trade country code (FK target for the trade tables)
      - name: iso_alpha2
        type: string
        nullable: true
        comment: ISO 3166-1 alpha-2 code
      - name: iso_alpha3
        type: string
        nullable: true
        comment: ISO 3166-1 alpha-3 code
      - name: iso_numeric
        type: string
        nullable: true
        comment: ISO 3166-1 numeric code
      - name: fips_code
        type: string
        nullable: true
        comment: FIPS 10-4 country code
      - name: country_name
        type: string
        nullable: true
        comment: Census display name (clean short form)
      - name: official_name
        type: string
        nullable: true
        comment: ISO English official name
      - name: bea_area_name
        type: string
        nullable: true
        comment: country_name with any parenthetical stripped; best-effort join key for BEA area_or_country
      - name: currency_code
        type: string
        nullable: true
        comment: ISO 4217 currency alphabetic code
      - name: region
        type: string
        nullable: true
        comment: M49 region (e.g. Americas, Europe)
      - name: subregion
        type: string
        nullable: true
        comment: M49 sub-region (e.g. Northern America)
      - name: intermediate_region
        type: string
        nullable: true
        comment: M49 intermediate region (nullable)
      - name: continent
        type: string
        nullable: true
        comment: Continent code (e.g. NA, EU, AS)
      - name: is_aggregate
        type: boolean
        nullable: true
        comment: True when the Census row is a grouping/area with no single ISO country

    source:
      type: http
      url: "https://www.census.gov/foreign-trade/schedules/c/country.txt"
      method: GET
      headers:
        User-Agent: "govdata-etl kennethstott@gmail.com"
      response:
        # 'json' describes the CountriesReferenceTransformer OUTPUT; the raw body
        # is the pipe-delimited Census text, which the transformer parses.
        format: json
      rateLimit:
        requestsPerSecond: 0.5
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.ref.CountriesReferenceTransformer"

    dimensions:
      type:
        - countries

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type]
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        batchPartitionColumns: [type]
        overwritePartitions: true
        runMaintenance: true
        snapshotRetentionDays: 1
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

  # ==========================================================================
  # NAICS — North American Industry Classification System (2-6 digit)
  # ==========================================================================
  # Static, non-vintaged industry taxonomy built from the Census 2022 NAICS code
  # list by scripts/build-refs.py (bundled /ref/naics-codes.yaml). Canonical FK
  # target for naics_code across census (County Business Patterns), econ, and
  # environment (TRI facility NAICS). Modeled like geo.state_ref: flat file, no
  # type/year partition, natural-key PK.
  - name: naics
    pattern: "naics.parquet"
    comment: >
      NAICS 2022 industry classification: one row per 2-to-6-digit code with its
      title and hierarchy level (2=sector, 3=subsector, 4=industry group,
      5=NAICS industry, 6=national industry). Sector codes retain the Census
      range form (e.g. '31-33' manufacturing). Canonical FK target for naics_code
      across census/econ/environment. Source: Census 2022 NAICS code list.

    columns:
      - name: naics_code
        type: string
        nullable: false
        comment: 2-6 digit NAICS code (sectors may be a range, e.g. '31-33')
      - name: naics_title
        type: string
        nullable: false
        comment: Industry title
      - name: level
        type: integer
        nullable: false
        comment: Hierarchy depth = number of digits in the base code (2=sector … 6=national industry)

    source:
      type: constants
      file: "/ref/naics-codes.yaml"
      path: "naics"

    dimensions:
      type:
        - naics
      year: *ref_year_range

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: []
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        runMaintenance: true
        snapshotRetentionDays: 1

  # ==========================================================================
  # NAICS_VINTAGE — multi-edition NAICS for period-correct industry lookups
  # ==========================================================================
  # NAICS revises in ~5-year editions (…2012/2017/2022). ref.naics holds only the
  # current edition (unique FK spine); this table holds one row per code PER edition so a
  # fact from year Y can be joined to the edition in effect for Y (via naics_vintage_map).
  # This is the correct "history in the data" pattern — see gleif_entities (SCD by source
  # last_update) for the high-churn analogue; NAICS has no per-row timestamp so it uses an
  # explicit vintage column instead. Editions loaded: 2017, 2022 (build-refs.py).
  - name: naics_vintage
    pattern: "type=naics_vintage/vintage=*/*.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR
        - name: vintage
          type: INTEGER
    comment: >
      Multi-edition NAICS classification: one row per 2-6 digit code PER vintage (edition
      year). Use for period-correct industry lookups — join fact.year to
      ref.naics_vintage_map to pick the edition, then join on (naics_vintage, naics_code).
      For the single current-edition FK spine use ref.naics. Source: Census per-edition
      code lists (editions 2017, 2022).

    columns:
      - name: vintage
        type: integer
        nullable: false
        comment: NAICS edition year (e.g. 2017, 2022)
      - name: naics_code
        type: string
        nullable: false
        comment: 2-6 digit NAICS code (sectors may be a range, e.g. '31-33')
      - name: naics_title
        type: string
        nullable: false
        comment: Industry title for this code in this edition
      - name: level
        type: integer
        nullable: false
        comment: Hierarchy depth = number of digits in the base code (2=sector … 6=national industry)

    source:
      type: constants
      file: "/ref/naics-vintage-codes.yaml"
      path: "naics_vintage"

    dimensions:
      type:
        - naics_vintage

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: "type=naics_vintage/vintage=*/"
      partition:
        columns: [type, vintage]
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        runMaintenance: true
        snapshotRetentionDays: 1

  # ==========================================================================
  # NAICS_VINTAGE_MAP — data-year -> applicable NAICS edition
  # ==========================================================================
  - name: naics_vintage_map
    pattern: "naics_vintage_map.parquet"
    comment: >
      Data-year to applicable NAICS edition. Join fact.year = naics_vintage_map.data_year to
      resolve naics_vintage, then join ref.naics_vintage on (naics_vintage, naics_code) for
      the period-correct title. Loaded editions: 2017, 2022; years before the earliest loaded
      edition map to it (documented fallback — refine when older editions are sourced).

    columns:
      - name: data_year
        type: integer
        nullable: false
        comment: Calendar/data year
      - name: naics_vintage
        type: integer
        nullable: false
        comment: NAICS edition year in effect for data_year (matches ref.naics_vintage.vintage)

    source:
      type: constants
      file: "/ref/naics-vintage-map.yaml"
      path: "naics_vintage_map"

    dimensions:
      type:
        - naics_vintage_map

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: []
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        runMaintenance: true
        snapshotRetentionDays: 1

  # ==========================================================================
  # SIC — SEC EDGAR Standard Industrial Classification list
  # ==========================================================================
  # Static, non-vintaged. Built from the SEC EDGAR SIC code list by
  # scripts/build-refs.py (bundled /ref/sic-codes.yaml). Canonical FK target for
  # sec.filing_metadata.sic_code. Codes are zero-padded to 4 digits to match the
  # SEC list form; verify the sec side is padded the same before enforcing.
  - name: sic
    pattern: "sic.parquet"
    comment: >
      SEC EDGAR Standard Industrial Classification codes: one row per 4-digit SIC
      code with its EDGAR Assistant-Director office and industry title. FK target
      for sec.filing_metadata.sic_code. Source: SEC EDGAR siccodes list.

    columns:
      - name: sic_code
        type: string
        nullable: false
        comment: 4-digit SIC code, zero-padded (e.g. '0100', '7372')
      - name: ad_office
        type: string
        nullable: true
        comment: EDGAR Assistant-Director office / industry group that reviews filers in this SIC
      - name: industry_title
        type: string
        nullable: false
        comment: SIC industry title (SEC EDGAR display form)

    source:
      type: constants
      file: "/ref/sic-codes.yaml"
      path: "sic"

    dimensions:
      type:
        - sic
      year: *ref_year_range

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: []
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        runMaintenance: true
        snapshotRetentionDays: 1

  # ==========================================================================
  # CURRENCIES — ISO 4217 active currency codes
  # ==========================================================================
  # Static, non-vintaged. Built from datasets/currency-codes (ISO 4217) by
  # scripts/build-refs.py (bundled /ref/currency-codes.yaml). FK target for
  # ref.countries.currency_code and any table carrying an ISO 4217 code.
  - name: currencies
    pattern: "currencies.parquet"
    comment: >
      ISO 4217 active currencies: one row per alphabetic code with its name,
      numeric code, and minor-unit (decimal places). FK target for
      ref.countries.currency_code. Withdrawn codes are excluded. Source: ISO 4217
      (datasets/currency-codes).

    columns:
      - name: currency_code
        type: string
        nullable: false
        comment: ISO 4217 3-letter alphabetic code (e.g. 'USD')
      - name: currency_name
        type: string
        nullable: false
        comment: Currency name (e.g. 'US Dollar')
      - name: numeric_code
        type: string
        nullable: true
        comment: ISO 4217 3-digit numeric code, zero-padded (e.g. '840')
      - name: minor_unit
        type: integer
        nullable: true
        comment: Number of decimal places in the minor unit (e.g. 2 for cents; null when not applicable)

    source:
      type: constants
      file: "/ref/currency-codes.yaml"
      path: "currencies"

    dimensions:
      type:
        - currencies
      year: *ref_year_range

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: []
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        runMaintenance: true
        snapshotRetentionDays: 1

  # ==========================================================================
  # CALENDAR — daily date spine (2010 → current+2yr) with every ISO form + parts
  # ==========================================================================
  # Pure-generated conformed date dimension. One row per day carrying the day in
  # every full-date representation (each declared unique → a valid FK target for
  # the heterogeneously-formatted date columns across schemas), plus every date
  # part in numeric and named forms, calendar flags, and US-federal fiscal
  # attributes. computed_delta append keyed on iso_date (mirrors gleif_entities):
  # each daily ETL run extends the spine by the newly-reached day. fiscal_year
  # FKs ref.fiscal_year.
  - name: calendar
    dataset_type: computed_delta
    pattern: "type=calendar.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR

    comment: >
      Daily date spine from 2010-01-01 through two years past the current year,
      one row per calendar day. The full-date representations (date_key, iso_date,
      basic_iso YYYYMMDD, iso_ordinal YYYY-DDD, iso_week_date YYYY-Www-D,
      epoch_day) are each unique and serve as FK targets for date columns in any
      form. Also carries numeric and named date parts, calendar flags, and
      US-federal fiscal attributes (fiscal_year FKs ref.fiscal_year). Generated
      by CalendarDataProvider — no external source.

    columns:
      - name: date_key
        type: date
        nullable: false
        comment: Calendar day as a native DATE (canonical FK target for DATE-typed columns)
      - name: iso_date
        type: string
        nullable: false
        comment: ISO-8601 calendar date YYYY-MM-DD (FK target for ISO date strings)
      - name: basic_iso
        type: string
        nullable: false
        comment: ISO-8601 basic date YYYYMMDD (FK target for compact date stamps)
      - name: iso_ordinal
        type: string
        nullable: false
        comment: ISO-8601 ordinal date YYYY-DDD
      - name: iso_week_date
        type: string
        nullable: false
        comment: ISO-8601 week date YYYY-Www-D
      - name: epoch_day
        type: long
        nullable: false
        comment: Days since 1970-01-01 (numeric full-date form)
      - name: year
        type: integer
        nullable: false
        comment: Calendar year
      - name: quarter
        type: integer
        nullable: false
        comment: Calendar quarter (1-4)
      - name: month
        type: integer
        nullable: false
        comment: Month of year (1-12)
      - name: day_of_month
        type: integer
        nullable: false
        comment: Day of month (1-31)
      - name: day_of_week_iso
        type: integer
        nullable: false
        comment: ISO day of week (1=Monday .. 7=Sunday)
      - name: day_of_week_us
        type: integer
        nullable: false
        comment: US day of week (1=Sunday .. 7=Saturday)
      - name: day_of_year
        type: integer
        nullable: false
        comment: Day of year (1-366)
      - name: day_of_quarter
        type: integer
        nullable: false
        comment: Day of quarter (1-92)
      - name: iso_week
        type: integer
        nullable: false
        comment: ISO-8601 week of week-based year (1-53)
      - name: iso_week_year
        type: integer
        nullable: false
        comment: ISO-8601 week-based year (may differ from year near Jan/Dec boundaries)
      - name: days_in_month
        type: integer
        nullable: false
        comment: Number of days in this month
      - name: month_name
        type: string
        nullable: false
        comment: Full month name (English, e.g. January)
      - name: month_abbr
        type: string
        nullable: false
        comment: Abbreviated month name (English, e.g. Jan)
      - name: day_name
        type: string
        nullable: false
        comment: Full weekday name (English, e.g. Monday)
      - name: day_abbr
        type: string
        nullable: false
        comment: Abbreviated weekday name (English, e.g. Mon)
      - name: year_month
        type: string
        nullable: false
        comment: Month-grain key YYYY-MM
      - name: year_quarter
        type: string
        nullable: false
        comment: Quarter-grain key YYYY-Qn
      - name: year_iso_week
        type: string
        nullable: false
        comment: ISO week-grain key YYYY-Www
      - name: is_weekend
        type: boolean
        nullable: false
        comment: True on Saturday or Sunday
      - name: is_weekday
        type: boolean
        nullable: false
        comment: True Monday through Friday
      - name: is_month_start
        type: boolean
        nullable: false
        comment: True on the first day of the month
      - name: is_month_end
        type: boolean
        nullable: false
        comment: True on the last day of the month
      - name: is_quarter_start
        type: boolean
        nullable: false
        comment: True on the first day of the quarter
      - name: is_quarter_end
        type: boolean
        nullable: false
        comment: True on the last day of the quarter
      - name: is_year_start
        type: boolean
        nullable: false
        comment: True on January 1
      - name: is_year_end
        type: boolean
        nullable: false
        comment: True on December 31
      - name: is_leap_year
        type: boolean
        nullable: false
        comment: True when the calendar year is a leap year
      - name: fiscal_year
        type: integer
        nullable: false
        comment: US federal fiscal year (starts Oct 1; FK to fiscal_year.fiscal_year)
      - name: fiscal_quarter
        type: integer
        nullable: false
        comment: US federal fiscal quarter (1=Oct-Dec .. 4=Jul-Sep)
      - name: fiscal_month
        type: integer
        nullable: false
        comment: US federal fiscal month (1=October .. 12=September)
      - name: fiscal_year_label
        type: string
        nullable: false
        comment: Fiscal year label, e.g. FY2024
      - name: day_of_fiscal_year
        type: integer
        nullable: false
        comment: Day of the federal fiscal year (1-366, from Oct 1)

    source:
      # No external source — CalendarDataProvider generates every row. The source
      # block exists only to declare the computed_delta high-water-mark key.
      type: http
      incremental:
        dateField: iso_date

    hooks:
      dataProvider: "org.apache.calcite.adapter.govdata.ref.CalendarDataProvider"

    dimensions:
      type:
        - calendar

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type]
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        batchPartitionColumns: [type]
        overwritePartitions: false   # APPEND the computed_delta rows (new days); never rewrite history
        runMaintenance: true
        snapshotRetentionDays: 1
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

  # ==========================================================================
  # FISCAL_YEAR — US federal fiscal-year dimension (Oct 1 start)
  # ==========================================================================
  - name: fiscal_year
    pattern: "type=fiscal_year.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR

    comment: >
      US federal fiscal-year dimension: one row per fiscal year (FY starts Oct 1,
      labelled by the calendar year it ends — FY2024 = 2023-10-01..2024-09-30).
      Boundary and per-quarter start dates are ISO strings that join to
      ref.calendar. Conformed FK target for fiscal_year across schemas
      (ref.calendar.fiscal_year references it). Generated by
      FiscalYearDataProvider — no external source. Covers FY2010 through two
      years past the current fiscal year.

    columns:
      - name: fiscal_year
        type: integer
        nullable: false
        comment: US federal fiscal year (e.g. 2024 = 2023-10-01..2024-09-30)
      - name: fiscal_year_label
        type: string
        nullable: false
        comment: Fiscal year label, e.g. FY2024
      - name: start_date
        type: date
        nullable: false
        comment: First day of the fiscal year (Oct 1 of the prior calendar year)
      - name: end_date
        type: date
        nullable: false
        comment: Last day of the fiscal year (Sep 30)
      - name: start_iso_date
        type: string
        nullable: false
        comment: start_date as ISO YYYY-MM-DD (FK to calendar.iso_date)
      - name: end_iso_date
        type: string
        nullable: false
        comment: end_date as ISO YYYY-MM-DD (FK to calendar.iso_date)
      - name: calendar_years
        type: string
        nullable: false
        comment: Spanning calendar years, e.g. 2023-2024
      - name: days_in_fiscal_year
        type: integer
        nullable: false
        comment: Number of days in the fiscal year (365 or 366)
      - name: q1_start_date
        type: string
        nullable: false
        comment: Fiscal Q1 start (Oct 1) as ISO YYYY-MM-DD
      - name: q2_start_date
        type: string
        nullable: false
        comment: Fiscal Q2 start (Jan 1) as ISO YYYY-MM-DD
      - name: q3_start_date
        type: string
        nullable: false
        comment: Fiscal Q3 start (Apr 1) as ISO YYYY-MM-DD
      - name: q4_start_date
        type: string
        nullable: false
        comment: Fiscal Q4 start (Jul 1) as ISO YYYY-MM-DD
      - name: prior_fiscal_year
        type: integer
        nullable: false
        comment: The preceding fiscal year
      - name: next_fiscal_year
        type: integer
        nullable: false
        comment: The following fiscal year

    source:
      # No external source — FiscalYearDataProvider generates every row.
      type: http

    hooks:
      dataProvider: "org.apache.calcite.adapter.govdata.ref.FiscalYearDataProvider"

    dimensions:
      type:
        - fiscal_year

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type]
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        batchPartitionColumns: [type]
        overwritePartitions: true
        runMaintenance: true
        snapshotRetentionDays: 1

  # ==========================================================================
  # HOLIDAYS — multi-country public holidays (Nager.Date, ~110 countries)
  # ==========================================================================
  - name: holidays
    pattern: "type=holidays/year=*.parquet"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR
        - name: year
          type: VARCHAR

    comment: >
      Public holidays for every country supported by the Nager.Date API (~110),
      one row per (country, holiday) per year. Joins to ref.calendar via
      holiday_date (ISO YYYY-MM-DD) and to ref.countries via country_code (ISO
      3166-1 alpha-2). Generated by HolidaysDataProvider, which pulls
      /api/v3/AvailableCountries then /api/v3/PublicHolidays/{year}/{country}.
      Source: date.nager.at (free, no API key).

    columns:
      - name: country_code
        type: string
        nullable: false
        comment: ISO 3166-1 alpha-2 country code (FK to countries.iso_alpha2)
      - name: country_name
        type: string
        nullable: true
        comment: English country name (Nager AvailableCountries)
      - name: holiday_date
        type: string
        nullable: false
        comment: Holiday date ISO YYYY-MM-DD (FK to calendar.iso_date)
      - name: holiday_name
        type: string
        nullable: false
        comment: Holiday name in English
      - name: local_name
        type: string
        nullable: true
        comment: Holiday name in the local language
      - name: is_global
        type: boolean
        nullable: true
        comment: True when the holiday applies nationwide (not subdivision-scoped)
      - name: is_fixed
        type: boolean
        nullable: true
        comment: True when the holiday falls on the same calendar date every year
      - name: counties
        type: string
        nullable: true
        comment: Comma-separated ISO-3166-2 subdivisions when the holiday is regional (else null)
      - name: launch_year
        type: integer
        nullable: true
        comment: Year the holiday was first observed, when known
      - name: holiday_types
        type: string
        nullable: true
        comment: Comma-separated Nager holiday types (Public, Bank, Optional, ...)

    source:
      type: http
      url: "https://date.nager.at/api/v3/PublicHolidays/{year}/{countryCode}"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 5.0
        maxRetries: 3
      rawCache:
        enabled: false

    hooks:
      dataProvider: "org.apache.calcite.adapter.govdata.ref.HolidaysDataProvider"

    dimensions:
      type:
        - holidays
      year: *ref_year_range

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type, year]
      options:
        compression: snappy
        batchSize: 50000
        stagingMode: local
      iceberg:
        catalogType: hadoop
        batchPartitionColumns: [type, year]
        overwritePartitions: true
        runMaintenance: true
        snapshotRetentionDays: 1
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 5

# ============================================================================
# CONSTRAINTS
# ============================================================================

constraints:

  naics:
    primaryKey: [naics_code]
    comment: NAICS code is the canonical FK target for naics_code across schemas.

  naics_vintage:
    primaryKey: [vintage, naics_code]
    comment: One code per edition; (vintage, naics_code) is unique. Period-correct lookup table.

  naics_vintage_map:
    primaryKey: [data_year]
    comment: Data-year to NAICS edition; naics_vintage matches ref.naics_vintage.vintage.

  sic:
    primaryKey: [sic_code]
    comment: 4-digit SIC code; FK target for sec.filing_metadata.sic_code.

  currencies:
    primaryKey: [currency_code]
    comment: ISO 4217 code; FK target for ref.countries.currency_code.

  calendar:
    primaryKey: [type, date_key]
    unique:
      # Every full-date representation is unique per day, so each is a valid FK
      # target for date columns stored in that form across schemas.
      - [date_key]
      - [iso_date]
      - [basic_iso]
      - [iso_ordinal]
      - [iso_week_date]
      - [epoch_day]
    foreignKeys:
      - columns: [fiscal_year]
        targetTable: fiscal_year
        targetColumns: [fiscal_year]
        comment: US federal fiscal year the day belongs to

  fiscal_year:
    primaryKey: [type, fiscal_year]
    unique:
      # fiscal_year is globally unique; declared so calendar.fiscal_year can FK it.
      - [fiscal_year]
    comment: US federal fiscal-year dimension; FK target for fiscal_year across schemas.

  holidays:
    primaryKey: [type, year, country_code, holiday_date, holiday_name]
    foreignKeys:
      - columns: [country_code]
        targetTable: countries
        targetColumns: [iso_alpha2]
        comment: ISO 3166-1 alpha-2 country of the holiday
      - columns: [holiday_date]
        targetTable: calendar
        targetColumns: [iso_date]
        comment: Holiday date joins the ref.calendar spine

  countries:
    primaryKey: [type, census_cty_code]
    unique:
      # ISO alpha-3 is a globally unique country identifier; declared unique so it
      # is a valid FK target (e.g. health.who_gho_indicators.country_code).
      - [iso_alpha3]
      # ISO alpha-2 is likewise globally unique; declared so the inbound alpha-2 FKs
      # render as real edges (gleif_entities HQ/registered country, ref.holidays).
      - [iso_alpha2]
    foreignKeys:
      - columns: [currency_code]
        targetTable: currencies
        targetColumns: [currency_code]
        comment: ISO 4217 currency of the country (null/aggregate rows excluded by nullability)

  gleif_entities:
    primaryKey: [type, lei]
    foreignKeys:
      - columns: [registration_authority_entity_id]
        targetSchema: "${SEC_SCHEMA_NAME:sec}"
        targetTable: filings
        targetColumns: [cik]
        comment: Links GLEIF entities registered with SEC (RA000602) to SEC filings
      - columns: [headquarters_country]
        targetTable: countries
        targetColumns: [iso_alpha2]
        comment: Links HQ country (ISO 3166-1 alpha-2) to country reference
      - columns: [registered_country]
        targetTable: countries
        targetColumns: [iso_alpha2]
        comment: Links legal-registration country (ISO 3166-1 alpha-2) to country reference

  gleif_cik_mapping:
    primaryKey: [type, lei]
    foreignKeys:
      - columns: [lei]
        targetTable: gleif_entities
        targetColumns: [lei]
        comment: Links CIK-LEI bridge record to full GLEIF entity record
      - columns: [cik]
        targetSchema: "${SEC_SCHEMA_NAME:sec}"
        targetTable: filings
        targetColumns: [cik]

  sec_company_tickers:
    primaryKey: [type, as_of, cik]   # per-day snapshots: cik is unique within an as_of, not across

  figi_instruments:
    primaryKey: [type, figi]

# ============================================================================
# VIEWS
# ============================================================================

views:

  - name: ticker_instrument_map
    comment: >
      Connects OpenFIGI instruments to SEC filers via shared ticker symbol.
      One row per ticker+figi combination — enables instrument-to-company resolution
      and cross-referencing FIGI, CIK, and company name for equity analysis.
      Self-contained within the ref schema; no dependency on other schemas.
    sql: >
      SELECT
        fi.ticker,
        fi.figi,
        fi.name          AS instrument_name,
        fi.exchange_code,
        fi.market_sector,
        fi.security_type,
        sct.cik,
        sct.title        AS company_name
      FROM figi_instruments fi
      LEFT JOIN sec_company_tickers sct ON fi.ticker = sct.ticker
      WHERE fi.ticker IS NOT NULL

  - name: current_naics
    comment: >
      Current NAICS edition — the latest vintage in naics_vintage. Tracks the newest loaded
      edition automatically (ref.naics remains the materialized current-edition FK spine; use
      this view when working from the vintage table). See naics_vintage_map for period-correct
      (non-current) edition selection.
    sql: >
      SELECT vintage, naics_code, naics_title, level
      FROM naics_vintage
      WHERE vintage = (SELECT MAX(vintage) FROM naics_vintage)

  - name: current_gleif_entities
    comment: >
      Current-state GLEIF entities: the latest row per LEI (max last_update) from the
      append-only gleif_entities changelog. Use for "as-now" lookups; query gleif_entities
      directly (group by last_update) for point-in-time / history.
    sql: >
      SELECT e.*
      FROM gleif_entities e
      JOIN (
        SELECT lei, MAX(last_update) AS max_last_update
        FROM gleif_entities
        GROUP BY lei
      ) latest ON e.lei = latest.lei AND e.last_update = latest.max_last_update
