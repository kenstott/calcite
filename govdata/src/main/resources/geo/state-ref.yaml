# US State Reference Data (conformed state-identity dimension)
# ---------------------------------------------------------------------------
# Static, non-vintaged list of the 50 states + DC. Read by the geo.state_ref
# table via `source.type: constants`. This is the canonical FK target for
# state_abbr / state_fips across every govdata schema — geo.states is a
# year-partitioned boundary snapshot and its state_abbr is NOT unique, so it
# cannot serve as an FK target. Add a new jurisdiction by appending a row.
