      - name: dose1_administered
        type: string
        nullable: true
      - name: dose1_pct_us
        type: string
        nullable: true
        comment: Percentage of US population
      - name: series_complete_count
        type: string
        nullable: true
      - name: series_complete_pct
        type: string
        nullable: true
      - name: booster_count
        type: string
        nullable: true
      - name: booster_pct
