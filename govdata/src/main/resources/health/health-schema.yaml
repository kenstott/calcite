  # ==========================================================================
  # MEDICAID DRUG UTILIZATION — Socrata SODA API, ~2.5M records/year
  # Default dataset: 2023 data (d890d3a9-6b00-43fd-8b31-fcba4c8e2909)
  # ==========================================================================
  - name: medicaid_drug_utilization
    releaseWindow:
      months: [3, 6, 9, 12] # Quarterly data published ~3 months after quarter end
    # DQ sample cap: the DKAN datastore returns the whole ~5.3M-row annual dataset; in DQ mode
    # (GOVDATA_DQ=true) materialize at most this many rows, so DQ writes a bounded sample instead
    # of 5.3M Iceberg rows. Cache-safe: the full ~2GB body is written to the raw cache during
    # fetch (before the iterator) and stays complete for prod; the cap only bounds the read +
    # materialize. Ignored outside DQ mode (prod loads everything).
    dqRowLimit: 25000
    pattern: "type=medicaid_drug_utilization"
    partitions:
      style: hive
      columnDefinitions:
        - name: type
          type: VARCHAR

    comment: >
      Medicaid drug utilization and reimbursement by state, drug (NDC), year/quarter.
      Composite PK: (state, ndc, year, quarter). Default dataset is 2023 data.

    columns:
      - name: state
        type: string
        nullable: false
        comment: State abbreviation — composite PK
      - name: ndc
        type: string
        nullable: false
        comment: National Drug Code — composite PK, FK to fda_ndc_products.product_ndc
      - name: year
        type: string
        nullable: false
        comment: Calendar year — composite PK
      - name: quarter
        type: string
        nullable: false
        comment: Q1, Q2, Q3, Q4 — composite PK
      - name: utilization_type
        type: string
        nullable: true
      - name: product_name
        type: string
        nullable: true
      - name: labeler_code
        type: string
        nullable: true
      - name: units_reimbursed
        type: string
        nullable: true
      - name: number_of_prescriptions
        type: string
        nullable: true
      - name: total_amount_reimbursed
        type: string
        nullable: true
        comment: Total reimbursement in dollars
      - name: medicaid_amount_reimbursed
        type: string
        nullable: true
        comment: Medicaid portion of reimbursement
      - name: non_medicaid_amount_reimbursed
        type: string
        nullable: true
        comment: Non-Medicaid portion (other payers)
      - name: suppression_used
        type: string
        nullable: true
        comment: 'true if data suppressed due to low counts'

    source:
      type: http
      # Annual dataset; one UUID per year, all 4 quarters included.
      # Catalog: GET https://data.medicaid.gov/api/1/metastore/schemas/dataset/items?limit=100&filter[theme]=State+Drug+Utilization
      # 2023=d890d3a9  2024=61729e5a-7aa8-448c-8903-ba3e0cd0ea3c  2025=158a1baa-5506-400a-8ec3-97756f0b0536
      url: "https://data.medicaid.gov/api/1/datastore/query/${MEDICAID_DRUG_UTIL_DATASET_ID:d890d3a9-6b00-43fd-8b31-fcba4c8e2909}/0"
      method: GET
      parameters:
        "limit": "8000"
      response:
        format: json
        pagination:
          type: OFFSET
          pageSize: 8000
          limitParam: "limit"
          offsetParam: "offset"
      rateLimit:
        requestsPerSecond: 1.0
        maxRetries: 3
        retryOn: [429, 503]
      rawCache:
        enabled: true
      incremental:
        sinceYear: "${GOVDATA_START_YEAR:}"
        sinceQuarter: "${MEDICAID_SINCE_QUARTER:}"
        untilYear: "${GOVDATA_END_YEAR:}"
        # DKAN ignores $where; conditions[] syntax needed for server-side filtering (not yet supported).
        # Without server-side filtering, all 5.3M records are fetched from the annual dataset.
        filterParam: "$where"
        yearField: "year"
        quarterField: "quarter"

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.health.MedicaidDrugUtilizationResponseTransformer"

    dimensions:
      type:
        - medicaid_drug_utilization
      year: *health_year_range

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: false
        runCompaction: false

# ============================================================================
# Health Schema — Phase 3: CDC Mortality, CDC BRFSS, CMS Open Payments, RxNorm
# ============================================================================

  - name: cdc_mortality
    releaseWindow:
      dow: [1]              # CDC publishes weekly updates Fridays; Monday catches them
    comment: >
      CDC/NCHS mortality statistics. Unions annual (bi63-dtpu) and weekly provisional
      (muzy-jte6) data. source_type dimension distinguishes the two.
    columns:
      - name: year
        type: VARCHAR
        nullable: true
      - name: week_ending_date
        type: VARCHAR
        nullable: true
      - name: state
        type: VARCHAR
        nullable: true
      - name: cause_name
        type: VARCHAR
        nullable: true
      - name: full_cause_name
        type: VARCHAR
        nullable: true
      - name: deaths
        type: VARCHAR
        nullable: true
      - name: age_adjusted_rate
        type: VARCHAR
        nullable: true
      - name: source_type
        type: VARCHAR
        nullable: false
        comment: 'annual or weekly'

    source:
      type: http
      url: "https://data.cdc.gov/resource/bi63-dtpu.json"
      method: GET
      parameters:
        "$limit": "1000"
      response:
        format: json
        pagination:
          type: OFFSET
          pageSize: 1000
          limitParam: "$limit"
          offsetParam: "$offset"
      urlRules:
        - url: "https://data.cdc.gov/resource/muzy-jte6.json"
          variableMatch:
            source_type: weekly
      rateLimit:
        requestsPerSecond: 1.0
        maxRetries: 3
        retryOn: [429, 503]
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.health.CdcMortalityResponseTransformer"

    dimensions:
      source_type:
        - annual
        - weekly
      year: *health_year_range

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [source_type]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: false
        runCompaction: false

  - name: cdc_brfss
    releaseWindow:
      months: [5, 6, 7, 8]  # CDC publishes annual BRFSS survey data May–August
    dqRowLimit: 25000   # DQ sample cap (GOVDATA_DQ mode); cache-safe (capped sample cached under cap=N, isolated from the full prod cache)
    comment: >
      CDC Behavioral Risk Factor Surveillance System prevalence data (Socrata dttw-5yxu).
      State-level health behavior estimates by year, question, and demographic breakout.
    columns:
      - name: year
        type: VARCHAR
        nullable: true
      - name: state
        type: VARCHAR
        nullable: true
        comment: 'state abbreviation from locationabbr'
      - name: question
        type: VARCHAR
        nullable: true
      - name: category
        type: VARCHAR
        nullable: true
      - name: topic
        type: VARCHAR
        nullable: true
      - name: response
        type: VARCHAR
        nullable: true
      - name: pct
        type: VARCHAR
        nullable: true
        comment: 'prevalence percentage (data_value)'
      - name: sample_size
        type: VARCHAR
        nullable: true
      - name: break_out
        type: VARCHAR
        nullable: true
      - name: break_out_category
        type: VARCHAR
        nullable: true
      - name: type
        type: VARCHAR
        nullable: false

    source:
      type: http
      url: "https://data.cdc.gov/resource/dttw-5yxu.json"
      method: GET
      parameters:
        "$limit": "1000"
      response:
        format: json
        pagination:
          type: OFFSET
          pageSize: 1000
          limitParam: "$limit"
          offsetParam: "$offset"
      rateLimit:
        requestsPerSecond: 1.0
        maxRetries: 3
        retryOn: [429, 503]
      rawCache:
        enabled: true
      incremental:
        sinceYear: "${GOVDATA_START_YEAR:}"
        untilYear: "${GOVDATA_END_YEAR:}"
        filterParam: "$where"
        yearField: "year"
        quoteValues: false

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.health.CdcBrfssResponseTransformer"

    dimensions:
      type:
        - cdc_brfss
      year:
        type: yearRange
        start: "${GOVDATA_START_YEAR:2010}"
        end: current
        dataLag: 1

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: false
        runCompaction: false

  - name: cms_open_payments
    releaseWindow:
      months: [6, 7]        # CMS Open Payments (Sunshine Act) annual release June–July
    # DQ sample cap (per program year): in DQ mode (GOVDATA_DQ=true) materialize at most this
    # many rows per fetch-unit, so DQ samples every year (2018+) — fast, but still crossing the
    # old/new format seam — instead of streaming ~100M rows. Safe here: the source is CSV_STREAM
    # (no raw cache to truncate). Ignored outside DQ mode (prod loads the full history).
    dqRowLimit: 25000
    comment: >
      CMS Open Payments (Sunshine Act) payments from pharmaceutical/device manufacturers
      to physicians. Bulk CSV downloads from download.cms.gov, one file per program year
      (CY2018+) and payment_type (general/research/ownership), partitioned by both.
    columns:
      - name: program_year
        type: VARCHAR
        nullable: true
      - name: change_type
        type: VARCHAR
        nullable: true
      - name: physician_profile_id
        type: VARCHAR
        nullable: true
      - name: physician_first_name
        type: VARCHAR
        nullable: true
      - name: physician_last_name
        type: VARCHAR
        nullable: true
      - name: physician_specialty
        type: VARCHAR
        nullable: true
      - name: physician_state
        type: VARCHAR
        nullable: true
      - name: physician_country
        type: VARCHAR
        nullable: true
      - name: paying_entity_name
        type: VARCHAR
        nullable: true
      - name: total_amount
        type: VARCHAR
        nullable: true
      - name: payment_date
        type: VARCHAR
        nullable: true
      - name: number_of_payments
        type: VARCHAR
        nullable: true
      - name: nature_of_payment
        type: VARCHAR
        nullable: true
      - name: product_name
        type: VARCHAR
        nullable: true
      - name: product_category
        type: VARCHAR
        nullable: true
      - name: payment_type
        type: VARCHAR
        nullable: false
        comment: 'general, research, or ownership'

    source:
      type: http
      # CMS bulk CSV downloads — direct from download.cms.gov, streamed in batches.
      # {effective_year} (= publish year - dataLag) is the program/data year — one file per
      # year (PGYR2018..PGYR2024) so the year dimension drives the URL instead of being inert.
      # The publication/reload segment (P{pubdate}_{reldate}) is assigned by CMS at release time,
      # is NOT derivable from the year, and is SHARED across all program years (CMS republishes
      # every year together). Refresh the literal below when CMS republishes (~annually) — the
      # current segment is the distribution.downloadURL path from the catalog API:
      #   https://openpaymentsdata.cms.gov/api/1/metastore/schemas/dataset/items
      url: "https://download.cms.gov/openpayments/PGYR{effective_year}_P01232026_01102026/OP_DTL_GNRL_PGYR{effective_year}_P01232026_01102026.csv"
      method: GET
      response:
        format: csv
        hasHeader: true
        pagination:
          type: CSV_STREAM
          pageSize: 5000
      urlRules:
        - url: "https://download.cms.gov/openpayments/PGYR{effective_year}_P01232026_01102026/OP_DTL_RSRCH_PGYR{effective_year}_P01232026_01102026.csv"
          variableMatch:
            payment_type: research
        - url: "https://download.cms.gov/openpayments/PGYR{effective_year}_P01232026_01102026/OP_DTL_OWNRSHP_PGYR{effective_year}_P01232026_01102026.csv"
          variableMatch:
            payment_type: ownership
      rateLimit:
        requestsPerSecond: 1.0
        maxRetries: 3
        retryOn: [429, 503]
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.health.CmsOpenPaymentsResponseTransformer"

    dimensions:
      payment_type:
        - general
        - research
        - ownership
      year:
        type: yearRange
        # Computed global demarcation (default 2010, same as every schema). The literal
        # 2019 floor is a feed-began bound (allowed): Open Payments did not exist before
        # publish year 2019 (program year CY2018, published the following June/July =
        # data year + 1), so minYear clamps the range up to 2019. In daily mode
        # GOVDATA_START_YEAR = current year → the range is the current publish year forward
        # (empty/skipped before the July release). {effective_year} (= year - dataLag) is
        # the program year used in the URL and mapped to the `year` partition on write.
        start: "${GOVDATA_START_YEAR:2010}"
        minYear: 2019
        dataLag: 1
        releaseMonth: 7

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: "payment_type=*/year=*/"
      partition:
        columns: [payment_type, year]
        valueSource:
          year: effective_year
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: false
        runCompaction: false

  - name: rxnorm_drugs
    # Freshness: rxnav has no version endpoint; hash the downloaded body (single
    # ~37k-concept page) and skip the Iceberg commit when byte-identical to the last
    # successful run (replaces the monthly GOVDATA_CURRENT_MONTH cache-buster).
    freshness:
      type: hash
    comment: >
      RxNorm drug concepts from the NLM bulk allconcepts endpoint.
      Covers ingredient (IN), brand name (BN), and clinical drug (SCD) term types.
      Single-page call (~37k concepts). rxcui joins to fda_ndc_products.rxcui.
    columns:
      - name: rxcui
        type: VARCHAR
        nullable: true
        comment: 'RxNorm concept unique identifier'
      - name: name
        type: VARCHAR
        nullable: true
      - name: tty
        type: VARCHAR
        nullable: true
        comment: 'term type: IN, BN, SCD'
      - name: type
        type: VARCHAR
        nullable: false

    source:
      type: http
      url: "https://rxnav.nlm.nih.gov/REST/allconcepts.json?tty=IN+BN+SCD"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 1.0
        maxRetries: 3
        retryOn: [429, 503]
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.health.RxNormDrugsResponseTransformer"

    dimensions:
      type:
        - rxnorm_drugs

    materialize:
      enabled: true
      format: iceberg
      output:
        pattern: ""
      partition:
        columns: [type]
      options:
        compression: snappy
      iceberg:
        catalogType: hadoop
        runMaintenance: false
        runCompaction: false

# ============================================================================
# Views
# ============================================================================

views:

  - name: drug_profile
    comment: >
      Complete drug profile: NDC product joined to FDA approval record and RxNorm concept.
      Left joins preserve NDC products that lack an approval record or rxcui mapping.
    sql: >
      SELECT
        n.product_ndc,
        n.generic_name,
        n.brand_name,
        n.labeler_name,
        n.dosage_form,
        n.route,
        n.product_type,
        n.application_number,
        n.rxcui,
        r.name      AS rxnorm_name,
        r.tty       AS rxnorm_tty,
        a.sponsor_name,
        a.marketing_status,
        a.latest_submission_date
      FROM fda_ndc_products n
      LEFT JOIN fda_drug_approvals a ON n.application_number = a.application_number
      LEFT JOIN rxnorm_drugs r       ON n.rxcui = r.rxcui

  - name: trial_full
    comment: >
      Denormalised clinical trial view: one row per trial with conditions and
      interventions aggregated into semicolon-delimited strings.
    sql: >
      SELECT
        t.nct_id,
        t.brief_title,
        t.overall_status,
        t.study_type,
        t.phase,
        t.enrollment_count,
        t.lead_sponsor,
        t.funder_type,
        t.start_date,
        t.primary_completion_date,
        t.completion_date,
        t.first_submit_date,
        t.last_update_date,
        t.brief_summary,
        STRING_AGG(DISTINCT c.condition_name,  '; ') AS conditions,
        STRING_AGG(DISTINCT i.intervention_name, '; ') AS interventions
      FROM clinical_trials t
      LEFT JOIN clinical_trial_conditions   c ON t.nct_id = c.nct_id
      LEFT JOIN clinical_trial_interventions i ON t.nct_id = i.nct_id
      GROUP BY
        t.nct_id, t.brief_title, t.overall_status, t.study_type, t.phase,
        t.enrollment_count, t.lead_sponsor, t.funder_type, t.start_date,
        t.primary_completion_date, t.completion_date, t.first_submit_date,
        t.last_update_date, t.brief_summary

  - name: medicaid_drug_spend
    comment: >
      Medicaid drug utilization enriched with NDC product details and RxNorm name.
      Enables spend analysis by brand, generic, labeler, and rxcui.
    sql: >
      SELECT
        m.state,
        m.year,
        m.quarter,
        m.ndc,
        m.utilization_type,
        m.product_name             AS medicaid_product_name,
        n.brand_name,
        n.generic_name,
        n.labeler_name,
        n.dosage_form,
        r.name                     AS rxnorm_name,
        r.tty                      AS rxnorm_tty,
        m.units_reimbursed,
        m.number_of_prescriptions,
        m.total_amount_reimbursed,
        m.medicaid_amount_reimbursed,
        m.non_medicaid_amount_reimbursed,
        m.suppression_used
      FROM medicaid_drug_utilization m
      LEFT JOIN fda_ndc_products n ON m.ndc = n.product_ndc
      LEFT JOIN rxnorm_drugs r     ON n.rxcui = r.rxcui

  - name: public_health_indicators
    comment: >
      State-year summary combining CDC mortality totals with BRFSS risk-factor averages.
      Rows where BRFSS has data but mortality does not appear with NULL death columns and vice versa.
    sql: >
      SELECT
        COALESCE(m.year,  b.year)  AS year,
        COALESCE(m.state, b.state) AS state,
        SUM(TRY_CAST(m.deaths AS BIGINT))       AS total_deaths,
        AVG(TRY_CAST(m.age_adjusted_rate AS DOUBLE)) AS avg_age_adjusted_rate,
        COUNT(DISTINCT m.cause_name)             AS distinct_causes,
        COUNT(DISTINCT b.question)               AS brfss_question_count,
        AVG(TRY_CAST(b.pct AS DOUBLE))           AS avg_risk_factor_pct
      FROM cdc_mortality m
      FULL OUTER JOIN cdc_brfss b
        ON m.state = b.state AND m.year = b.year
      WHERE (m.source_type = 'annual' OR m.source_type IS NULL)
      GROUP BY COALESCE(m.year, b.year), COALESCE(m.state, b.state)

  - name: hospital_quality_by_state
    comment: >
      State-level hospital quality summary: counts, average ratings, and quality tier breakdown.
    sql: >
      SELECT
        state,
        COUNT(*)                                                       AS hospital_count,
        COUNT(CASE WHEN overall_rating NOT IN ('Not Available', '')
                   THEN 1 END)                                         AS rated_count,
        AVG(TRY_CAST(overall_rating AS DOUBLE))                        AS avg_overall_rating,
        COUNT(CASE WHEN TRY_CAST(overall_rating AS INTEGER) >= 4
                   THEN 1 END)                                         AS high_quality_count,
        COUNT(CASE WHEN hospital_type = 'Acute Care Hospitals'
                   THEN 1 END)                                         AS acute_care_count,
        COUNT(CASE WHEN emergency_services = 'Yes' THEN 1 END)         AS with_emergency_services,
        COUNT(CASE WHEN birthing_friendly = 'Yes'  THEN 1 END)         AS birthing_friendly_count
      FROM cms_hospital_quality
      GROUP BY state

  - name: hospital_with_geography
    comment: >
      Hospital quality records enriched with county FIPS, county name, and
      rural-urban classification via the dominant-county ZIP crosswalk.
    sql: >
      SELECT
        h.facility_id,
        h.facility_name,
        h.address,
        h.city,
        h.state,
        h.zip_code,
        h.county,
        h.hospital_type,
        h.hospital_ownership,
        h.emergency_services,
        h.overall_rating,
        h.mort_measures_better,
        h.mort_measures_worse,
        h.safety_measures_better,
        h.safety_measures_worse,
        h.readm_measures_better,
        h.readm_measures_worse,
        h.patient_exp_rating,
        h.birthing_friendly,
        xw.county_fips,
        c.county_name  AS geo_county_name,
        ruc.rucc_code,
        ruc.rucc_description,
        ruc.metro_nonmetro
      FROM cms_hospital_quality h
      LEFT JOIN (
        SELECT zip, county_fips,
               ROW_NUMBER() OVER (PARTITION BY zip ORDER BY res_ratio DESC) AS rn
        FROM "geo"."zip_county_crosswalk"
      ) xw ON h.zip_code = xw.zip AND xw.rn = 1
      LEFT JOIN "geo"."counties"               c   ON xw.county_fips = c.county_fips
      LEFT JOIN "geo"."rural_urban_continuum"  ruc ON xw.county_fips = ruc.county_fips

  - name: medicaid_spend_by_state_geo
    comment: >
      Medicaid spend aggregated by state and year, enriched with state name and FIPS
      for choropleth-ready geographic analysis.
    sql: >
      SELECT
        s.state_fips,
        s.state_name,
        m.state,
        m.year,
        SUM(TRY_CAST(m.total_amount_reimbursed    AS DOUBLE)) AS total_spend,
        SUM(TRY_CAST(m.medicaid_amount_reimbursed AS DOUBLE)) AS medicaid_spend,
        SUM(TRY_CAST(m.number_of_prescriptions    AS BIGINT)) AS total_prescriptions,
        COUNT(DISTINCT m.ndc)                                  AS distinct_drugs
      FROM medicaid_drug_utilization m
      LEFT JOIN "geo"."states" s ON m.state = s.state_abbr
      GROUP BY s.state_fips, s.state_name, m.state, m.year

  - name: mortality_brfss_by_state
    comment: >
      CDC annual mortality joined to BRFSS risk factors, both enriched with state
      geography. One row per state/year/cause/question combination — filter on
      cause_name and question to avoid cross-product explosion.
    sql: >
      SELECT
        gs.state_fips,
        gs.state_name,
        m.state,
        m.year,
        m.cause_name,
        m.full_cause_name,
        m.deaths,
        m.age_adjusted_rate,
        b.question,
        b.category,
        b.topic,
        b.response,
        b.pct          AS risk_factor_pct,
        b.sample_size,
        b.break_out,
        b.break_out_category
      FROM cdc_mortality m
      LEFT JOIN cdc_brfss b
        ON m.state = b.state AND m.year = b.year
      LEFT JOIN "geo"."states" gs ON m.state = gs.state_abbr
      WHERE m.source_type = 'annual'

  - name: drug_manufacturer_span
    comment: >
      Connects drug manufacturers across FDA approval, NDC catalog, and Medicaid spend.
      One row per labeler+application. Enables manufacturer market-size and reach analysis.
    sql: >
      SELECT
        n.labeler_name,
        n.application_number,
        a.sponsor_name,
        COUNT(DISTINCT n.product_ndc)                              AS distinct_products,
        COUNT(DISTINCT m.state)                                    AS states_dispensed,
        SUM(TRY_CAST(m.total_amount_reimbursed AS DOUBLE))         AS total_medicaid_spend,
        SUM(TRY_CAST(m.number_of_prescriptions AS BIGINT))         AS total_prescriptions
      FROM fda_ndc_products n
      LEFT JOIN fda_drug_approvals        a ON n.application_number = a.application_number
      LEFT JOIN medicaid_drug_utilization m ON n.product_ndc = m.ndc
      GROUP BY n.labeler_name, n.application_number, a.sponsor_name

  - name: rxnorm_medicaid_bridge
    comment: >
      Connects RxNorm clinical concepts to Medicaid spending via NDC codes.
      One row per rxcui — enables clinical terminology to spending analysis.
    sql: >
      SELECT
        r.rxcui,
        r.name                                                     AS rxnorm_name,
        r.tty                                                      AS rxnorm_tty,
        COUNT(DISTINCT n.product_ndc)                              AS distinct_ndcs,
        COUNT(DISTINCT m.state)                                    AS states_with_spending,
        SUM(TRY_CAST(m.total_amount_reimbursed AS DOUBLE))         AS total_medicaid_spend,
        SUM(TRY_CAST(m.number_of_prescriptions AS BIGINT))         AS total_prescriptions
      FROM rxnorm_drugs r
      LEFT JOIN fda_ndc_products          n ON r.rxcui = n.rxcui
      LEFT JOIN medicaid_drug_utilization m ON n.product_ndc = m.ndc
      GROUP BY r.rxcui, r.name, r.tty

  - name: hospital_county_summary
    comment: >
      Aggregates CMS hospital quality metrics to county level via ZIP-county crosswalk.
      One row per county — enables county-level healthcare access and quality analysis.
    sql: >
      SELECT
        c.county_fips,
        c.county_name,
        c.state_fips,
        gs.state_abbr,
        COUNT(h.facility_id)                                                       AS facility_count,
        AVG(TRY_CAST(h.overall_rating AS DOUBLE))                                  AS avg_rating,
        COUNT(CASE WHEN TRY_CAST(h.overall_rating AS INTEGER) >= 4 THEN 1 END)     AS high_quality_count,
        COUNT(CASE WHEN h.emergency_services = 'Yes' THEN 1 END)                   AS with_emergency,
        AVG(TRY_CAST(h.mort_measures_better AS DOUBLE))                            AS avg_mortality_better,
        AVG(TRY_CAST(h.readm_measures_better AS DOUBLE))                           AS avg_readmission_better
      FROM cms_hospital_quality h
      LEFT JOIN "geo"."zip_county_crosswalk" zc ON h.zip_code = zc.zip
      LEFT JOIN "geo"."counties"              c  ON zc.county_fips = c.county_fips
      LEFT JOIN "geo"."states"               gs  ON c.state_fips = gs.state_fips
      GROUP BY c.county_fips, c.county_name, c.state_fips, gs.state_abbr

  - name: drug_spend_trends
    comment: >
      Annual Medicaid drug spend aggregated from quarterly utilization data, enriched
      with NDC product details. One row per state+year+ndc — enables year-over-year
      spend trend analysis by brand, generic, and labeler.
    sql: >
      SELECT
        m.state,
        m.year,
        m.ndc,
        n.brand_name,
        n.generic_name,
        n.labeler_name,
        SUM(TRY_CAST(m.total_amount_reimbursed    AS DOUBLE)) AS annual_spend,
        SUM(TRY_CAST(m.medicaid_amount_reimbursed AS DOUBLE)) AS medicaid_spend,
        SUM(TRY_CAST(m.number_of_prescriptions    AS BIGINT)) AS annual_prescriptions,
        COUNT(DISTINCT m.quarter)                              AS quarters_reported
      FROM medicaid_drug_utilization m
      LEFT JOIN fda_ndc_products n ON m.ndc = n.product_ndc
      GROUP BY m.state, m.year, m.ndc, n.brand_name, n.generic_name, n.labeler_name

  - name: health_social_equity
    comment: >
      State-year health equity view: CDC mortality layered with BRFSS behavioral risk
      factors, enriched with geographic identifiers. One row per state+year — filter
      on cause_name to focus on a specific cause of death.
    sql: >
      SELECT
        m.state                                          AS state_abbr,
        m.year,
        gs.state_name,
        gs.state_fips,
        SUM(TRY_CAST(m.deaths AS BIGINT))                AS total_deaths,
        AVG(TRY_CAST(m.age_adjusted_rate AS DOUBLE))     AS avg_mortality_rate,
        COUNT(DISTINCT b.question)                       AS brfss_questions_tracked,
        AVG(TRY_CAST(b.pct AS DOUBLE))                   AS avg_risk_factor_pct
      FROM cdc_mortality m
      LEFT JOIN "geo"."states" gs ON m.state = gs.state_abbr
      LEFT JOIN cdc_brfss b       ON m.state = b.state AND m.year = b.year
      WHERE m.source_type = 'annual'
      GROUP BY m.state, m.year, gs.state_name, gs.state_fips

  - name: weather_health_correlation
    comment: >
      Links annual CDC mortality to NOAA CDO monthly climate summaries by state and year.
      Temperature and precipitation are pivoted from long to wide via conditional aggregation.
      One row per state+year — enables climate-health correlation analysis.
    sql: >
      SELECT
        m.state                                                                          AS state_abbr,
        m.year,
        gs.state_name,
        gs.state_fips,
        SUM(TRY_CAST(m.deaths AS BIGINT))                                                AS total_deaths,
        AVG(TRY_CAST(m.age_adjusted_rate AS DOUBLE))                                     AS avg_mortality_rate,
        AVG(CASE WHEN w.datatype = 'TAVG' THEN TRY_CAST(w.value AS DOUBLE) END)          AS avg_temp_c,
        MIN(CASE WHEN w.datatype = 'TMIN' THEN TRY_CAST(w.value AS DOUBLE) END)          AS min_monthly_temp_c,
        MAX(CASE WHEN w.datatype = 'TMAX' THEN TRY_CAST(w.value AS DOUBLE) END)          AS max_monthly_temp_c,
        SUM(CASE WHEN w.datatype = 'PRCP' THEN TRY_CAST(w.value AS DOUBLE) END)          AS total_precip_mm
      FROM cdc_mortality m
      LEFT JOIN "geo"."states" gs ON m.state = gs.state_abbr
      LEFT JOIN "weather"."cdo_monthly_summaries" w
        ON gs.state_fips = w.state_fips AND m.year = w.year
      WHERE m.source_type = 'annual'
      GROUP BY m.state, m.year, gs.state_name, gs.state_fips

# ============================================================================
# CONSTRAINTS
# ============================================================================

constraints:

  fda_ndc_products:
    primaryKey: [type, product_ndc]
    foreignKeys:
      - columns: [application_number]
        targetTable: fda_drug_approvals
        targetColumns: [application_number]
        comment: Links NDC product to its FDA approval application
      - columns: [rxcui]
        targetTable: rxnorm_drugs
        targetColumns: [rxcui]
        comment: Links NDC product to RxNorm concept for clinical terminology

  fda_drug_approvals:
    primaryKey: [type, application_number]

  fda_drug_recalls:
    primaryKey: [type, event_id]
    foreignKeys:
      - columns: [state]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: states
        targetColumns: [state_abbr]
        comment: Links recall voluntary firm state to geographic data

  fda_adverse_events:
    primaryKey: [type, safety_report_id]

  fda_device_recalls:
    primaryKey: [type, cfres_id]

  clinical_trials:
    primaryKey: [type, nct_id]

  clinical_trial_conditions:
    primaryKey: [type, nct_id, condition_name]
    foreignKeys:
      - columns: [nct_id]
        targetTable: clinical_trials
        targetColumns: [nct_id]
        comment: Links condition row to parent trial record

  clinical_trial_interventions:
    primaryKey: [type, nct_id, intervention_name]
    foreignKeys:
      - columns: [nct_id]
        targetTable: clinical_trials
        targetColumns: [nct_id]
        comment: Links intervention row to parent trial record

  cdc_covid_vaccinations:
    primaryKey: [type, date, demographic_category]

  cms_hospital_quality:
    primaryKey: [type, facility_id]
    foreignKeys:
      - columns: [state]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: states
        targetColumns: [state_abbr]
        comment: Links hospital state to geographic data for regional quality analysis

  cdc_mortality:
    primaryKey: [source_type, year, state, cause_name]
    foreignKeys:
      - columns: [state]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: states
        targetColumns: [state_abbr]
        comment: Links mortality data to geographic state for spatial health analysis

  cdc_brfss:
    primaryKey: [type, year, state, question, break_out_category, response]
    foreignKeys:
      - columns: [state]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: states
        targetColumns: [state_abbr]
        comment: Links BRFSS survey data to geographic state for behavioral health mapping

  medicaid_drug_utilization:
    primaryKey: [type, state, ndc, year, quarter]
    foreignKeys:
      - columns: [ndc]
        targetTable: fda_ndc_products
        targetColumns: [product_ndc]
        comment: Links Medicaid drug spend to FDA NDC product catalog for drug detail enrichment
      - columns: [state]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: states
        targetColumns: [state_abbr]
        comment: Links state drug utilization to geographic data for Medicaid spending maps

  cms_open_payments:
    primaryKey: [payment_type, program_year, physician_profile_id, paying_entity_name, nature_of_payment]
    foreignKeys:
      - columns: [physician_state]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: states
        targetColumns: [state_abbr]
        comment: Links physician practice state to geographic data

  rxnorm_drugs:
    primaryKey: [type, rxcui]
