  # ---------------------------------------------------------------------------
  # FAA AIRPORTS — NTAD ArcGIS FeatureServer (snapshot, self-paginated JSON)
  # ---------------------------------------------------------------------------
  - name: airports
    pattern: "type=airports/*.parquet"
    partitions: *static_partitions
    comment: >
      FAA airport / aviation-facility master (NTAD, NASR-derived) — one row per
      facility (~19,445), keyed by FAA location id. The ArcGIS FeatureServer
      paginates 2000 features/page, so a self-paginating ResponseTransformer
      fetches all pages and flattens features[].attributes. Snapshot, refreshed
      on the FAA 56-day NASR cycle. arpt_id joins airline_ontime.origin/dest.
      Source: services.arcgis.com/.../NTAD_Aviation_Facilities/FeatureServer/0.

    dimensions:
      type:
        - airports

    columns:
      - name: arpt_id
        type: string
        nullable: false
        comment: FAA location identifier (e.g. ATL) — PK
      - name: arpt_name
        type: string
        nullable: true
        comment: Airport/facility name
      - name: city
        type: string
        nullable: true
        comment: Associated city
      - name: state_code
        type: string
        nullable: true
        comment: State (USPS abbr; FK component to geo.states)
      - name: state_name
        type: string
        nullable: true
        comment: State name
      - name: county_name
        type: string
        nullable: true
        comment: County name
      - name: latitude
        type: double
        nullable: true
        comment: Latitude (decimal degrees, WGS84)
      - name: longitude
        type: double
        nullable: true
        comment: Longitude (decimal degrees, WGS84)
      - name: elevation_ft
        type: double
        nullable: true
        comment: Field elevation (feet)
      - name: site_type_code
        type: string
        nullable: true
        comment: Facility type (A=airport, H=heliport, S=seaplane base, ...)
      - name: facility_use_code
        type: string
        nullable: true
        comment: PU=public, PR=private
      - name: ownership_type_code
        type: string
        nullable: true
        comment: Ownership (PU=public, PR=private, MA/MN/MR=military)
      - name: arpt_status
        type: string
        nullable: true
        comment: Operational status (O=operational)
      - name: region_code
        type: string
        nullable: true
        comment: FAA region code
      - name: eff_date
        type: string
        nullable: true
        comment: NASR effective date (56-day cycle) — freshness marker

    source:
      type: http
      # Trigger URL; the transformer self-paginates via resultOffset. returnGeometry
      # is off (lat/lon come from the LAT_DECIMAL/LONG_DECIMAL attributes).
      # where / outFields / f=json live in the URL; the OFFSET paginator injects
      # resultOffset + resultRecordCount (do NOT hardcode them here). ArcGIS caps
      # a page at maxRecordCount=2000; pageSize 2000 makes full pages exactly 2000
      # rows so termination fires on the short final page (no count in the body).
      url: "https://services.arcgis.com/xOi1kZaI0eWDREZv/arcgis/rest/services/NTAD_Aviation_Facilities/FeatureServer/0/query?where=1%3D1&outFields=ARPT_ID,ARPT_NAME,CITY,STATE_CODE,STATE_NAME,COUNTY_NAME,LAT_DECIMAL,LONG_DECIMAL,ELEV,SITE_TYPE_CODE,FACILITY_USE_CODE,OWNERSHIP_TYPE_CODE,ARPT_STATUS,REGION_CODE,EFF_DATE&returnGeometry=false&f=json"
      method: GET
      response:
        format: json
        pagination:
          type: OFFSET
          offsetParam: resultOffset
          limitParam: resultRecordCount
          pageSize: 2000
      rateLimit:
        requestsPerSecond: 2.0
        retryOn: [429, 500, 503]
        maxRetries: 3
      # Paginated source — the paginator merges pages; the single-response cache
      # would truncate to page 1, so keep it off.
      rawCache:
        enabled: false

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.transport.FaaAirportsTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=airports/"
      partition:
        columns: [type]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/transport"
        tableName: airports
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 67108864
        compactionMinFiles: 3
        incrementalTtlDays: 30
        overwritePartitions: true

  # ---------------------------------------------------------------------------
  # FTA TRANSIT RIDERSHIP — DOT Socrata 8bui-9xvu (delta by month, JSON)
  # ---------------------------------------------------------------------------
  - name: transit_ridership
    pattern: "type=transit_ridership/year=*/month=*/*.parquet"
    partitions: *month_partitions
    comment: >
      FTA National Transit Database — Complete Monthly Ridership (with
      adjustments and estimates). Long format: one row per transit agency ×
      mode × type-of-service × month with unlinked passenger trips (upt),
      vehicles operated in max service (voms), and vehicle revenue hours/miles
      (vrh/vrm). Delta by (year, month) sliced from the Socrata `date` field.
      Source: data.transportation.gov/resource/8bui-9xvu.json.

    dimensions:
      type:
        - transit_ridership
      year: *ontime_year_range
      month: *all_months

    columns:
      - name: ntd_id
        type: string
        nullable: true
        expression: 'src."ntd_id"'
        comment: NTD agency id
      - name: agency
        type: string
        nullable: true
        expression: 'src."agency"'
        comment: Transit agency name
      - name: uza_name
        type: string
        nullable: true
        expression: 'src."uza_name"'
        comment: Urbanized area name
      - name: mode
        type: string
        nullable: true
        expression: 'src."mode"'
        comment: NTD mode code (e.g. DR, MB, HR, LR)
      - name: mode_name
        type: string
        nullable: true
        expression: 'src."_3_mode"'
        comment: Grouped mode label (e.g. Bus, Heavy Rail)
      - name: tos
        type: string
        nullable: true
        expression: 'src."tos"'
        comment: Type of service (DO=directly operated, PT=purchased transportation)
      - name: reporter_type
        type: string
        nullable: true
        expression: 'src."reporter_type"'
        comment: Reporter type (Full Reporter, ...)
      - name: state_abbr
        type: string
        nullable: true
        expression: 'src."state"'
        comment: State (USPS abbr; FK component to geo.states)
      - name: fta_region
        type: string
        nullable: true
        expression: 'src."fta_region"'
        comment: FTA region number
      - name: ride_date
        type: date
        nullable: true
        expression: 'TRY_CAST(src."date" AS DATE)'
        comment: Observation month (first of month)
      - name: upt
        type: double
        nullable: true
        expression: 'TRY_CAST(src."upt" AS DOUBLE)'
        comment: Unlinked passenger trips
      - name: voms
        type: double
        nullable: true
        expression: 'TRY_CAST(src."voms" AS DOUBLE)'
        comment: Vehicles operated in maximum service
      - name: vrh
        type: double
        nullable: true
        expression: 'TRY_CAST(src."vrh" AS DOUBLE)'
        comment: Vehicle revenue hours
      - name: vrm
        type: double
        nullable: true
        expression: 'TRY_CAST(src."vrm" AS DOUBLE)'
        comment: Vehicle revenue miles
      - name: agency_mode_tos_date
        type: string
        nullable: false
        expression: 'src."agency_mode_tos_date"'
        comment: Composite natural key (agency_mode_tos_reporter_uace_date) — PK

    source:
      type: http
      # SoQL slices the (year, month) partition directly from the `date` field;
      # one fetch per partition well under Socrata's 50000-row page cap.
      url: "https://data.transportation.gov/resource/8bui-9xvu.json?$where=date%20%3E%3D%20'{effective_year}-{month}-01T00:00:00'%20AND%20date%20%3C%20'{period_end}'&$limit=50000&$order=agency_mode_tos_date"
      method: GET
      response:
        format: json
      rateLimit:
        requestsPerSecond: 2.0
        retryOn: [429, 500, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    materialize:
      format: iceberg
      output:
        pattern: "type=transit_ridership/year=*/month=*/"
      partition:
        columns: [type, year, month]
        valueSource:
          year: effective_year
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/transport"
        tableName: transit_ridership
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 67108864
        compactionMinFiles: 3
        batchPartitionColumns: [year, month]
        incrementalKeys: [year, month]
        overwritePartitions: true

