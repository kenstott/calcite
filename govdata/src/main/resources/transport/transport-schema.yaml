  # ---------------------------------------------------------------------------
  - name: vehicle_registrations
    pattern: "type=vehicle_registrations/year=*/*.parquet"
    partitions: *standard_partitions
    comment: >
      FHWA Highway Statistics table MV-1 — state motor-vehicle registrations by
      vehicle class (automobiles, buses, trucks, motorcycles, and the all-vehicle
      total) for the data year. FHWA publishes MV-1 only as a merged multi-header
      Excel workbook, so a ResponseTransformer parses the fixed MV-1 layout and
      derives state_fips. Delta by year; dataLag 2 targets the newest available
      data year. Joins to geo.states via state_fips. Source:
      fhwa.dot.gov/policyinformation/statistics/{year}/xls/mv1.xlsx.

    dimensions:
      type:
        - vehicle_registrations
      year: *fhwa_year_range

    columns:
      - <<: *state_fips_column
        nullable: false
      - name: state_name
        type: string
        nullable: true
        comment: State name (footnote markers stripped)
      - name: automobiles
        type: long
        nullable: true
        comment: Registered automobiles (total, public + private)
      - name: buses
        type: long
        nullable: true
        comment: Registered buses (total)
      - name: trucks
        type: long
        nullable: true
        comment: Registered trucks (total)
      - name: motorcycles
        type: long
        nullable: true
        comment: Registered motorcycles (total)
      - name: all_motor_vehicles
        type: long
        nullable: true
        comment: All registered motor vehicles (total)

    source:
      type: http
      url: "https://www.fhwa.dot.gov/policyinformation/statistics/{effective_year}/xls/mv1.xlsx"
      method: GET
      # Transformer re-downloads the URL as raw bytes and parses with POI; the
      # text body handed in is ignored (binary XLSX corrupts under UTF-8 decode).
      parallel: 1
      response:
        format: text
      rateLimit:
        requestsPerSecond: 1.0
        retryOn: [429, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.transport.FhwaVehicleRegistrationsTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=vehicle_registrations/year=*/"
      partition:
        columns: [type, year]
        valueSource:
          year: effective_year
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/transport"
        tableName: vehicle_registrations
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 67108864
        compactionMinFiles: 3
        batchPartitionColumns: [year]
        incrementalKeys: [year]
        overwritePartitions: true

  # ---------------------------------------------------------------------------
  # FMCSA MOTOR CARRIER CENSUS — DOT Socrata az4n-8mr2 bulk CSV (snapshot)
  # ---------------------------------------------------------------------------
  - name: fmcsa_carriers
    pattern: "type=fmcsa_carriers/*.parquet"
    partitions: *static_partitions
    comment: >
      FMCSA Company Census File — one row per USDOT-registered motor carrier
      (~4.47M rows), carrying registration, fleet size, operation type, and
      (for carriers that received a compliance review) the assigned safety
      rating. Bulk CSV export of DOT Socrata dataset az4n-8mr2 — the whole set
      is downloaded in one unpaginated request and the partition overwritten
      each run, so this is a snapshot. Crash/inspection/out-of-service metrics
      are NOT on this file (only ~54K carriers are ever rated); they publish as
      separate per-event SMS datasets (SMS Input - Crash 4wxs-vbns / aayw-vxb3,
      SMS Input - Inspection rbkj-cgst) and would be their own raw tables + a
      rollup view, per the one-source-per-table rule. In DQ mode dqRowLimit caps
      the sample. Source:
      data.transportation.gov/api/views/az4n-8mr2/rows.csv?accessType=DOWNLOAD.
    dqRowLimit: 200000

    dimensions:
      type:
        - fmcsa_carriers

    columns:
      - name: dot_number
        type: string
        nullable: false
        expression: 'src."DOT_NUMBER"'
        comment: USDOT number — PK
      - name: carrier_name
        type: string
        nullable: true
        expression: 'src."LEGAL_NAME"'
        comment: Legal carrier name (fuzzy-join to sec.filing_metadata)
      - name: dba_name
        type: string
        nullable: true
        expression: 'src."DBA_NAME"'
        comment: Doing-business-as name (often blank)
      - name: phy_city
        type: string
        nullable: true
        expression: 'src."PHY_CITY"'
        comment: Principal place of business — city
      - name: state_abbr
        type: string
        nullable: true
        expression: 'src."PHY_STATE"'
        comment: Principal office state (USPS abbr; FK component to geo.state_ref)
      - name: phy_zip
        type: string
        nullable: true
        expression: 'src."PHY_ZIP"'
        comment: Principal place of business — ZIP
      - name: business_org
        type: string
        nullable: true
        expression: 'src."BUSINESS_ORG_DESC"'
        comment: Business organization (CORPORATION / LLC / SOLE PROPRIETOR / ...)
      - name: classdef
        type: string
        nullable: true
        expression: 'src."CLASSDEF"'
        comment: Carrier classification (semicolon multi-value, e.g. PRIVATE PROPERTY;AUTHORIZED FOR HIRE)
      - name: operation_type
        type: string
        nullable: true
        expression: 'src."CARRIER_OPERATION"'
        comment: Operation classification (A=Interstate, B=Intrastate Hazmat, C=Intrastate Non-Hazmat)
      - name: safety_rating
        type: string
        nullable: true
        expression: 'src."SAFETY_RATING"'
        comment: Safety rating (S=Satisfactory, C=Conditional, U=Unsatisfactory; blank unless a compliance review occurred)
      - name: safety_rating_date
        type: date
        nullable: true
        expression: 'TRY_CAST(strptime(NULLIF(src."SAFETY_RATING_DATE",''''), ''%Y%m%d'') AS DATE)'
        comment: Date of the most recent safety rating
      - name: review_date
        type: date
        nullable: true
        expression: 'TRY_CAST(strptime(NULLIF(src."REVIEW_DATE",''''), ''%Y%m%d'') AS DATE)'
        comment: Date of the most recent compliance review
      - name: total_drivers
        type: integer
        nullable: true
        expression: 'TRY_CAST(src."TOTAL_DRIVERS" AS INTEGER)'
        comment: Number of drivers
      - name: total_cdl
        type: integer
        nullable: true
        expression: 'TRY_CAST(src."TOTAL_CDL" AS INTEGER)'
        comment: Number of CDL drivers
      - name: power_units
        type: integer
        nullable: true
        expression: 'TRY_CAST(src."POWER_UNITS" AS INTEGER)'
        comment: Power units (trucks and tractors)
      - name: truck_units
        type: integer
        nullable: true
        expression: 'TRY_CAST(src."TRUCK_UNITS" AS INTEGER)'
        comment: Truck units
      - name: bus_units
        type: integer
        nullable: true
        expression: 'TRY_CAST(src."BUS_UNITS" AS INTEGER)'
        comment: Bus units
      - name: hazmat_flag
        type: string
        nullable: true
        expression: 'src."HM_Ind"'
        comment: Authorized to transport hazardous materials (Y/N)
      - name: recordable_crash_rate
        type: double
        nullable: true
        expression: 'TRY_CAST(src."RECORDABLE_CRASH_RATE" AS DOUBLE)'
        comment: FMCSA recordable crash rate (per the carrier census, when computed)
      - name: mcs150_mileage
        type: long
        nullable: true
        expression: 'TRY_CAST(src."MCS150_MILEAGE" AS BIGINT)'
        comment: Annual vehicle miles traveled reported on the MCS-150
      - name: mcs150_mileage_year
        type: integer
        nullable: true
        expression: 'TRY_CAST(src."MCS150_MILEAGE_YEAR" AS INTEGER)'
        comment: Year of the reported MCS-150 mileage
      - name: status_code
        type: string
        nullable: true
        expression: 'src."STATUS_CODE"'
        comment: Carrier record status code (A=Active, I=Inactive, ...)

    source:
      type: http
      # Socrata bulk CSV export = the whole dataset in one unpaginated request
      # (preferred over $limit/$offset paging of 4.47M rows). Headers are the
      # UPPERCASE source field names (note HM_Ind is mixed-case).
      url: "https://data.transportation.gov/api/views/az4n-8mr2/rows.csv?accessType=DOWNLOAD"
      method: GET
      response:
        format: csv
        hasHeader: true
      freshness:
        type: etag
      rateLimit:
        requestsPerSecond: 1.0
        retryOn: [429, 500, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    materialize:
      format: iceberg
      output:
        pattern: "type=fmcsa_carriers/"
      partition:
        columns: [type]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/transport"
        tableName: fmcsa_carriers
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 3
        incrementalTtlDays: 7
        overwritePartitions: true

  # ---------------------------------------------------------------------------
  # FAA AIRCRAFT REGISTRY — ReleasableAircraft.zip, one faithful table per file
  # ---------------------------------------------------------------------------
  # The zip holds MASTER.txt (registered aircraft), ACFTREF.txt (aircraft
  # reference), ENGINE.txt (engine reference), plus DEALER/RESERVED/DEREG. Each
  # file is a comma-delimited, space-padded, header-bearing text file (verified
  # 0 ragged rows — no embedded commas), so each lands as a faithful clean-CSV
  # passthrough table (all columns, no Java), sharing one cached zip via
  # extractPattern. The friendly denormalized join + code decoding is the
  # faa_aircraft_registry VIEW (SQL, never Java). The prior single projected
  # table dropped engine detail, Mode-S/ICAO hex, addresses, and dates.
  # ---------------------------------------------------------------------------
  - name: faa_aircraft_master
    pattern: "type=faa_aircraft_master/*.parquet"
    partitions: *static_partitions
    comment: >
      FAA MASTER.txt — one row per registered aircraft (~314K), keyed by
      N-number. Faithful recreation of the master file: registration, address,
      airworthiness/certificate dates, Mode-S transponder codes, fractional
      ownership, kit build, and the reference/engine join codes. Snapshot.
      Source: registry.faa.gov/database/ReleasableAircraft.zip (MASTER.txt).
    dqRowLimit: 100000

    dimensions:
      type:
        - faa_aircraft_master

    columns:
      - name: n_number
        type: string
        nullable: false
        expression: '''N'' || trim(src."N-NUMBER")'
        comment: FAA N-number / tail number, canonical N-prefixed form (e.g. N100) — PK; join target for airline_ontime.tail_number and ntsb_aviation_accidents.aircraft_n_number
      - name: serial_number
        type: string
        nullable: true
        expression: 'trim(src."SERIAL NUMBER")'
        comment: Manufacturer serial number
      - name: mfr_mdl_code
        type: string
        nullable: true
