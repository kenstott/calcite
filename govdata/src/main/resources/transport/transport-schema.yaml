  # ---------------------------------------------------------------------------
  # NTSB AVIATION ACCIDENTS — avall.zip / avall.mdb (snapshot, Jackcess MDB read)
  # ---------------------------------------------------------------------------
  - name: ntsb_aviation_accidents
    pattern: "type=ntsb_aviation_accidents/*.parquet"
    partitions: *static_partitions
    comment: >
      NTSB aviation accident & incident database — one row per aircraft involved
      in an event (all events 1982-present). The download (avall.zip, ~95MB) is a
      single Microsoft Access database (avall.mdb, ~553MB) read in-JVM with
      Jackcess by NtsbAviationTransformer: the `aircraft` table (grain ev_id +
      Aircraft_Key) is streamed and joined to `events` (ev_id) and the
      `narratives.narr_cause` probable-cause text. The MDB has no county column,
      so only state_fips is derived (from USPS ev_state). Snapshot: the whole MDB
      is re-ingested and the partition overwritten each run. event_year is a
      column (not a partition) since one file carries all years. Source:
      data.ntsb.gov/avdata/avall.zip.

    dimensions:
      type:
        - ntsb_aviation_accidents

    columns:
      - name: event_id
        type: string
        nullable: false
        comment: NTSB event id (ev_id) — PK component
      - name: aircraft_key
        type: integer
        nullable: false
        comment: Aircraft sequence within the event (Aircraft_Key) — PK component
      - name: event_year
        type: integer
        nullable: true
        comment: Year of the event
      - name: event_date
        type: date
        nullable: true
        comment: Date of the accident/incident
      - name: event_type
        type: string
        nullable: true
        comment: Accident / Incident (decoded from ev_type)
      - name: aircraft_n_number
        type: string
        nullable: true
        comment: Aircraft tail number, canonical N-prefixed (regis_no; FK to faa_aircraft_master.n_number)
      - name: aircraft_make
        type: string
        nullable: true
        comment: Aircraft manufacturer (acft_make)
      - name: aircraft_model
        type: string
        nullable: true
        comment: Aircraft model (acft_model)
      - name: aircraft_category
        type: string
        nullable: true
        comment: Aircraft category code (acft_category; e.g. AIR, HELI)
      - name: far_part
        type: string
        nullable: true
        comment: FAR operating part (091, 121, 135, ...) — operation type
      - name: carrier_name
        type: string
        nullable: true
        comment: Operator/carrier name (oper_name)
      - name: city
        type: string
        nullable: true
        comment: Event city (ev_city)
      - name: state_abbr
        type: string
        nullable: true
        comment: Event state (USPS abbr; FK component to geo.state_ref)
      - <<: *state_fips_column
      - name: country
        type: string
        nullable: true
        comment: Event country code (ev_country)
      - name: airport_id
        type: string
        nullable: true
        comment: Nearest airport id (ev_nr_apt_id; null for en-route)
      - name: airport_name
        type: string
        nullable: true
        comment: Nearest airport name (apt_name)
      - name: injury_severity
        type: string
        nullable: true
        comment: Highest injury level (Fatal / Serious / Minor / None; decoded)
      - name: fatal_injuries
        type: integer
        nullable: true
        comment: Total fatalities (inj_tot_f)
      - name: serious_injuries
        type: integer
        nullable: true
        comment: Total serious injuries (inj_tot_s)
      - name: minor_injuries
        type: integer
        nullable: true
        comment: Total minor injuries (inj_tot_m)
      - name: aircraft_damage
        type: string
        nullable: true
        comment: Aircraft damage (Destroyed / Substantial / Minor / None; decoded)
      - name: phase_flt_code
        type: integer
        nullable: true
        comment: NTSB phase-of-flight code (phase_flt_spec; raw code, not decoded)
      - name: latitude
        type: double
        nullable: true
        comment: Event latitude (dec_latitude, WGS84)
      - name: longitude
        type: double
        nullable: true
        comment: Event longitude (dec_longitude, WGS84)
      - name: probable_cause
        type: string
        nullable: true
        comment: NTSB probable-cause narrative (narr_cause, truncated to 4000 chars)

    source:
      type: http
      url: "https://data.ntsb.gov/avdata/avall.zip"
      method: GET
      # StreamingResponseTransformer opens the URL itself (95MB zip -> 553MB MDB);
      # the framework does not pre-fetch, so rawCache does not apply.
      response:
        format: json
      rateLimit:
        requestsPerSecond: 1.0
        retryOn: [429, 500, 503]
        maxRetries: 3
      rawCache:
        enabled: false

    hooks:
      responseTransformer: "org.apache.calcite.adapter.govdata.transport.NtsbAviationTransformer"

    materialize:
      format: iceberg
      output:
        pattern: "type=ntsb_aviation_accidents/"
      partition:
        columns: [type]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/transport"
        tableName: ntsb_aviation_accidents
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 67108864
        compactionMinFiles: 3
        incrementalTtlDays: 7
        overwritePartitions: true

  # ---------------------------------------------------------------------------
  # CFS SHIPMENTS — Commodity Flow Survey Public Use File (snapshot, bulk CSV)
  # ---------------------------------------------------------------------------
  - name: cfs_shipments
    pattern: "type=cfs_shipments/*.parquet"
    partitions: *static_partitions
    comment: >
      Census/BTS Commodity Flow Survey 2017 Public Use File (PUF) — one row per
      sampled shipment (~5.98M), the shipment-level microdata behind every CFS
      cross-tab. Origin/destination state + CFS area, SCTG commodity, mode,
      shipper NAICS, value ($), weight (lb), great-circle + routed distance
      (miles), and WGT_FACTOR (the tabulation weight: SUM(measure * wgt_factor)
      estimates the population total). All published cross-tabs (origin x dest x
      commodity x mode, by-NAICS, by-distance, ...) are SQL views over this one
      table (never Java) — e.g. the bts_freight_flows view. Aggregates are
      sample-weighted estimates and approximate the official CFS tables. Bulk CSV
      export of BTS Socrata y9wr-xk52; snapshot, partition overwritten each run.
      Source: data.bts.gov/api/views/y9wr-xk52/rows.csv.
    dqRowLimit: 200000

    dimensions:
      type:
        - cfs_shipments

    columns:
      - name: shipmt_id
        type: string
        nullable: false
        expression: 'src."SHIPMT_ID"'
        comment: Shipment identifier — PK
      - name: survey_year
        type: integer
        nullable: false
        expression: '2017'
        comment: CFS survey year (this PUF file is 2017)
      - name: orig_state_fips
        type: string
        nullable: true
        expression: 'CASE WHEN src."ORIG_STATE" IS NULL OR src."ORIG_STATE"='''' THEN NULL ELSE lpad(src."ORIG_STATE", 2, ''0'') END'
        comment: Origin state FIPS (FK to geo.state_ref)
      - name: orig_cfs_area
        type: string
        nullable: true
        expression: 'src."ORIG_CFS_AREA"'
        comment: Origin CFS area code (state-MA)
      - name: dest_state_fips
        type: string
        nullable: true
        expression: 'CASE WHEN src."DEST_STATE" IS NULL OR src."DEST_STATE"='''' THEN NULL ELSE lpad(src."DEST_STATE", 2, ''0'') END'
        comment: Destination state FIPS (FK to geo.state_ref)
      - name: dest_cfs_area
        type: string
        nullable: true
        expression: 'src."DEST_CFS_AREA"'
        comment: Destination CFS area code (state-MA)
      - name: naics
        type: string
        nullable: true
        expression: 'src."NAICS"'
        comment: Shipper NAICS code
      - name: quarter
        type: integer
        nullable: true
        expression: 'TRY_CAST(src."QUARTER" AS INTEGER)'
        comment: Quarter of shipment (1-4)
      - name: sctg_code
        type: string
        nullable: true
        expression: 'src."SCTG"'
        comment: SCTG commodity code
      - name: mode_code
        type: string
        nullable: true
        expression: 'src."MODE"'
        comment: CFS transport mode code (raw; some recoded for confidentiality)
      - name: shipmt_value
        type: double
        nullable: true
        expression: 'TRY_CAST(src."SHIPMT_VALUE" AS DOUBLE)'
        comment: Shipment value (USD)
      - name: shipmt_weight_lb
        type: double
        nullable: true
        expression: 'TRY_CAST(src."SHIPMT_WGHT" AS DOUBLE)'
        comment: Shipment weight (pounds)
      - name: dist_gc_miles
        type: double
        nullable: true
        expression: 'TRY_CAST(src."SHIPMT_DIST_GC" AS DOUBLE)'
        comment: Great-circle distance origin->destination (miles)
      - name: dist_routed_miles
        type: double
        nullable: true
        expression: 'TRY_CAST(src."SHIPMT_DIST_ROUTED" AS DOUBLE)'
        comment: Routed distance origin->destination (miles)
      - name: temp_controlled
        type: string
        nullable: true
        expression: 'src."TEMP_CNTL_YN"'
        comment: Temperature-controlled shipment (true/false)
      - name: export_yn
        type: string
        nullable: true
        expression: 'src."EXPORT_YN"'
        comment: Export shipment (true/false)
      - name: export_country
        type: string
        nullable: true
        expression: 'src."EXPORT_CNTRY"'
        comment: Export final destination country indicator
      - name: hazmat
        type: string
        nullable: true
        expression: 'src."HAZMAT"'
        comment: Hazardous material code (N = not hazmat)
      - name: wgt_factor
        type: double
        nullable: true
        expression: 'TRY_CAST(src."WGT_FACTOR" AS DOUBLE)'
        comment: Shipment tabulation weighting factor (multiply measures by this for population estimates)

    source:
      type: http
      # Socrata bulk CSV export = the whole 5.98M-row PUF in one unpaginated
      # request (preferred over paging). Headers are UPPERCASE source names.
      url: "https://data.bts.gov/api/views/y9wr-xk52/rows.csv?accessType=DOWNLOAD"
      method: GET
      response:
        format: csv
        hasHeader: true
      freshness:
        type: etag
      rateLimit:
        requestsPerSecond: 1.0
        retryOn: [429, 500, 503]
        maxRetries: 3
      rawCache:
        enabled: true

    materialize:
      format: iceberg
      output:
        pattern: "type=cfs_shipments/"
      partition:
        columns: [type]
      iceberg:
        warehousePath: "${GOVDATA_PARQUET_DIR}/transport"
        tableName: cfs_shipments
        catalogType: hadoop
        runCompaction: true
        compactionTargetFileSizeBytes: 134217728
        compactionMinFiles: 3
        incrementalTtlDays: 30
        overwritePartitions: true

# ============================================================================
# CONSTRAINTS
# ============================================================================
# PKs identify one observation. Most FKs are inter-schema, pointing at geo
# dimension tables via state/county keys. The one intra-transport dimension is
# airports: the aviation traffic tables (airline_ontime, t100_segments) FK their
# origin/dest airport codes to airports.arpt_id. The road-safety and transit
# tables share only geo keys with the rest.
# ============================================================================

constraints:

  vehicle_recalls:
    primaryKey: [nhtsa_id]

  safety_complaints:
    primaryKey: [cmplid]
    foreignKeys:
      - columns: [state_abbr]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_abbr]
      - columns: [state_of_incident]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_abbr]

  fatal_crashes:
    primaryKey: [year, st_case]
    foreignKeys:
      - columns: [state_fips]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_fips]
      - columns: [county_fips]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: counties
        targetColumns: [county_fips]

  airline_ontime:
    primaryKey: [flight_date, reporting_airline, flight_number, origin, dest, crs_dep_time]
    foreignKeys:
      - columns: [origin]
        targetTable: airports
        targetColumns: [arpt_id]
      - columns: [dest]
        targetTable: airports
        targetColumns: [arpt_id]
      - columns: [tail_number]
        targetTable: faa_aircraft_master
        targetColumns: [n_number]
      - columns: [origin_state]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_abbr]
      - columns: [dest_state]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_abbr]

  airports:
    primaryKey: [arpt_id]
    foreignKeys:
      - columns: [state_code]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_abbr]

  transit_ridership:
    primaryKey: [agency_mode_tos_date]
    foreignKeys:
      - columns: [state_abbr]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_abbr]

  t100_segments:
    # service_class is part of the grain: T-100 publishes separate rows per
    # service class (scheduled passenger vs. cargo, etc.) for the same
    # carrier/route/aircraft/month, so it must be in the key to stay unique.
    primaryKey: [year, month, carrier, origin, dest, aircraft_type, service_class]
    foreignKeys:
      - columns: [origin]
        targetTable: airports
        targetColumns: [arpt_id]
      - columns: [dest]
        targetTable: airports
        targetColumns: [arpt_id]
      - columns: [origin_state]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_abbr]
      - columns: [dest_state]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_abbr]

  vehicle_registrations:
    primaryKey: [year, state_fips]
    foreignKeys:
      - columns: [state_fips]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_fips]

  fmcsa_carriers:
    primaryKey: [dot_number]
    foreignKeys:
      - columns: [state_abbr]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_abbr]

  faa_aircraft_master:
    primaryKey: [n_number]
    unique:
      - [unique_id]
    foreignKeys:
      - columns: [state_abbr]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_abbr]
      - columns: [mfr_mdl_code]
        targetTable: faa_aircraft_reference
        targetColumns: [code]
      - columns: [eng_mfr_mdl]
        targetTable: faa_engine_reference
        targetColumns: [code]

  faa_aircraft_reference:
    primaryKey: [code]

  faa_engine_reference:
    primaryKey: [code]

  ntsb_aviation_accidents:
    primaryKey: [event_id, aircraft_key]
    foreignKeys:
      - columns: [state_abbr]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_abbr]
      - columns: [state_fips]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_fips]
      - columns: [airport_id]
        targetTable: airports
        targetColumns: [arpt_id]
      - columns: [aircraft_n_number]
        targetTable: faa_aircraft_master
        targetColumns: [n_number]

  cfs_shipments:
    primaryKey: [shipmt_id]
    foreignKeys:
      - columns: [orig_state_fips]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_fips]
      - columns: [dest_state_fips]
        targetSchema: "${GEO_SCHEMA_NAME:geo}"
        targetTable: state_ref
        targetColumns: [state_fips]

# ============================================================================
# VIEWS
# ============================================================================

views:

  - name: airline_ontime_by_carrier_month
    comment: >
      Monthly on-time summary by reporting carrier: flight counts, average
      arrival delay, and cancellation rate. The headline punctuality rollup.
    sql: >
      SELECT
        o.year,
        o.month,
        o.reporting_airline,
        COUNT(*)                                      AS flights,
        AVG(o.arr_delay)                              AS avg_arr_delay,
        SUM(o.cancelled)                              AS cancellations,
        SUM(o.cancelled) / CAST(COUNT(*) AS DOUBLE)   AS cancellation_rate,
        AVG(o.dep_del15)                              AS pct_dep_delayed_15
      FROM airline_ontime o
      GROUP BY o.year, o.month, o.reporting_airline

  - name: fatal_crashes_by_state_year
    comment: >
      Fatal crashes and total fatalities by state and year — the core FARS
      rollup, joinable to geo.states and census population for per-capita rates.
    sql: >
      SELECT
        f.year,
        f.state_fips,
        f.state_name,
        COUNT(*)             AS crashes,
        SUM(f.fatalities)    AS fatalities,
        SUM(f.pedestrians)   AS pedestrians_involved
      FROM fatal_crashes f
      GROUP BY f.year, f.state_fips, f.state_name

  - name: transit_ridership_by_agency_year
    comment: >
      Annual transit ridership (unlinked passenger trips) by agency and mode,
      summed from the monthly series.
    sql: >
      SELECT
        CAST(EXTRACT(YEAR FROM t.ride_date) AS INTEGER) AS year,
        t.ntd_id,
        t.agency,
        t.mode_name,
        t.state_abbr,
        SUM(t.upt)   AS unlinked_passenger_trips,
        SUM(t.vrm)   AS vehicle_revenue_miles
      FROM transit_ridership t
      GROUP BY 1, t.ntd_id, t.agency, t.mode_name, t.state_abbr

  - name: bts_freight_flows
    comment: >
      Commodity Flow Survey freight flows — the origin-state x destination-state x
      SCTG commodity x mode estimate, aggregated from the cfs_shipments Public Use
      File by the tabulation weight (WGT_FACTOR). value_million = USD millions,
      tons_thousands = thousands of short tons (weight_lb / 2000), ton_miles_million
      = millions of ton-miles (tons x routed miles). These are sample-weighted
      estimates and approximate — not identical to — the official published CFS
      tables. Every other CFS cross-tab (by NAICS, by distance band, ...) is a
      sibling view over cfs_shipments; add as needed.
    sql: >
      SELECT
        s.survey_year,
        s.orig_state_fips                                             AS origin_state_fips,
        s.dest_state_fips,
        s.sctg_code,
        s.mode_code,
        SUM(s.shipmt_value * s.wgt_factor) / 1e6                      AS value_million,
        SUM(s.shipmt_weight_lb * s.wgt_factor) / 2000.0 / 1000.0      AS tons_thousands,
        SUM(s.shipmt_weight_lb * s.wgt_factor * s.dist_routed_miles) / 2000.0 / 1e6
                                                                      AS ton_miles_million,
        COUNT(*)                                                      AS sample_shipments
      FROM cfs_shipments s
      GROUP BY s.survey_year, s.orig_state_fips, s.dest_state_fips, s.sctg_code, s.mode_code

  - name: faa_aircraft_registry
    comment: >
      Friendly denormalized view of the FAA aircraft registry: faa_aircraft_master
      joined to faa_aircraft_reference (manufacturer / model / category / seats)
      and faa_engine_reference (engine make / model / horsepower / thrust), with
      the registrant-type, aircraft-type, engine-type, category and status codes
      decoded. n_number is surfaced as the full tail number (N-prefixed). Raw
      per-file detail (addresses, Mode-S codes, dates, kit build, other names)
      stays on faa_aircraft_master; other cross-tabs are sibling views.
    sql: >
      SELECT
        m.n_number,
        m.unique_id,
        m.serial_number,
        m.mfr_mdl_code,
        r.mfr                                                        AS manufacturer,
        r.model                                                      AS model,
        CASE r.ac_cat WHEN '1' THEN 'Land' WHEN '2' THEN 'Sea' WHEN '3' THEN 'Amphibian' END AS aircraft_category,
        CASE COALESCE(r.type_acft, m.type_aircraft)
          WHEN '1' THEN 'Glider' WHEN '2' THEN 'Balloon' WHEN '3' THEN 'Blimp/Dirigible'
          WHEN '4' THEN 'Fixed wing single engine' WHEN '5' THEN 'Fixed wing multi engine'
          WHEN '6' THEN 'Rotorcraft' WHEN '7' THEN 'Weight-shift-control'
          WHEN '8' THEN 'Powered Parachute' WHEN '9' THEN 'Gyroplane'
          WHEN 'H' THEN 'Hybrid Lift' WHEN 'O' THEN 'Other' END      AS aircraft_type,
        CASE COALESCE(r.type_eng, m.type_engine)
          WHEN '0' THEN 'None' WHEN '1' THEN 'Reciprocating' WHEN '2' THEN 'Turbo-prop'
          WHEN '3' THEN 'Turbo-shaft' WHEN '4' THEN 'Turbo-jet' WHEN '5' THEN 'Turbo-fan'
          WHEN '6' THEN 'Ramjet' WHEN '7' THEN '2 Cycle' WHEN '8' THEN '4 Cycle'
          WHEN '9' THEN 'Unknown' WHEN '10' THEN 'Electric' WHEN '11' THEN 'Rotary' END AS engine_type,
        r.no_eng                                                     AS num_engines,
        r.no_seats                                                   AS num_seats,
        r.ac_weight                                                  AS weight_class,
        e.mfr                                                        AS engine_manufacturer,
        e.model                                                      AS engine_model,
        e.horsepower                                                 AS engine_horsepower,
        e.thrust                                                     AS engine_thrust,
        m.year_mfr                                                   AS year_manufactured,
        m.registrant_name,
        CASE m.type_registrant
          WHEN '1' THEN 'Individual' WHEN '2' THEN 'Partnership' WHEN '3' THEN 'Corporation'
          WHEN '4' THEN 'Co-Owned' WHEN '5' THEN 'Government' WHEN '7' THEN 'LLC'
          WHEN '8' THEN 'Non-Citizen Corporation' WHEN '9' THEN 'Non-Citizen Co-Owned' END AS registrant_type,
        m.city,
        m.state_abbr,
        m.zip_code,
        m.county_code,
        m.country,
        CASE m.status_code
          WHEN 'V' THEN 'Valid Registration' WHEN 'R' THEN 'Registration pending'
          WHEN 'A' THEN 'Triennial form not returned' WHEN 'D' THEN 'Expired Dealer'
          WHEN 'E' THEN 'Revoked by enforcement' WHEN 'W' THEN 'Certificate ineffective'
          WHEN 'Z' THEN 'Permanent Reserved' ELSE m.status_code END  AS status,
        m.mode_s_code_hex,
        m.fract_owner,
        m.cert_issue_date,
        m.airworthiness_date,
        m.expiration_date
      FROM faa_aircraft_master m
      LEFT JOIN faa_aircraft_reference r ON m.mfr_mdl_code = r.code
      LEFT JOIN faa_engine_reference e ON m.eng_mfr_mdl = e.code
