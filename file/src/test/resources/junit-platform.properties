# Limit JUnit 5 parallel test execution to prevent ForkJoinPool thread exhaustion
junit.jupiter.execution.parallel.enabled=true
junit.jupiter.execution.parallel.mode.default=same_thread
junit.jupiter.execution.parallel.mode.classes.default=concurrent
junit.jupiter.execution.parallel.config.strategy=fixed
junit.jupiter.execution.parallel.config.fixed.parallelism=4
junit.jupiter.execution.parallel.config.fixed.max-pool-size=8

# Use NEVER cleanup for temp dirs since DuckDB/FileSchema may hold file locks
# Tests manage their own cleanup via @AfterEach
junit.jupiter.tempdir.cleanup.mode.default=NEVER
